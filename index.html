function quoteById(id){ return (db.quotations||[]).find(q=>q.id===id); }
// สิทธิ์: ใครสร้าง/แก้งานจัดเลี้ยงได้ (viewer/hm ทำไม่ได้)
function boCanCreate(){ if(!CLOUD) return true; const r=userRole(); return ["owner","sales_manager","sales","sales_assistant","finance"].includes(r); }
function canEditOrder(o){ if(!CLOUD) return true; const r=userRole(); if(r==="owner"||r==="sales_manager"||r==="sales_assistant") return true; if(r==="sales") return mySalesId()===o.salesId; if(r==="finance") return true; return false; }
function guardOrder(o){ if(canEditOrder(o)) return true; alert("บัญชีนี้แก้ได้เฉพาะงานของเซลล์ตัวเองเท่านั้น"); return false; }
function nowUserName(){ const sid=mySalesId(); const rep=sid&&salesById(sid); if(rep) return rep.name; const em=currentEmail(); return em||"ผู้ใช้"; }
function pad3(n){ return String(n).padStart(3,"0"); }
function orderCodeNext(){ return "ORD-"+pad3((db.orders||[]).length+1); }
function poNoNext(){ const n=(db.orders||[]).filter(o=>o.poNo).length+1; return "PO#"+pad3(n); }
function boNoNext(){ const n=(db.orders||[]).filter(o=>o.boNo).length+1; return "BO#"+pad3(n); }
function beoNoNext(){
  const n=(db.orders||[]).filter(o=>o.beo && o.beo.beoNo).length+1;
  const d=new Date(todayStr()+"T00:00:00"); const mm=String((d.getMonth()||0)+1).padStart(2,"0"); const yy=d.getFullYear()+543;
  return "BEO#"+pad3(n)+"/"+mm+"/"+ (isNaN(yy)? "" : yy);
}
function quoteCodeNext(){ const d=new Date(); const yy=(d.getFullYear()+543); return "QT-"+yy+"-"+pad3((db.quotations||[]).length+1); }

// กลุ่มงานสำหรับผู้ช่วย: รอรับ / งานของฉัน / ส่งต่อ-จบแล้ว
function orderIsActive(o){ return o.status!=="done" && o.status!=="cancelled"; }
function orderWaiting(o){ return orderIsActive(o) && !o.assistant && !(o.handedTo&&o.handedTo!==""); }
function orderMine(o){ return !!o.assistant && o.assistant===nowUserName() && orderIsActive(o); }
function orderClosed(o){ return o.status==="done" || o.status==="cancelled" || (o.handedTo&&o.handedTo!==""); }

function ordersFiltered(){
  let list=(db.orders||[]).slice();
  if(ui.boHotel && ui.boHotel!=="all") list=list.filter(o=>o.hotelId===ui.boHotel);
  const qk=ui.boQueue||"all";
  if(qk==="waiting") list=list.filter(orderWaiting);
  else if(qk==="mine") list=list.filter(orderMine);
  else if(qk==="closed") list=list.filter(orderClosed);
  if(ui.boStatus && ui.boStatus!=="all") list=list.filter(o=>o.status===ui.boStatus);
  const q=(ui.boSearch||"").trim().toLowerCase();
  if(q) list=list.filter(o=>((o.customerName||"")+" "+(o.eventName||"")+" "+(o.code||"")).toLowerCase().includes(q));
  // เรียงตามวันจัดงาน (ใกล้สุดก่อน) แล้วตามอัพเดตล่าสุด
  return list.sort((a,b)=> String(a.eventDate||"9999").localeCompare(String(b.eventDate||"9999")) || String(b.updatedAt||"").localeCompare(String(a.updatedAt||"")) );
}

function orderRowHtml(o){

  }
  const beoBtn = o.beo ? `<button onclick="openBeoPrint('${o.id}')" class="text-xs text-teal-700 underline ml-2">ดู BEO</button>` : "";
  const nextNote = ORDER_NEXT_OWNER[st]||"";
  const typeTag = `<span class="badge" style="background:#e2e8f0;color:#475569;font-size:10px;">${ORDER_SALE_TYPE[o.saleType]||"งาน"}</span>`;
  const waitTag = orderWaiting(o)?`<span class="badge" style="background:#fee2e2;color:#b91c1c;font-size:10px;">🔔 รอรับ</span>`:"";

function submitOrder(){
  const id=val("f_id"); const ex=id?orderById(id):null;

  const customer=val("f_customer").trim();
  if(!customer){ alert("กรุณากรอกชื่อลูกค้า/หน่วยงาน"); return; }
  const sid = isSales()? mySalesId() : val("f_sales");
  const saleType=val("f_saletype")||"function";
  const roomValue=(saleType==="room"||saleType==="both")?(Number(val("f_roomvalue"))||0):0;
  const functionValue=(saleType==="function"||saleType==="both")?(Number(val("f_fnvalue"))||0):0;
  const data={ hotelId:val("f_hotel"), salesId:sid, customerName:customer, contactPerson:val("f_contact"),
    phone:val("f_phone"), segment:val("f_segment"), eventName:val("f_event"), eventType:val("f_etype"),
    eventDate:val("f_date"), eventEndDate:val("f_dateend")||val("f_date"), pax:Number(val("f_pax"))||0,
    saleType, roomCategory:val("f_roomcat")||"gro", roomValue, functionValue,
    value:roomValue+functionValue, stage:val("f_stage")||"won", notes:val("f_notes") };
  let o;
  if(ex){ o=ex; Object.assign(ex,data); ex.updatedAt=nowIso(); }
  else{
    o={ id:uid("ord"), code:orderCodeNext(), status:"order", poNo:"",poDate:"",poBy:"", boNo:"",boDate:"",boBy:"",
      briefDate:"",briefTime:"",briefOwner:"",briefRows:[], beo:null, quotationId:"", assistant:"", handedTo:"", assignLog:[], saleRefs:[], history:[], createdAt:nowIso(), updatedAt:nowIso(), ...data };
    pushOrderHistory(o,"order");
    db.orders.push(o);
  }
  syncOrderToSales(o);
  saveData(); closeModal(); render();
}
// เขียนกลับเข้าการขายเดิม (pipeline/functionEvents) เพื่อให้แดชบอร์ด/On Hand/เป้า อัปเดตโดยไม่กรอกซ้ำ
function stageToFnStatus(st){ return ({lead:"inquiry",quoted:"quoted",negotiation:"quoted",won:"confirmed",lost:"cancelled"}[st])||"inquiry"; }
function syncOrderToSales(o){
  o.saleRefs=Array.isArray(o.saleRefs)?o.saleRefs:[];
  const wantRoom=(o.saleType==="room"||o.saleType==="both");
  const wantFn=(o.saleType==="function"||o.saleType==="both");
  // ---- ห้องพัก → pipeline ----
  let pref=o.saleRefs.find(r=>r.kind==="pipeline");
  if(wantRoom){
    const data={ hotelId:o.hotelId, salesId:o.salesId, accountName:o.customerName, dealType:"corporate_room",
      salesCategory:o.roomCategory||"gro", eventType:o.eventName||"", serviceStartDate:o.eventDate,
      serviceEndDate:o.eventEndDate||o.eventDate, estValue:Number(o.roomValue)||0, stage:o.stage||"won",
      expectedCloseDate:o.eventDate, lostReason:"", customerType:"corporate", orderId:o.id };
    let rec=pref&&db.pipeline.find(p=>p.id===pref.id);
    if(rec){ Object.assign(rec,data); }
    else{ const nid=uid("pl"); db.pipeline.unshift({id:nid,feedbackFiles:[],...data}); o.saleRefs=o.saleRefs.filter(r=>r.kind!=="pipeline"); o.saleRefs.push({kind:"pipeline",id:nid}); }
  } else if(pref){ db.pipeline=db.pipeline.filter(p=>p.id!==pref.id); o.saleRefs=o.saleRefs.filter(r=>r.kind!=="pipeline"); }
  // ---- ฟังก์ชัน → functionEvents ----
  let fref=o.saleRefs.find(r=>r.kind==="function");
  if(wantFn){
    const data={ hotelId:o.hotelId, salesId:o.salesId, clientName:o.customerName, eventType:o.eventType||o.eventName||"",
      eventDate:o.eventDate, eventEndDate:o.eventEndDate||o.eventDate, paxCount:Number(o.pax)||0,
      estRevenue:Number(o.functionValue)||0, status:stageToFnStatus(o.stage), salesStage:o.stage||"won",
      expectedCloseDate:o.eventDate, customerType:"corporate", salesCategory:"function", orderId:o.id };
    let rec=fref&&db.functionEvents.find(x=>x.id===fref.id);
    if(rec){ Object.assign(rec,data); }
    else{ const nid=uid("fn"); db.functionEvents.unshift({id:nid,beoSentDate:"",feedbackFiles:[],...data}); o.saleRefs=o.saleRefs.filter(r=>r.kind!=="function"); o.saleRefs.push({kind:"function",id:nid}); }
  } else if(fref){ db.functionEvents=db.functionEvents.filter(x=>x.id!==fref.id); o.saleRefs=o.saleRefs.filter(r=>r.kind!=="function"); }
  o.value=(Number(o.roomValue)||0)+(Number(o.functionValue)||0);
}
function orderForSaleRecord(refKind,id){ return (db.orders||[]).find(o=>(o.saleRefs||[]).some(r=>r.kind===refKind&&r.id===id)); }
function openBanquetFromSale(oid){ ui.page="banquetOps"; render(); setTimeout(()=>openOrderModal(oid),30); }
function openOrderFromSale(refKind,id){
  let o=orderForSaleRecord(refKind,id);
  if(o){ openBanquetFromSale(o.id); return; }
  const rec = refKind==="function"?db.functionEvents.find(f=>f.id===id):db.pipeline.find(p=>p.id===id);
  if(!rec) return;
  if(!(canEditSales(rec.salesId)||isSalesAssistant())){ alert("ไม่มีสิทธิ์ดำเนินงานนี้"); return; }
  const isFn=refKind==="function";
  o={ id:uid("ord"), code:orderCodeNext(), status:"order",
    hotelId:rec.hotelId, salesId:rec.salesId,
    customerName:isFn?rec.clientName:rec.accountName, contactPerson:rec.contactPerson||"", phone:rec.phone||"", segment:"",
    eventName:isFn?(rec.eventType||rec.clientName):rec.accountName, eventType:isFn?(rec.eventType||""):"",
    eventDate:isFn?rec.eventDate:rec.serviceStartDate, eventEndDate:isFn?(rec.eventEndDate||rec.eventDate):(rec.serviceEndDate||rec.serviceStartDate),
    pax:isFn?(rec.paxCount||0):0,
    saleType:isFn?"function":"room", roomCategory:isFn?"gro":(rec.salesCategory||"gro"),
    roomValue:isFn?0:(Number(rec.estValue)||0), functionValue:isFn?(Number(rec.estRevenue)||0):0,
    value:isFn?(Number(rec.estRevenue)||0):(Number(rec.estValue)||0),
    stage:(isFn?rec.salesStage:rec.stage)||"won",
    poNo:"",poDate:"",poBy:"", boNo:"",boDate:"",boBy:"", briefDate:"",briefTime:"",briefOwner:"",briefRows:[],
    beo:null, quotationId:"", assistant:"", handedTo:"", assignLog:[],
    saleRefs:[{kind:refKind,id:rec.id}], history:[], createdAt:nowIso(), updatedAt:nowIso() };
  pushOrderHistory(o,"order"); db.orders.push(o); saveData();
  openBanquetFromSale(o.id);
}
function opsCellHtml(refKind,id,salesId){

function deleteOrder(id){ const o=orderById(id); if(!o)return; if(!guardOrder(o))return; if(!confirm("ลบออเดอร์นี้?"))return; db.orders=db.orders.filter(x=>x.id!==id); saveData(); closeModal(); render(); }
function cancelOrder(id){ const o=orderById(id); if(!o)return; if(!guardOrder(o))return; if(!confirm("ยกเลิกงานนี้?"))return; o.status="cancelled"; pushOrderHistory(o,"cancelled"); saveData(); render(); }

function recalcBeo(){
  let sum=0;
  document.querySelectorAll("#beoCostBody .beo-c-row").forEach(tr=>{
    const p=Number(tr.querySelector(".bc-price").value)||0;
    const q=Number(tr.querySelector(".bc-qty").value)||0;
    const d=Number(tr.querySelector(".bc-days").value)||1;
    const amt=p*q*d; tr.querySelector(".bc-amt").textContent=bahtFmt(amt); sum+=amt;
  });
  const el=document.getElementById("beoGrand"); if(el) el.textContent="฿"+bahtFmt(sum);
}

function submitBEO(){
  const o=orderById(val("f_id")); if(!o)return; if(!guardOrder(o))return;
  const costItems=[]; document.querySelectorAll("#beoCostBody .beo-c-row").forEach(tr=>{
    const desc=tr.querySelector(".bc-desc").value.trim();
    const price=Number(tr.querySelector(".bc-price").value)||0;
    const qty=Number(tr.querySelector(".bc-qty").value)||0;
    const days=Number(tr.querySelector(".bc-days").value)||1;
    const date=tr.querySelector(".bc-date").value;
    if(desc||price||qty) costItems.push({date,desc,price,qty,days});
  });
  const agenda=[]; document.querySelectorAll("#beoAgendaBody .beo-a-row").forEach(tr=>{
    const time=tr.querySelector(".ba-time").value.trim();
    const venue=tr.querySelector(".ba-venue").value.trim();
    const act=tr.querySelector(".ba-act").value.trim();
    const count=tr.querySelector(".ba-count").value.trim();
    const format=tr.querySelector(".ba-format").value.trim();
    if(time||venue||act) agenda.push({time,venue,act,count,format});
  });
  const deptNotes={}; BEO_DEPT_NOTES.forEach(d=>{ deptNotes[d.key]=val("f_note_"+d.key)||""; });
  // sync core fields back to order
  o.customerName=val("f_customer"); o.contactPerson=val("f_contact"); o.phone=val("f_phone");
  o.segment=val("f_segment"); o.eventName=val("f_event"); o.eventType=val("f_etype");
  o.eventDate=val("f_date"); o.pax=Number(val("f_pax"))||o.pax;
  o.beo={ beoNo:val("f_beono"), issueDate:val("f_beodate"), toDept:val("f_beoto"), venue:val("f_venue"),
    costItems, priceIncl:document.getElementById("f_incl").checked, payTerm:val("f_payterm"),
    agenda, deptNotes, proposedBy:val("f_proposed"), approvedBy:val("f_approved") };
  o.boNo=o.boNo||boNoNext(); o.boDate=todayStr(); o.boBy=nowUserName();
  if(ORDER_FLOW.indexOf(o.status)<ORDER_FLOW.indexOf("bo")){ o.status="bo"; pushOrderHistory(o,"bo"); }
  saveData(); closeModal(); render();
}
function beoTotals(b){
  let sub=0; (b.costItems||[]).forEach(it=>{ sub+=(Number(it.price)||0)*(Number(it.qty)||0)*(Number(it.days)||1); });
  return { sub };
}

// ---------- QUOTATION ----------
function quoteTotals(q){
  let sub=0; (q.items||[]).forEach(it=>{ sub+=(Number(it.unitPrice)||0)*(Number(it.qty)||0)*(Number(it.days)||1); });
  const disc=Number(q.discount)||0; const net=Math.max(0,sub-disc);
  if(q.priceIncl){ return { sub, disc, net, service:0, vat:0, total:net, incl:true }; }
  const service=net*(Number(q.svcPct)||0)/100;
  const vat=(net+service)*(Number(q.vatPct)||0)/100;
  return { sub, disc, net, service, vat, total:net+service+vat, incl:false };
}
function qtRowHtml(it){
  it=it||{};
  return `<tr class="qt-row border-b">
    <td class="p-1"><input class="qt-desc border rounded px-1 py-1 text-xs w-full" value="${escAttr(it.desc||"")}" placeholder="รายการ เช่น อาหารกลางวันบุฟเฟ่ต์"/></td>
    <td class="p-1"><input type="number" class="qt-price border rounded px-1 py-1 text-xs text-right" value="${it.unitPrice!=null?it.unitPrice:""}" oninput="recalcQuote()" style="width:100px;"/></td>
    <td class="p-1"><input type="number" class="qt-qty border rounded px-1 py-1 text-xs text-right" value="${it.qty!=null?it.qty:""}" oninput="recalcQuote()" style="width:80px;"/></td>
    <td class="p-1"><input type="number" class="qt-days border rounded px-1 py-1 text-xs text-right" value="${it.days!=null?it.days:1}" oninput="recalcQuote()" style="width:70px;"/></td>
    <td class="p-1 text-right qt-amt text-xs font-semibold" style="min-width:90px;">0.00</td>
    <td class="p-1"><button type="button" onclick="this.closest('tr').remove();recalcQuote()" class="text-rose-400 text-xs">✕</button></td>
  </tr>`;
}

function recalcQuote(){
  let sub=0;
  document.querySelectorAll("#qtItems .qt-row").forEach(tr=>{
    const p=Number(tr.querySelector(".qt-price").value)||0;
    const q=Number(tr.querySelector(".qt-qty").value)||0;
    const d=Number(tr.querySelector(".qt-days").value)||1;
    const amt=p*q*d; tr.querySelector(".qt-amt").textContent=bahtFmt(amt); sub+=amt;
  });
  const disc=Number(val("f_discount"))||0;
  const incl=document.getElementById("f_incl") && document.getElementById("f_incl").checked;
  const svc=Number(val("f_svc"))||0, vatp=Number(val("f_vat"))||0;
  const net=Math.max(0,sub-disc);
  let service=0,vat=0,total=net;
  if(!incl){ service=net*svc/100; vat=(net+service)*vatp/100; total=net+service+vat; }
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent="฿"+bahtFmt(v); };
  set("qtSub",sub); set("qtNet",net); set("qtSvc",service); set("qtVat",vat); set("qtTotal",total);
  const sw=document.getElementById("qtTaxWrap"); if(sw) sw.style.display= incl?"none":"";
}

function submitQuote(){
  const id=val("f_id"); const ex=id?quoteById(id):null;
  const customer=val("f_customer").trim();
  if(!customer){ alert("กรุณากรอกชื่อลูกค้า"); return; }
  const items=[]; document.querySelectorAll("#qtItems .qt-row").forEach(tr=>{
    const desc=tr.querySelector(".qt-desc").value.trim();
    const unitPrice=Number(tr.querySelector(".qt-price").value)||0;
    const qty=Number(tr.querySelector(".qt-qty").value)||0;
    const days=Number(tr.querySelector(".qt-days").value)||1;
    if(desc||unitPrice||qty) items.push({desc,unitPrice,qty,days});
  });
  const data={ hotelId:val("f_hotel"), salesId:val("f_sales"), customerName:customer, contactPerson:val("f_contact"),
    phone:val("f_phone"), taxId:val("f_taxid"), address:val("f_address"), eventName:val("f_event"), eventDate:val("f_date"),
    items, discount:Number(val("f_discount"))||0, svcPct:Number(val("f_svc"))||0, vatPct:Number(val("f_vat"))||0,
    priceIncl:document.getElementById("f_incl").checked, paymentTerm:val("f_payment"), validUntil:val("f_valid"), note:val("f_note") };
  if(ex){ Object.assign(ex,data); }
  else{ db.quotations.push({ id:uid("qt"), code:quoteCodeNext(), createdBy:currentEmail()||nowUserName(), createdAt:nowIso(), ...data }); }
  saveData(); closeModal(); render();
}
function deleteQuote(id){ const q=quoteById(id); if(!q)return; if(!confirm("ลบใบเสนอราคานี้?"))return; db.quotations=db.quotations.filter(x=>x.id!==id); saveData(); render(); }
function convertQuoteToOrder(id){
  const q=quoteById(id); if(!q)return; if(!boCanCreate()){ alert("ไม่มีสิทธิ์เปิดออเดอร์"); return; }
  const t=quoteTotals(q);
  const o={ id:uid("ord"), code:orderCodeNext(), status:"order", hotelId:q.hotelId, salesId:q.salesId,
    customerName:q.customerName, contactPerson:q.contactPerson, phone:q.phone, segment:"",
    eventName:q.eventName, eventType:"", eventDate:q.eventDate, eventEndDate:q.eventDate, pax:0, value:Math.round(t.total),
    notes:"สร้างจากใบเสนอราคา "+q.code, poNo:"",poDate:"",poBy:"", boNo:"",boDate:"",boBy:"",
    briefDate:"",briefTime:"",briefOwner:"",briefRows:[], beo:null, quotationId:q.id, history:[], createdAt:nowIso(), updatedAt:nowIso() };
  pushOrderHistory(o,"order"); db.orders.push(o); saveData();
  alert("สร้างออเดอร์ "+o.code+" จากใบเสนอราคาแล้ว"); render();
}

      <thead><tr style="background:#f1f5f9;"><th style="padding:6px;border:1px solid #e2e8f0;">บรีฟแล้ว</th><th style="padding:6px;border:1px solid #e2e8f0;">แผนก</th><th style="padding:6px;border:1px solid #e2e8f0;">ผู้รับผิดชอบ</th><th style="padding:6px;border:1px solid #e2e8f0;">เบอร์</th><th style="padding:6px;border:1px solid #e2e8f0;text-align:left;">หมายเหตุ</th></tr></thead>
      <tbody>${briefRows}</tbody></table>`:""}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:36px;font-size:12px;text-align:center;color:#64748b;">
      <div>_______________________________<br>Proposed by ${b.proposedBy?"("+escHtml(b.proposedBy)+")":""}</div>
      <div>_______________________________<br>Approved by ${b.approvedBy?"("+escHtml(b.approvedBy)+")":""}</div>
    </div>
  </div>`;
}

async function initCloud(){
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(session){ currentUser = session.user; await cloudBootstrap(); }
    else { renderLogin(); }
  }catch(e){
    console.error(e); renderLogin("เชื่อมต่อระบบไม่สำเร็จ กรุณาลองใหม่");
  }
}

// ---- เฝ้าดูวันที่จริง: ถ้าข้ามวัน (เช่นเปิดแอปค้างข้ามคืน) ให้รีเฟรชเอง เพื่อให้แจ้งเตือน 30 วันแม่นยำ ----
let __lastRealDate = realToday();
function startDateWatch(){
  setInterval(()=>{
    const d=realToday();
    if(d!==__lastRealDate){
      __lastRealDate=d;
      if(typeof db!=="undefined" && db && !isUserBusy()) render();  // ไม่รีเฟรชทับตอนกำลังพิมพ์
    }
  }, 60*1000);  // ตรวจทุก 1 นาที
}

// ============================================================
// INIT
// ============================================================
if (CLOUD && sb){
  initCloud();               // โหมดออนไลน์: ล็อกอินก่อน แล้วดึงข้อมูลจากคลาวด์
} else {
  loadData();                // โหมดออฟไลน์: ใช้ข้อมูลในเครื่อง (localStorage)
  render();
}
startDateWatch();            // อัปเดตวันที่/แจ้งเตือนอัตโนมัติตามวันจริง
// เมื่อผู้ใช้พิมพ์เสร็จ (เลิกโฟกัสช่องกรอก) แล้วมีอัปเดตจากทีมค้างอยู่ → รีเฟรชให้เห็นข้อมูลล่าสุด
document.addEventListener("focusout", ()=>{ setTimeout(flushPendingRender, 150); });
// ช่องวันที่ที่ถูกสร้างภายหลัง (เช่น Modal) ใช้ปฏิทินแบบกระชับเดียวกันอัตโนมัติ
new MutationObserver(changes=>changes.forEach(c=>c.addedNodes.forEach(n=>{ if(n.nodeType===1) enhanceDateInputs(n); }))).observe(document.getElementById("app"),{childList:true,subtree:true});
document.addEventListener("mousedown",e=>{ const p=document.getElementById("smartDatePop"); if(p&&smartDateState&&!p.contains(e.target)&&e.target!==smartDateState.button&&!smartDateState.button.contains(e.target)) closeSmartDate(); });
window.addEventListener("resize",positionSmartDate);
</script>
