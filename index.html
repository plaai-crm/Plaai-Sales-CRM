<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plaai Group — Sales Ops</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --brand:#0f3a52;         /* deep teal-navy */
    --brand-2:#12546f;
    --accent:#0e7490;        /* teal/cyan primary action */
    --accent-2:#0891b2;
    --pos:#0f766e;           /* teal-green (on hand / confirmed) */
    --warn:#c2760c;          /* muted amber */
    --danger:#be123c;        /* rose */
    --ink:#0f2233;
    --muted:#64748b;
    --line:#e6ebf0;
    --bg:#f4f7f9;
  }
  body { font-family: 'Inter','Segoe UI','Tahoma',sans-serif; color:#0f2233;
         background: linear-gradient(180deg,#eaf0f4 0%, #f4f7f9 240px, #f4f7f9 100%); }
  .modal-backdrop { background: rgba(10,28,45,0.55); backdrop-filter: blur(2px); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

  .tab-pill { transition: all .15s ease; }
  .tab-pill.active { background:#ffffff; color:var(--brand); font-weight:700; box-shadow:0 1px 3px rgba(15,58,82,0.18); }
  .tab-pill:not(.active) { color:#64748b; }
  .tab-pill:not(.active):hover { color:var(--brand); }

  .badge { display:inline-block; padding:2px 10px; border-radius:9999px; font-size:11px; font-weight:600; }
  .card { background:#fff; border-radius:16px; box-shadow:0 1px 2px rgba(15,23,42,0.05),0 1px 10px rgba(15,23,42,0.04); border:1px solid #eef2f6; }
  .card:hover { box-shadow:0 4px 16px rgba(15,23,42,0.07); }
  .kpi { border-radius:16px; padding:16px 18px; color:#fff; box-shadow:0 6px 18px rgba(15,58,82,0.14); }
  .kpi .lbl{ font-size:11px; opacity:.85; letter-spacing:.02em; }
  .kpi .num{ font-size:24px; font-weight:800; margin-top:4px; line-height:1.1; }
  .kpi .sub{ font-size:11px; opacity:.82; margin-top:4px; }

  .btn { border-radius:10px; font-weight:600; transition: all .15s ease; }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary{ background:var(--accent); color:#fff; box-shadow:0 2px 8px rgba(14,116,144,0.25); }
  .btn-primary:hover{ background:#0c6a86; }
  .btn-ghost{ background:#fff; border:1px solid var(--line); color:var(--ink); }
  .btn-ghost:hover{ border-color:#cbd5e1; }

  /* clean unified quick-add buttons: white chip + colored icon */
  .qbtn{ display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line);
         border-radius:11px; padding:8px 13px; font-size:13px; font-weight:600; color:var(--ink);
         transition:all .15s ease; box-shadow:0 1px 2px rgba(15,23,42,0.05); }
  .qbtn:hover{ transform:translateY(-1px); border-color:#cbd5e1; box-shadow:0 4px 10px rgba(15,23,42,0.09); }
  .qico{ width:22px; height:22px; border-radius:7px; display:inline-flex; align-items:center; justify-content:center;
         color:#fff; font-size:14px; font-weight:700; }

  select.pill-select { border:0; cursor:pointer; -webkit-appearance:none; appearance:none; padding-right:20px;
        background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 3.5L5 6.5L8 3.5' stroke='%23475569' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>");
        background-repeat:no-repeat; background-position:right 6px center; }
  select.pill-select:focus { outline: 2px solid #7dd3fc; }
  .fc-input{ width:110px; border:1px solid var(--line); border-radius:8px; padding:4px 8px; font-size:13px; text-align:right; }
  .fc-input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(14,116,144,0.15); }
  table th { font-weight:600; letter-spacing:.02em; }
  tbody tr:hover { background:#f8fafc; }
  .link-tag{ display:inline-block; font-size:10px; font-weight:700; color:var(--pos);
             background:#e6f6f2; border-radius:6px; padding:1px 6px; margin-left:6px; white-space:nowrap; }
  .progress-track{ height:10px; border-radius:9999px; background:#e5edf2; overflow:hidden; }
  .progress-fill{ height:100%; border-radius:9999px; background:linear-gradient(90deg,var(--accent),var(--pos)); }
  .stage-bar{ height:8px; border-radius:9999px; background:#eef2f6; overflow:hidden; }
  .section-title{ font-weight:700; color:#1e2a3a; }
  .section-help{ font-size:12px; line-height:1.55; color:#64748b; margin-top:4px; max-width:860px; }
  .section-action{ display:inline-flex; align-items:center; gap:6px; border-radius:9px; padding:7px 11px;
                   font-size:12px; font-weight:700; background:#0e7490; color:#fff; white-space:nowrap; }
  .section-action:hover{ background:#0c6a86; transform:translateY(-1px); }
  .status-note{ margin-top:3px; font-size:11px; color:#be123c; max-width:240px; }
  /* ตัวเลือกวัน/เดือน/ปีแบบกระชับ ใช้รูปแบบเดียวกันทั้งระบบ */
  .smart-date-btn{ display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; min-width:132px;
    border:1px solid var(--line); border-radius:10px; padding:7px 10px; background:#fff; color:var(--ink); cursor:pointer;
    font-size:13px; line-height:1.25; box-shadow:0 1px 2px rgba(15,23,42,.04); }
  .smart-date-btn:hover{ border-color:#94a3b8; }
  .smart-date-btn:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(14,116,144,.13); }
  .smart-date-native{ position:absolute !important; width:1px !important; height:1px !important; opacity:0 !important; pointer-events:none !important; }
  .smart-date-pop{ position:fixed; z-index:10000; width:300px; max-width:calc(100vw - 24px); background:#fff; border:1px solid #dbe3ea;
    border-radius:14px; box-shadow:0 18px 48px rgba(15,34,51,.22); padding:12px; }
  .smart-date-head{ display:grid; grid-template-columns:36px 1fr 36px; align-items:center; gap:6px; margin-bottom:10px; }
  .smart-date-head button,.smart-year-step{ height:34px; border:1px solid var(--line); border-radius:9px; background:#f8fafc; font-weight:700; color:#334155; }
  .smart-date-title{ text-align:center; font-weight:800; color:#0f2233; }
  .smart-year-row{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:10px; }
  .smart-year-row .smart-year-step{ width:38px; }
  .smart-year-value{ min-width:86px; text-align:center; font-weight:800; font-size:16px; }
  .smart-month-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .smart-month-grid button,.smart-day-grid button{ border:0; border-radius:8px; background:#f8fafc; color:#334155; cursor:pointer; }
  .smart-month-grid button{ padding:9px 4px; font-size:12px; }
  .smart-month-grid button:hover,.smart-day-grid button:hover{ background:#e0f2fe; color:#075985; }
  .smart-month-grid button.active,.smart-day-grid button.active{ background:var(--accent); color:#fff; font-weight:800; }
  .smart-week,.smart-day-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:3px; text-align:center; }
  .smart-week{ color:#94a3b8; font-size:10px; margin-bottom:4px; }
  .smart-day-grid button{ aspect-ratio:1; font-size:12px; }
  .smart-day-grid button.muted{ color:#cbd5e1; background:transparent; cursor:default; }
  .smart-date-foot{ display:flex; justify-content:space-between; gap:8px; border-top:1px solid #eef2f6; margin-top:10px; padding-top:9px; }
  .smart-date-foot button{ border:0; background:transparent; color:#0e7490; font-size:12px; font-weight:700; cursor:pointer; }
  .date-range-fields{ display:grid; grid-template-columns:minmax(132px,1fr) auto minmax(132px,1fr); gap:7px; align-items:end; }
  .date-range-sep{ color:#94a3b8; padding-bottom:9px; font-size:12px; }
  @media(max-width:520px){ .date-range-fields{ grid-template-columns:1fr; } .date-range-sep{ display:none; } }
  .attachment-chip{ display:inline-flex; align-items:center; gap:4px; margin:2px 4px 2px 0; padding:3px 7px;
                    border-radius:7px; background:#eef6f8; color:#0e7490; font-size:11px; font-weight:600; }
  /* solid, clearly-visible quick-add buttons */
  .qbtn-solid{ display:inline-flex; align-items:center; gap:7px; color:#fff; border:0; border-radius:11px;
        padding:9px 15px; font-size:13px; font-weight:700; cursor:pointer;
        box-shadow:0 2px 6px rgba(15,23,42,0.20); transition:all .15s ease; }
  .qbtn-solid:hover{ transform:translateY(-1px); filter:brightness(1.08); box-shadow:0 5px 14px rgba(15,23,42,0.26); }
  .qbtn-solid .qi{ font-size:15px; font-weight:800; line-height:1; }

  /* โหมดดูอย่างเดียว (View only): ซ่อนปุ่มเพิ่ม/แก้ไข/ลบ ทั้งหมด ผู้ใช้ยังเลื่อนดู/สลับแท็บ/เลือกปีได้ */
  body.readonly [onclick*="Modal("],
  body.readonly [onclick^="delete"],
  body.readonly [onclick^="quickLogFor"],
  body.readonly [onclick^="addYear"],
  body.readonly .ro-hide,
  body.readonly .qbtn-solid { display:none !important; }

  /* พรีเซนต์ผู้บริหาร: ตัวหนังสือใหญ่ อ่านง่ายสำหรับผู้บริหาร/เจ้าของกิจการ */
  .pres-big .kpi .num{ font-size:30px; }
  .pres-big .kpi .lbl{ font-size:12.5px; opacity:.9; }
  .pres-big .kpi .sub{ font-size:12px; }
  .pres-big .section-title{ font-size:17px; }
  .pres-big table{ font-size:14px; }
  .pres-big th{ font-size:12.5px; }

  /* โหมดพิมพ์/บันทึก PDF สำหรับพรีเซนต์ผู้บริหาร */
  @media print {
    .no-print { display:none !important; }
    body { background:#fff !important; }
    .card { box-shadow:none !important; border:1px solid #d7dee5 !important; break-inside:avoid; }
    .kpi { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    @page { margin:12mm; }
  }
</style>
</head>
<body class="min-h-screen">
<div id="app"></div>

<script>
/* =========================================================
   PLAAI GROUP — SALES OPS  (client-side prototype)
   Redesign: easier sales workflow, two-bucket forecast
   (Pipeline + Function), results-only executive view,
   and everything auto-linked to On Hand.
   Data persists in this browser via localStorage.
   ========================================================= */

const STORAGE_KEY = "plaai_sales_ops_v3";

/* =========================================================
   CLOUD (Supabase) CONFIG
   ใส่ค่า 2 อย่างจากโปรเจกต์ Supabase ของคุณด้านล่างนี้:
   1) SUPABASE_URL      = Project URL   (Settings > API)
   2) SUPABASE_ANON_KEY = anon public key (Settings > API)
   ถ้าเว้นว่างไว้ แอปจะทำงานแบบออฟไลน์ (localStorage) เหมือนเดิม
   ========================================================= */
const SUPABASE_URL = "https://diffxgsxmztvccebgnol.supabase.co";// <-- วาง Project URL ที่นี่
const SUPABASE_ANON_KEY = "sb_publishable_m9ntF4MgZrk7wbIcXUL5rw_wUQEvWOT";  // <-- วาง anon public key ที่นี่
const CLOUD = !!(SUPABASE_URL && SUPABASE_ANON_KEY);

/* =========================================================
   สิทธิ์การใช้งานแบบแยกตำแหน่ง (ROLE-BASED ACCESS)
   ---------------------------------------------------------
   มี 4 ระดับสิทธิ์:
   • owner  (เจ้าของกิจการ) — ดูได้ทุกหน้า และ "แก้ไขได้ทุกอย่าง"
   • finance (ฝ่ายบัญชี)     — ดูได้ทุกหน้า แต่แก้ได้ "เฉพาะตัวเลขยอดขาย/รายได้" (หน้าเจ้าของ)
   • sales  (ฝ่ายขาย)        — ดูได้ทุกหน้า แต่แก้ได้ "เฉพาะข้อมูลของเซลล์ตัวเอง" เท่านั้น
   • viewer (อื่น ๆ)          — เข้าดูได้อย่างเดียว (View only)
   หมายเหตุ: ถ้าใช้งานแบบออฟไลน์ (ไม่ต่อคลาวด์) จะแก้ได้ทุกอย่างเหมือนเดิม
   ========================================================= */

/* อีเมลเจ้าของกิจการ (สิทธิ์สูงสุด แก้ได้ทุกหน้า) */
const OWNER_EMAILS = [
  "kunnsiri@gmail.com",
  "rda.plaai@gmail.com",
];

/* อีเมลที่ "ตั้งเป้ายอดขายได้" — จำกัดสูงสุด 2 บัญชีตามที่กำหนด
   (เฉพาะ 2 บัญชีนี้เท่านั้นที่แก้หน้า Target รายตึก/ตั้งเป้าทั้งปีได้) */
const TARGET_EDIT_EMAILS = [
  "rda.plaai@gmail.com",
  "kunnsiri@gmail.com",
];

/* อีเมลฝ่ายบัญชี (ดูได้ทุกหน้า แต่แก้ได้เฉพาะตัวเลขยอดขาย/รายได้) */
const FINANCE_EMAILS = [
  "finance@p-plaai.com",
];

/* ผู้จัดการโรงแรม (Hotel Manager) — เข้าดูได้อย่างเดียว (View only)
   และเห็นเฉพาะโรงแรมที่กำหนด + ภาพรวมทั้งกลุ่มเท่านั้น
   ---------------------------------------------------------
   • ตั้ง "รหัสผ่าน" ของแต่ละอีเมล (HM01/HM02/HM03/HM04) ในหน้า Supabase
     (Authentication > Users) — ไฟล์นี้คุมแค่ว่าอีเมลไหน "เห็นโรงแรมใดได้บ้าง"
   • ค่า array คือ hotelId ของโรงแรมที่อนุญาต (ต้องตรงกับ id ของโรงแรมในระบบ)   */
const HM_ACCESS = {
  "hm@p-plaai.com":              ["prime"],            // HM01 · Plaai Prime + ภาพรวม
  "rm.plus@p-plaai.com":         ["saroch"],           // HM02 · Plaai Plus สาโรช + ภาพรวม
  "om.plusbowin@p-plaai.com":    ["bowin","bowin2"],   // HM04 · Plaai Plus บ่อวิน + บ่อวิน2 + ภาพรวม
  "saleco.plaaihotel@p-plaai.com":["play"],            // HM03 · Plaai Play + ภาพรวม
};
function hmHotelsFor(em){
  em = (em||"").toLowerCase();
  const au = appUserFor(em);
  if(au && au.role==="hm" && Array.isArray(au.hotelIds) && au.hotelIds.length) return au.hotelIds;
  for(const k in HM_ACCESS){ if(k.toLowerCase()===em) return HM_ACCESS[k]; }
  return null;
}
// ค้นหา "ผู้ใช้ที่เพิ่มจากหน้าโปรแกรม" ตามอีเมล (ต้อง active) — ใช้กำหนดสิทธิ์แทน/เสริม config ในโค้ด
function appUserFor(em){
  em = (em||"").toLowerCase();
  if(!em || !db || !Array.isArray(db.appUsers)) return null;
  return db.appUsers.find(u=>(u.email||"").toLowerCase()===em && u.active!==false) || null;
}

/* ผูก "อีเมลของฝ่ายขายแต่ละคน" กับ "รหัสเซลล์ (salesId)" ของตัวเอง
   - เซลล์คนนั้นจะแก้ได้เฉพาะข้อมูลของ salesId ตัวเอง (Pipeline/Function/Account/กิจกรรม/แผนงาน)
   - ค่าเริ่มต้น s1/s2/s3 = เซลล์ 1/2/3 ในระบบ  ← แก้ให้ตรงกับเซลล์จริงได้เลย
   - เพิ่มบรรทัดใหม่ได้ตามจำนวนพนักงานขาย เช่น "email@บริษัท": "s4"        */
const SALES_EMAILS = {
  "ales.plusbowin@p-plaai.com":    "s2",
  "salesco.plus@p-plaai.com":      "s3",
};

/* Sales Manager — จัดการข้อมูลได้ทุกหน้า แต่ไม่มีสิทธิ์จัดการผู้ใช้ */
const SALES_MANAGER_EMAILS = {
  "sales1.plaaihotel@p-plaai.com": "s1",
};

/* URL ของ Supabase Edge Function สำหรับส่งสรุปเข้า LINE (ดูคู่มือ LINE)
   - ถ้าใส่ไว้ ปุ่ม “ส่งเข้า LINE เลย” จะทำงานได้
   - ถ้าเว้นว่าง ยังใช้ปุ่มคัดลอก/ดาวน์โหลดข้อความสรุปได้ตามปกติ           */
const LINE_SUMMARY_FUNCTION_URL = ""; // เช่น "https://xxxx.functions.supabase.co/weekly-line-summary"

/* URL ของ Supabase Edge Function สำหรับ "ส่งรายงานเซลล์เข้าอีเมล" พร้อมไฟล์แนบ
   - ถ้าใส่ไว้ ปุ่ม "ส่งเข้าอีเมล" จะส่งอีเมลอัตโนมัติพร้อมไฟล์ Excel แนบ
   - ถ้าเว้นว่าง ปุ่มจะเปิดโปรแกรมอีเมลในเครื่อง (mailto) พร้อมข้อความสรุป
     และดาวน์โหลดไฟล์ Excel ให้แนบเองอัตโนมัติ                              */
const REPORT_EMAIL_FUNCTION_URL = ""; // เช่น "https://xxxx.functions.supabase.co/sales-report-email"

let sb = null;                 // Supabase client
let currentUser = null;        // ผู้ใช้ที่ล็อกอินอยู่
let applyingRemote = false;    // กันบันทึกซ้ำเมื่อรับข้อมูลจากคนอื่น
let cloudSaveTimer = null;     // debounce การบันทึกขึ้นคลาวด์
let cloudSnapshot = null;      // สำเนา db ที่ตรงกับคลาวด์ล่าสุด (ใช้หา “อะไรเปลี่ยน”)
let pendingRemoteRender = false; // มีอัปเดตจากทีมค้างอยู่ รอผู้ใช้พิมพ์เสร็จค่อยรีเฟรช
let storageWarningShown = false;
const CLIENT_ID = Math.random().toString(36).slice(2); // ระบุว่า update นี้มาจากเครื่องเรา
// ทุกคอลเลกชันที่ซิงค์ (แต่ละ “รายการ” มี id ของตัวเอง → บันทึกแยกกันได้ ไม่ทับกัน)
const CLOUD_COLLECTIONS = ["hotels","salesReps","accounts","pipeline","functionEvents","activities","forecasts","revenue","partners","newCompanies","lostBusiness","events","opportunities","appUsers","orders","quotations"];
if (CLOUD && window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  // ความปลอดภัย: เก็บ session ไว้ใน sessionStorage (ไม่ใช่ localStorage)
  //  → ปิดหน้าต่าง/แท็บเมื่อไหร่ session จะหายทันที ต้องล็อกอินใหม่เสมอ
  //  (การรีเฟรชหน้าในแท็บเดิมยังอยู่ในระบบตามปกติ)
  auth: {
    storage: window.sessionStorage,
    storageKey: "plaai_auth",
    persistSession: true,
    autoRefreshToken: true,
  }
});

// ---------- สิทธิ์การใช้งาน (ROLE-BASED) ----------
function currentEmail(){ return (currentUser && currentUser.email || "").toLowerCase(); }
// หา salesId ของอีเมลนี้ (จาก config SALES_EMAILS หรือช่องอีเมลที่ผูกไว้กับตัวเซลล์)
function salesIdForEmail(em){
  em = (em||"").toLowerCase();
  const au = appUserFor(em);
  if(au && (au.role==="sales"||au.role==="sales_manager") && au.salesId) return au.salesId;
  for(const k in SALES_MANAGER_EMAILS){ if(k.toLowerCase()===em) return SALES_MANAGER_EMAILS[k]; }
  for(const k in SALES_EMAILS){ if(k.toLowerCase()===em) return SALES_EMAILS[k]; }

// ตำแหน่งของผู้ใช้ปัจจุบัน: owner | sales_manager | finance | sales | viewer  (ออฟไลน์ = owner)
function userRole(){
  if(!CLOUD) return "owner";
  const em = currentEmail();
  // เจ้าของกิจการ (จากโค้ด) = สิทธิ์สูงสุดเสมอ กันล็อกตัวเองออกจากระบบ
  if(OWNER_EMAILS.map(e=>e.toLowerCase()).includes(em)) return "owner";
  // อีเมล Sales Manager ที่กำหนดไว้ = สิทธิ์ผู้จัดการเสมอ
  if(Object.keys(SALES_MANAGER_EMAILS).some(e=>e.toLowerCase()===em)) return "sales_manager";
  // สิทธิ์ที่เจ้าของกำหนดจากหน้าโปรแกรม (มาก่อน config เดิมในโค้ด)
  const au = appUserFor(em);
  if(au && au.role) return au.role;
  if(FINANCE_EMAILS.map(e=>e.toLowerCase()).includes(em)) return "finance";
  if(salesIdForEmail(em)) return "sales";
  if(hmHotelsFor(em)) return "hm";
  return "viewer";
}

function addDaysStr(dateStr,n){ if(!dateStr) return ""; const d=new Date(dateStr); d.setDate(d.getDate()+(Number(n)||0)); return d.toISOString().slice(0,10); }
function ymKey(dateStr){ return (dateStr||"").slice(0,7); }
function currentMonthKey(){ return todayStr().slice(0,7); }
function currentYear(){ return Number(todayStr().slice(0,4))||new Date().getFullYear(); }
function addMonthsKey(key,n){ let [y,m]=key.split("-").map(Number); m+=n; while(m>12){m-=12;y+=1;} while(m<1){m+=12;y-=1;} return y+"-"+String(m).padStart(2,"0"); }
function monthLabel(key){ const [y,m]=key.split("-").map(Number); return THAI_MONTHS[m-1]+" "+y; }
function next6Months(startKey){ const arr=[]; let k=startKey||currentMonthKey(); for(let i=0;i<6;i++){ arr.push(k); k=addMonthsKey(k,1);} return arr; }
function firstDayOfMonthKey(key){ return key+"-01"; }
function lastDayOfMonthKey(key){ const [y,m]=key.split("-").map(Number); return key+"-"+String(new Date(y,m,0).getDate()).padStart(2,"0"); }
function dateInRange(d,from,to){ return !!d && (!from||d>=from) && (!to||d<=to); }
function rangesOverlap(start,end,from,to){ start=start||end||""; end=end||start; return !!start && (!to||start<=to) && (!from||end>=from); }
function shortDateLabel(v){
  if(!v) return "เลือกวันที่";
  const p=v.split("-").map(Number); if(p.length<3) return v;
  return p[2]+" "+THAI_MONTHS[p[1]-1]+" "+p[0];
}

// สร้างข้อมูลยอดขายตัวอย่าง (ปีนี้ถึงเดือนปัจจุบัน + ทั้งปีที่แล้ว) เพื่อให้หน้าเจ้าของมีกราฟให้ดูทันที
function genSampleRevenue(hotels, cy){
  const rows = [];
  const season = [0.9,0.95,1.05,1.0,0.95,0.9,0.92,0.98,1.0,1.1,1.15,1.2]; // ปัจจัยตามเดือน
  const nowM = Number(todayStr().slice(5,7));
  const sampleKeys = ["corporate","walkin","direct","ota","other"];
  hotels.forEach((h,hi)=>{
    const base = 900000 + hi*250000;           // ฐานยอด/เดือน ต่างกันตามโรงแรม
    const mix  = [0.28,0.14,0.10,0.30,0.18];    // สัดส่วน Corporate/Walk-in/Direct/OTA/อื่นๆ
    const build = (year, month, growth)=>{
      const tot = Math.round(base*season[month-1]*growth/1000)*1000;
      const e = { id:uid("rev"), hotelId:h.id, month:year+"-"+String(month).padStart(2,"0"), vals:{} };
      sampleKeys.forEach((k,i)=>{ e.vals[k] = Math.round(tot*(mix[i]||0)/1000)*1000; });
      return e;
    };
    for(let m=1;m<=12;m++) rows.push(build(cy-2, m, 0.92));          // 2 ปีก่อน ครบ 12 เดือน
    for(let m=1;m<=12;m++) rows.push(build(cy-1, m, 1.0));            // ปีที่แล้ว ครบ 12 เดือน
    for(let m=1;m<=nowM;m++) rows.push(build(cy, m, 1.08+hi*0.01));   // ปีนี้ ถึงเดือนปัจจุบัน (โต ~8-13%)
  });
  return rows;
}

let db = null;
function loadData(){
  try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw){ db=JSON.parse(raw); normalizeData(); return; } }catch(e){}
  db = defaultData(); normalizeData(); saveData();
}
// keep the global HOTELS / SALES_REPS pointing at the persisted arrays
function syncLookups(){ HOTELS = db.hotels; SALES_REPS = db.salesReps; }
function normalizeData(){
  // hotels & sales reps are now persisted; fall back to defaults for old saves
  db.hotels = (db.hotels && db.hotels.length) ? db.hotels.map(h=>({ features:{ functionRoom:true, otaOnly:false }, accent:"#0e7490", sub:"", ...h, features:{ functionRoom:true, otaOnly:false, ...(h.features||{}) } })) : DEFAULT_HOTELS.map(h=>({ ...h, features:{ ...h.features } }));
  db.salesReps = (db.salesReps && db.salesReps.length) ? db.salesReps.map(s=>({ actionPlan:"", email:"", ...s })) : DEFAULT_SALES_REPS.map(s=>({ actionPlan:"", email:"", ...s }));
  syncLookups();
  db.accounts = (db.accounts||[]).map(a=>{
    const status = a.status==="new" ? "opportunity" : (a.status==="dormant" ? "inactive" : (a.status||"active"));
    return { contactPerson:"", phone:"", lastContactTopic:"", statusReason:"", acquiredDate:"", ...a, status };
  });
  db.pipeline = (db.pipeline||[]).map(p=>({
    lostReason:"", customerType:"corporate", customerTypeOther:"",
    salesCategory:p.salesCategory||(p.dealType==="function"?"function":(p.customerType==="government"?"government":"gro")),
    serviceStartDate:p.expectedCloseDate||"", serviceEndDate:p.expectedCloseDate||"",
    feedbackFiles:[], customerFeedback:"", salesObstacle:"", salesSuggestion:"", feedbackRating:0, workClosed:false, closedDate:"", ...p
  }));
  db.functionEvents = (db.functionEvents||[]).map(f=>({
    salesStage:f.status==="confirmed"||f.status==="beo_sent"||f.status==="completed" ? "won" : (f.status==="cancelled"?"lost":(f.status==="quoted"?"quoted":"lead")),
    customerType:"corporate", customerTypeOther:"",
    salesCategory:"function",
    eventEndDate:f.eventDate||"", feedbackFiles:[], customerFeedback:"", salesObstacle:"", salesSuggestion:"", feedbackRating:0, workClosed:f.status==="completed", closedDate:"", ...f
  }));
  db.activities = (db.activities||[]).map(a=>({ notes:"", ...a }));
  db.forecasts = (db.forecasts||[]).map(f=>{
    // migrate old single-value forecast -> two-bucket
    if (f.pipelineForecast===undefined && f.functionForecast===undefined){
      return { id:f.id, hotelId:f.hotelId, month:f.month,
               pipelineForecast:Number(f.forecastValue)||0, functionForecast:0, notes:f.notes||"" };
    }
    return { pipelineForecast:0, functionForecast:0, notes:"", ...f };
  });
  // ---- ยอดขายรวมรายเดือน: ย้ายมาเก็บใน entry.vals = { channelKey: number } (รองรับช่องทางต่อโรงแรม) ----
  db.revenue = (db.revenue||[]).map(r=>{
    r = { ...r };
    if(!r.vals || typeof r.vals!=="object"){
      const vals = {};
      const map = { sales:"corporate", ota:"ota", walkin:"walkin", fit:"fit", other:"other", direct:"direct", corporate:"corporate" };
      ["ota","fit","walkin","sales","corporate","direct","other"].forEach(k=>{
        if(r[k]!=null){ const nk=map[k]||k; vals[nk]=(Number(vals[nk])||0)+(Number(r[k])||0); }
      });
      if(r.lump!=null && Number(r.lump)!==0) vals.lump = Number(r.lump)||0;
      r.vals = vals;
    }
    return r;
  });
  // ---- กลุ่มลูกค้า (Customer Groups): ชุดกลางชุดเดียว ใช้ "เหมือนกันทุกโรงแรม" ----
  if(!Array.isArray(db.customerGroups) || !db.customerGroups.length){
    // ครั้งแรก: ถ้ามีช่องทางเดิมของโรงแรมใดอยู่ ให้ยกมาเป็นชุดกลาง ไม่งั้นใช้ค่าเริ่มต้น
    const seed = (db.hotels||[]).map(h=>h.channels).find(c=>Array.isArray(c)&&c.length);
    db.customerGroups = (seed ? seed.map(c=>({ ...c })) : DEFAULT_CHANNELS.map(c=>({ ...c })));
  }
  // กลุ่มที่ต้องมีเสมอ (Corporate/MICE/Government) — เติมให้ครบถ้ายังไม่มี
  REQUIRED_GROUP_KEYS.forEach(k=>{
    if(!db.customerGroups.some(c=>c.key===k)){
      const d = DEFAULT_CHANNELS.find(c=>c.key===k) || { key:k, label:LEGACY_CH_LABEL[k]||k, color:LEGACY_CH_COLOR[k]||"#94a3b8" };
      db.customerGroups.push({ ...d });
    }
  });
  // ผนวก key ที่มีข้อมูลจริงในยอดขายแต่ยังไม่อยู่ในชุด (กันข้อมูลหาย)
  const haveG = new Set(db.customerGroups.map(c=>c.key));
  (db.revenue||[]).forEach(r=>Object.keys(r.vals||{}).forEach(k=>{
    if(k!=="lump" && !haveG.has(k)){ haveG.add(k);
      db.customerGroups.push({ key:k, label:LEGACY_CH_LABEL[k]||k, color:LEGACY_CH_COLOR[k]||CHANNEL_PALETTE[db.customerGroups.length%CHANNEL_PALETTE.length] }); }
  }));
  // ให้ทุกโรงแรมชี้ไปที่ชุดกลางเดียวกัน (เผื่อโค้ดเก่าอ้าง h.channels)
  db.hotels.forEach(h=>{ h.channels = db.customerGroups; });
  // ---- คอลเลกชันสำหรับพรีเซนต์ประจำเดือน ----
  db.partners      = (db.partners||[]).map(x=>({ year:null, roomNights:0, revenue:0, ...x }));
  db.newCompanies  = (db.newCompanies||[]).map(x=>({ roomNights:0, revenue:0, note:"", ...x }));
  db.lostBusiness  = (db.lostBusiness||[]).map(x=>({ reason:"", value:0, note:"", lastDate:"", ...x }));
  // ---- Event ทั้งปี (ปฏิทินอีเวนต์ในโซน · ใช้ร่วมกันทุกโรงแรม) ----
  // ขยายฟิลด์: จังหวัด/เขต-อำเภอ/สถานที่ · วันเริ่ม-สิ้นสุด · ประเภท · ขนาดงาน · ผลกระทบ
  //           · แผน Activity (ฝ่ายขายกรอก) · แผนการทำราคา/Yield รายตึก (ผจก.แต่ละตึกกรอก)
  db.events        = (db.events||[]).map(x=>({ year:null, hotelId:"", hotelIds:null, location:"", venue:"", province:"", district:"",
                        startDate:"", endDate:"", days:1, category:"", scale:"", impact:"", salesId:"",
                        activityPlan:"", pricingPlans:{}, acks:{}, note:"", ...x }));
  db.events.forEach(e=>{
    if(!e.venue && e.location) e.venue = e.location;             // ย้ายค่าสถานที่เดิม → venue
    if(!e.endDate) e.endDate = e.startDate ? addDaysStr(e.startDate,(Number(e.days)||1)-1) : "";
    if(!e.pricingPlans || typeof e.pricingPlans!=="object") e.pricingPlans = {};
    if(!e.acks || typeof e.acks!=="object") e.acks = {};          // ผจก.แต่ละตึก "รับทราบ" อีเวนต์นี้แล้วหรือยัง
    if(!e.year && e.startDate) e.year = Number(e.startDate.slice(0,4))||null;
  });
  db.opportunities = (db.opportunities||[]).map(x=>({ value:0, stage:"lead", actionPlan:"", ...x }));
  const cy = currentYear();
  db.years = [...new Set([...(db.years||[]),...systemYearRange(),cy])].map(Number).sort((a,b)=>a-b);
  db.targets = db.targets || {};
  db.hotelTargets = db.hotelTargets || {};   // { hotelId: { year: number } } — เป้ารายโรงแรม
  db.salesTargets = db.salesTargets || {};   // { hotelId: { year: { corporate,government,gro,function,newAccounts,activeOldPct } } }
  // ---- ผู้ใช้ที่เพิ่ม/กำหนดสิทธิ์จากหน้าโปรแกรม (เจ้าของเป็นผู้จัดการ) ----
  // แต่ละรายการ = { id, email, role, name, salesId, hotelIds, active }
  db.appUsers = (Array.isArray(db.appUsers) ? db.appUsers : []).map(u=>({
    id: u.id || uid("usr"),
    email: (u.email||"").trim().toLowerCase(),
    role: u.role || "viewer",
    name: u.name || "",
    salesId: u.salesId || "",
    hotelIds: Array.isArray(u.hotelIds) ? u.hotelIds : [],
    active: u.active!==false
  })).filter(u=>u.email);

  // ---- รายชื่อแผนกสำหรับ "นัดบรีฟงาน" (แก้/เพิ่ม/ลดได้) — อ้างอิง CC ในฟอร์ม BEO ----
  if(!Array.isArray(db.briefDepts) || !db.briefDepts.length){
    db.briefDepts = DEFAULT_BRIEF_DEPTS.map(d=>({ ...d }));
  }
  // ---- ออเดอร์งานจัดเลี้ยง (Order → PO → BO → บรีฟ → เสร็จ) ----
  db.orders = (db.orders||[]).map(o=>({
    id:o.id||uid("ord"), code:o.code||"", hotelId:o.hotelId||"", salesId:o.salesId||"",
    customerName:o.customerName||"", contactPerson:o.contactPerson||"", phone:o.phone||"", segment:o.segment||"",
    eventName:o.eventName||"", eventType:o.eventType||"", eventDate:o.eventDate||"", eventEndDate:o.eventEndDate||o.eventDate||"",
    pax:Number(o.pax)||0, value:Number(o.value)||0, notes:o.notes||"",
    status:o.status||"order",
    poNo:o.poNo||"", poDate:o.poDate||"", poBy:o.poBy||"",
    boNo:o.boNo||"", boDate:o.boDate||"", boBy:o.boBy||"",
    briefDate:o.briefDate||"", briefTime:o.briefTime||"", briefOwner:o.briefOwner||"",
    briefRows: Array.isArray(o.briefRows)?o.briefRows:[],
    beo: o.beo && typeof o.beo==="object" ? o.beo : null,
    quotationId:o.quotationId||"",
    history: Array.isArray(o.history)?o.history:[],
    createdAt:o.createdAt||nowIso(), updatedAt:o.updatedAt||nowIso()
  }));
  // ---- ใบเสนอราคา (ผู้ช่วยฝ่ายขายจัดทำ) ----
  db.quotations = (db.quotations||[]).map(q=>({
    id:q.id||uid("qt"), code:q.code||"", hotelId:q.hotelId||"", salesId:q.salesId||"",
    customerName:q.customerName||"", contactPerson:q.contactPerson||"", phone:q.phone||"",
    address:q.address||"", taxId:q.taxId||"", eventName:q.eventName||"", eventDate:q.eventDate||"",
    items: Array.isArray(q.items)?q.items:[],
    svcPct: q.svcPct==null?10:Number(q.svcPct), vatPct: q.vatPct==null?7:Number(q.vatPct),
    priceIncl: q.priceIncl!==false, discount:Number(q.discount)||0,
    note:q.note||"", validUntil:q.validUntil||"", paymentTerm:q.paymentTerm||"ชำระยอดทั้งหมดวันจัดงาน",
    createdBy:q.createdBy||"", createdAt:q.createdAt||nowIso()
  }));
}
function nowIso(){ try{ return new Date().toISOString(); }catch(e){ return ""; } }
// ห้ามเขียนขึ้นคลาวด์เฉพาะ "ผู้ดูอย่างเดียวจริง ๆ" (viewer)
// หมายเหตุ: ผู้จัดการโรงแรม (hm) ต้องเขียนได้ เพื่อบันทึก "แผนการทำราคา/Yield" ของตึกตัวเอง
//           ในหน้าปฏิทินอีเวนต์ (ส่วนอื่นถูกล็อกด้วยสิทธิ์รายฟังก์ชันอยู่แล้ว)
function blockCloudWrite(){ if(!CLOUD) return false; return userRole()==="viewer"; }
function saveData(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } // แคชในเครื่องเสมอ
  catch(e){
    console.warn("local cache full",e);
    if(!storageWarningShown){ storageWarningShown=true; alert("พื้นที่แคชในเครื่องใกล้เต็ม ไฟล์ Feedback จะยังพยายามบันทึกขึ้นระบบออนไลน์ กรุณาลดขนาดหรือลบไฟล์เก่าหากบันทึกไม่สำเร็จ"); }
  }
  if (CLOUD && !applyingRemote && !blockCloudWrite()) cloudSyncChanges(); // ซิงค์เฉพาะ “รายการที่เปลี่ยน” ขึ้นคลาวด์
}

// ---- ซิงค์แบบแยกรายการ: หา “อะไรเปลี่ยน” เทียบ snapshot แล้วส่งเฉพาะรายการนั้น ----
function cloudSyncChanges(){
  if(!sb || !currentUser) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(async ()=>{
    try{
      const rows = [];
      for(const col of CLOUD_COLLECTIONS){
        const cur = db[col] || [], prev = (cloudSnapshot && cloudSnapshot[col]) || [];
        const curMap = new Map(cur.map(x=>[x.id,x]));
        const prevMap = new Map(prev.map(x=>[x.id,x]));
        // เพิ่ม/แก้ไข
        for(const [id,item] of curMap){
          const p = prevMap.get(id);
          if(!p || JSON.stringify(p)!==JSON.stringify(item))
            rows.push({ collection:col, id, data:item, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });
        }
        // ลบ (soft delete)
        for(const [id] of prevMap){
          if(!curMap.has(id))
            rows.push({ collection:col, id, data:{}, deleted:true, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });
        }
      }
      // meta = years + targets (เก็บเป็นแถวเดียว)
      const meta = { years:db.years, targets:db.targets, hotelTargets:db.hotelTargets, salesTargets:db.salesTargets, customerGroups:db.customerGroups };
      const prevMeta = cloudSnapshot ? { years:cloudSnapshot.years, targets:cloudSnapshot.targets, hotelTargets:cloudSnapshot.hotelTargets, salesTargets:cloudSnapshot.salesTargets, customerGroups:cloudSnapshot.customerGroups } : null;
      if(!prevMeta || JSON.stringify(prevMeta)!==JSON.stringify(meta))
        rows.push({ collection:"meta", id:"app_meta", data:meta, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });

      if(rows.length){
        const { error } = await sb.from("records").upsert(rows);
        if(error) throw error;
      }
      cloudSnapshot = JSON.parse(JSON.stringify(db));
      setCloudStatus("saved");
    }catch(e){ console.error("cloud sync error:", e); setCloudStatus("error"); }
  }, 350);
}

function rebuildDbFromRows(rows){
  const base = defaultData();
  const out = { hotels:[], salesReps:[], accounts:[], pipeline:[], functionEvents:[], activities:[], forecasts:[], revenue:[], partners:[], newCompanies:[], lostBusiness:[], events:[], opportunities:[], appUsers:[], orders:[], quotations:[], years:base.years, targets:{}, hotelTargets:{}, salesTargets:{} };
  for(const r of rows){
    if(r.deleted) continue;
    if(r.collection==="meta"){ if(r.data){ out.years=r.data.years||out.years; out.targets=r.data.targets||{}; out.hotelTargets=r.data.hotelTargets||{}; out.salesTargets=r.data.salesTargets||{}; if(Array.isArray(r.data.customerGroups)&&r.data.customerGroups.length) out.customerGroups=r.data.customerGroups; } continue; }
    if(out[r.collection]) out[r.collection].push(r.data);
  }
  return out;
}
async function pushEntireDb(){ // ใช้ตอนตั้งค่าครั้งแรก (ฐานข้อมูลยังว่าง)
  const rows = [];
  for(const col of CLOUD_COLLECTIONS)
    (db[col]||[]).forEach(item=>rows.push({ collection:col, id:item.id, data:item, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() }));
  rows.push({ collection:"meta", id:"app_meta", data:{ years:db.years, targets:db.targets, hotelTargets:db.hotelTargets, salesTargets:db.salesTargets, customerGroups:db.customerGroups }, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });
  if(rows.length) await sb.from("records").upsert(rows);
}

// ดึงข้อมูลทั้งหมดจากคลาวด์ ประกอบเป็น db แล้วเริ่มฟังเรียลไทม์
async function cloudBootstrap(){
  try{
    const { data:rows, error } = await sb.from("records").select("*");
    if(error) throw error;
    if(rows && rows.length){
      db = rebuildDbFromRows(rows); normalizeData();
    } else {
      db = defaultData(); normalizeData();
      if(!readOnly()) await pushEntireDb();
    }
    cloudSnapshot = JSON.parse(JSON.stringify(db));
    // ถ้าเป็นบัญชีฝ่ายขาย ให้เริ่มที่หน้าเซลล์ตัวเองเลย (สะดวกในการแก้ข้อมูลของตัวเอง)
    if(isSales()){ ui.role="sales"; const sid=mySalesId(); if(sid) ui.currentSales=sid; }
    if(isSalesManager()){ ui.role="sales"; const sid=mySalesId(); if(sid) ui.currentSales=sid; }
    // ฝ่ายบัญชี เปิดมาที่หน้ากรอกข้อมูลฝ่ายบัญชีเลย
    if(isFinance()){ ui.role="finance"; }
    // เจ้าของกิจการ เปิดมาที่หน้าแดชบอร์ดผู้บริหาร (ดูภาพรวมก่อน)
    if(isOwner()){ ui.role="gm"; }
    // ผู้จัดการโรงแรม (hm) เปิดมาที่หน้าพรีเซนต์ + โฟกัสโรงแรมของตัวเอง
    if(isHM()){ ui.role="present"; const ids=allowedHotelIds(); ui.presScope = ids.length===1 ? ids[0] : "group"; ui.currentHotelTab=ui.presScope; ui.ownerTab=ui.presScope; }
    subscribeRealtime();
    setCloudStatus("saved");
    startIdleWatch();   // เริ่มจับเวลา auto logout เมื่อไม่มีการใช้งาน
    render();
  }catch(e){
    console.error("cloud bootstrap failed:", e);
    alert("เชื่อมต่อฐานข้อมูลไม่สำเร็จ: "+(e.message||e)+"\n\nแอปจะทำงานแบบออฟไลน์ในเครื่องนี้ชั่วคราว");
    loadData(); render();
  }
}

// รับการเปลี่ยนแปลงจากคนอื่น “ทีละรายการ” แล้วผสานเข้ากับ db (ไม่ทับทั้งก้อน)
function subscribeRealtime(){
  sb.channel("records_rt")
    .on("postgres_changes", { event:"*", schema:"public", table:"records" }, payload=>{
      const row = payload.new;
      if(!row || row.updated_by===CLIENT_ID) return; // ข้ามสิ่งที่เราเขียนเอง
      applyRemoteRow(row);
    })
    .subscribe();
}
function applyRemoteRow(row){
  applyingRemote = true;
  try{
    if(row.collection==="meta"){
      if(row.data){ db.years = row.data.years || db.years; db.targets = row.data.targets || {}; db.hotelTargets = row.data.hotelTargets || {}; db.salesTargets = row.data.salesTargets || {}; if(Array.isArray(row.data.customerGroups)&&row.data.customerGroups.length) db.customerGroups = row.data.customerGroups; }
    } else if(Array.isArray(db[row.collection])){
      const arr = db[row.collection];
      const idx = arr.findIndex(x=>x.id===row.id);
      if(row.deleted){ if(idx>=0) arr.splice(idx,1); }
      else { if(idx>=0) arr[idx] = row.data; else arr.push(row.data); }
    }
    normalizeData();
    cloudSnapshot = JSON.parse(JSON.stringify(db)); // กันไม่ให้ diff รอบหน้าดันข้อมูลของคนอื่นกลับ
    localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
  }catch(e){ console.error(e); }
  applyingRemote = false;
  setCloudStatus("synced");
  if(isUserBusy()) pendingRemoteRender = true; // กำลังพิมพ์อยู่ → ค่อยรีเฟรชทีหลัง
  else render();
}
function flushPendingRender(){
  if(pendingRemoteRender && !isUserBusy()){ pendingRemoteRender=false; render(); }
}
function setCloudStatus(state){
  const el = document.getElementById("cloudStatus");
  if(!el) return;
  const map = { saved:["● ซิงค์แล้ว","#a7f3d0"], synced:["● อัปเดตจากทีม","#bae6fd"], error:["● บันทึกไม่สำเร็จ","#fecaca"] };
  const [txt,color] = map[state]||["",""];
  el.textContent = txt; el.style.color = color;
}

// ---------- Global UI state ----------
let ui = { role:"sales", currentSales:"s1", currentHotelTab:"group", salesHotel:null, today:null, year:null, ownerTab:"group", ownerYear:null, ownerYearB:null,
           finHotel:null, finYear:null,
           salesMonth:null, salesFrom:null, salesTo:null, salesForecastStart:null, activityDays:30, activityFrom:null, activityTo:null, targetYear:null,
           feedbackYear:null, feedbackFrom:null, feedbackTo:null, feedbackHotel:"all", feedbackStatus:"all",
           page:null, reportRep:"all", reportFrom:null, reportTo:null, reportEmail:"",
           boardYear:null, boardProvince:"all", boardHotel:"all",
           boHotel:"all", boStatus:"all", boSearch:"", qtHotel:"all", printId:null };

// ---------- data helpers ----------
function hotelById(id){ return HOTELS.find(h=>h.id===id); }
function salesById(id){ return SALES_REPS.find(s=>s.id===id); }
function accountsForHotel(hid){ return db.accounts.filter(a=>a.hotelIds.includes(hid)); }
function pipelineForHotel(hid){ return db.pipeline.filter(p=>p.hotelId===hid); }
function functionsForHotel(hid){ return db.functionEvents.filter(f=>f.hotelId===hid); }
function activitiesForHotel(hid){ return db.activities.filter(a=>a.hotelId===hid).sort((a,b)=>b.date.localeCompare(a.date)); }
function pipelineForSales(sid){ return db.pipeline.filter(p=>p.salesId===sid); }
function functionsForSales(sid){ return db.functionEvents.filter(f=>f.salesId===sid); }
function activitiesForSales(sid){ return db.activities.filter(a=>a.salesId===sid).sort((a,b)=>b.date.localeCompare(a.date)); }
function accountsForSales(sid){ return db.accounts.filter(a=>a.salesId===sid); }
function sumVal(arr,key){ return arr.reduce((s,x)=>s+(Number(x[key])||0),0); }

// ---------- ON HAND (auto-linked from won pipeline + confirmed functions) ----------
function onHandPipeline(hid,key){ return sumVal(db.pipeline.filter(p=>p.hotelId===hid && p.stage==="won" && ymKey(p.expectedCloseDate)===key),"estValue"); }
function onHandFunction(hid,key){ return sumVal(db.functionEvents.filter(f=>f.hotelId===hid && ONHAND_FN_STATUS.includes(f.status) && ymKey(f.eventDate)===key),"estRevenue"); }
function onHandForMonth(hid,key){ return onHandPipeline(hid,key)+onHandFunction(hid,key); }
function onHandForSalesMonth(sid,key){
  const won = sumVal(db.pipeline.filter(p=>p.salesId===sid && p.stage==="won" && ymKey(p.expectedCloseDate)===key),"estValue");
  const conf = sumVal(db.functionEvents.filter(f=>f.salesId===sid && ONHAND_FN_STATUS.includes(f.status) && ymKey(f.eventDate)===key),"estRevenue");
  return won+conf;
}

// ---------- FORECAST (two buckets) ----------
function forecastEntry(hid,key){ return db.forecasts.find(x=>x.hotelId===hid && x.month===key); }
function fcPipeline(hid,key){ const e=forecastEntry(hid,key); return e?Number(e.pipelineForecast)||0:0; }
function fcFunction(hid,key){ const e=forecastEntry(hid,key); return e?Number(e.functionForecast)||0:0; }
function fcTotal(hid,key){ return fcPipeline(hid,key)+fcFunction(hid,key); }
function setForecastPart(hid,month,part,value){
  if(!canEditForecast()){ render(); return; }
  let e = db.forecasts.find(x=>x.hotelId===hid && x.month===month);
  if(!e){ e={ id:uid("fc"), hotelId:hid, month, pipelineForecast:0, functionForecast:0, notes:"" }; db.forecasts.push(e); }
  e[part] = Number(value)||0;
  saveData(); render();
}

// group-wide sums for a month
function groupOnHand(key){ return HOTELS.reduce((s,h)=>s+onHandForMonth(h.id,key),0); }
function groupForecast(key){ return HOTELS.reduce((s,h)=>s+fcTotal(h.id,key),0); }
function groupOpenPipeline(){ return db.pipeline.filter(p=>p.stage!=="won" && p.stage!=="lost"); }
function monthKey(y,m){ return y+"-"+String(m).padStart(2,"0"); }
function yearMonths(y){ const a=[]; for(let m=1;m<=12;m++) a.push(monthKey(y,m)); return a; }
function groupOnHandYear(y){ return yearMonths(y).reduce((s,k)=>s+groupOnHand(k),0); }
function groupForecastYear(y){ return yearMonths(y).reduce((s,k)=>s+groupForecast(k),0); }

// ---------- TOTAL REVENUE (Owner view: OTA/FIT/Walk-in/ฝ่ายขาย/อื่นๆ) ----------
function revEntry(hid,key){ return db.revenue.find(r=>r.hotelId===hid && r.month===key); }
function revVals(hid,key){ const e=revEntry(hid,key); return (e && e.vals && typeof e.vals==="object") ? e.vals : {}; }
function revChannel(hid,key,ch){ const v=revVals(hid,key); return Number(v[ch])||0; }
function revHotelMonth(hid,key){ const v=revVals(hid,key); return Object.keys(v).reduce((s,k)=>s+(Number(v[k])||0),0); }
function hotelRevenueYear(hid,year){ return yearMonths(year).reduce((s,k)=>s+revHotelMonth(hid,k),0); }

// ---------- ANNUAL SALES TARGETS & PERFORMANCE ----------
function salesTargetFor(hid,year){
  const src=db.salesTargets&&db.salesTargets[hid]&&db.salesTargets[hid][year];
  return { corporate:0, government:0, gro:0, function:0, newAccounts:0, activeOldPct:0, ...(src||{}) };
}
function saleCategoryOf(item,kind){
  if(kind==="function") return "function";
  if(item.salesCategory && B2B_CATEGORIES[item.salesCategory]) return item.salesCategory;
  if(item.dealType==="function") return "function";
  if(item.customerType==="government") return "government";
  return "gro";
}
function b2bActualForHotelYear(hid,year,category){
  const y=String(year);
  let total=0;
  db.pipeline.forEach(p=>{
    const d=p.expectedCloseDate||p.serviceStartDate||"";
    if(p.hotelId===hid && p.stage==="won" && d.slice(0,4)===y && saleCategoryOf(p,"group_ro")===category) total+=Number(p.estValue)||0;
  });
  if(category==="function") db.functionEvents.forEach(f=>{
    const d=f.eventDate||f.expectedCloseDate||"";
    if(f.hotelId===hid && ONHAND_FN_STATUS.includes(f.status) && d.slice(0,4)===y) total+=Number(f.estRevenue)||0;
  });
  return total;
}
function b2bTargetTotal(hid,year){ const t=salesTargetFor(hid,year); return ["corporate","government","gro","function"].reduce((s,k)=>s+(Number(t[k])||0),0); }
function b2bActualTotal(hid,year){ return Object.keys(B2B_CATEGORIES).reduce((s,k)=>s+b2bActualForHotelYear(hid,year,k),0); }
function accountMetricsForHotelYear(hid,year){
  const list=accountsForHotel(hid), y=String(year);
  const newer=list.filter(a=>(a.acquiredDate||"").slice(0,4)===y);
  const old=list.filter(a=>!a.acquiredDate || (a.acquiredDate||"").slice(0,4)<y);
  const activeOld=old.filter(a=>a.status==="active");
  return { newCount:newer.length, oldCount:old.length, activeOldCount:activeOld.length, activeOldPct:old.length?activeOld.length/old.length*100:0 };
}
function achievementPct(actual,target){ return Number(target)>0 ? actual/Number(target)*100 : 0; }
function performanceScope(hid,year){
  const hs=hid?[hotelById(hid)].filter(Boolean):HOTELS;
  const categories={};
  Object.keys(B2B_CATEGORIES).forEach(k=>{
    categories[k]={
      target:hs.reduce((s,h)=>s+(Number(salesTargetFor(h.id,year)[k])||0),0),
      actual:hs.reduce((s,h)=>s+b2bActualForHotelYear(h.id,year,k),0)
    };
  });
  const hotelTarget=hs.reduce((s,h)=>s+hotelTargetFor(h.id,year),0);
  const hotelActual=hs.reduce((s,h)=>s+hotelRevenueYear(h.id,year),0);

    b2bActual:Object.values(categories).reduce((s,x)=>s+x.actual,0), newTarget,newActual,oldCount,activeOldCount,activeOldPct,activeOldTarget };
}

// ---- กลุ่มลูกค้า (ชุดกลาง 1 ชุด · เหมือนกันทุกโรงแรม) ----
function customerGroups(){ return (db && Array.isArray(db.customerGroups) && db.customerGroups.length) ? db.customerGroups : DEFAULT_CHANNELS; }
// คงชื่อฟังก์ชันเดิมไว้เพื่อความเข้ากันได้ — ทุกอันคืนชุดกลุ่มลูกค้าชุดกลางเสมอ
function hotelChannels(hid){ return customerGroups(); }
function groupChannels(hs){ return customerGroups(); }
function channelsForScope(scope){ return customerGroups(); }
function chLabel(key,scope){ const c=channelsForScope(scope||"group").find(x=>x.key===key); return c?c.label:(LEGACY_CH_LABEL[key]||key); }
function chColor(key,scope){ const c=channelsForScope(scope||"group").find(x=>x.key===key); return c?c.color:(LEGACY_CH_COLOR[key]||"#94a3b8"); }
function revGroupMonth(key){ return HOTELS.reduce((s,h)=>s+revHotelMonth(h.id,key),0); }
function revHotelMonthChannel(hid,y,m,ch){ return revChannel(hid,monthKey(y,m),ch); }
// a month "has data" if any hotel (or a given hotel) recorded revenue that month
function revHotelYear(hid,y){ return yearMonths(y).reduce((s,k)=>s+revHotelMonth(hid,k),0); }
function revGroupYear(y){ return yearMonths(y).reduce((s,k)=>s+revGroupMonth(k),0); }
function revHotelYearChannel(hid,y,ch){ let s=0; for(let m=1;m<=12;m++) s+=revChannel(hid,monthKey(y,m),ch); return s; }
function revGroupYearChannel(y,ch){ return HOTELS.reduce((s,h)=>s+revHotelYearChannel(h.id,y,ch),0); }
// monthly array (1..12) for a scope ('group' or hotelId)
function revMonthlyArray(scope,y){
  return yearMonths(y).map(k=> scope==="group" ? revGroupMonth(k) : revHotelMonth(scope,k));
}
function revScopeYear(scope,y){ return scope==="group" ? revGroupYear(y) : revHotelYear(scope,y); }
function revScopeYearChannel(scope,y,ch){ return scope==="group" ? revGroupYearChannel(y,ch) : revHotelYearChannel(scope,y,ch); }
// which months (1..12) have any recorded revenue for this scope+year
function revMonthsWithData(scope,y){
  const out=[]; const arr=revMonthlyArray(scope,y);
  arr.forEach((v,i)=>{ if(v>0) out.push(i+1); });
  return out;
}
// sum only the given month-numbers, for a scope+year
function revSumMonths(scope,y,monthNums){
  return monthNums.reduce((s,m)=>s+(scope==="group"?revGroupMonth(monthKey(y,m)):revHotelMonth(scope,monthKey(y,m))),0);
}
function pctChange(cur,prev){ if(!prev) return null; return (cur-prev)/prev*100; }

// hotels a rep touches
function repHotels(sid){
  const set = new Set();
  db.pipeline.filter(p=>p.salesId===sid).forEach(p=>set.add(p.hotelId));
  db.functionEvents.filter(f=>f.salesId===sid).forEach(f=>set.add(f.hotelId));
  db.accounts.filter(a=>a.salesId===sid).forEach(a=>a.hotelIds.forEach(h=>set.add(h)));
  const ids = [...set];
  return ids.length ? HOTELS.filter(h=>ids.includes(h.id)) : HOTELS.slice();
}

  const allPipeline = pipelineForSales(sid);
  const allFunctions = functionsForSales(sid);
  const openPipeline = allPipeline.filter(p=>p.stage!=="won" && p.stage!=="lost" && rangesOverlap(p.serviceStartDate||p.expectedCloseDate,p.serviceEndDate||p.serviceStartDate||p.expectedCloseDate,salesFrom,salesTo));
  const myFunctions = allFunctions.filter(f=>f.status!=="completed" && f.status!=="cancelled" && rangesOverlap(f.eventDate,f.eventEndDate||f.eventDate,salesFrom,salesTo));
  const myAccounts = accountsForSales(sid);
  const myActivities = activitiesForSales(sid).filter(a=>dateInRange(a.date,activityFrom,activityTo));
  const myOnHand = sumVal(allPipeline.filter(p=>p.stage==="won"&&dateInRange(p.serviceStartDate||p.expectedCloseDate,salesFrom,salesTo)),"estValue")+
    sumVal(allFunctions.filter(f=>ONHAND_FN_STATUS.includes(f.status)&&dateInRange(f.eventDate,salesFrom,salesTo)),"estRevenue");

  const overdue = myAccounts.filter(a=>daysDiff(a.lastContactDate)<=-14);
  const upcoming = allFunctions.filter(f=>daysDiff(f.eventDate)<=2 && daysDiff(f.eventDate)>=0 && f.status!=="beo_sent" && f.status!=="completed" && f.status!=="cancelled");

  // forecast hotel context
  const hotels = visibleHotels();
  if (!ui.salesHotel || !hotels.find(h=>h.id===ui.salesHotel)) ui.salesHotel = hotels[0].id;

  const editable = canEditSales(sid); // แก้ข้อมูลของเซลล์คนที่กำลังดูอยู่ได้ไหม

  return `
  <div class="mb-3">
    <div class="text-2xl font-bold text-slate-800">📝 หน้ากรอกข้อมูล — ฝ่ายขาย</div>
    <div class="text-sm text-slate-500">กรอกข้อมูลจากจุดที่ใช้งานจริงในแต่ละส่วน: การขาย · กิจกรรม · Account · Forecast — เมื่อเป็น Confirmed ยอดจะขึ้นแดชบอร์ดอัตโนมัติ</div>
  </div>
  <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
    <div class="flex items-center gap-2">
      <span class="text-sm text-slate-500">ฉันคือ</span>
      <select onchange="setSalesRep(this.value)" class="btn-ghost btn px-3 py-1.5 text-sm" ${isSales()?"disabled":""}>
        ${(isSales()?SALES_REPS.filter(s=>s.id===sid):SALES_REPS).map(s=>`<option value="${s.id}" ${s.id===sid?"selected":""}>${s.name}</option>`).join("")}
      </select>
      ${canManage() ? `<button onclick="openSalesModal('${sid}')" title="แก้ไข/ลบเซลล์คนนี้" class="btn btn-ghost text-xs px-2 py-1.5">✎</button>
      <button onclick="openSalesModal()" title="เพิ่มฝ่ายขายคนใหม่" class="btn btn-ghost text-xs px-2 py-1.5">＋ เพิ่มเซลล์</button>` : ""}
      <span class="text-sm text-slate-400 ml-1">• ช่วง ${shortDateLabel(salesFrom)} – ${shortDateLabel(salesTo)}</span>
      ${(!editable && !readOnly()) ? `<span class="text-xs px-2 py-1 rounded" style="background:#fef3c7;color:#92580a;" title="ดูข้อมูลของเซลล์คนอื่นได้ แต่แก้ไม่ได้">👁 กำลังดูของเซลล์คนอื่น (แก้ไม่ได้)</span>` : ""}
    </div>
  </div>

  ${(overdue.length||upcoming.length)?`
  <div class="rounded-2xl p-4 mb-5 border" style="background:#fff5f6;border-color:#fecdd3;">
    <div class="flex items-center justify-between mb-2">
      <div class="font-semibold text-rose-800">⚠ สิ่งที่ต้องติดตามวันนี้ (${rep.name})</div>
      ${editable?`<span class="text-xs text-rose-400">ติ๊ก “ทำแล้ว” เมื่อทำจริง แล้วแจ้งเตือนจะหายไป</span>`:""}
    </div>
    <ul class="text-sm text-rose-700 space-y-1.5">
      ${overdue.map(a=>`<li class="flex items-start gap-2">
        ${editable?`<label class="inline-flex items-center gap-1 shrink-0 cursor-pointer text-teal-700 font-medium" title="บันทึกว่าติดต่อลูกค้ารายนี้แล้ววันนี้">
          <input type="checkbox" onclick="markAccountContacted('${a.id}')" class="w-4 h-4 accent-teal-600"/> ทำแล้ว</label>`:"<span>•</span>"}
        <span>Account "<b>${a.name}</b>" ไม่ได้ติดต่อมา ${Math.abs(daysDiff(a.lastContactDate))} วันแล้ว${editable?` <span class="text-rose-400">(ติ๊ก = บันทึกว่าติดต่อวันนี้)</span>`:""}</span>
      </li>`).join("")}
      ${upcoming.map(f=>`<li class="flex items-start gap-2">
        ${editable?`<label class="inline-flex items-center gap-1 shrink-0 cursor-pointer text-teal-700 font-medium" title="บันทึกว่าส่ง BEO ให้ครัว/ทีมงานแล้ว">
          <input type="checkbox" onclick="markFunctionBeoSent('${f.id}')" class="w-4 h-4 accent-teal-600"/> ทำแล้ว</label>`:"<span>•</span>"}
        <span>งาน Function "<b>${f.clientName}</b>" (${hotelById(f.hotelId).name}) อีก ${daysDiff(f.eventDate)} วัน — ยังไม่ส่ง BEO${editable?` <span class="text-rose-400">(ติ๊ก = บันทึกว่าส่ง BEO แล้ว)</span>`:""}</span>
      </li>`).join("")}
    </ul>
  </div>`:""}

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    ${kpiCard("On Hand ช่วงที่เลือก (ของฉัน)", fmtM(myOnHand), "ยอด Confirmed", G.onhand)}
    ${kpiCard("การขายที่กำลังติดตาม", fmtM(sumVal(openPipeline,"estValue")+sumVal(myFunctions.filter(f=>!ONHAND_FN_STATUS.includes(f.status)),"estRevenue")), `${openPipeline.length+myFunctions.length} รายการ`, G.pipeline)}
    ${kpiCard("งานหลายวัน / Function", myFunctions.length, "งานที่ยังไม่จบ", G.warn)}
    ${kpiCard("Account ในมือ", myAccounts.length, "ฐานลูกค้าที่รับผิดชอบ", G.account)}
  </div>

  <div class="card p-4">
    <div class="flex flex-wrap items-start justify-between gap-3 mb-3">
      <div>
        <div class="section-title">การขายของฉัน</div>
        <div class="section-help">เก็บงานขาย B2B ไว้จุดเดียว แล้วเลือกหมวดเป็น <b>Corporate, Government, G-RO</b> (กรุ๊ปห้องพักแบบ Room Only) หรือ <b>Function</b> (จัดเลี้ยง/ประชุม/สัมมนา) ข้อมูล Confirmed จะนำไปเทียบ Target บนแดชบอร์ดอัตโนมัติ</div>
      </div>
      <div class="flex flex-wrap items-end gap-2">
        <div class="date-range-fields">
          <label class="text-xs text-slate-500">แสดงตั้งแต่<input type="date" value="${salesFrom}" max="${salesTo}" onchange="setSalesDateFrom(this.value)" class="block mt-1"/></label>

          <label class="text-xs text-slate-500">ถึงวันที่<input type="date" value="${salesTo}" min="${salesFrom}" onchange="setSalesDateTo(this.value)" class="block mt-1"/></label>
        </div>
        ${editable ? `<button onclick="openSaleModal()" class="section-action">＋ เพิ่มการขาย</button>` : ""}
      </div>
    </div>
    <div class="overflow-x-auto"><table class="w-full text-sm">
      <thead><tr class="text-left text-slate-500 border-b">
        <th class="py-1">ประเภท</th><th>ลูกค้า/งาน</th><th>โรงแรม</th><th>กลุ่มลูกค้า</th><th>วันที่ใช้บริการ</th><th class="text-right">มูลค่า</th><th>Stage</th><th>Feedback</th><th class="text-right">จัดการ</th>
      </tr></thead>
      <tbody>
      ${[
        ...allPipeline.map(p=>({kind:"group_ro",item:p,date:p.serviceStartDate||p.expectedCloseDate||""})),
        ...allFunctions.map(f=>({kind:"function",item:f,date:f.eventDate||""}))
      ].filter(row=>{const x=row.item,isFn=row.kind==="function";return rangesOverlap(isFn?x.eventDate:(x.serviceStartDate||x.expectedCloseDate),isFn?(x.eventEndDate||x.eventDate):(x.serviceEndDate||x.serviceStartDate||x.expectedCloseDate),salesFrom,salesTo);}).sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(row=>{
        const x=row.item, isFnRecord=row.kind==="function", isFn=isFnRecord||x.dealType==="function", name=isFnRecord?x.clientName:x.accountName;
        const category=saleCategoryOf(x,row.kind);
        const start=isFnRecord?x.eventDate:x.serviceStartDate, end=isFnRecord?x.eventEndDate:x.serviceEndDate;
        const value=isFnRecord?x.estRevenue:x.estValue, collection=isFnRecord?"functionEvents":"pipeline";
        const st=saleStage(x,row.kind), onhand=st==="won";
        return `<tr class="border-b last:border-0 align-top">
          <td class="py-2"><span class="badge ${category==="function"?'bg-amber-100 text-amber-800':'bg-sky-100 text-sky-800'}">${B2B_CATEGORIES[category]||category}</span></td>
          <td class="py-2 font-medium">${escHtml(name||"-")}${onhand?'<span class="link-tag">→ On Hand</span>':""}${st==="lost"&&x.lostReason?`<div class="status-note">Lost: ${escHtml(x.lostReason)}</div>`:""}</td>
          <td class="py-2">${hotelById(x.hotelId)?.name||"-"}</td>
          <td class="py-2">${CUSTOMER_TYPES[x.customerType]||"Corporate"}${x.customerType==="other"&&x.customerTypeOther?`<div class="text-xs text-slate-400">${escHtml(x.customerTypeOther)}</div>`:""}</td>
          <td class="py-2 whitespace-nowrap">${serviceDateLabel(start,end)}</td>
          <td class="py-2 text-right whitespace-nowrap">${fmtMoney(value)}</td>
          <td class="py-2">${saleStageSelect(x,row.kind)}</td>
          <td class="py-2">${feedbackHtml(x,collection)}</td>
          <td class="py-2 text-right whitespace-nowrap">${canEditSales(x.salesId)?`
            <button onclick="openSaleModal('${row.kind}','${x.id}')" class="text-cyan-700 text-xs mr-2">แก้ไข</button>
            <button onclick="${isFnRecord?"deleteFunction":"deletePipeline"}('${x.id}')" class="text-rose-500 text-xs">ลบ</button>`:`<span class="text-slate-300 text-xs">—</span>`}</td>
        </tr>`;
      }).join("") || `<tr><td class="py-3 text-slate-400" colspan="9">ยังไม่มีข้อมูลการขาย — กด “＋ เพิ่มการขาย” เพื่อเริ่ม</td></tr>`}
      </tbody>
    </table></div>
  </div>

  <div class="card p-4 mt-5" style="border-color:#cffafe;">
    <div class="flex flex-wrap items-center justify-between gap-2 mb-1">
      <div class="section-title">Note สำคัญของฉัน (${rep.name})</div>
      <span class="text-xs text-slate-400">บันทึกอัตโนมัติ · ใช้ในรายงานเซลล์</span>
    </div>
    <div class="text-xs text-slate-400 mb-2">บันทึกเรื่องสำคัญที่ต้องส่งต่อหรือห้ามลืม เช่น เงื่อนไขพิเศษของลูกค้า · นัดติดตาม · สิ่งที่เซลล์คนถัดไปควรรู้</div>
    <textarea ${dSales(sid)} rows="3" onchange="saveRepPlan('${sid}',this.value)"
      class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-200"
      placeholder="พิมพ์ Note สำคัญที่นี่...">${escAttr(rep.actionPlan||"")}</textarea>
  </div>

  ${renderSalesForecast(sid, hotels)}

  <div class="card p-4 mt-5">
    <div class="flex flex-wrap items-start justify-between gap-3 mb-3">
      <div>
        <div class="section-title">กิจกรรมล่าสุดของฉัน</div>
        <div class="section-help">บันทึกการโทร เข้าพบ ส่งใบเสนอราคา หรือติดตามลูกค้า เพิ่ม แก้ไข และลบได้จากส่วนนี้โดยตรง</div>
      </div>
      <div class="flex flex-wrap items-end gap-2">
        <div class="date-range-fields">
          <label class="text-xs text-slate-500">กิจกรรมตั้งแต่<input type="date" value="${activityFrom}" max="${activityTo}" onchange="setActivityDateFrom(this.value)" class="block mt-1"/></label>
          <span class="date-range-sep">ถึง</span>
          <label class="text-xs text-slate-500">ถึงวันที่<input type="date" value="${activityTo}" min="${activityFrom}" onchange="setActivityDateTo(this.value)" class="block mt-1"/></label>
        </div>
        ${editable?`<button onclick="openActivityModal()" class="section-action">＋ เพิ่ม Activity</button>`:""}
      </div>
    </div>
    <div class="overflow-x-auto"><table class="w-full text-sm">
      <thead><tr class="text-left text-slate-500 border-b"><th class="py-1">วันที่</th><th>ประเภท</th><th>โรงแรม</th><th>Account/งาน</th><th>บันทึก</th><th class="text-right">จัดการ</th></tr></thead>
      <tbody>
      ${myActivities.map(a=>`
        <tr class="border-b last:border-0">
          <td class="py-1.5">${a.date}</td><td>${ACTIVITY_TYPES[a.type]||a.type}</td>
          <td>${hotelById(a.hotelId).name}</td><td>${a.accountName||"-"}</td>
          <td class="text-slate-500">${a.notes||""}</td>
          <td class="text-right whitespace-nowrap">${canEditSales(a.salesId)?`<button onclick="openActivityModal('${a.id}')" class="text-cyan-700 text-xs mr-2">แก้ไข</button><button onclick="deleteActivity('${a.id}')" class="text-rose-500 text-xs">ลบ</button>`:`<span class="text-slate-300 text-xs">—</span>`}</td>
        </tr>`).join("") || `<tr><td class="py-2 text-slate-400" colspan="6">ยังไม่มีข้อมูล</td></tr>`}
      </tbody>
    </table></div>
  </div>

  <div class="card p-4 mt-5">
    <div class="flex flex-wrap items-start justify-between gap-3 mb-3">
      <div>
        <div class="section-title">Account ในมือที่ฉันดูแล</div>
        <div class="section-help">นี่คือฐานข้อมูลลูกค้าที่อยู่ในความรับผิดชอบของคุณ ใช้เก็บผู้ติดต่อ ประวัติการคุย และสถานะ <b>Active / Inactive / Lost / Opportunity</b> เพื่อให้ติดตามและดูแลลูกค้าได้อย่างต่อเนื่อง หากเลือก Inactive หรือ Lost ต้องระบุเหตุผลไว้ด้วย</div>
      </div>
      ${editable ? `<button onclick="openAccountModal()" class="section-action">＋ เพิ่ม Account</button>` : ""}
    </div>
    <div class="overflow-x-auto"><table class="w-full text-sm">
      <thead><tr class="text-left text-slate-500 border-b"><th class="py-1">ชื่อบริษัท</th><th>โรงแรม</th><th>ผู้ติดต่อ</th><th>เบอร์โทร</th><th>สถานะ</th><th>Room Nights</th><th>ติดต่อล่าสุด</th><th class="text-right">จัดการ</th></tr></thead>
      <tbody>
      ${myAccounts.map(a=>`
        <tr class="border-b last:border-0">
          <td class="py-1.5">${a.name}</td>
          <td>${a.hotelIds.map(h=>hotelById(h).name).join(", ")}</td>
          <td>${a.contactPerson||"-"}</td><td>${a.phone||"-"}</td>
          <td>${accountStatusHtml(a)}</td><td>${a.roomNightsMTD}</td>
          <td>${a.lastContactDate} ${daysDiff(a.lastContactDate)<=-14?'<span class="text-rose-500">(เงียบไป '+Math.abs(daysDiff(a.lastContactDate))+' วัน)</span>':''}
              ${a.lastContactTopic?`<div class="text-xs text-slate-400">${a.lastContactTopic}</div>`:""}</td>
          <td class="text-right whitespace-nowrap">
            ${canEditSales(a.salesId)?`<button onclick="openAccountModal('${a.id}')" class="text-cyan-700 text-xs mr-2">แก้ไข</button>
            <button onclick="deleteAccount('${a.id}')" class="text-rose-500 text-xs">ลบ</button>`:`<span class="text-slate-300 text-xs">—</span>`}
          </td>
        </tr>`).join("") || `<tr><td class="py-2 text-slate-400" colspan="8">ยังไม่มีข้อมูล</td></tr>`}
      </tbody>
    </table></div>
  </div>
  `;
}

function qbtn(onclick,color,ico,label){
  return `<button class="qbtn-solid" onclick="${onclick}" style="background:${color}"><span class="qi">${ico}</span>${label}</button>`;
}

// ---- Sales forecast (two buckets, inline editable) ----
function renderSalesForecast(sid, hotels){
  const hid = ui.salesHotel;
  const startMonth = ui.salesForecastStart || currentMonthKey();
  ui.salesForecastStart = startMonth;
  const months = next6Months(startMonth);
  return `
  <div class="card p-4 mt-5" style="border-color:#dbeafe;">
    <div class="flex flex-wrap items-center justify-between gap-2 mb-1">
      <div class="section-title">พยากรณ์ยอด (Forecast) — ปรับได้ทั้งฝั่ง Pipeline และฝั่ง Function</div>
      <div class="flex flex-wrap items-end gap-2">
        <label class="text-xs text-slate-500">เริ่มแสดงจากเดือน
          <input type="month" value="${startMonth}" onchange="setSalesForecastStart(this.value)" class="block btn btn-ghost text-xs px-3 py-1.5 mt-1"/>
        </label>
        <label class="text-xs text-slate-500">โรงแรม
          <select onchange="setSalesHotel(this.value)" class="block btn btn-ghost text-xs px-3 py-1.5 mt-1">
            ${hotels.map(h=>`<option value="${h.id}" ${h.id===hid?"selected":""}>${h.name}</option>`).join("")}
          </select>
        </label>
      </div>
    </div>
    <div class="text-xs text-slate-400 mb-3">เลือกเดือนย้อนหลังหรือเดือนข้างหน้าได้ แล้วกรอก Forecast ในช่วงที่ต้องการ ระบบบวกรวมและส่งขึ้นหน้าผู้บริหารทันที ส่วน On Hand คำนวณจากรายการ Confirmed</div>
    <div class="overflow-x-auto"><table class="w-full text-sm">
      <thead><tr class="text-left text-slate-500 border-b">
        <th class="py-1">เดือน</th>
        <th class="text-right">On Hand (Confirmed)</th>
        <th class="text-right">Forecast: Pipeline</th>
        <th class="text-right">Forecast: Function</th>
        <th class="text-right">Forecast รวม</th>
        <th class="text-right">ส่วนต่าง (On Hand − Forecast)</th>
      </tr></thead>
      <tbody>
      ${months.map((mk,i)=>{
        const oh = onHandForMonth(hid,mk);
        const fp = fcPipeline(hid,mk), ff = fcFunction(hid,mk), ft = fp+ff;
        const diff = oh - ft;
        const isCurrent = mk===currentMonthKey();
        return `<tr class="border-b last:border-0 ${isCurrent?'bg-cyan-50/60':''}">
          <td class="py-2 font-medium">${monthLabel(mk)} ${isCurrent?'<span class="badge bg-cyan-100 text-cyan-800 ml-1">เดือนปัจจุบัน</span>':''}</td>
          <td class="text-right font-semibold" style="color:var(--pos)">${fmtMoney(oh)}</td>
          <td class="text-right"><input ${canEditForecast()?"":"disabled"} class="fc-input" type="number" value="${fp||''}" placeholder="0"
                onchange="setForecastPart('${hid}','${mk}','pipelineForecast',this.value)"></td>
          <td class="text-right"><input ${canEditForecast()?"":"disabled"} class="fc-input" type="number" value="${ff||''}" placeholder="0"
                onchange="setForecastPart('${hid}','${mk}','functionForecast',this.value)"></td>
          <td class="text-right font-semibold">${fmtMoney(ft)}</td>
          <td class="text-right ${diff>=0?'text-teal-600':'text-rose-500'}">${(diff>=0?'+':'')+fmtMoney(diff)}</td>
        </tr>`;
      }).join("")}
      </tbody>
    </table></div>
  </div>`;
}

// ---- interactive selects (sales only) — เปิดให้แก้เฉพาะเจ้าของข้อมูล ----
function stageSelect(p){
  return `<select ${dSales(p.salesId)} onchange="updateField('pipeline','${p.id}','stage',this.value)" class="pill-select badge ${STAGE_COLOR[p.stage]}">
    ${Object.entries(PIPELINE_STAGES).map(([k,v])=>`<option value="${k}" ${k===p.stage?"selected":""}>${v}</option>`).join("")}</select>`;
}
function functionSelect(f){
  return `<select ${dSales(f.salesId)} onchange="updateField('functionEvents','${f.id}','status',this.value)" class="pill-select badge ${FUNCTION_COLOR[f.status]}">
    ${Object.entries(FUNCTION_STATUS).map(([k,v])=>`<option value="${k}" ${k===f.status?"selected":""}>${v}</option>`).join("")}</select>`;
}
function accountSelect(a){
  return `<select ${dSales(a.salesId)} onchange="updateField('accounts','${a.id}','status',this.value)" class="pill-select badge ${ACCOUNT_COLOR[a.status]}">
    ${Object.entries(ACCOUNT_STATUS).map(([k,v])=>`<option value="${k}" ${k===a.status?"selected":""}>${v}</option>`).join("")}</select>`;
}
function updateField(collection,id,field,value){
  const item = db[collection] ? db[collection].find(x=>x.id===id) : null;
  if(!item){ render(); return; }
  if(!canEditSales(item.salesId)){ alert("บัญชีนี้แก้ได้เฉพาะข้อมูลของเซลล์ตัวเองเท่านั้น"); render(); return; }
  item[field]=value;
  // ถ้าเปลี่ยน Stage เป็น Lost → ถามเหตุผลทันที (เก็บไว้ปรับปรุง)
  if(collection==="pipeline" && field==="stage" && value==="lost"){
    const r = prompt("ดีลนี้ Lost เพราะอะไร? (บริษัทจะได้เอาไปปรับปรุงถูกจุด)", item.lostReason||"");
    if(r!==null) item.lostReason = r;
  }
  saveData(); render();
}

// OWNER VIEW — ยอดขายรวมทุกช่องทาง (เน้นกราฟ อ่านง่าย)
// ============================================================
function ownerKpiSub(pct, note){
  if(pct===null || pct===undefined || !isFinite(pct)) return note || "ยังไม่มีข้อมูลปีก่อน";
  const up = pct>=0, col = up ? "#bbf7d0" : "#fecaca";
  return `<span style="color:${col};font-weight:800">${up?'▲':'▼'} ${Math.abs(pct).toFixed(0)}%</span> ${note||"เทียบปีก่อน"}`;
}
function renderOwnerView(){
  if(!ui.ownerYear) ui.ownerYear = currentYear();
  if(ui.ownerYearB===null || ui.ownerYearB===undefined) ui.ownerYearB = ui.ownerYear-1;
  let scope = ui.ownerTab;
  if(scope!=="group" && !hotelById(scope)){ ui.ownerTab="group"; scope="group"; }
  const y = ui.ownerYear, py = ui.ownerYearB;   // y = ปีหลัก · py = ปีที่เลือกมาเทียบ
  const scopeName = scope==="group" ? "ภาพรวมทุกโรงแรม" : hotelById(scope).name;

  // years available to pick (จาก db.years + ปีที่มีข้อมูลยอดขายจริง + ปีที่กำลังเลือกอยู่)
  const revYears = db.revenue.map(r=>Number(r.month.slice(0,4)));
  const yearsSel = [...new Set([...db.years, ...revYears, y, py])].sort((a,b)=>a-b);

  // เทียบเฉพาะเดือนที่ "ปีหลัก" มีข้อมูล เทียบกับเดือนเดียวกันของ "ปีที่เลือกมาเทียบ"
  const monthsData    = revMonthsWithData(scope,y);
  const curYearSoFar  = revScopeYear(scope,y);
  const cmpSamePeriod = revSumMonths(scope,py,monthsData);   // ปีเทียบ เฉพาะเดือนเดียวกัน
  const cmpYearFull   = revScopeYear(scope,py);              // ปีเทียบ ครบทั้งปี
  const yoy = pctChange(curYearSoFar, cmpSamePeriod);
  const diffBaht = curYearSoFar - cmpSamePeriod;

  const latestM   = monthsData.length ? monthsData[monthsData.length-1] : Number(currentMonthKey().slice(5,7));
  const latestVal = scope==="group" ? revGroupMonth(monthKey(y,latestM))  : revHotelMonth(scope,monthKey(y,latestM));
  const latestPrv = scope==="group" ? revGroupMonth(monthKey(py,latestM)) : revHotelMonth(scope,monthKey(py,latestM));
  const latestYoy = pctChange(latestVal, latestPrv);

  const chTotals = channelsForScope(scope).map(c=>({ k:c.key, v:revScopeYearChannel(scope,y,c.key) })).sort((a,b)=>b.v-a.v);
  const topCh = chTotals[0] || { k:"ota", v:0 };
  const topChPct = curYearSoFar ? Math.round(topCh.v/curYearSoFar*100) : 0;

  // ทิศทางผล: ดีขึ้น / เท่าเดิม / ลดลง — พร้อม % และยอดเงิน (ผู้บริหารถามทั้งสองอย่าง)
  const hasCmp   = yoy!==null && isFinite(yoy);
  const flat     = hasCmp && Math.abs(yoy)<0.5;
  const up       = hasCmp && yoy>0;
  const dirWord  = !hasCmp ? "" : flat ? "เท่าเดิม" : up ? "ดีขึ้น" : "ลดลง";
  const dirColor = !hasCmp ? "#64748b" : flat ? "#64748b" : up ? "#0f766e" : "#be123c";
  const arrow    = flat ? "▬" : up ? "▲" : "▼";
  const bahtSigned = (diffBaht>=0?"+":"−") + fmtMoney(Math.abs(diffBaht));
  const summary = !hasCmp
    ? `ปี ${y} ทำได้ <b>${fmtMoney(curYearSoFar)}</b> — ยังไม่มีข้อมูลปี ${py} ไว้เทียบ (เลือกปีเทียบที่มีข้อมูล หรือกรอกยอดปี ${py} ก่อน)`
    : `ปี ${y} (ถึงเดือน ${monthLabel(monthKey(y,latestM))}) ทำได้ <b>${fmtMoney(curYearSoFar)}</b> — <span style="color:${dirColor};font-weight:800">${arrow} ${dirWord} ${Math.abs(yoy).toFixed(1)}%</span> เทียบช่วงเดียวกันของปี ${py} <span style="color:${dirColor};font-weight:700">(คิดเป็น ${bahtSigned})</span> · ปี ${py} ช่วงเดียวกันทำได้ ${fmtMoney(cmpSamePeriod)}`;

  // best month (สำหรับกล่องสรุปฝั่งขวาเมื่อดูรายโรงแรม)
  const arr = revMonthlyArray(scope,y);
  let bi=-1, bv=-1; arr.forEach((v,i)=>{ if(v>bv){ bv=v; bi=i; } });
  const bestMonthTxt = bv>0 ? `${THAI_MONTHS[bi]} ${y}` : "—";

  const tabs = `
  <div class="flex flex-wrap items-center gap-2 mb-5">
    <div class="flex flex-wrap gap-1 bg-slate-200/60 rounded-full p-1 w-fit">
      <button onclick="setOwnerTab('group')" class="tab-pill px-4 py-2 rounded-full text-sm ${scope==='group'?'active':''}">ภาพรวมทุกโรงแรม</button>
      ${visibleHotels().map(h=>`<button onclick="setOwnerTab('${h.id}')" class="tab-pill px-4 py-2 rounded-full text-sm ${scope===h.id?'active':''}">${h.name}</button>`).join("")}
    </div>
  </div>`;

  return `
  ${tabs}
  ${db.revenue.length===0 ? `<div class="rounded-2xl p-4 mb-5 border" style="background:#f0f9ff;border-color:#bae6fd;color:#075985;"><b>ยังไม่มีข้อมูลยอดขาย</b> — ไปที่หน้า <b>📝 กรอกข้อมูล › ฝ่ายบัญชี</b> เพื่อเริ่มบันทึกยอดแต่ละเดือนของแต่ละโรงแรม</div>`:""}

  <div class="rounded-xl px-4 py-2.5 mb-4 flex items-center gap-2 text-sm no-print" style="background:#eef6fb;color:#0f4c66;">
    <span>📊</span><span>หน้านี้เป็น <b>แดชบอร์ดดูผลอย่างเดียว</b> — ต้องการแก้ไขตัวเลข ไปที่ <b>📝 กรอกข้อมูล › ฝ่ายบัญชี</b></span>
    ${canEditRevenue()?`<button onclick="setRole('finance')" class="btn btn-ghost text-xs px-3 py-1 ml-auto">ไปหน้าฝ่ายบัญชี →</button>`:""}
  </div>

  <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
    <div>
      <div class="text-2xl font-bold text-slate-800">ยอดขายรวม — ${scopeName}</div>
      <div class="text-sm text-slate-500">แยกตามกลุ่มลูกค้า: ${customerGroups().map(c=>c.label).join(" · ")}</div>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <span class="text-sm text-slate-500">เทียบปี</span>
      <select onchange="setOwnerYear(this.value)" title="ปีหลัก" class="btn btn-ghost text-sm px-3 py-2" style="font-weight:700">
        ${yearsSel.map(yy=>`<option value="${yy}" ${yy===y?"selected":""}>ปี ${yy}</option>`).join("")}
      </select>
      <button onclick="swapOwnerYears()" title="สลับปีที่นำมาเทียบ" class="btn btn-ghost text-sm px-2 py-2">⇄</button>
      <select onchange="setOwnerYearB(this.value)" title="ปีที่นำมาเทียบ" class="btn btn-ghost text-sm px-3 py-2">
        ${yearsSel.map(yy=>`<option value="${yy}" ${yy===py?"selected":""}>ปี ${yy}</option>`).join("")}
      </select>
      <button onclick="exportRevenueExcel()" title="ดาวน์โหลดตัวเลขยอดขายทั้งปีเป็น Excel" class="qbtn-solid" style="background:#0f766e"><span class="qi">⬇</span> Excel</button>
      <button onclick="exportRevenueCSV()" title="ดาวน์โหลดตัวเลขยอดขายทั้งปีเป็น CSV" class="qbtn-solid" style="background:#0369a1"><span class="qi">⬇</span> CSV</button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    ${kpiCard("ยอดขายรวมสะสม ปี "+y, fmtM(curYearSoFar), ownerKpiSub(yoy,"เทียบช่วงเดียวกันปี "+py)+(hasCmp?` · ${bahtSigned}`:""), G.onhand)}
    ${kpiCard("เดือนล่าสุด ("+THAI_MONTHS[latestM-1]+" "+y+")", fmtM(latestVal), ownerKpiSub(latestYoy,"เทียบเดือนเดียวกันปี "+py), G.pipeline)}
    ${kpiCard("ทั้งปี "+py+" (ปีที่เทียบ)", fmtM(cmpYearFull), "ยอดรวม 12 เดือน", G.forecast)}
    ${kpiCard("ช่องทางหลักปี "+y, chLabel(topCh.k,scope), fmtMoney(topCh.v)+" · "+topChPct+"% ของทั้งหมด", G.account)}
  </div>

  ${hasCmp ? `<div class="card p-4 mb-6 flex flex-wrap items-center gap-4" style="border-left:6px solid ${dirColor};">
    <div class="text-3xl">${flat?'⚖️':up?'📈':'📉'}</div>
    <div class="flex-1 min-w-[220px]">
      <div class="text-xs text-slate-400">สรุปเทียบ ปี ${y} กับ ปี ${py} (ช่วงเดียวกัน)</div>
      <div class="text-xl font-extrabold" style="color:${dirColor}">${dirWord} ${Math.abs(yoy).toFixed(1)}% · ${bahtSigned}</div>
    </div>
    <div class="text-right">
      <div class="text-xs text-slate-400">ปี ${y} / ปี ${py}</div>
      <div class="text-sm font-semibold text-slate-700">${fmtMoney(curYearSoFar)} / ${fmtMoney(cmpSamePeriod)}</div>
    </div>
  </div>` : ""}

  ${renderSalesPerformance(scope==="group"?null:scope,y,"Performance ฝ่ายขาย B2B — "+scopeName)}

  <div class="card p-5 mb-6">
    <div class="section-title mb-1">ยอดขายรวมรายเดือน — ปี ${y} เทียบ ปี ${py}</div>
    <div class="text-sm text-slate-600 mb-3">${summary}</div>
    <canvas id="own-monthly" height="230"></canvas>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-2">
    <div class="card p-5">
      <div class="section-title mb-1">สัดส่วนยอดขายตามช่องทาง — ปี ${y}</div>
      <div class="text-xs text-slate-400 mb-2">ยอดรวมทั้งปี ${fmtMoney(curYearSoFar)}</div>
      <canvas id="own-donut" height="240"></canvas>
    </div>
    ${scope==="group" ? `
    <div class="card p-5">
      <div class="section-title mb-1">เทียบรายโรงแรม — ปี ${y} vs ปี ${py}</div>
      <div class="text-xs text-slate-400 mb-2">ยาวกว่า = ยอดสูงกว่า</div>
      <canvas id="own-hotels" height="260"></canvas>
    </div>` : `
    <div class="card p-5">
      <div class="section-title mb-3">สรุปสั้น ๆ — ${scopeName}</div>
      <div class="space-y-3 text-slate-700">
        <div class="flex items-center gap-3"><span class="text-2xl">🏆</span><div><div class="text-xs text-slate-400">เดือนที่ทำยอดสูงสุดปี ${y}</div><div class="text-lg font-bold">${bestMonthTxt} · ${fmtMoney(bv>0?bv:0)}</div></div></div>
        <div class="flex items-center gap-3"><span class="text-2xl">⭐</span><div><div class="text-xs text-slate-400">ช่องทางที่ทำรายได้มากสุด</div><div class="text-lg font-bold">${chLabel(topCh.k,scope)} · ${topChPct}%</div></div></div>
        <div class="flex items-center gap-3"><span class="text-2xl">${flat?'⚖️':up?'📈':'📉'}</span><div><div class="text-xs text-slate-400">เทียบช่วงเดียวกันปี ${py}</div><div class="text-lg font-bold" style="color:${dirColor}">${!hasCmp?'—':dirWord+' '+Math.abs(yoy).toFixed(1)+'% · '+bahtSigned}</div></div></div>
      </div>
    </div>`}
  </div>
  <div class="text-xs text-slate-400 mb-6">ตัวเลขยอดขายแยกกลุ่มลูกค้าอัปเดตได้ที่หน้า <b>📝 กรอกข้อมูล › ฝ่ายบัญชี</b> (ฝ่ายบัญชี/ฝ่ายขายกรอกได้) · ข้อมูลจะรวมและวาดกราฟให้อัตโนมัติ</div>
  `;
}

// แก้ได้: ฝ่ายบัญชี + ฝ่ายขาย + เจ้าของ
// ============================================================

  const yearTotal = revHotelYear(hid,y);
  const target = hotelTargetFor(hid,y);

  return `

    <div class="text-sm text-slate-500">กรอกยอดขายจริงรายเดือน (แยกกลุ่มลูกค้า) และจัดการรายชื่อกลุ่มลูกค้า · เป้ายอดขายจัดการที่หน้า Target รายตึก</div>
  </div>
  ${editable

    : `<div class="rounded-xl px-4 py-3 mb-4 text-sm" style="background:#fff7ed;color:#9a3412;">👁 บัญชีนี้ดูได้อย่างเดียว — แก้ไขตัวเลขได้เฉพาะฝ่ายบัญชี / ฝ่ายขาย / เจ้าของ</div>`}

  <div class="card p-4 mb-5">
    <div class="flex items-center justify-between mb-2">
      <div class="section-title">กลุ่มลูกค้า — ใช้ชุดเดียวเหมือนกันทุกโรงแรม</div>
      ${canEditGroups()?`<button onclick="openChannelManager()" class="btn btn-ghost text-xs px-3 py-1.5">⚙ จัดการกลุ่มลูกค้า</button>`:""}
    </div>
    <div class="flex flex-wrap gap-2">
      ${groups.map(c=>`<span class="badge" style="background:${c.color}1f;color:${c.color};border:1px solid ${c.color}55;">${c.label}</span>`).join("")}
    </div>
    <div class="text-xs text-slate-400 mt-2">Corporate · MICE · Government เป็นกลุ่มหลักที่ต้องมีทุกโรงแรม (ลบไม่ได้) · แก้ที่นี่แล้วทุกโรงแรมเปลี่ยนตาม</div>
  </div>

  <div class="card p-4 mb-4">
    <div class="flex flex-wrap items-end gap-3">
      <label class="text-sm text-slate-600">โรงแรม<br><select onchange="setFinHotel(this.value)" class="btn btn-ghost text-sm px-3 py-2 mt-1" style="font-weight:700">${visibleHotels().map(h=>`<option value="${h.id}" ${h.id===hid?"selected":""}>${h.name}</option>`).join("")}</select></label>
      <label class="text-sm text-slate-600">ปี<br><select onchange="setFinYear(this.value)" class="btn btn-ghost text-sm px-3 py-2 mt-1">${yearsSel.map(yy=>`<option value="${yy}" ${yy===y?"selected":""}>ปี ${yy}</option>`).join("")}</select></label>
      <div class="flex-1"></div>
      <button onclick="exportRevenueExcel()" class="qbtn-solid" style="background:#0f766e"><span class="qi">⬇</span> Excel</button>
      <button onclick="exportRevenueCSV()" class="qbtn-solid" style="background:#0369a1"><span class="qi">⬇</span> CSV</button>
      ${canEditRevenue()?`<label class="qbtn-solid cursor-pointer" style="background:#7c3aed"><span class="qi">⬆</span> นำเข้าตัวเลข<input type="file" accept=".xlsx,.xls,.csv" class="hidden" onchange="importRevenueFile(event)"/></label>`:""}

        return `<tr class="border-b last:border-0">
          <td class="py-1.5 pr-2 font-medium whitespace-nowrap">${mn} ${y}</td>
          ${groups.map(c=>`<td class="text-right px-1"><input ${editable?"":"disabled"} type="number" min="0" class="fc-input" style="width:100px" value="${revChannel(hid,mk,c.key)||''}" placeholder="0" onchange="setRevCell('${hid}','${mk}','${c.key}',this.value)"></td>`).join("")}

    <canvas id="fin-donut" height="200"></canvas>
  </div>
  `;
}
function setFinHotel(v){ ui.finHotel=v; render(); }
function setFinYear(v){ ui.finYear=Number(v); render(); }
function setRevCell(hid,mk,key,value){
  if(!guardRevenue()){ render(); return; }
  const v = Number(value)||0;
  let e = revEntry(hid,mk);
  if(!e){ e={ id:uid("rev"), hotelId:hid, month:mk, vals:{} }; db.revenue.push(e); }
  if(!e.vals || typeof e.vals!=="object") e.vals={};
  if(v) e.vals[key]=v; else delete e.vals[key];
  saveData(); render();
}
function drawFinanceChart(){
  const hid=ui.finHotel, y=ui.finYear; const c=document.getElementById("fin-donut"); if(!c) return;
  const groups=customerGroups();
  window.__chartRefs["fin-donut"]=new Chart(c.getContext("2d"),{ type:"doughnut",
    data:{ labels:groups.map(g=>g.label), datasets:[{ data:groups.map(g=>revHotelYearChannel(hid,y,g.key)), backgroundColor:groups.map(g=>g.color), borderWidth:2, borderColor:"#fff" }] },
    options:{ cutout:"58%", plugins:{ legend:{ position:"right" }, tooltip:{ callbacks:{ label:ctx=>ctx.label+": "+fmtMoney(ctx.parsed) } } } } });
}

function drawOwnerCharts(){
  const y = ui.ownerYear || new Date().getFullYear();

function addYear(){
  if(!guardManage())return;
  const mx = db.years.length ? Math.max.apply(null,db.years) : new Date().getFullYear();
  const input = prompt("เพิ่มปีที่ต้องการบันทึกข้อมูล (ค.ศ. เช่น "+(mx+1)+")", String(mx+1));
  if(input===null) return;                       // กดยกเลิก
  const yr = parseInt(String(input).trim(),10);
  if(!yr || yr<2000 || yr>2100){ alert("กรุณากรอกปีเป็น ค.ศ. ระหว่าง 2000–2100"); return; }
  if(db.years.includes(yr)){ alert("มีปี "+yr+" อยู่แล้ว"); ui.year=yr; ui.ownerYear=yr; render(); return; }
  db.years.push(yr);
  db.years = db.years.map(Number).sort((a,b)=>a-b);
  ui.year=yr; ui.ownerYear=yr;                    // เด้งไปที่ปีที่เพิ่งเพิ่ม
  saveData(); render();
}
