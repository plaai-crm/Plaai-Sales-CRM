function fileToDataUrl(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader(); r.onload=()=>resolve(r.result); r.onerror=()=>reject(new Error("อ่านไฟล์ "+file.name+" ไม่สำเร็จ")); r.readAsDataURL(file);
  });
}
function optimizeFeedbackImage(file){
  if(file.size>12*1024*1024) return Promise.reject(new Error("รูป "+file.name+" มีขนาดเกิน 12 MB"));
  return fileToDataUrl(file).then(src=>new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const max=1400, scale=Math.min(1,max/Math.max(img.width,img.height));
      const c=document.createElement("canvas"); c.width=Math.max(1,Math.round(img.width*scale)); c.height=Math.max(1,Math.round(img.height*scale));
      const ctx=c.getContext("2d"); ctx.drawImage(img,0,0,c.width,c.height);
      const type=file.type==="image/png"&&file.size<900000?"image/png":"image/jpeg";
      resolve({name:file.name.replace(/\.(heic|heif)$/i,".jpg"),type,data:c.toDataURL(type,type==="image/jpeg"?.75:undefined)});
    };
    img.onerror=()=>reject(new Error("รูป "+file.name+" เปิดไม่ได้ กรุณาใช้ JPG, PNG หรือ WebP"));
    img.src=src;
  }));
}
function readFeedbackFiles(input){
  const files=Array.from((input&&input.files)||[]);
  if(files.length>5) return Promise.reject(new Error("เลือกได้ไม่เกิน 5 ไฟล์ต่อครั้ง"));
  return Promise.all(files.map(async f=>{
    if((f.type||"").startsWith("image/")) return optimizeFeedbackImage(f);
    if(f.type==="application/pdf"||/\.pdf$/i.test(f.name)){
      if(f.size>3*1024*1024) throw new Error("PDF "+f.name+" มีขนาดเกิน 3 MB");
      return {name:f.name,type:"application/pdf",data:await fileToDataUrl(f)};
    }
    throw new Error("รองรับเฉพาะรูปภาพและ PDF");
  })).then(out=>{
    const total=out.reduce((s,f)=>s+String(f.data||"").length,0);
    if(total>3.5*1024*1024) throw new Error("ไฟล์รวมมีขนาดใหญ่เกินไป กรุณาเลือกน้อยลงหรือย่อ PDF");
    return out;
  });
}
async function submitSale(){
  const id=val("f_id"), kind=val("f_kind")||"group_ro", oldIsFn=kind==="function";
  const saleType=val("f_saletype"), salesId=isSales()?mySalesId():val("f_sales");
  if(!guardSales(salesId)) return;
  const name=val("f_sale_name").trim(), customerType=val("f_customer_type"), customerTypeOther=val("f_customer_other").trim();
  const start=val("f_service_start"), end=val("f_service_end")||start, workClosed=!!document.getElementById("f_work_closed")?.checked;
  const stage=workClosed?"won":val("f_stage"), lostReason=val("f_lostreason").trim();
  if(!name){ alert("กรุณากรอกชื่อลูกค้าหรือชื่องาน"); return; }
  if(!start){ alert("กรุณาระบุวันเริ่มใช้บริการ"); return; }
  if(customerType==="other"&&!customerTypeOther){ alert("กรุณาระบุประเภทลูกค้าอื่น ๆ"); return; }
  if(start&&end<start){ alert("วันสิ้นสุดต้องไม่ก่อนวันเริ่มใช้บริการ"); return; }
  if(stage==="lost"&&!lostReason){ alert("กรุณาระบุเหตุผลที่ Lost"); return; }
  const saveBtn=document.getElementById("modalSaveBtn");
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent="กำลังบันทึกไฟล์…"; }
  let added=[]; try{ added=await readFeedbackFiles(document.getElementById("f_feedback")); }
  catch(e){ if(saveBtn){saveBtn.disabled=false;saveBtn.textContent="บันทึก";} alert(e.message||e); return; }
  const existing=oldIsFn?(id?db.functionEvents.find(x=>x.id===id):null):(id?db.pipeline.find(x=>x.id===id):null);
  if(existing&&!guardSales(existing.salesId)) return;
  const removed=new Set(Array.from(document.querySelectorAll(".remove_feedback:checked")).map(x=>Number(x.value)));
  const feedbackFiles=[...((existing&&existing.feedbackFiles)||[]).filter((_,i)=>!removed.has(i)),...added];
  if(feedbackFiles.length>10){ if(saveBtn){saveBtn.disabled=false;saveBtn.textContent="บันทึก";} alert("งานหนึ่งเก็บไฟล์ได้สูงสุด 10 ไฟล์ กรุณาลบไฟล์เดิมบางส่วน"); return; }
  const feedbackData={workClosed,closedDate:workClosed?(val("f_closed_date")||todayStr()):"",
    feedbackRating:Number(val("f_feedback_rating"))||0,customerFeedback:val("f_customer_feedback").trim(),
    salesObstacle:val("f_sales_obstacle").trim(),salesSuggestion:val("f_sales_suggestion").trim(),feedbackFiles};
  const newIsFn=saleType==="function";
  if(newIsFn){
    const status=workClosed?"completed":({lead:"inquiry",quoted:"quoted",negotiation:"quoted",won:"confirmed",lost:"cancelled"}[stage]||"inquiry");
    const data={hotelId:val("f_hotel"),salesId,clientName:name,eventType:val("f_eventtype"),eventDate:start,eventEndDate:end,
      paxCount:Number(val("f_pax"))||0,estRevenue:Number(val("f_value"))||0,status,salesStage:stage,expectedCloseDate:val("f_close"),
      lostReason:stage==="lost"?lostReason:"",customerType,customerTypeOther:customerType==="other"?customerTypeOther:"",salesCategory:"function",...feedbackData};
    if(existing&&oldIsFn) Object.assign(existing,data);
    else {
      if(existing) db.pipeline=db.pipeline.filter(x=>x.id!==existing.id);
      db.functionEvents.unshift({id:existing?existing.id:uid("fn"),beoSentDate:"",...data});
    }
  }else{
    const data={hotelId:val("f_hotel"),salesId,accountName:name,dealType:"corporate_room",salesCategory:saleType,
      eventType:val("f_eventtype"),serviceStartDate:start,serviceEndDate:end,estValue:Number(val("f_value"))||0,stage,
      expectedCloseDate:val("f_close"),lostReason:stage==="lost"?lostReason:"",customerType,customerTypeOther:customerType==="other"?customerTypeOther:"",...feedbackData};
    if(existing&&!oldIsFn) Object.assign(existing,data);
    else {
      if(existing) db.functionEvents=db.functionEvents.filter(x=>x.id!==existing.id);
      db.pipeline.unshift({id:existing?existing.id:uid("pl"),...data});

// อ่านไฟล์โลโก้ที่เลือก → ย่อขนาด → เก็บเป็น dataURL ใน hidden field + แสดงตัวอย่าง
function previewHotelLogo(input){
  const file = input.files && input.files[0]; if(!file) return;
  if(!/^image\//.test(file.type)){ alert("กรุณาเลือกไฟล์รูปภาพ"); input.value=""; return; }
  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.onload = ()=>{
      const max=320; let w=img.width, h=img.height;
      if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      let dataUrl; try{ dataUrl = cv.toDataURL("image/png"); }catch(err){ dataUrl = e.target.result; }
      const hid=document.getElementById("f_logo"); if(hid) hid.value=dataUrl;
      const pv=document.getElementById("logoPreview"); if(pv) pv.innerHTML=`<img src="${dataUrl}" style="max-width:100%;max-height:100%;object-fit:contain;"/>`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearHotelLogo(){
  const hid=document.getElementById("f_logo"); if(hid) hid.value="";
  const ff=document.getElementById("f_logo_file"); if(ff) ff.value="";
  const pv=document.getElementById("logoPreview"); if(pv) pv.innerHTML=`<span class="text-xs text-slate-400">ไม่มี</span>`;
}

function submitSales(){
  if(!guardManage()) return;
  const id = val("f_id");
  const name = val("f_name").trim();
  const email = (val("f_email")||"").trim().toLowerCase();
  if(!name){ alert("กรุณากรอกชื่อฝ่ายขาย"); return; }
  if(id){ Object.assign(salesById(id), { name, email }); }
  else { const nid=uid("s"); db.salesReps.push({ id:nid, name, email }); ui.currentSales=nid; }
  saveData(); closeModal(); render();
}
function deleteSales(id){
  if(!guardManage()) return;
  if(db.salesReps.length<=1){ alert("ต้องมีฝ่ายขายอย่างน้อย 1 คน"); return; }
  const used = db.pipeline.some(p=>p.salesId===id) || db.functionEvents.some(f=>f.salesId===id)
    || db.accounts.some(a=>a.salesId===id) || db.activities.some(a=>a.salesId===id);
  if(used){ alert("ลบไม่ได้ เพราะยังมีข้อมูล (Pipeline / Function / Account / กิจกรรม) ผูกกับเซลล์คนนี้อยู่\n\nกรุณาย้ายหรือลบข้อมูลเหล่านั้นก่อน"); return; }
  if(!confirm("ลบเซลล์คนนี้?")) return;
  db.salesReps = db.salesReps.filter(s=>s.id!==id);
  syncLookups();
  if(ui.currentSales===id) ui.currentSales = db.salesReps[0].id;
  saveData(); closeModal(); render();
}

// Supabase client แยกอีกตัว (storageKey คนละอัน) ไว้ "สร้างบัญชี login ใหม่"
// โดยไม่กระทบ session ของเจ้าของที่ล็อกอินอยู่
let sbSignup = null;
function getSignupClient(){
  if(sbSignup) return sbSignup;
  if(!window.supabase) return null;
  sbSignup = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth:{ storage: window.sessionStorage, storageKey:"plaai_signup_tmp", persistSession:false, autoRefreshToken:false }
  });
  return sbSignup;
}
async function createLoginAccount(email, password){
  const c = getSignupClient();
  if(!c) throw new Error("ไม่มีการเชื่อมต่อ Supabase");
  const { data, error } = await c.auth.signUp({ email, password });
  try{ await c.auth.signOut(); }catch(e){}
  if(error) throw error;
  return data;
}

async function submitAppUser(){
  if(!guardUserManage()) return;
  const id = val("f_id");
  const email = (val("f_email")||"").trim().toLowerCase();
  const role = val("f_role");
  const name = (val("f_name")||"").trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ alert("กรุณากรอกอีเมลให้ถูกต้อง"); return; }
  const dup = (db.appUsers||[]).find(u=>u.email.toLowerCase()===email && u.id!==id);
  if(dup){ alert("มีอีเมลนี้อยู่ในรายการแล้ว"); return; }
  const rec = { email, role, name, salesId:"", hotelIds:[], active:true };
  if(role==="sales"||role==="sales_manager"){ rec.salesId = val("f_sales")||""; if(!rec.salesId){ alert("กรุณาเลือกฝ่ายขายที่จะผูกกับบัญชีนี้"); return; } }
  if(role==="hm"){
    rec.hotelIds = Array.from(document.querySelectorAll(".hm_hotel:checked")).map(x=>x.value);
    if(!rec.hotelIds.length){ alert("กรุณาเลือกโรงแรมอย่างน้อย 1 แห่งสำหรับผู้จัดการโรงแรม"); return; }
  }
  if(id){ const u=(db.appUsers||[]).find(x=>x.id===id); if(u) Object.assign(u, rec); }
  else { rec.id = uid("usr"); db.appUsers = db.appUsers||[]; db.appUsers.push(rec); }
  saveData();

  // สร้างบัญชี login (ไม่บังคับ)
  const wantLogin = !!(document.getElementById("f_makelogin") && document.getElementById("f_makelogin").checked);
  const pw = (val("f_pw")||"").trim();
  if(wantLogin && pw){
    if(pw.length<6){ alert("บันทึกสิทธิ์ผู้ใช้แล้ว ✓ แต่รหัสผ่านสั้นเกินไป (ต้องอย่างน้อย 6 ตัว) จึงยังไม่ได้สร้างบัญชี login"); openUserManager(); return; }
    try{
      const res = await createLoginAccount(email, pw);
      const confirmed = res && (res.session || (res.user && (res.user.confirmed_at || res.user.email_confirmed_at)));
      if(confirmed) alert("เพิ่มผู้ใช้และสร้างบัญชี login เรียบร้อย ✓\nผู้ใช้ล็อกอินด้วยอีเมล + รหัสผ่านนี้ได้เลย");
      else alert("เพิ่มผู้ใช้แล้ว ✓ และสร้างบัญชี login แล้ว\nแต่ Supabase ตั้งค่าให้ยืนยันอีเมลก่อน — แจ้งผู้ใช้เปิดอีเมลกดลิงก์ยืนยัน หรือแอดมินกด Confirm ในหน้า Supabase");
    }catch(e){
      const m=(e.message||"").toLowerCase();
      if(m.includes("already")||m.includes("registered")||m.includes("exist"))
        alert("บันทึกสิทธิ์ผู้ใช้แล้ว ✓ (อีเมลนี้มีบัญชี login ใน Supabase อยู่แล้ว จึงไม่สร้างซ้ำ)");
      else
        alert("บันทึกสิทธิ์ผู้ใช้แล้ว ✓ แต่สร้างบัญชี login ไม่สำเร็จ: "+(e.message||e)+"\nสร้างบัญชีในหน้า Supabase (Authentication > Users) แทนได้");
    }
  }
  openUserManager();
}
function deleteAppUser(id){
  if(!guardUserManage()) return;
  const u = (db.appUsers||[]).find(x=>x.id===id);
  if(!u) return;
  if(!confirm("ลบผู้ใช้ “"+u.email+"” ออกจากรายการสิทธิ์?\n(บัญชี login ใน Supabase จะไม่ถูกลบ — หากต้องการปิดการเข้าระบบให้ลบในหน้า Supabase ด้วย)")) return;
  db.appUsers = (db.appUsers||[]).filter(x=>x.id!==id);
  saveData();
  openUserManager();
}

function thaiFullDate(d){ return d.getDate()+" "+THAI_MONTHS[d.getMonth()]+" "+d.getFullYear(); }
// สร้างข้อความสรุป (รูปแบบเดียวกับที่ Edge Function ส่งอัตโนมัติ)
function buildWeeklySummary(){
  const now = new Date(todayStr()+"T12:00:00");
  const mk = currentMonthKey();
  const monthRev = revGroupMonth(mk);
  const oh = groupOnHand(mk), fc = groupForecast(mk);

  let s = "";
  s += "📊 สรุปยอดขายประจำเดือน\n";
  s += "Plaai Group • " + monthLabel(mk) + "\n";
  s += "ข้อมูล ณ " + thaiFullDate(now) + "\n\n";
  s += "💰 ยอดขายรวมเดือนนี้: " + fmtMoney(monthRev) + "\n";
  s += "✅ On Hand (Confirmed): " + fmtMoney(oh) + "\n";
  s += "📈 Forecast (Pipeline+Function): " + fmtMoney(fc) + "\n";
  s += "\n— ส่งจากระบบ Plaai Sales Ops";
  return s;
}

  const canSend = !!(CLOUD && LINE_SUMMARY_FUNCTION_URL);

        </div>
        ${canSend ? "" : `<div class="text-xs text-slate-400">* ปุ่มส่งเข้า LINE จะใช้ได้เมื่อตั้งค่า Edge Function แล้ว (ดูคู่มือ LINE)</div>`}

function copyWeekly(){
  const t = document.getElementById("weeklyText"); if(!t) return;
  const done = ()=>{ const m=document.getElementById("weeklyMsg"); if(m){ m.textContent="คัดลอกแล้ว ✓"; m.style.color="#0f766e"; } };
  try{ navigator.clipboard.writeText(t.value).then(done, ()=>{ t.select(); document.execCommand("copy"); done(); }); }
  catch(e){ t.select(); document.execCommand("copy"); done(); }
}
function downloadWeekly(){
  const t = document.getElementById("weeklyText"); if(!t) return;
  const blob = new Blob([t.value], { type:"text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="plaai_monthly_"+currentMonthKey()+".txt"; a.click(); URL.revokeObjectURL(url);
}
async function sendWeeklyToLine(btn){
  const msg = document.getElementById("weeklyMsg");
  if(!sb){ if(msg){ msg.textContent="ต้องเชื่อมต่อคลาวด์ก่อนจึงจะส่งได้"; msg.style.color="#be123c"; } return; }
  if(btn){ btn.disabled=true; btn.textContent="กำลังส่ง..."; }
  try{
    const { data:{ session } } = await sb.auth.getSession();
    const res = await fetch(LINE_SUMMARY_FUNCTION_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+(session?session.access_token:SUPABASE_ANON_KEY) },
      body: JSON.stringify({ mode:"send", summaryType:"monthly", month:currentMonthKey(), text:(document.getElementById("weeklyText")||{}).value||buildWeeklySummary() })
    });
    if(!res.ok) throw new Error("HTTP "+res.status+" "+(await res.text()));
    if(msg){ msg.textContent="ส่งเข้า LINE เรียบร้อย ✓"; msg.style.color="#0f766e"; }
  }catch(e){
    if(msg){ msg.textContent="ส่งไม่สำเร็จ: "+(e.message||e); msg.style.color="#be123c"; }
  }finally{ if(btn){ btn.disabled=false; btn.textContent="📤 ส่งเข้า LINE เลย"; } }
}

function addChannelRow(){
  const wrap = document.getElementById("cmRows"); if(!wrap) return;
  const cnt = Number(val("cm_count"))||0; const i = cnt;
  document.getElementById("cm_count").value = cnt+1;
  const col = CHANNEL_PALETTE[i%CHANNEL_PALETTE.length];
  const div = document.createElement("div");
  div.className="flex items-center gap-2"; div.setAttribute("data-chrow",i);
  div.innerHTML = `<input type="color" value="${col}" id="cm_color_${i}" class="w-8 h-8 rounded border" />
      <input type="text" value="" placeholder="ชื่อกลุ่มลูกค้าใหม่" id="cm_label_${i}" class="flex-1 border border-slate-200 rounded-lg px-2 py-1.5 text-sm" />
      <input type="hidden" id="cm_key_${i}" value=""/>
      <button type="button" onclick="removeChannelRow(${i})" class="text-rose-500 text-xs px-2">ลบ</button>`;
  wrap.appendChild(div);
}
function removeChannelRow(i){ const r=document.querySelector('[data-chrow="'+i+'"]'); if(r) r.remove(); }
function submitChannels(){
  if(!guardGroups()) return;
  const cnt = Number(val("cm_count"))||0;
  const out = []; const usedKeys=new Set();
  for(let i=0;i<cnt;i++){
    const labelEl = document.getElementById("cm_label_"+i); if(!labelEl) continue;
    const label = labelEl.value.trim(); if(!label) continue;
    const color = (document.getElementById("cm_color_"+i)||{}).value || CHANNEL_PALETTE[i%CHANNEL_PALETTE.length];
    let key = val("cm_key_"+i) || slugChannel(label);
    while(usedKeys.has(key)) key = key+"_";
    usedKeys.add(key);
    out.push({ key, label, color });
  }
  // กลุ่มหลักต้องมีเสมอทุกโรงแรม — เติมกลับถ้าถูกลบ
  REQUIRED_GROUP_KEYS.forEach(k=>{ if(!usedKeys.has(k)){ const d=DEFAULT_CHANNELS.find(c=>c.key===k)||{ key:k, label:LEGACY_CH_LABEL[k]||k, color:LEGACY_CH_COLOR[k]||"#94a3b8" }; out.push({ ...d }); usedKeys.add(k); } });
  if(!out.length){ alert("ต้องมีอย่างน้อย 1 กลุ่มลูกค้า"); return; }
  db.customerGroups = out;
  db.hotels.forEach(h=>{ h.channels = db.customerGroups; });
  saveData(); closeModal(); render();
}
function deleteRevenue(hid,month){
  if(!guardRevenue()) return;
  if(!confirm("ล้างยอดขายของเดือนนี้?")) return;
  db.revenue = db.revenue.filter(r=>!(r.hotelId===hid && r.month===month));
  saveData(); closeModal(); render();
}

function firstDayOfMonth(){ return todayStr().slice(0,7)+"-01"; }
function ensureReportDefaults(){
  if(!ui.reportFrom) ui.reportFrom = firstDayOfMonth();
  if(!ui.reportTo)   ui.reportTo   = todayStr();
  if(isSales()){ ui.reportRep=mySalesId(); return; }
  if(ui.reportRep!=="all" && !salesById(ui.reportRep)) ui.reportRep = "all";
}
function openSalesReport(){ ensureReportDefaults(); ui.page="salesReport"; render(); }
function closeSalesReport(){ ui.page=null; render(); }
function setReportRep(v){ ui.reportRep=isSales()?mySalesId():v; render(); }
function setReportFrom(v){ ui.reportFrom=v; render(); }
function setReportTo(v){ ui.reportTo=v; render(); }
function setReportEmail(v){ ui.reportEmail=v; }
function reportRepMatch(sid){ return ui.reportRep==="all" || sid===ui.reportRep; }
function inRange(dateStr){ const d=(dateStr||""); return d && d>=ui.reportFrom && d<=ui.reportTo; }

// ---- data slices for the selected rep + date range ----
function repActivities(){ return db.activities.filter(a=>reportRepMatch(a.salesId) && inRange(a.date)).sort((a,b)=>a.date.localeCompare(b.date)); }
function repRoomDeals(){ return db.pipeline.filter(p=>reportRepMatch(p.salesId) && p.dealType==="corporate_room" && p.stage==="won" && inRange(p.expectedCloseDate)); }
function repFunctionPipeline(){ return db.pipeline.filter(p=>reportRepMatch(p.salesId) && p.dealType==="function" && p.stage==="won" && inRange(p.expectedCloseDate)); }
function repFunctionEvents(){ return db.functionEvents.filter(f=>reportRepMatch(f.salesId) && ONHAND_FN_STATUS.includes(f.status) && inRange(f.eventDate)); }
function repOpenPipeline(){ return db.pipeline.filter(p=>reportRepMatch(p.salesId) && p.stage!=="won" && p.stage!=="lost"); }
function repUpcomingFunctions(){ return db.functionEvents.filter(f=>reportRepMatch(f.salesId) && f.status!=="completed" && f.status!=="cancelled" && daysDiff(f.eventDate)>=0).sort((a,b)=>a.eventDate.localeCompare(b.eventDate)); }
function repOverdueAccounts(){ return db.accounts.filter(a=>reportRepMatch(a.salesId) && daysDiff(a.lastContactDate)<=-14); }

function roomTotal(){ return sumVal(repRoomDeals(),"estValue"); }
function functionTotal(){ return sumVal(repFunctionEvents(),"estRevenue") + sumVal(repFunctionPipeline(),"estValue"); }
function reportGrandTotal(){ return roomTotal()+functionTotal(); }
function reportRepName(){ return ui.reportRep==="all" ? "ทุกคน (รวมทุกเซลล์)" : (salesById(ui.reportRep)?.name || "-"); }
function reportPeriodTh(){
  const f=new Date(ui.reportFrom), t=new Date(ui.reportTo);
  return thaiFullDate(f)+" – "+thaiFullDate(t);
}

// ---- auto action plan (สรุปจากข้อมูลที่มี) ----
function autoActionItems(){
  const items=[];
  const nm = sid => salesById(sid)?.name || "-";
  const pfx = sid => ui.reportRep==="all" ? "["+nm(sid)+"] " : "";
  repOpenPipeline().sort((a,b)=>(a.expectedCloseDate||"").localeCompare(b.expectedCloseDate||"")).forEach(p=>{
    items.push(pfx(p.salesId)+"ตามดีล “"+p.accountName+"” ("+hotelById(p.hotelId).name+") — "+PIPELINE_STAGES[p.stage]+" · "+fmtMoney(p.estValue)+(p.expectedCloseDate?" · คาดปิด "+p.expectedCloseDate:""));
  });
  repUpcomingFunctions().forEach(f=>{
    const dd=daysDiff(f.eventDate);
    const warn = (!ONHAND_FN_STATUS.includes(f.status)) ? " · ยังไม่ยืนยัน" : (f.status==="confirmed"?" · ยังไม่ส่ง BEO":"");
    items.push(pfx(f.salesId)+"เตรียมงาน “"+f.clientName+"” ("+hotelById(f.hotelId).name+") วันงาน "+f.eventDate+" (อีก "+dd+" วัน) — "+FUNCTION_STATUS[f.status]+warn);
  });
  repOverdueAccounts().forEach(a=>{
    items.push(pfx(a.salesId)+"ติดต่อ Account “"+a.name+"” — เงียบไป "+Math.abs(daysDiff(a.lastContactDate))+" วัน"+(a.lastContactTopic?" (ล่าสุด: "+a.lastContactTopic+")":""));
  });
  return items;
}

function saveRepPlan(sid,value){ if(!canEditSales(sid))return; const r=salesById(sid); if(r){ r.actionPlan=value; saveData(); } }

// นำเข้า/ส่งออก "ตัวเลขยอดขายรายเดือน" เป็น Excel / CSV
//   - ส่งออก: ได้ตารางยอดขายทั้งปี (แต่ละโรงแรม × 12 เดือน × ทุกช่องทาง)
//   - นำเข้า: อัปเดตตัวเลขทีเดียวหลายเดือน (ไม่ต้องแก้ทีละช่อง) เหมาะกับฝ่ายบัญชี
//   คอลัมน์: hotelId | โรงแรม | เดือน(YYYY-MM) | OTA | FIT | Walk-in | Corporate | อื่นๆ | ยอดรวมเหมา(lump)
// ============================================================
// คอลัมน์ช่องทาง = union ของทุกโรงแรม (แต่ละโรงแรมมีช่องทางของตัวเอง)
function revenueChannelCols(){ return groupChannels(HOTELS).map(c=>({ key:c.key, label:c.label })); }
function revenueRowsForYear(y){
  const cols = revenueChannelCols();
  const header = ["hotelId","โรงแรม","เดือน(YYYY-MM)", ...cols.map(c=>c.label), "ยอดรวมเหมา(lump)"];
  const rows = [header];
  HOTELS.forEach(h=>{
    for(let m=1;m<=12;m++){
      const key = monthKey(y,m); const v = revVals(h.id,key);
      rows.push([ h.id, h.name, key, ...cols.map(c=>Number(v[c.key])||0), Number(v.lump)||0 ]);
    }
  });
  return rows;
}

// จับคู่หัวคอลัมน์ช่องทาง -> channel key (รองรับชื่อไทย/อังกฤษ/คีย์เดิม)
function importColKey(text, cols){
  const t = String(text||"").toLowerCase().trim();
  if(t.includes("lump")||t.includes("เหมา")||t==="ยอดรวมเหมา") return "lump";
  let c = cols.find(x=>String(x.label).toLowerCase().trim()===t); if(c) return c.key;
  c = cols.find(x=>String(x.key).toLowerCase()===t); if(c) return c.key;
  if(t==="ota") return "ota";
  if(t.includes("walk")) return "walkin";
  if(t==="fit") return "fit";
  if(t.includes("corporate")||t.includes("คอร์ป")||t.includes("ฝ่ายขาย")) return "corporate";
  if(t.includes("direct")||t.includes("ไดเร")) return "direct";
  if(t.includes("อื่น")||t.includes("other")) return "other";
  return slugChannel(text);
}
function normMonthCell(v){
  if(v==null) return "";
  // เผื่อ Excel ส่งมาเป็น Date object
  if(v instanceof Date){ return v.getFullYear()+"-"+String(v.getMonth()+1).padStart(2,"0"); }
  const s = String(v).trim();
  const m = s.match(/(\d{4})[-/](\d{1,2})/);
  if(m) return m[1]+"-"+String(Number(m[2])).padStart(2,"0");
  return "";
}
function applyRevenueImport(aoa){
  if(!aoa || !aoa.length) throw new Error("ไฟล์ว่าง");
  const header = aoa[0];
  const cols = revenueChannelCols();
  let iHotelId=-1, iName=-1, iMonth=-1;
  const chanCols = []; // { col, key }
  header.forEach((raw,i)=>{
    const h = String(raw||"").toLowerCase().trim();
    if(h.includes("hotelid")){ iHotelId=i; return; }
    if(h.includes("โรงแรม")||h==="hotel"){ iName=i; return; }
    if(h.includes("เดือน")||h.includes("month")){ iMonth=i; return; }
    if(!h) return;
    chanCols.push({ col:i, key:importColKey(raw, cols) });
  });
  if(iMonth===-1 || (iHotelId===-1 && iName===-1))
    throw new Error("ไม่พบคอลัมน์ 'เดือน' หรือ 'โรงแรม/hotelId' — กรุณาใช้ไฟล์ที่ส่งออกจากปุ่ม Excel/CSV เป็นแม่แบบ");
  let updated=0, skipped=0;
  for(let r=1;r<aoa.length;r++){
    const row = aoa[r]; if(!row || !row.length) continue;
    const month = normMonthCell(iMonth>=0?row[iMonth]:"");
    if(!/^\d{4}-\d{2}$/.test(month)){ skipped++; continue; }
    let hid = iHotelId>=0 ? String(row[iHotelId]||"").trim() : "";
    if(!hid || !hotelById(hid)){
      const nm = iName>=0 ? String(row[iName]||"").trim() : "";
      const h = HOTELS.find(x=>x.name===nm);
      hid = h ? h.id : "";
    }
    if(!hid || !hotelById(hid)){ skipped++; continue; }
    const num = i => (i>=0 ? Number(String(row[i]).replace(/[,\s฿]/g,""))||0 : 0);
    const vals = {};
    chanCols.forEach(cc=>{ const v=num(cc.col); if(v) vals[cc.key]=(Number(vals[cc.key])||0)+v; });
    const e = revEntry(hid,month);
    if(e){ e.vals = vals; } else { db.revenue.push({ id:uid("rev"), hotelId:hid, month, vals }); }
    // ให้แน่ใจว่าโรงแรมมีนิยามช่องทางของ key ที่นำเข้ามา (กันข้อมูลซ่อน)
    const h = hotelById(hid); if(h){ if(!Array.isArray(h.channels)) h.channels=[]; const have=new Set(h.channels.map(c=>c.key));
      Object.keys(vals).forEach(k=>{ if(k!=="lump" && !have.has(k)){ have.add(k);
        h.channels.push({ key:k, label:(cols.find(c=>c.key===k)||{}).label||LEGACY_CH_LABEL[k]||k, color:LEGACY_CH_COLOR[k]||CHANNEL_PALETTE[h.channels.length%CHANNEL_PALETTE.length] }); } }); }
    updated++;
  }
  return { updated, skipped };
}
function importRevenueFile(evt){
  if(!guardRevenue()){ evt.target.value=""; return; }
  if(typeof XLSX==="undefined"){ alert("ไลบรารี Excel ยังโหลดไม่เสร็จ กรุณาลองใหม่อีกครั้ง"); evt.target.value=""; return; }
  const file = evt.target.files[0]; if(!file){ return; }
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const wb = XLSX.read(new Uint8Array(reader.result), { type:"array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const aoa = XLSX.utils.sheet_to_json(ws, { header:1, raw:true, defval:"" });
      const res = applyRevenueImport(aoa);
      saveData(); render();
      alert("นำเข้ายอดขายสำเร็จ ✓\nอัปเดต "+res.updated+" เดือน"+(res.skipped?("\nข้าม "+res.skipped+" แถวที่อ่านไม่ได้"):""));
    }catch(e){ alert("นำเข้าไม่สำเร็จ: "+(e.message||e)); }
    evt.target.value="";
  };
  reader.readAsArrayBuffer(file);
}

function csvCell(v){
  let s = (v===null||v===undefined) ? "" : String(v);
  if(s.charAt(0)==="'") s = s.slice(1); // ตัด marker ที่กันวันที่เพี้ยนใน Excel ออกสำหรับ CSV
  if(/[",\n]/.test(s)) s = '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function aoaToCsv(aoa){ return aoa.map(row=>row.map(csvCell).join(",")).join("\r\n"); }
function exportReportCSV(){

  blocks.push(aoaToCsv(t.summary));
  blocks.push("");

  blocks.push("");
  blocks.push("=== Note สำคัญ ===");

  // โหมดส่งอัตโนมัติผ่าน Edge Function (พร้อมไฟล์ Excel แนบ)
  if(REPORT_EMAIL_FUNCTION_URL && sb){
    try{
      const wb = XLSX.utils.book_new();
      const t = buildReportTables();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(t.summary), "สรุป");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([t.activities.head, ...t.activities.rows]), "กิจกรรมรายวัน");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([t.room.head, ...t.room.rows]), "ยอดขายห้องพัก");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([t.functions.head, ...t.functions.rows]), "งาน Function");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(t.plan), "Note สำคัญ");
      const b64 = XLSX.write(wb, { bookType:"xlsx", type:"base64" });
      const { data:{ session } } = await sb.auth.getSession();
      const res = await fetch(REPORT_EMAIL_FUNCTION_URL, {
        method:"POST",
        headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+(session?session.access_token:SUPABASE_ANON_KEY) },
        body: JSON.stringify({ to, subject, body, filename:reportFileBase()+".xlsx", attachmentBase64:b64 })
      });
      if(!res.ok) throw new Error("HTTP "+res.status+" "+(await res.text()));
      alert("ส่งรายงานเข้าอีเมล "+to+" เรียบร้อยแล้ว ✓");
      return;
    }catch(e){ alert("ส่งอัตโนมัติไม่สำเร็จ: "+(e.message||e)+"\n\nจะเปิดโปรแกรมอีเมลให้แทน"); }
  }

  // โหมดสำรอง: เปิดโปรแกรมอีเมล (mailto) + ดาวน์โหลดไฟล์ Excel ให้แนบเอง
  exportReportExcel();
  const mailto = "mailto:"+encodeURIComponent(to)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body+"\n\n*กรุณาแนบไฟล์ Excel ที่เพิ่งดาวน์โหลด ("+reportFileBase()+".xlsx) ก่อนส่ง");
  window.location.href = mailto;
}
function importData(evt){
  if(!guardManage()){ evt.target.value=""; return; }
  const file = evt.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed.accounts || !parsed.pipeline) throw new Error("invalid");
      db = parsed; normalizeData(); saveData(); render(); alert("นำเข้าข้อมูลสำเร็จ");
    }catch(e){ alert("ไฟล์ไม่ถูกต้อง กรุณาตรวจสอบอีกครั้ง"); }
  };
  reader.readAsText(file);
}

// PRESENTATION VIEW — พรีเซนต์ประจำเดือนสำหรับผู้บริหาร (แยกรายโรงแรม)

function canEditPresentation(){ if(!CLOUD) return true; const r=userRole(); return r==="owner"||r==="finance"; }
function guardPresentation(){ if(canEditPresentation()) return true; alert("เฉพาะเจ้าของกิจการหรือฝ่ายขายเท่านั้นที่แก้ไขข้อมูลส่วนนี้ได้"); return false; }

function ensurePresDefaults(){
  const cy=currentYear(), cm=Number(currentMonthKey().slice(5,7))||1;
  if(!ui.presYear) ui.presYear=cy;
  if(ui.presCmpYear==null) ui.presCmpYear=ui.presYear-1;
  if(!ui.presPeriod) ui.presPeriod="range";
  if(!ui.presFromM) ui.presFromM=cm;
  if(!ui.presToM) ui.presToM=cm;
  if(!ui.presScope) ui.presScope="group";
  if(ui.presScope!=="group" && !canSeeHotel(ui.presScope)) ui.presScope="group";
}
function setPresScope(v){ ui.presScope=v; render(); }
function setPresYear(v){ ui.presYear=Number(v); if(ui.presCmpYear===ui.presYear) ui.presCmpYear=ui.presYear-1; render(); }
function setPresCmpYear(v){ ui.presCmpYear=Number(v); render(); }
function setPresPeriod(v){ ui.presPeriod=v; render(); }
function setPresFromM(v){ ui.presFromM=Number(v); render(); }
function setPresToM(v){ ui.presToM=Number(v); render(); }
function printPresent(){ window.print(); }

function presMonthsList(){
  const scope=ui.presScope, y=ui.presYear;
  if(ui.presPeriod==="full"){ const a=[]; for(let m=1;m<=12;m++)a.push(m); return a; }
  if(ui.presPeriod==="range"){ const a=Math.min(ui.presFromM,ui.presToM), b=Math.max(ui.presFromM,ui.presToM); const out=[]; for(let m=a;m<=b;m++) out.push(m); return out; }
  let ms=revMonthsWithData(scope,y);
  if(!ms.length){ const cy=currentYear(); const upto=(y===cy)?(Number(currentMonthKey().slice(5,7))||12):12; ms=[]; for(let m=1;m<=upto;m++) ms.push(m); }
  return ms;
}
function presPeriodLabel(){
  const ms=presMonthsList();
  if(!ms.length) return "—";
  return THAI_MONTHS[ms[0]-1]+"–"+THAI_MONTHS[ms[ms.length-1]-1]+" "+ui.presYear;
}
// รวมยอดตามช่องทาง (per scope/months)
function revScopeMonthChannel(scope,y,m,ch){ return scope==="group" ? visibleHotels().reduce((s,h)=>s+revChannel(h.id,monthKey(y,m),ch),0) : revChannel(scope,monthKey(y,m),ch); }
function revScopeMonthsChannel(scope,y,months,ch){ return months.reduce((s,m)=>s+revScopeMonthChannel(scope,y,m,ch),0); }
// Corporate: ห้องพัก (won corporate_room) vs งาน Function (ยืนยันแล้ว) ในช่วง
function presDateInScope(dateStr,y,months){ if(!dateStr) return false; const yy=Number(dateStr.slice(0,4)), mm=Number(dateStr.slice(5,7)); return yy===y && months.includes(mm); }
function presRooms(scope,y,months){ return db.pipeline.filter(p=>p.dealType==="corporate_room"&&p.stage==="won"&&(scope==="group"||p.hotelId===scope)&&presDateInScope(p.expectedCloseDate,y,months)); }
function presFuncs(scope,y,months){ return db.functionEvents.filter(f=>ONHAND_FN_STATUS.includes(f.status)&&(scope==="group"||f.hotelId===scope)&&presDateInScope(f.eventDate,y,months)); }
// คอลเลกชันพรีเซนต์ (กรองตามโรงแรม)
function scopeMatch(x){ return ui.presScope==="group" ? canSeeHotel(x.hotelId) : x.hotelId===ui.presScope; }
function presPartnersList(){ return (db.partners||[]).filter(x=>scopeMatch(x) && (!x.year || Number(x.year)===ui.presYear)).sort((a,b)=>(Number(b.revenue)||0)-(Number(a.revenue)||0)).slice(0,10); }
function presNewList(){ return (db.newCompanies||[]).filter(scopeMatch).sort((a,b)=>String(b.date||"").localeCompare(String(a.date||""))); }
function presLostList(){ return (db.lostBusiness||[]).filter(scopeMatch).sort((a,b)=>String(a.lastDate||"").localeCompare(String(b.lastDate||""))); }
// อีเวนต์ในโซน "เห็นได้ทุกตึก" → ถ้าไม่ได้ผูกโรงแรมใดโดยเฉพาะ ให้แสดงในภาพรวม/ทุกตึก
function eventScopeMatch(x){ if(!x.hotelId) return true; return ui.presScope==="group" ? canSeeHotel(x.hotelId) : x.hotelId===ui.presScope; }
function presEventsList(){ return (db.events||[]).filter(x=>eventScopeMatch(x) && (!x.year || Number(x.year)===ui.presYear)).sort((a,b)=>String(a.startDate||"").localeCompare(String(b.startDate||""))); }
function presOppList(){ return (db.opportunities||[]).filter(scopeMatch).sort((a,b)=>(Number(b.value)||0)-(Number(a.value)||0)); }
function humanGap(dateStr){ if(!dateStr) return "—"; const d=Math.max(0,-daysDiff(dateStr)); if(d>=30){ const mo=Math.floor(d/30), rem=d%30; return mo+" เดือน"+(rem?(" "+rem+" วัน"):""); } return d+" วัน"; }
function hotelChip(hid){ const h=hotelById(hid); return h?`<span class="text-xs text-slate-400">${h.name}</span>`:""; }

function drawPresentCharts(){

    <label class="block text-sm">ชื่อลูกค้า/ดีล<input id="f_name" value="${escAttr(ex?ex.name:"")}" class="${inputCls}"/></label>
    <label class="block text-sm">มูลค่าโอกาส (บาท)<input type="number" id="f_value" value="${ex?ex.value:0}" class="${inputCls}"/></label>
    <label class="block text-sm">สถานะ<select id="f_stage" class="${inputCls}">${Object.entries(PIPELINE_STAGES).map(([k,v])=>`<option value="${k}" ${ex&&ex.stage===k?'selected':''}>${v}</option>`).join("")}</select></label>
    <label class="block text-sm">Note สำคัญ<textarea id="f_plan" class="${inputCls}" rows="3" placeholder="เงื่อนไขสำคัญ / ขั้นตอนถัดไป">${ex?escAttr(ex.actionPlan):""}</textarea></label>
    <input type="hidden" id="f_id" value="${ex?ex.id:''}"/>`;
  const footer=ex?`<button type="button" onclick="deletePresItem('opportunities','${ex.id}');closeModal();" class="text-rose-500 text-xs">ลบรายการนี้</button>`:"";
  document.getElementById("modalRoot").innerHTML=modalShell(ex?"แก้ไข Opportunity":"เพิ่ม Opportunity",body,"submitOpp",footer); }
function submitOpp(){ if(!guardPresentation())return; const id=val("f_id");
  const data={ hotelId:val("f_hotel"), name:val("f_name"), value:Number(val("f_value"))||0, stage:val("f_stage"), actionPlan:val("f_plan") };
  if(!data.name.trim()){ alert("กรุณากรอกชื่อลูกค้า/ดีล"); return; }
  if(id){ Object.assign(db.opportunities.find(x=>x.id===id),data); } else { db.opportunities.push({ id:uid("op"), ...data }); }
  saveData(); closeModal(); render(); }

// ---- event helpers ----
function evStart(x){ return x.startDate||""; }
function evEnd(x){ return x.endDate||x.startDate||""; }
function evDays(x){
  if(x.startDate && x.endDate){ const d=Math.round((new Date(x.endDate)-new Date(x.startDate))/86400000)+1; return d>0?d:1; }
  return Number(x.days)||1;
}
function evInMonth(x,key){ const s=ymKey(evStart(x)), e=ymKey(evEnd(x)); if(!s) return false; return s<=key && e>=key; }
function evInYear(x,y){ y=Number(y);
  const ys=Number(evStart(x).slice(0,4)), ye=Number(evEnd(x).slice(0,4));
  if(ys===y || ye===y) return true;
  if(!evStart(x) && Number(x.year)===y) return true;
  return false;
}
function evDateLabel(x){
  const s=evStart(x), e=evEnd(x);
  if(!s) return "— ยังไม่ระบุวันที่ —";
  const fmt=d=>{ const [yy,mm,dd]=d.split("-"); return Number(dd)+" "+THAI_MONTHS[Number(mm)-1]; };
  if(!e || e===s) return fmt(s)+" "+s.slice(0,4);
  if(s.slice(0,7)===e.slice(0,7)){ const [,,dd]=s.split("-"); return Number(dd)+"–"+fmt(e)+" "+e.slice(0,4); }
  return fmt(s)+" – "+fmt(e)+" "+e.slice(0,4);
}
function yieldEntry(ev,hid){ const p=ev.pricingPlans && ev.pricingPlans[hid]; if(!p) return null;
  if(typeof p==="string") return { text:p, by:"", at:"", level:"" }; return p; }
// ---- ระดับราคาช่วงอีเวนต์ (ให้ฝ่ายขายเห็นแบบย่อว่า "ราคาสูงเป็นพิเศษ") ----
const PRICE_LEVELS = {
  peak:   { label:"ราคาสูงเป็นพิเศษ", short:"สูงพิเศษ", badge:"background:#fee2e2;color:#b91c1c;", dot:"#dc2626", rank:3 },
  up:     { label:"ราคาปรับขึ้น",     short:"ปรับขึ้น",  badge:"background:#ffedd5;color:#c2410c;", dot:"#ea580c", rank:2 },
  normal: { label:"ราคาปกติ",         short:"ปกติ",     badge:"background:#e0f2fe;color:#0369a1;", dot:"#0284c7", rank:1 },
};
function yieldLevel(ev,hid){ const ye=yieldEntry(ev,hid); return (ye && ye.level) ? ye.level : ""; }
// ระดับราคารวมของอีเวนต์ (เอาระดับสูงสุดในบรรดาตึกที่วางแผนไว้)
function eventPriceLevel(ev){
  let best=null, bestRank=0;
  eventHotels(ev).forEach(h=>{ const lv=yieldLevel(ev,h.id); if(lv&&PRICE_LEVELS[lv]&&PRICE_LEVELS[lv].rank>bestRank){ best=lv; bestRank=PRICE_LEVELS[lv].rank; } });
  return best;
}
function ackEntry(ev,hid){ const a=ev.acks && ev.acks[hid]; return a||null; }
// จำนวนตึกที่ "รับทราบแล้ว" / "วางแผนราคาแล้ว" จากตึกที่เกี่ยวข้องทั้งหมด
function eventAckStats(ev){ const hs=eventHotels(ev); return {
  total:hs.length,
  acked:hs.filter(h=>ackEntry(ev,h.id)).length,
  planned:hs.filter(h=>{ const ye=yieldEntry(ev,h.id); return ye&&ye.text; }).length,
}; }

// ---- สถานะการแจ้งเตือน (คำนวณจากวันจริงอัตโนมัติทุกครั้งที่เรนเดอร์) ----
// upcoming = ใกล้ถึงภายใน 30 วัน · ongoing = กำลังจัดอยู่ · past = ผ่านไปแล้ว (แจ้งเตือนหายเอง) · future = ยังไกลเกิน 30 วัน
const NOTIF_WINDOW_DAYS = 30;
function eventNotifState(x){
  const s=evStart(x); if(!s) return "future";
  const dStart=daysDiff(s), dEnd=daysDiff(evEnd(x));
  if(dEnd<0) return "past";
  if(dStart<=0 && dEnd>=0) return "ongoing";
  if(dStart<=NOTIF_WINDOW_DAYS) return "upcoming";
  return "future";
}
function eventNotifActive(x){ const st=eventNotifState(x); return st==="upcoming"||st==="ongoing"; }
// ตึกที่ผู้ใช้คนนี้ "ดูแล/เกี่ยวข้อง" กับอีเวนต์นี้ (ผจก.=เฉพาะตึกตัวเอง · คนอื่น=ทุกตึกที่เกี่ยวข้อง)
function eventScopeHotels(x){ const rel=new Set(eventHotelIds(x)); const allow=new Set(allowedHotelIds()); return HOTELS.filter(h=>rel.has(h.id)&&allow.has(h.id)); }
// อีเวนต์ที่ต้องแจ้งเตือนสำหรับผู้ใช้คนนี้ (active + เกี่ยวข้องกับตึกที่ดูได้)
function viewerNotifEvents(){
  return (db.events||[]).filter(x=>eventNotifActive(x) && eventScopeHotels(x).length>0)
    .sort((a,b)=>String(evStart(a)).localeCompare(String(evStart(b))));
}
// อีเวนต์ที่ "ยังต้องทำอะไรบางอย่าง" (ผจก. = ยังไม่รับทราบ หรือ ยังไม่วางแผนราคาตึกตัวเอง)
function eventNeedsAttention(x){
  if(!eventNotifActive(x)) return false;
  return eventScopeHotels(x).some(h=>{
    if(!canEditPricing(h.id)) return false;          // นับเฉพาะตึกที่ผู้ใช้มีสิทธิ์กรอก (ผจก./เจ้าของ)
    const ye=yieldEntry(x,h.id);
    return !ackEntry(x,h.id) || !(ye&&ye.text);       // ยังไม่รับทราบ หรือ ยังไม่มีแผนราคา
  });
}
// จำนวนแจ้งเตือนที่ต้องสนใจ (กระดิ่งบนแถบบน)
function notifBellCount(){
  const evs=viewerNotifEvents();
  if(canEditAnyPricing()) return evs.filter(eventNeedsAttention).length; // ผจก./เจ้าของ = งานที่ยังค้าง
  return evs.length;                                                     // ฝ่ายขาย/อื่น ๆ = จำนวนอีเวนต์ที่กำลังจะถึง
}
function notifDayLabel(x){
  const st=eventNotifState(x);
  if(st==="ongoing") return "🔴 กำลังจัดอยู่";
  const d=daysDiff(evStart(x));
  if(d===0) return "วันนี้!";
  if(d===1) return "พรุ่งนี้";
  return "อีก "+d+" วัน";
}
function eventLocLabel(x){
  const parts=[]; if(x.venue) parts.push(x.venue);
  const geo=[x.district,x.province].filter(Boolean).join(", ");
  if(geo) parts.push(geo);
  return parts.join(" · ") || "— ยังไม่ระบุสถานที่ —";
}
// ---- โรงแรมที่เกี่ยวข้องกับอีเวนต์ ----
// ถ้าติ๊กเลือกไว้ = ใช้เฉพาะที่ติ๊ก · ถ้ายังไม่เคยติ๊ก (อีเวนต์เดิม) = ถือว่าเกี่ยวข้องทุกโรงแรม
function eventHotelIds(x){
  const ids=(Array.isArray(x.hotelIds)?x.hotelIds:[]).filter(id=>hotelById(id));
  return ids.length ? ids : HOTELS.map(h=>h.id);
}
function eventHotels(x){ const s=new Set(eventHotelIds(x)); return HOTELS.filter(h=>s.has(h.id)); }
function eventHasExplicitHotels(x){ return Array.isArray(x.hotelIds) && x.hotelIds.filter(id=>hotelById(id)).length>0; }

function ensureBoardDefaults(){
  const cy=currentYear();
  if(!ui.boardYear) ui.boardYear=cy;
  if(!ui.boardProvince) ui.boardProvince="all";
  if(!ui.boardHotel) ui.boardHotel="all";
}
function openEventBoard(){ ensureBoardDefaults(); ui.page="eventBoard"; render(); }
function closeEventBoard(){ ui.page=null; render(); }
function setBoardYear(v){ ui.boardYear=Number(v); render(); }
function setBoardProvince(v){ ui.boardProvince=v; render(); }
function setBoardHotel(v){ ui.boardHotel=v; render(); }

function boardEventsFiltered(){
  const prov=ui.boardProvince, hid=ui.boardHotel;
  return (db.events||[]).filter(x=>{
    if(prov!=="all" && (x.province||"")!==prov) return false;
    if(hid!=="all"){ // กรอง "ตึกที่เกี่ยวข้อง": ตึกที่ติ๊กเลือก (หรือมีแผนราคาแล้ว)
      const rel = eventHotelIds(x).includes(hid) || (x.pricingPlans && x.pricingPlans[hid]);
      if(!rel) return false;
    }
    return true;
  });
}
function boardProvinceOptions(){
  const set=new Set((db.events||[]).map(x=>x.province).filter(Boolean));
  const provs=[...set].sort();
  return `<option value="all" ${ui.boardProvince==="all"?"selected":""}>ทุกจังหวัด</option>`+
    provs.map(p=>`<option value="${escAttr(p)}" ${ui.boardProvince===p?"selected":""}>${p}</option>`).join("");
}
function boardYearOptions(){
  const cy=currentYear();
  const yrs=new Set((db.years||[]).concat([cy-1,cy,cy+1]));
  (db.events||[]).forEach(x=>{ const y=Number(evStart(x).slice(0,4))||x.year; if(y) yrs.add(Number(y)); });
  return [...yrs].filter(Boolean).sort((a,b)=>a-b).map(y=>`<option value="${y}" ${Number(ui.boardYear)===y?"selected":""}>${y}</option>`).join("");
}

// การ์ดอีเวนต์ (โฟกัส 3 เดือน) — รายละเอียด + แผน Activity + ตารางราคา/Yield รายตึก
function eventCardHtml(x){
  const cat=EVENT_CATS[x.category]||x.category||"อีเวนต์";
  const catCol=CAT_COLOR[x.category]||"#64748b";
  const imp=x.impact||"medium";
  const canInfo=canEditEventInfo();
  const salesNm=salesById(x.salesId)?.name || (x.salesId||"");
  const actPlan = x.activityPlan ? escHtml(x.activityPlan) : `<span class="text-slate-400">— ฝ่ายขายยังไม่ระบุแผน —</span>`;
  const notif = eventNotifActive(x) ? `<span class="badge" style="background:#fef9c3;color:#a16207;">🔔 ${notifDayLabel(x)}</span>` : "";
  return `<div class="card p-4 mb-3">
    <div class="flex flex-wrap items-start justify-between gap-2">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="badge" style="background:${catCol}1a;color:${catCol};">${cat}</span>
        <span class="badge" style="${IMPACT_BADGE[imp]||IMPACT_BADGE.medium}">${IMPACT_LABEL[imp]||"ผลกระทบกลาง"}</span>
        <span class="text-xs text-slate-500">🗓️ ${evDateLabel(x)} · ${evDays(x)} วัน</span>
        ${notif}
      </div>
      ${canInfo?`<div class="flex gap-2 no-print"><button onclick="openEventInfo('${x.id}')" class="text-cyan-700 text-xs font-semibold">แก้ไขข้อมูล</button></div>`:""}
    </div>
    <div class="text-lg font-bold text-slate-800 mt-1.5">${escHtml(x.name)}</div>
    <div class="text-sm text-slate-500 mt-0.5">📍 ${escHtml(eventLocLabel(x))}${x.scale?` &nbsp;·&nbsp; 👥 ${escHtml(x.scale)}`:""}</div>
    <div class="text-xs text-slate-500 mt-1">🏨 โรงแรมที่เกี่ยวข้อง: ${eventHasExplicitHotels(x)?eventHotels(x).map(h=>escHtml(h.name)).join(", "):`<span class="text-slate-400">ทุกโรงแรม</span>`}</div>
    ${x.note?`<div class="text-xs text-slate-400 mt-1">📝 ${escHtml(x.note)}</div>`:""}
    <div class="mt-3 rounded-xl p-3" style="background:#f8fafc;border:1px solid #eef2f6;">
      <div class="flex items-center justify-between">
        <div class="text-xs font-bold text-slate-600">🎯 แผน Activity (ฝ่ายขาย)${salesNm?` · ${escHtml(salesNm)}`:""}</div>
      </div>
      <div class="text-sm text-slate-700 mt-1 whitespace-pre-line leading-snug">${actPlan}</div>
    </div>
    ${priceStatusHtml(x)}
  </div>`;
}
// แถบสถานะราคา/Yield แบบย่อ (อ่านอย่างเดียว) + ลิงก์ไปหน้าจัดการราคา — ใช้ในหน้าปฏิทินอีเวนต์
function priceStatusHtml(x){
  const st=eventAckStats(x);
  const lv=eventPriceLevel(x);
  const lvBadge = lv
    ? `<span class="badge" style="${PRICE_LEVELS[lv].badge}">💰 ${PRICE_LEVELS[lv].label}</span>`
    : `<span class="badge" style="background:#f1f5f9;color:#64748b;">💰 ยังไม่ระบุระดับราคา</span>`;
  return `<div class="mt-3 rounded-xl p-3 flex flex-wrap items-center gap-x-4 gap-y-1.5" style="background:#f0fdfa;border:1px solid #cdeee9;">
    <div class="text-xs font-bold text-slate-600">สถานะราคา/Yield</div>
    ${lvBadge}
    <span class="text-xs text-slate-500">รับทราบ <b class="text-slate-700">${st.acked}/${st.total}</b> ตึก · วางแผนราคาแล้ว <b class="text-teal-700">${st.planned}/${st.total}</b> ตึก</span>
    <div class="flex-1"></div>
    <button onclick="openYieldBoard('${x.id}')" class="text-xs font-semibold px-2.5 py-1 rounded-md no-print" style="background:#0f766e;color:#fff;">แผนราคา/Yield →</button>
  </div>`;
}

// แถวอีเวนต์แบบย่อ (มุมมองทั้งปี) จัดกลุ่มตามเดือน
function eventRowHtml(x){
  const cat=EVENT_CATS[x.category]||x.category||"อีเวนต์";
  const catCol=CAT_COLOR[x.category]||"#64748b";
  const imp=x.impact||"medium";
  const relHotels=eventHotels(x);
  const planned=relHotels.filter(h=>yieldEntry(x,h.id)&&yieldEntry(x,h.id).text).length;
  const lv=eventPriceLevel(x);
  const priceCell = lv
    ? `<span class="badge" style="${PRICE_LEVELS[lv].badge}">${PRICE_LEVELS[lv].short}</span><div class="text-[10px] text-slate-400 mt-0.5">${planned}/${relHotels.length} ตึก</div>`
    : `<span class="badge" style="background:#f1f5f9;color:#64748b;">${planned}/${relHotels.length} ตึก</span>`;
  const canInfo=canEditEventInfo();
  return `<tr class="border-b last:border-0 align-top">
    <td class="py-2 whitespace-nowrap"><span style="display:inline-block;width:8px;height:8px;border-radius:9999px;background:${IMPACT_DOT[imp]||'#d97706'};margin-right:6px;"></span>${evDateLabel(x)}</td>
    <td class="py-2 font-medium">${escHtml(x.name)}<div class="text-xs text-slate-400">${cat}</div></td>
    <td class="py-2 text-slate-600">${escHtml([x.district,x.province].filter(Boolean).join(", ")||"-")}${x.venue?`<div class="text-xs text-slate-400">${escHtml(x.venue)}</div>`:""}</td>
    <td class="py-2 text-slate-600">${x.scale?escHtml(x.scale):"-"}</td>
    <td class="py-2 text-center">${priceCell}</td>
    <td class="py-2 text-right whitespace-nowrap no-print">
      <button onclick="scrollFocusOrEdit('${x.id}')" class="text-cyan-700 text-xs font-semibold mr-2">เปิด</button>
      ${canInfo?`<button onclick="openEventInfo('${x.id}')" class="text-slate-500 text-xs">แก้ไข</button>`:""}
    </td>
  </tr>`;
}
function scrollFocusOrEdit(id){ // เปิดกล่องรายละเอียด/แก้ไขราคาแบบเร็ว
  openEventDetail(id);
}

function renderEventBoard(){
  ensureBoardDefaults();
  const y=ui.boardYear;
  const focusKeys=[currentMonthKey(), addMonthsKey(currentMonthKey(),1), addMonthsKey(currentMonthKey(),2)];
  const all=boardEventsFiltered();
  // โฟกัส 3 เดือน (ไม่ผูกปี — ตามวันจริง) · กันซ้ำ: แสดงในเดือนแรกที่อีเวนต์แตะ
  const shown=new Set();
  const focusBlocks=focusKeys.map(k=>{
    const list=all.filter(x=>evInMonth(x,k) && !shown.has(x.id))
                  .sort((a,b)=>String(evStart(a)).localeCompare(String(evStart(b))));
    list.forEach(x=>shown.add(x.id));
    const inner = list.length
      ? list.map(eventCardHtml).join("")
      : `<div class="text-sm text-slate-400 px-1 py-3">— ยังไม่มีอีเวนต์ในเดือนนี้ —</div>`;
    return `<div class="mb-2">
      <div class="flex items-center gap-2 mb-2">
        <div class="text-base font-bold text-slate-700">${monthLabel(k)}</div>
        <div class="text-xs text-slate-400">${list.length} อีเวนต์</div>
      </div>${inner}</div>`;
  }).join("");

  // ทั้งปี: จัดกลุ่มตามเดือน
  const yearEvents=all.filter(x=>evInYear(x,y)).sort((a,b)=>String(evStart(a)).localeCompare(String(evStart(b))));
  const byMonth={};
  yearEvents.forEach(x=>{ const mk=ymKey(evStart(x))||(y+"-00"); (byMonth[mk]=byMonth[mk]||[]).push(x); });
  const monthKeysSorted=Object.keys(byMonth).sort();
  const yearBlocks = monthKeysSorted.length ? monthKeysSorted.map(mk=>{
    const label = mk.endsWith("-00") ? "ยังไม่ระบุวันที่" : monthLabel(mk);
    return `<div class="mb-1">
      <div class="text-sm font-bold text-slate-600 mt-3 mb-1" style="border-left:3px solid #0e7490;padding-left:8px;">${label} <span class="font-normal text-slate-400">(${byMonth[mk].length})</span></div>
      <div class="overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="text-left text-slate-500 border-b">
          <th class="py-1">วันที่</th><th>งาน/อีเวนต์</th><th>สถานที่ (เขต/จังหวัด)</th><th>ขนาด</th><th class="text-center">ระดับราคา</th><th class="text-right no-print"></th>
        </tr></thead>
        <tbody>${byMonth[mk].map(eventRowHtml).join("")}</tbody>
      </table></div></div>`;
  }).join("") : `<div class="text-sm text-slate-400 py-4">— ยังไม่มีอีเวนต์ในปี ${y} —</div>`;

  const totalYear=yearEvents.length;
  const highCount=yearEvents.filter(x=>(x.impact||"medium")==="high").length;
  const plannedCount=yearEvents.filter(x=>HOTELS.some(h=>yieldEntry(x,h.id)&&yieldEntry(x,h.id).text)).length;

  return `
  <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
    <div>
      <div class="text-2xl font-bold text-slate-800">📅 ปฏิทินอีเวนต์ทั้งปี <span class="text-base font-normal text-slate-400">· ฝ่ายขายแจ้งงานในโซน</span></div>
      <div class="text-sm text-slate-500">ฝ่ายขายแจ้งอีเวนต์ในโซน (ทุกตึกเห็นเหมือนกัน) → ระบบแจ้งเตือนผู้จัดการแต่ละตึกให้ไปวางแผนราคาที่ <b>หน้าแผนราคา/Yield</b></div>
    </div>
    <div class="flex gap-2">
      <button onclick="openYieldBoard()" class="btn btn-primary text-sm px-3 py-1.5">💰 หน้าแผนราคา/Yield →</button>
      <button onclick="closeEventBoard()" class="btn btn-ghost text-sm px-3 py-1.5">← กลับหน้าหลัก</button>
    </div>
  </div>

  ${(CLOUD && isHM()) ? `<div class="card p-3 mb-4" style="background:#fffbeb;border-color:#fde68a;">
      <div class="text-sm text-amber-800">🏨 คุณเข้าสู่ระบบเป็น <b>ผู้จัดการโรงแรม</b> — หน้านี้ดูอย่างเดียว (ปฏิทินอีเวนต์ที่ฝ่ายขายแจ้ง) · การ <b>รับทราบ</b> และ <b>วางแผนราคา (Yield)</b> ของตึกคุณ ทำได้ที่ <button onclick="openYieldBoard()" class="underline font-semibold">หน้าแผนราคา/Yield</button></div>
    </div>` : ""}
  ${(CLOUD && isSales()) ? `<div class="card p-3 mb-4" style="background:#ecfeff;border-color:#a5f3fc;">
      <div class="text-sm text-cyan-800">🧑‍💼 คุณคือ <b>ฝ่ายขาย</b> — กด “＋ เพิ่มอีเวนต์” เพื่อแจ้งงานในโซนและใส่แผน Activity · ระบบจะแจ้งเตือนผู้จัดการแต่ละตึกให้ไปทำราคาเอง คุณดูสถานะราคาได้แบบอ่านอย่างเดียว</div>
    </div>` : ""}

  <div class="card p-4 mb-5">
    <div class="flex flex-wrap items-center gap-3">
      <label class="text-sm text-slate-600">ปี (มุมมองทั้งปี)
        <select onchange="setBoardYear(this.value)" class="pill-select ml-1 bg-slate-100 rounded-lg px-3 py-1.5 text-sm font-semibold">${boardYearOptions()}</select></label>
      <label class="text-sm text-slate-600">จังหวัด
        <select onchange="setBoardProvince(this.value)" class="pill-select ml-1 bg-slate-100 rounded-lg px-3 py-1.5 text-sm">${boardProvinceOptions()}</select></label>
      <label class="text-sm text-slate-600">โรงแรมที่เกี่ยวข้อง
        <select onchange="setBoardHotel(this.value)" class="pill-select ml-1 bg-slate-100 rounded-lg px-3 py-1.5 text-sm">
          <option value="all" ${ui.boardHotel==="all"?"selected":""}>ทุกตึก</option>
          ${HOTELS.map(h=>`<option value="${h.id}" ${ui.boardHotel===h.id?"selected":""}>${h.name}</option>`).join("")}
        </select></label>
      <div class="flex-1"></div>
      ${canEditEventInfo()?`<button onclick="openEventInfo()" class="btn btn-primary text-sm px-4 py-1.5">＋ เพิ่มอีเวนต์</button>`:""}
      <button onclick="exportEventBoardExcel()" class="btn btn-ghost text-sm px-3 py-1.5">⬇︎ Excel</button>
    </div>
    <div class="flex flex-wrap gap-4 mt-3 pt-3 border-t text-sm">
      <div><span class="text-slate-400">อีเวนต์ปี ${y}:</span> <b class="text-slate-700">${totalYear}</b> งาน</div>
      <div><span class="text-slate-400">ผลกระทบสูง:</span> <b class="text-rose-600">${highCount}</b> งาน</div>
      <div><span class="text-slate-400">วางแผนราคาแล้ว:</span> <b class="text-teal-700">${plannedCount}</b> งาน</div>
    </div>
  </div>

  <div class="mb-6">
    <div class="flex items-center gap-2 mb-3">
      <div class="section-title text-lg">🔎 โฟกัส 3 เดือน</div>
      <div class="text-sm text-slate-400">${monthLabel(focusKeys[0])} – ${monthLabel(focusKeys[2])} · ช่วงที่ต้องรีบวางแผนราคา</div>
    </div>
    ${focusBlocks}
  </div>

  <div class="card p-4">
    <div class="section-title text-lg mb-1">🗂️ อีเวนต์ทั้งปี ${y}</div>
    <div class="text-sm text-slate-400 mb-2">กด “เปิด” เพื่อดูรายละเอียด/ใส่แผนราคาของแต่ละตึก</div>
    ${yearBlocks}
  </div>
  `;
}

// ---- กล่องรายละเอียดอีเวนต์ (เปิดจากมุมมองทั้งปี) — ดูข้อมูล + ตารางราคาทุกตึก ----
function openEventDetail(id){
  const x=db.events.find(e=>e.id===id); if(!x) return;
  const grid=eventHotels(x).map(h=>{
    const ye=yieldEntry(x,h.id); const has=ye&&ye.text; const lv=yieldLevel(x,h.id);
    const acked=ackEntry(x,h.id);
    return `<div class="rounded-xl border p-2.5" style="border-color:${has?'#99f6e4':'#e6ebf0'};background:${has?'#f0fdfa':'#fff'};">
      <div class="flex items-center justify-between gap-2">
        <div class="text-xs font-bold" style="color:${h.accent||'#0e7490'}">${h.name}</div>
        ${lv&&PRICE_LEVELS[lv]?`<span class="badge" style="${PRICE_LEVELS[lv].badge}">${PRICE_LEVELS[lv].short}</span>`:(acked?`<span class="badge" style="background:#e0f2fe;color:#0369a1;">รับทราบแล้ว</span>`:"")}
      </div>
      <div class="text-xs text-slate-700 mt-1.5 whitespace-pre-line leading-snug">${has?escHtml(ye.text):`<span class="text-slate-400">ยังไม่มีแผนราคา</span>`}</div>
    </div>`;
  }).join("");
  const canInfo=canEditEventInfo();
  const body=`
    <div class="flex items-center gap-2 flex-wrap mb-1">
      <span class="badge" style="background:${(CAT_COLOR[x.category]||'#64748b')}1a;color:${CAT_COLOR[x.category]||'#64748b'};">${EVENT_CATS[x.category]||"อีเวนต์"}</span>
      <span class="badge" style="${IMPACT_BADGE[x.impact]||IMPACT_BADGE.medium}">${IMPACT_LABEL[x.impact]||"ผลกระทบกลาง"}</span>
    </div>
    <div class="text-lg font-bold text-slate-800">${escHtml(x.name)}</div>
    <div class="text-sm text-slate-500">🗓️ ${evDateLabel(x)} · ${evDays(x)} วัน</div>
    <div class="text-sm text-slate-500">📍 ${escHtml(eventLocLabel(x))}${x.scale?` · 👥 ${escHtml(x.scale)}`:""}</div>
    <div class="text-xs text-slate-500 mt-1">🏨 โรงแรมที่เกี่ยวข้อง: ${eventHasExplicitHotels(x)?eventHotels(x).map(h=>escHtml(h.name)).join(", "):`<span class="text-slate-400">ทุกโรงแรม</span>`}</div>
    ${x.note?`<div class="text-xs text-slate-400 mt-1">📝 ${escHtml(x.note)}</div>`:""}
    <div class="mt-3 rounded-xl p-3" style="background:#f8fafc;border:1px solid #eef2f6;">
      <div class="text-xs font-bold text-slate-600">🎯 แผน Activity (ฝ่ายขาย)</div>
      <div class="text-sm text-slate-700 mt-1 whitespace-pre-line">${x.activityPlan?escHtml(x.activityPlan):`<span class="text-slate-400">— ยังไม่ระบุ —</span>`}</div>
    </div>
    <div class="mt-3">
      <div class="flex items-center justify-between mb-1.5">
        <div class="text-xs font-bold text-slate-600">💰 แผนการทำราคา / Yield รายตึก <span class="font-normal text-slate-400">(อ่านอย่างเดียว)</span></div>
        <button onclick="closeYieldBox();openYieldBoard('${x.id}')" class="text-[11px] font-semibold px-2 py-0.5 rounded-md no-print" style="background:#0f766e;color:#fff;">ไปหน้าแผนราคา →</button>
      </div>
      <div class="grid gap-2" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));">${grid}</div>
    </div>`;
  const footer=canInfo?`<button type="button" onclick="closeYieldBox();openEventInfo('${x.id}')" class="text-cyan-700 text-xs font-semibold">✎ แก้ไขข้อมูลอีเวนต์</button>`:"";
  document.getElementById("modalRoot").innerHTML=`
    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50" onclick="if(event.target===this) closeYieldBox()">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
        <div class="px-5 py-4 border-b flex justify-between items-center">
          <div class="font-semibold text-lg text-slate-800">รายละเอียดอีเวนต์</div>
          <button onclick="closeYieldBox()" class="text-slate-400 hover:text-slate-700">✕</button>
        </div>
        <div class="px-5 py-4">${body}
          <div class="pt-4 flex justify-between items-center">
            <div>${footer}</div>
            <button type="button" onclick="closeYieldBox()" class="px-4 py-2 text-sm rounded-lg border">ปิด</button>
          </div>
        </div>
      </div>
    </div>`;
}

// ---- Event info modal (ฝ่ายขาย/เจ้าของ) : เพิ่ม/แก้ข้อมูลอีเวนต์ + แผน Activity ----
function openEventInfo(id){
  if(!canEditEventInfo()){ alert("เฉพาะฝ่ายขายหรือเจ้าของกิจการเท่านั้นที่เพิ่ม/แก้ข้อมูลอีเวนต์ได้"); return; }
  const ex=id?db.events.find(x=>x.id===id):null;
  const catOpts=Object.entries(EVENT_CATS).map(([k,v])=>`<option value="${k}" ${ex&&ex.category===k?"selected":""}>${v}</option>`).join("");
  const impOpts=Object.entries(IMPACT_LABEL).map(([k,v])=>`<option value="${k}" ${((ex&&ex.impact)||"medium")===k?"selected":""}>${v}</option>`).join("");
  // โรงแรมที่เกี่ยวข้อง (ติ๊กเลือกได้) — อีเวนต์ใหม่/อีเวนต์เดิม = ติ๊กครบทุกโรงแรมไว้ก่อน
  const relSet=new Set(ex?eventHotelIds(ex):HOTELS.map(h=>h.id));
  const hotelChecks=HOTELS.map(h=>`<label class="inline-flex items-center gap-1.5 mr-4 mb-1.5 text-sm cursor-pointer"><input type="checkbox" id="f_h_${h.id}" ${relSet.has(h.id)?"checked":""} style="width:16px;height:16px;accent-color:#0e7490;"/> <span>${escHtml(h.name)}</span></label>`).join("");
  const body=`
    <label class="block text-sm">ชื่องาน/อีเวนต์<input id="f_name" value="${escAttr(ex?ex.name:"")}" class="${inputCls}" placeholder="เช่น คอนเสิร์ต … / มหกรรม …"/></label>
    <div class="grid grid-cols-2 gap-2">
      <label class="block text-sm">ประเภทงาน<select id="f_cat" class="${inputCls}">${catOpts}</select></label>
      <label class="block text-sm">ผลกระทบต่อความต้องการห้องพัก<select id="f_impact" class="${inputCls}">${impOpts}</select></label>
    </div>
    <div class="grid grid-cols-2 gap-2">
      <label class="block text-sm">จังหวัด<input id="f_prov" value="${escAttr(ex?ex.province:"")}" class="${inputCls}" list="provList" placeholder="เช่น ชลบุรี"/></label>
      <label class="block text-sm">เขต/อำเภอ<input id="f_dist" value="${escAttr(ex?ex.district:"")}" class="${inputCls}" list="distList" placeholder="เช่น ศรีราชา"/></label>
    </div>
    <datalist id="provList">${PROVINCE_SUGGEST.map(p=>`<option value="${p}">`).join("")}</datalist>
    <datalist id="distList">${DISTRICT_SUGGEST.map(d=>`<option value="${d}">`).join("")}</datalist>
    <label class="block text-sm">สถานที่จัด (สถานที่/ฮอลล์)<input id="f_venue" value="${escAttr(ex?ex.venue:"")}" class="${inputCls}" placeholder="เช่น สนามกีฬา … / ศูนย์ประชุม …"/></label>
    <div class="text-sm">
      <div class="flex items-center justify-between mb-1">
        <span>🏨 โรงแรมที่เกี่ยวข้อง <span class="text-xs text-slate-400">(ติ๊กเฉพาะตึกที่ได้ประโยชน์/ต้องทำราคา)</span></span>
        <span class="text-xs no-print"><button type="button" onclick="eventHotelsToggleAll(true)" class="text-cyan-700 mr-2">เลือกทั้งหมด</button><button type="button" onclick="eventHotelsToggleAll(false)" class="text-slate-500">ล้าง</button></span>
      </div>
      <div class="rounded-lg border p-2.5 flex flex-wrap" style="border-color:#e6ebf0;background:#f8fafc;">${hotelChecks}</div>
    </div>
    <div class="grid grid-cols-2 gap-2">
      <label class="block text-sm">วันที่เริ่ม<input type="date" id="f_start" value="${ex?ex.startDate||todayStr():todayStr()}" class="${inputCls}"/></label>
      <label class="block text-sm">วันที่สิ้นสุด<input type="date" id="f_end" value="${ex?(ex.endDate||ex.startDate||todayStr()):todayStr()}" class="${inputCls}"/></label>
    </div>
    <label class="block text-sm">ขนาดงาน / ผู้เข้าร่วมโดยประมาณ<input id="f_scale" value="${escAttr(ex?ex.scale:"")}" class="${inputCls}" placeholder="เช่น 5,000 คน / 20 บูธ"/></label>
    <label class="block text-sm">ผู้แจ้ง (ฝ่ายขาย)${salesSelectHtml(ex?ex.salesId:(mySalesId()||ui.currentSales))}</label>
    <label class="block text-sm">🎯 แผน Activity (ฝ่ายขาย)<textarea id="f_act" class="${inputCls}" rows="3" placeholder="เช่น ออกบูธหน้างาน · โปรโมชั่นแพ็กเกจห้องพัก · ประสานงานผู้จัด …">${ex?escAttr(ex.activityPlan):""}</textarea></label>
    <label class="block text-sm">หมายเหตุ<input id="f_note" value="${escAttr(ex?ex.note:"")}" class="${inputCls}"/></label>
    <input type="hidden" id="f_id" value="${ex?ex.id:''}"/>`;
  const footer=ex?`<button type="button" onclick="deleteEventItem('${ex.id}')" class="text-rose-500 text-xs">ลบอีเวนต์นี้</button>`:"";
  document.getElementById("modalRoot").innerHTML=modalShell(ex?"แก้ไขอีเวนต์":"เพิ่มอีเวนต์ (ฝ่ายขาย)",body,"submitEventInfo",footer);
}
function eventHotelsToggleAll(on){ HOTELS.forEach(h=>{ const el=document.getElementById("f_h_"+h.id); if(el) el.checked=!!on; }); }
function submitEventInfo(){
  if(!canEditEventInfo()){ alert("ไม่มีสิทธิ์แก้ไขข้อมูลอีเวนต์"); return; }
  const id=val("f_id");
  const start=val("f_start"); let end=val("f_end");
  if(start && (!end || end<start)) end=start;
  const hotelIds=HOTELS.filter(h=>document.getElementById("f_h_"+h.id)&&document.getElementById("f_h_"+h.id).checked).map(h=>h.id);
  const data={
    name:val("f_name").trim(), category:val("f_cat"), impact:val("f_impact"),
    province:val("f_prov").trim(), district:val("f_dist").trim(), venue:val("f_venue").trim(),
    hotelIds:hotelIds,
    startDate:start, endDate:end, location:val("f_venue").trim(),
    days:(start&&end)?(Math.round((new Date(end)-new Date(start))/86400000)+1):1,
    scale:val("f_scale").trim(), salesId:val("f_sales"), activityPlan:val("f_act"),
    note:val("f_note").trim(), year:start?Number(start.slice(0,4)):currentYear()
  };
  if(!data.name){ alert("กรุณากรอกชื่องาน/อีเวนต์"); return; }
  if(id){ Object.assign(db.events.find(x=>x.id===id),data); }
  else { db.events.push({ id:uid("ev"), hotelId:"", pricingPlans:{}, ...data }); }
  saveData(); closeModal(); render();
}
function deleteEventItem(id){
  if(!canEditEventInfo()){ alert("ไม่มีสิทธิ์ลบอีเวนต์"); return; }
  if(!confirm("ลบอีเวนต์นี้? (แผนราคาของทุกตึกจะถูกลบด้วย)")) return;
  db.events=db.events.filter(x=>x.id!==id);
  saveData(); closeModal(); render();
}

// ---- Yield editor (ผู้จัดการโรงแรม/เจ้าของ) : แผนการทำราคาของ "ตึกเดียว" ----
// ใช้ modal เฉพาะที่ไม่โดนซ่อนในโหมด readonly (ปุ่มปิดไม่มีคำว่า Modal)
function openYieldBox(eventId,hid){
  if(!canEditPricing(hid)){ alert("เฉพาะผู้จัดการโรงแรมของตึกนี้ (หรือเจ้าของกิจการ) เท่านั้นที่กรอกแผนการทำราคาได้"); return; }
  const ev=db.events.find(x=>x.id===eventId); if(!ev) return;
  const h=hotelById(hid); const ye=yieldEntry(ev,hid); const cur=ye?ye.text:""; const curLv=(ye&&ye.level)||"";
  const lvOpts=Object.entries(PRICE_LEVELS).map(([k,v])=>`<option value="${k}" ${curLv===k?"selected":""}>${v.label}</option>`).join("");
  document.getElementById("modalRoot").innerHTML=`
    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50" onclick="if(event.target===this) closeYieldBox()">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4">
        <div class="px-5 py-4 border-b flex justify-between items-center">
          <div class="font-semibold text-slate-800">💰 แผนการทำราคา · <span style="color:${h?h.accent:'#0e7490'}">${h?h.name:""}</span></div>
          <button onclick="closeYieldBox()" class="text-slate-400 hover:text-slate-700">✕</button>
        </div>
        <div class="px-5 py-4 space-y-3">
          <div class="text-xs text-slate-500">อีเวนต์: <span class="font-medium text-slate-700">${escHtml(ev.name)}</span> · ${evDateLabel(ev)}</div>
          <label class="block text-sm text-slate-600">ระดับราคาช่วงนี้ <span class="text-xs text-slate-400">(ฝ่ายขายจะเห็นป้ายนี้)</span>
            <select id="yield_level" class="${inputCls}">${lvOpts}</select></label>
          <label class="block text-sm text-slate-600">รายละเอียดแผนการทำราคา
            <textarea id="yield_txt" rows="5" class="${inputCls}" placeholder="เช่น ปรับ Superior +15% วันที่ 12–14, ปิดขาย OTA ราคาต่ำ, ตั้ง Min Stay 2 คืน, กันห้องขายหน้างาน 10 ห้อง">${escAttr(cur)}</textarea></label>
          <div class="text-[11px] text-slate-400">บันทึกแล้วฝ่ายขายและผู้จัดการตึกอื่นจะเห็นทันที และระบบจะถือว่าตึกนี้ “รับทราบ” อีเวนต์นี้แล้ว</div>
          <div class="flex justify-between items-center gap-2 pt-1">
            <div>${cur?`<button type="button" onclick="clearYield('${eventId}','${hid}')" class="text-rose-500 text-xs">ล้างแผนของตึกนี้</button>`:""}</div>
            <div class="flex gap-2">
              <button type="button" onclick="closeYieldBox()" class="px-4 py-2 text-sm rounded-lg border">ยกเลิก</button>
              <button type="button" onclick="saveYield('${eventId}','${hid}')" class="btn btn-primary px-4 py-2 text-sm">บันทึก</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}
function closeYieldBox(){ const r=document.getElementById("modalRoot"); if(r) r.innerHTML=""; flushPendingRender(); }
function saveYield(eventId,hid){
  if(!canEditPricing(hid)){ alert("ไม่มีสิทธิ์แก้แผนราคาของตึกนี้"); return; }
  const ev=db.events.find(x=>x.id===eventId); if(!ev) return;
  if(!ev.pricingPlans||typeof ev.pricingPlans!=="object") ev.pricingPlans={};
  const t=(val("yield_txt")||"").trim();
  const lv=val("yield_level")||"";
  if(t) ev.pricingPlans[hid]={ text:t, level:lv, by:(currentEmail()||"เครื่องนี้"), at:realToday() };
  else delete ev.pricingPlans[hid];
  markAck(ev,hid);                 // วางแผนราคา = รับทราบอีเวนต์นี้ด้วยโดยอัตโนมัติ
  saveData(); closeYieldBox(); render();
}
function clearYield(eventId,hid){
  if(!canEditPricing(hid)) return;
  const ev=db.events.find(x=>x.id===eventId); if(!ev) return;
  if(ev.pricingPlans) delete ev.pricingPlans[hid];
  saveData(); closeYieldBox(); render();
}
// ---- ผู้จัดการโรงแรม "รับทราบ" ว่ามีอีเวนต์นี้ ----
function markAck(ev,hid){
  if(!ev.acks||typeof ev.acks!=="object") ev.acks={};
  if(!ev.acks[hid]) ev.acks[hid]={ by:(currentEmail()||"เครื่องนี้"), at:realToday() };
}
function ackEvent(eventId,hid){
  if(!canEditPricing(hid)){ alert("เฉพาะผู้จัดการโรงแรมของตึกนี้ (หรือเจ้าของกิจการ) เท่านั้นที่กดรับทราบได้"); return; }
  const ev=db.events.find(x=>x.id===eventId); if(!ev) return;
  markAck(ev,hid); saveData(); render();
}

// ============================================================
// หน้าแผนราคา / Yield (แยกจากปฏิทินอีเวนต์)
//  • ผู้จัดการแต่ละตึก = รับทราบอีเวนต์ + กรอกแผนราคาของตึกตัวเอง
//  • ฝ่ายขาย/ผู้บริหาร = ดูอย่างเดียว (เห็นว่าช่วงไหนราคาสูงเป็นพิเศษ)
// ============================================================
function openYieldBoard(focusId){ ensureBoardDefaults(); ui.page="yieldBoard"; ui.yieldFocus=focusId||null; if(focusId){ const ev=(db.events||[]).find(e=>e.id===focusId); if(ev){ const y=Number(evStart(ev).slice(0,4)); if(y) ui.boardYear=y; } } render(); if(focusId) setTimeout(()=>{ const el=document.getElementById("yc_"+focusId); if(el){ el.scrollIntoView({behavior:"smooth",block:"center"}); } },60); }
function closeYieldBoard(){ ui.page=null; ui.yieldFocus=null; render(); }

// อีเวนต์ที่จะแสดงบนหน้าแผนราคา (เกี่ยวข้องกับตึกที่ผู้ใช้ดูได้)
function yieldBoardEvents(){
  return (db.events||[]).filter(x=>eventScopeHotels(x).length>0);
}
// การ์ดหนึ่งอีเวนต์ในหน้าแผนราคา — แสดงตึกที่ผู้ใช้เกี่ยวข้อง + ปุ่มรับทราบ/ใส่แผนราคา
function yieldEventCard(x,highlight){
  const cat=EVENT_CATS[x.category]||x.category||"อีเวนต์";
  const catCol=CAT_COLOR[x.category]||"#64748b";
  const st=eventNotifState(x);
  const notif = eventNotifActive(x) ? `<span class="badge" style="background:#fef9c3;color:#a16207;">🔔 ${notifDayLabel(x)}</span>` : (st==="past"?`<span class="badge" style="background:#f1f5f9;color:#94a3b8;">ผ่านไปแล้ว</span>`:"");
  const rows=eventScopeHotels(x).map(h=>{
    const editable=canEditPricing(h.id);
    const ye=yieldEntry(x,h.id); const has=ye&&ye.text; const lv=yieldLevel(x,h.id);
    const acked=ackEntry(x,h.id);
    const lvBadge = lv&&PRICE_LEVELS[lv] ? `<span class="badge" style="${PRICE_LEVELS[lv].badge}">${PRICE_LEVELS[lv].short}</span>` : "";
    const ackBadge = acked ? `<span class="badge" style="background:#dcfce7;color:#15803d;">✔ รับทราบแล้ว</span>` : `<span class="badge" style="background:#fee2e2;color:#b91c1c;">ยังไม่รับทราบ</span>`;
    const meta = has&&ye.at ? `<div class="text-[10px] text-slate-400 mt-1">อัปเดต ${ye.at}${ye.by?(" · "+ye.by):""}</div>` : "";
    const actions = editable ? `<div class="flex gap-2 mt-2 no-print">
        ${!acked?`<button onclick="ackEvent('${x.id}','${h.id}')" class="text-[11px] font-semibold px-2.5 py-1 rounded-md" style="background:#0369a1;color:#fff;">✔ รับทราบ</button>`:""}
        <button onclick="openYieldBox('${x.id}','${h.id}')" class="text-[11px] font-semibold px-2.5 py-1 rounded-md" style="background:${has?'#0f766e':'#0e7490'};color:#fff;">${has?'แก้ไขแผนราคา':'＋ ใส่แผนราคา'}</button>
      </div>` : "";
    return `<div class="rounded-xl border p-3" style="border-color:${has?'#99f6e4':'#e6ebf0'};background:${has?'#f0fdfa':'#fff'};">
      <div class="flex items-center justify-between gap-2 flex-wrap">
        <div class="text-sm font-bold" style="color:${h.accent||'#0e7490'}">${escHtml(h.name)}</div>
        <div class="flex items-center gap-1.5 flex-wrap">${lvBadge}${ackBadge}</div>
      </div>
      <div class="text-sm text-slate-700 mt-1.5 whitespace-pre-line leading-snug">${has?escHtml(ye.text):`<span class="text-slate-400">${editable?'ยังไม่ได้วางแผนราคา':'ผจก.ตึกนี้ยังไม่วางแผนราคา'}</span>`}</div>
      ${meta}
      ${actions}
    </div>`;
  }).join("");
  return `<div id="yc_${x.id}" class="card p-4 mb-3" style="${highlight?'border:1px solid #fcd34d;box-shadow:0 0 0 3px rgba(252,211,77,0.25);':''}">
    <div class="flex flex-wrap items-start justify-between gap-2">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="badge" style="background:${catCol}1a;color:${catCol};">${cat}</span>
        <span class="text-xs text-slate-500">🗓️ ${evDateLabel(x)} · ${evDays(x)} วัน</span>
        ${notif}
      </div>
    </div>
    <div class="text-lg font-bold text-slate-800 mt-1.5">${escHtml(x.name)}</div>
    <div class="text-sm text-slate-500 mt-0.5">📍 ${escHtml(eventLocLabel(x))}${x.scale?` &nbsp;·&nbsp; 👥 ${escHtml(x.scale)}`:""}</div>
    ${x.activityPlan?`<div class="text-xs text-slate-500 mt-1">🎯 แผน Activity ฝ่ายขาย: ${escHtml(x.activityPlan)}</div>`:""}
    <div class="grid gap-2 mt-3" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));">${rows}</div>
  </div>`;
}

function renderYieldBoard(){
  ensureBoardDefaults();
  const y=ui.boardYear;
  const mine=yieldBoardEvents();
  const notifs=viewerNotifEvents();
  const canEditAny=canEditAnyPricing();
  // สรุปตัวเลข
  const needAtt=notifs.filter(eventNeedsAttention).length;
  // การ์ดแจ้งเตือน (ล่วงหน้า 30 วัน + กำลังจัด) — ไฮไลต์ที่ต้องรีบทำ
  const notifBlock = notifs.length
    ? notifs.map(x=>yieldEventCard(x,true)).join("")
    : `<div class="text-sm text-slate-400 px-1 py-3">— ไม่มีอีเวนต์ที่ใกล้ถึงภายใน ${NOTIF_WINDOW_DAYS} วัน —</div>`;
  // อีเวนต์ทั้งปีที่เลือก (ไม่รวมที่ผ่านไปแล้ว จะอยู่ท้ายสุด)
  const yearEvents=mine.filter(x=>evInYear(x,y)).sort((a,b)=>String(evStart(a)).localeCompare(String(evStart(b))));
  const notifIds=new Set(notifs.map(x=>x.id));
  const rest=yearEvents.filter(x=>!notifIds.has(x.id));
  const restBlock = rest.length ? rest.map(x=>yieldEventCard(x,false)).join("")
    : `<div class="text-sm text-slate-400 px-1 py-3">— ไม่มีอีเวนต์อื่นในปี ${y} —</div>`;

  const roleBanner = canEditAny
    ? `<div class="card p-3 mb-4" style="background:#fffbeb;border-color:#fde68a;">
        <div class="text-sm text-amber-800">🏨 คุณคือ <b>ผู้จัดการโรงแรม</b> — เมื่อฝ่ายขายแจ้งอีเวนต์ ระบบจะเตือนคุณล่วงหน้า ${NOTIF_WINDOW_DAYS} วัน · กรุณากด <b>“✔ รับทราบ”</b> และ <b>ใส่แผนการทำราคา (Yield)</b> ของตึกคุณ${needAtt?` · <b class="text-rose-600">มี ${needAtt} อีเวนต์ที่ยังต้องดำเนินการ</b>`:""}</div>
      </div>`
    : `<div class="card p-3 mb-4" style="background:#ecfeff;border-color:#a5f3fc;">
        <div class="text-sm text-cyan-800">🧑‍💼 หน้านี้ <b>อ่านอย่างเดียว</b>สำหรับฝ่ายขาย/ผู้บริหาร — ดูว่าช่วงไหน <b>ราคาสูงเป็นพิเศษ</b> เพื่อวางแผนงาน · การกรอกราคาเป็นหน้าที่ผู้จัดการแต่ละตึก</div>
      </div>`;

  return `
  <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
    <div>
      <div class="text-2xl font-bold text-slate-800">💰 แผนการทำราคา / Yield <span class="text-base font-normal text-slate-400">· รายตึก</span></div>
      <div class="text-sm text-slate-500">ผู้จัดการแต่ละตึกรับทราบอีเวนต์และกรอกแผนราคาของตึกตัวเอง · ฝ่ายขายเห็นสถานะราคาแบบอ่านอย่างเดียว</div>
    </div>
    <div class="flex gap-2">
      <button onclick="openEventBoard()" class="btn btn-ghost text-sm px-3 py-1.5">📅 ปฏิทินอีเวนต์</button>
      <button onclick="closeYieldBoard()" class="btn btn-ghost text-sm px-3 py-1.5">← กลับหน้าหลัก</button>
    </div>
  </div>

  ${roleBanner}

  <div class="card p-4 mb-5">
    <div class="flex flex-wrap items-center gap-3">
      <label class="text-sm text-slate-600">ปี
        <select onchange="setBoardYear(this.value)" class="pill-select ml-1 bg-slate-100 rounded-lg px-3 py-1.5 text-sm font-semibold">${boardYearOptions()}</select></label>
      <div class="flex-1"></div>
      <div class="text-sm"><span class="text-slate-400">ใกล้ถึง (≤${NOTIF_WINDOW_DAYS} วัน):</span> <b class="text-amber-600">${notifs.length}</b> งาน</div>
      ${canEditAny?`<div class="text-sm"><span class="text-slate-400">ยังต้องทำ:</span> <b class="text-rose-600">${needAtt}</b> งาน</div>`:""}
    </div>
  </div>

  <div class="mb-6">
    <div class="flex items-center gap-2 mb-3">
      <div class="section-title text-lg">🔔 แจ้งเตือน · อีเวนต์ที่ใกล้ถึง (ล่วงหน้า ${NOTIF_WINDOW_DAYS} วัน)</div>
      <div class="text-sm text-slate-400">แจ้งเตือนจะหายเองอัตโนมัติเมื่อผ่านวันงานไปแล้ว</div>
    </div>
    ${notifBlock}
  </div>

  <div class="card p-4">
    <div class="section-title text-lg mb-1">🗂️ อีเวนต์ทั้งหมด ปี ${y}</div>
    <div class="text-sm text-slate-400 mb-3">รวมงานที่ยังมาไม่ถึงและที่ผ่านไปแล้ว (เรียงตามวันที่)</div>
    ${restBlock}
  </div>
  `;
}

// ---- แถบแจ้งเตือนรวม (แสดงใต้แถบบนทุกหน้า เมื่อมีอีเวนต์ใกล้ถึง) ----
function notifBannerHtml(){
  if(!CLOUD) return "";
  const notifs=viewerNotifEvents();
  if(!notifs.length) return "";
  if(ui.page==="yieldBoard") return ""; // อยู่หน้าแผนราคาอยู่แล้ว ไม่ต้องเตือนซ้ำ
  const canEditAny=canEditAnyPricing();
  const needAtt=notifs.filter(eventNeedsAttention).length;
  const soonest=notifs[0];
  const msg = canEditAny
    ? (needAtt?`มี <b>${needAtt}</b> อีเวนต์ใกล้ถึงที่ตึกของคุณ<b>ยังไม่รับทราบ/ยังไม่วางแผนราคา</b>`
             : `มี <b>${notifs.length}</b> อีเวนต์ใกล้ถึง — จัดการแผนราคาเรียบร้อยแล้ว ✔`)
    : `มี <b>${notifs.length}</b> อีเวนต์ใกล้ถึงภายใน ${NOTIF_WINDOW_DAYS} วัน — ดูช่วงที่ราคาห้องจะสูงเป็นพิเศษ`;
  const col = (canEditAny&&needAtt) ? "background:#fef2f2;border-color:#fecaca;" : "background:#fffbeb;border-color:#fde68a;";
  return `<div class="no-print rounded-xl border px-4 py-2.5 mb-4 flex flex-wrap items-center gap-x-3 gap-y-1.5" style="${col}">
    <span class="text-sm">🔔 <span class="font-medium">${escHtml(soonest.name)}</span> · ${notifDayLabel(soonest)}</span>
    <span class="text-sm text-slate-600">${msg}</span>
    <div class="flex-1"></div>
    <button onclick="openYieldBoard()" class="btn btn-primary text-xs px-3 py-1.5">ดูแผนราคา/Yield →</button>
  </div>`;
}

/* ---- Auto logout เมื่อไม่มีการใช้งานเกิน 30 นาที ----
   นับเวลาจากการขยับเมาส์/พิมพ์/แตะ/เลื่อนหน้าจอครั้งล่าสุด
   ถ้าเงียบเกิน 30 นาที → ออกจากระบบอัตโนมัติ แล้วบังคับให้ล็อกอินใหม่ */
const IDLE_LIMIT_MS = 30 * 60 * 1000; // 30 นาที
let idleTimer = null;
let idleWatchStarted = false;

async function autoLogoutIdle(){
  clearTimeout(idleTimer);
  try{ if(sb) await sb.auth.signOut(); }catch(e){}
  currentUser = null;
  try{ sessionStorage.clear(); }catch(e){}
  alert("ออกจากระบบอัตโนมัติ เนื่องจากไม่มีการใช้งานเกิน 30 นาที\nกรุณาเข้าสู่ระบบใหม่อีกครั้ง");
  location.reload();
}
function resetIdleTimer(){
  if(!CLOUD || !currentUser) return;
  clearTimeout(idleTimer);
  idleTimer = setTimeout(autoLogoutIdle, IDLE_LIMIT_MS);
}
function startIdleWatch(){
  if(idleWatchStarted || !CLOUD) return;
  idleWatchStarted = true;
  ["mousemove","mousedown","keydown","scroll","touchstart","click"].forEach(ev=>
    document.addEventListener(ev, resetIdleTimer, { passive:true }));
  resetIdleTimer();
}

// แปลงข้อความ error ของ Supabase เป็นภาษาไทยที่เข้าใจง่าย
function loginErrorTh(error){
  const code = error.code || "", msg = (error.message||"").toLowerCase();
  if(code==="invalid_credentials" || msg.includes("invalid login credentials"))
    return "อีเมลหรือรหัสผ่านไม่ถูกต้อง — ตรวจตัวพิมพ์เล็ก/ใหญ่ของรหัสผ่านอีกครั้ง หรือติดต่อแอดมินเพื่อรีเซ็ตรหัส";
  if(code==="email_not_confirmed" || msg.includes("email not confirmed"))
    return "บัญชีนี้ยังไม่ได้ยืนยันอีเมล — กรุณาเปิดอีเมลของคุณแล้วกดลิงก์ยืนยัน หรือแจ้งแอดมินให้กด Confirm ในระบบ";
  if(msg.includes("network") || msg.includes("fetch"))
    return "เชื่อมต่ออินเทอร์เน็ต/เซิร์ฟเวอร์ไม่ได้ — ตรวจสัญญาณเน็ตแล้วลองใหม่";
  return "เข้าสู่ระบบไม่สำเร็จ: "+error.message;
}
async function doLogin(){
  const email = val("login_email").trim().toLowerCase(), password = val("login_pw");
  const errEl = document.getElementById("login_err");
  if(!email || !password){ if(errEl) errEl.textContent="กรุณากรอกอีเมลและรหัสผ่าน"; return; }
  if(errEl) errEl.textContent="กำลังเข้าสู่ระบบ...";
  try{
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ if(errEl) errEl.textContent=loginErrorTh(error); return; }
    const { data:{ session } } = await sb.auth.getSession();
    currentUser = session ? session.user : null;
    await cloudBootstrap();
  }catch(e){ if(errEl) errEl.textContent="เกิดข้อผิดพลาด: "+(e.message||e); }
}
async function logout(){
  clearTimeout(idleTimer);
  try{ await sb.auth.signOut(); }catch(e){}
  currentUser = null;
  try{ sessionStorage.clear(); }catch(e){}   // ล้าง session ให้หมด กันเข้าระบบซ้ำโดยไม่ล็อกอิน
  location.reload();
}

function bahtFmt(n){ return Number(n||0).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2}); }
