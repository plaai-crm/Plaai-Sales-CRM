<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plaai Group — Sales Ops</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --brand:#0f3a52;         /* deep teal-navy */
    --brand-2:#12546f;
    --accent:#0e7490;        /* teal/cyan primary action */
    --accent-2:#0891b2;
    --pos:#0f766e;           /* teal-green (on hand / confirmed) */
    --warn:#c2760c;          /* muted amber */
    --danger:#be123c;        /* rose */
    --ink:#0f2233;
    --muted:#64748b;
    --line:#e6ebf0;
    --bg:#f4f7f9;
  }
  body { font-family: 'Inter','Segoe UI','Tahoma',sans-serif; color:#0f2233;
         background: linear-gradient(180deg,#eaf0f4 0%, #f4f7f9 240px, #f4f7f9 100%); }
  .modal-backdrop { background: rgba(10,28,45,0.55); backdrop-filter: blur(2px); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

  .tab-pill { transition: all .15s ease; }
  .tab-pill.active { background:#ffffff; color:var(--brand); font-weight:700; box-shadow:0 1px 3px rgba(15,58,82,0.18); }
  .tab-pill:not(.active) { color:#64748b; }
  .tab-pill:not(.active):hover { color:var(--brand); }

  .badge { display:inline-block; padding:2px 10px; border-radius:9999px; font-size:11px; font-weight:600; }
  .card { background:#fff; border-radius:16px; box-shadow:0 1px 2px rgba(15,23,42,0.05),0 1px 10px rgba(15,23,42,0.04); border:1px solid #eef2f6; }
  .card:hover { box-shadow:0 4px 16px rgba(15,23,42,0.07); }
  .kpi { border-radius:16px; padding:16px 18px; color:#fff; box-shadow:0 6px 18px rgba(15,58,82,0.14); }
  .kpi .lbl{ font-size:11px; opacity:.85; letter-spacing:.02em; }
  .kpi .num{ font-size:24px; font-weight:800; margin-top:4px; line-height:1.1; }
  .kpi .sub{ font-size:11px; opacity:.82; margin-top:4px; }

  .btn { border-radius:10px; font-weight:600; transition: all .15s ease; }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary{ background:var(--accent); color:#fff; box-shadow:0 2px 8px rgba(14,116,144,0.25); }
  .btn-primary:hover{ background:#0c6a86; }
  .btn-ghost{ background:#fff; border:1px solid var(--line); color:var(--ink); }
  .btn-ghost:hover{ border-color:#cbd5e1; }

  /* clean unified quick-add buttons: white chip + colored icon */
  .qbtn{ display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line);
         border-radius:11px; padding:8px 13px; font-size:13px; font-weight:600; color:var(--ink);
         transition:all .15s ease; box-shadow:0 1px 2px rgba(15,23,42,0.05); }
  .qbtn:hover{ transform:translateY(-1px); border-color:#cbd5e1; box-shadow:0 4px 10px rgba(15,23,42,0.09); }
  .qico{ width:22px; height:22px; border-radius:7px; display:inline-flex; align-items:center; justify-content:center;
         color:#fff; font-size:14px; font-weight:700; }

  select.pill-select { border:0; cursor:pointer; -webkit-appearance:none; appearance:none; padding-right:20px;
        background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 3.5L5 6.5L8 3.5' stroke='%23475569' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>");
        background-repeat:no-repeat; background-position:right 6px center; }
  select.pill-select:focus { outline: 2px solid #7dd3fc; }
  .fc-input{ width:110px; border:1px solid var(--line); border-radius:8px; padding:4px 8px; font-size:13px; text-align:right; }
  .fc-input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(14,116,144,0.15); }
  table th { font-weight:600; letter-spacing:.02em; }
  tbody tr:hover { background:#f8fafc; }
  .link-tag{ display:inline-block; font-size:10px; font-weight:700; color:var(--pos);
             background:#e6f6f2; border-radius:6px; padding:1px 6px; margin-left:6px; white-space:nowrap; }
  .progress-track{ height:10px; border-radius:9999px; background:#e5edf2; overflow:hidden; }
  .progress-fill{ height:100%; border-radius:9999px; background:linear-gradient(90deg,var(--accent),var(--pos)); }
  .stage-bar{ height:8px; border-radius:9999px; background:#eef2f6; overflow:hidden; }
  .section-title{ font-weight:700; color:#1e2a3a; }
  .section-help{ font-size:12px; line-height:1.55; color:#64748b; margin-top:4px; max-width:860px; }
  .section-action{ display:inline-flex; align-items:center; gap:6px; border-radius:9px; padding:7px 11px;
                   font-size:12px; font-weight:700; background:#0e7490; color:#fff; white-space:nowrap; }
  .section-action:hover{ background:#0c6a86; transform:translateY(-1px); }
  .status-note{ margin-top:3px; font-size:11px; color:#be123c; max-width:240px; }
  /* ตัวเลือกวัน/เดือน/ปีแบบกระชับ ใช้รูปแบบเดียวกันทั้งระบบ */
  .smart-date-btn{ display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; min-width:132px;
    border:1px solid var(--line); border-radius:10px; padding:7px 10px; background:#fff; color:var(--ink); cursor:pointer;
    font-size:13px; line-height:1.25; box-shadow:0 1px 2px rgba(15,23,42,.04); }
  .smart-date-btn:hover{ border-color:#94a3b8; }
  .smart-date-btn:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(14,116,144,.13); }
  .smart-date-native{ position:absolute !important; width:1px !important; height:1px !important; opacity:0 !important; pointer-events:none !important; }
  .smart-date-pop{ position:fixed; z-index:10000; width:300px; max-width:calc(100vw - 24px); background:#fff; border:1px solid #dbe3ea;
    border-radius:14px; box-shadow:0 18px 48px rgba(15,34,51,.22); padding:12px; }
  .smart-date-head{ display:grid; grid-template-columns:36px 1fr 36px; align-items:center; gap:6px; margin-bottom:10px; }
  .smart-date-head button,.smart-year-step{ height:34px; border:1px solid var(--line); border-radius:9px; background:#f8fafc; font-weight:700; color:#334155; }
  .smart-date-title{ text-align:center; font-weight:800; color:#0f2233; }
  .smart-year-row{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:10px; }
  .smart-year-row .smart-year-step{ width:38px; }
  .smart-year-value{ min-width:86px; text-align:center; font-weight:800; font-size:16px; }
  .smart-month-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .smart-month-grid button,.smart-day-grid button{ border:0; border-radius:8px; background:#f8fafc; color:#334155; cursor:pointer; }
  .smart-month-grid button{ padding:9px 4px; font-size:12px; }
  .smart-month-grid button:hover,.smart-day-grid button:hover{ background:#e0f2fe; color:#075985; }
  .smart-month-grid button.active,.smart-day-grid button.active{ background:var(--accent); color:#fff; font-weight:800; }
  .smart-week,.smart-day-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:3px; text-align:center; }
  .smart-week{ color:#94a3b8; font-size:10px; margin-bottom:4px; }
  .smart-day-grid button{ aspect-ratio:1; font-size:12px; }
  .smart-day-grid button.muted{ color:#cbd5e1; background:transparent; cursor:default; }
  .smart-date-foot{ display:flex; justify-content:space-between; gap:8px; border-top:1px solid #eef2f6; margin-top:10px; padding-top:9px; }
  .smart-date-foot button{ border:0; background:transparent; color:#0e7490; font-size:12px; font-weight:700; cursor:pointer; }
  .date-range-fields{ display:grid; grid-template-columns:minmax(132px,1fr) auto minmax(132px,1fr); gap:7px; align-items:end; }
  .date-range-sep{ color:#94a3b8; padding-bottom:9px; font-size:12px; }
  @media(max-width:520px){ .date-range-fields{ grid-template-columns:1fr; } .date-range-sep{ display:none; } }
  .attachment-chip{ display:inline-flex; align-items:center; gap:4px; margin:2px 4px 2px 0; padding:3px 7px;
                    border-radius:7px; background:#eef6f8; color:#0e7490; font-size:11px; font-weight:600; }
  /* solid, clearly-visible quick-add buttons */
  .qbtn-solid{ display:inline-flex; align-items:center; gap:7px; color:#fff; border:0; border-radius:11px;
        padding:9px 15px; font-size:13px; font-weight:700; cursor:pointer;
        box-shadow:0 2px 6px rgba(15,23,42,0.20); transition:all .15s ease; }
  .qbtn-solid:hover{ transform:translateY(-1px); filter:brightness(1.08); box-shadow:0 5px 14px rgba(15,23,42,0.26); }
  .qbtn-solid .qi{ font-size:15px; font-weight:800; line-height:1; }

  /* โหมดดูอย่างเดียว (View only): ซ่อนปุ่มเพิ่ม/แก้ไข/ลบ ทั้งหมด ผู้ใช้ยังเลื่อนดู/สลับแท็บ/เลือกปีได้ */
  body.readonly [onclick*="Modal("],
  body.readonly [onclick^="delete"],
  body.readonly [onclick^="quickLogFor"],
  body.readonly [onclick^="addYear"],
  body.readonly .ro-hide,
  body.readonly .qbtn-solid { display:none !important; }

  /* พรีเซนต์ผู้บริหาร: ตัวหนังสือใหญ่ อ่านง่ายสำหรับผู้บริหาร/เจ้าของกิจการ */
  .pres-big .kpi .num{ font-size:30px; }
  .pres-big .kpi .lbl{ font-size:12.5px; opacity:.9; }
  .pres-big .kpi .sub{ font-size:12px; }
  .pres-big .section-title{ font-size:17px; }
  .pres-big table{ font-size:14px; }
  .pres-big th{ font-size:12.5px; }

  /* โหมดพิมพ์/บันทึก PDF สำหรับพรีเซนต์ผู้บริหาร */
  @media print {
    .no-print { display:none !important; }
    body { background:#fff !important; }
    .card { box-shadow:none !important; border:1px solid #d7dee5 !important; break-inside:avoid; }
    .kpi { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    @page { margin:12mm; }
  }
</style>
</head>
<body class="min-h-screen">
<div id="app"></div>

<script>
/* =========================================================
   PLAAI GROUP — SALES OPS  (client-side prototype)
   Redesign: easier sales workflow, two-bucket forecast
   (Pipeline + Function), results-only executive view,
   and everything auto-linked to On Hand.
   Data persists in this browser via localStorage.
   ========================================================= */

const STORAGE_KEY = "plaai_sales_ops_v3";

/* =========================================================
   CLOUD (Supabase) CONFIG
   ใส่ค่า 2 อย่างจากโปรเจกต์ Supabase ของคุณด้านล่างนี้:
   1) SUPABASE_URL      = Project URL   (Settings > API)
   2) SUPABASE_ANON_KEY = anon public key (Settings > API)
   ถ้าเว้นว่างไว้ แอปจะทำงานแบบออฟไลน์ (localStorage) เหมือนเดิม
   ========================================================= */
const SUPABASE_URL = "https://diffxgsxmztvccebgnol.supabase.co";// <-- วาง Project URL ที่นี่
const SUPABASE_ANON_KEY = "sb_publishable_m9ntF4MgZrk7wbIcXUL5rw_wUQEvWOT";  // <-- วาง anon public key ที่นี่
const CLOUD = !!(SUPABASE_URL && SUPABASE_ANON_KEY);

/* =========================================================
   สิทธิ์การใช้งานแบบแยกตำแหน่ง (ROLE-BASED ACCESS)
   ---------------------------------------------------------
   มี 4 ระดับสิทธิ์:
   • owner  (เจ้าของกิจการ) — ดูได้ทุกหน้า และ "แก้ไขได้ทุกอย่าง"
   • finance (ฝ่ายบัญชี)     — ดูได้ทุกหน้า แต่แก้ได้ "เฉพาะตัวเลขยอดขาย/รายได้" (หน้าเจ้าของ)
   • sales  (ฝ่ายขาย)        — ดูได้ทุกหน้า แต่แก้ได้ "เฉพาะข้อมูลของเซลล์ตัวเอง" เท่านั้น
   • viewer (อื่น ๆ)          — เข้าดูได้อย่างเดียว (View only)
   หมายเหตุ: ถ้าใช้งานแบบออฟไลน์ (ไม่ต่อคลาวด์) จะแก้ได้ทุกอย่างเหมือนเดิม
   ========================================================= */

/* อีเมลเจ้าของกิจการ (สิทธิ์สูงสุด แก้ได้ทุกหน้า) */
const OWNER_EMAILS = [
  "kunnsiri@gmail.com",
  "rda.plaai@gmail.com",
];

/* อีเมลที่ "ตั้งเป้ายอดขายได้" — จำกัดสูงสุด 2 บัญชีตามที่กำหนด
   (เฉพาะ 2 บัญชีนี้เท่านั้นที่แก้หน้า Target รายตึก/ตั้งเป้าทั้งปีได้) */
const TARGET_EDIT_EMAILS = [
  "rda.plaai@gmail.com",
  "kunnsiri@gmail.com",
];

/* อีเมลฝ่ายบัญชี (ดูได้ทุกหน้า แต่แก้ได้เฉพาะตัวเลขยอดขาย/รายได้) */
const FINANCE_EMAILS = [
  "finance@p-plaai.com",
];

/* ผู้จัดการโรงแรม (Hotel Manager) — เข้าดูได้อย่างเดียว (View only)
   และเห็นเฉพาะโรงแรมที่กำหนด + ภาพรวมทั้งกลุ่มเท่านั้น
   ---------------------------------------------------------
   • ตั้ง "รหัสผ่าน" ของแต่ละอีเมล (HM01/HM02/HM03/HM04) ในหน้า Supabase
     (Authentication > Users) — ไฟล์นี้คุมแค่ว่าอีเมลไหน "เห็นโรงแรมใดได้บ้าง"
   • ค่า array คือ hotelId ของโรงแรมที่อนุญาต (ต้องตรงกับ id ของโรงแรมในระบบ)   */
const HM_ACCESS = {
  "hm@p-plaai.com":              ["prime"],            // HM01 · Plaai Prime + ภาพรวม
  "rm.plus@p-plaai.com":         ["saroch"],           // HM02 · Plaai Plus สาโรช + ภาพรวม
  "om.plusbowin@p-plaai.com":    ["bowin","bowin2"],   // HM04 · Plaai Plus บ่อวิน + บ่อวิน2 + ภาพรวม
  "saleco.plaaihotel@p-plaai.com":["play"],            // HM03 · Plaai Play + ภาพรวม
};
function hmHotelsFor(em){
  em = (em||"").toLowerCase();
  const au = appUserFor(em);
  if(au && au.role==="hm" && Array.isArray(au.hotelIds) && au.hotelIds.length) return au.hotelIds;
  for(const k in HM_ACCESS){ if(k.toLowerCase()===em) return HM_ACCESS[k]; }
  return null;
}
// ค้นหา "ผู้ใช้ที่เพิ่มจากหน้าโปรแกรม" ตามอีเมล (ต้อง active) — ใช้กำหนดสิทธิ์แทน/เสริม config ในโค้ด
function appUserFor(em){
  em = (em||"").toLowerCase();
  if(!em || !db || !Array.isArray(db.appUsers)) return null;
  return db.appUsers.find(u=>(u.email||"").toLowerCase()===em && u.active!==false) || null;
}

/* ผูก "อีเมลของฝ่ายขายแต่ละคน" กับ "รหัสเซลล์ (salesId)" ของตัวเอง
   - เซลล์คนนั้นจะแก้ได้เฉพาะข้อมูลของ salesId ตัวเอง (Pipeline/Function/Account/กิจกรรม/แผนงาน)
   - ค่าเริ่มต้น s1/s2/s3 = เซลล์ 1/2/3 ในระบบ  ← แก้ให้ตรงกับเซลล์จริงได้เลย
   - เพิ่มบรรทัดใหม่ได้ตามจำนวนพนักงานขาย เช่น "email@บริษัท": "s4"        */
const SALES_EMAILS = {
  "ales.plusbowin@p-plaai.com":    "s2",
  "salesco.plus@p-plaai.com":      "s3",
};

/* จำกัด "เซลล์แต่ละคนให้เห็นเฉพาะโรงแรมของตัวเอง" (ดูได้แค่ส่วนของตัวเอง)
   - key = อีเมลเซลล์ (พิมพ์เล็ก) · value = array ของ hotelId ที่เซลล์คนนั้นดูได้
   - hotelId ที่ใช้ได้: "prime" · "saroch" · "play" · "bowin" · "bowin2"
   - ถ้าไม่กำหนดที่นี่ ระบบจะใช้ค่า "โรงแรมที่ผูกไว้" ในหน้า 👤 จัดการผู้ใช้ (ช่อง hotelIds) แทน
   - ถ้าไม่กำหนดทั้งสองที่ = เห็นทุกโรงแรม (ควรกำหนดให้ครบเพื่อจำกัดสิทธิ์)
   ตัวอย่าง: "ales.plusbowin@p-plaai.com": ["bowin","bowin2"],                              */
const SALES_HOTELS = {
  // "ales.plusbowin@p-plaai.com": ["bowin","bowin2"],
  // "salesco.plus@p-plaai.com":   ["saroch"],
};
function salesHotelsFor(em){
  em=(em||"").toLowerCase();
  const au=appUserFor(em);
  if(au && Array.isArray(au.hotelIds) && au.hotelIds.length) return au.hotelIds;
  for(const k in SALES_HOTELS){ if(k.toLowerCase()===em && Array.isArray(SALES_HOTELS[k]) && SALES_HOTELS[k].length) return SALES_HOTELS[k]; }
  return null;
}

/* Sales Manager — จัดการข้อมูลได้ทุกหน้า แต่ไม่มีสิทธิ์จัดการผู้ใช้ */
const SALES_MANAGER_EMAILS = {
  "sales1.plaaihotel@p-plaai.com": "s1",
};

/* ผู้ช่วยฝ่ายขายประจำออฟฟิศ — ดูแลให้เซลล์ทุกคน
   เข้าถึงเฉพาะ: หน้าฝ่ายขาย (ช่วยกรอกของทุกเซลล์) · งานจัดเลี้ยง/ออเดอร์ · ใบเสนอราคา
   รับงาน/ส่งต่องานได้ · แต่แก้ Target / ตัวเลขรายได้ / จัดการผู้ใช้ ไม่ได้
   วิธีใช้: ใส่อีเมลผู้ช่วยที่นี่ หรือกำหนด role "sales_assistant" ในหน้า "จัดการผู้ใช้" ก็ได้ */
const SALES_ASSISTANT_EMAILS = [
  // "assistant@p-plaai.com",
];

/* URL ของ Supabase Edge Function สำหรับส่งสรุปเข้า LINE (ดูคู่มือ LINE)
   - ถ้าใส่ไว้ ปุ่ม “ส่งเข้า LINE เลย” จะทำงานได้
   - ถ้าเว้นว่าง ยังใช้ปุ่มคัดลอก/ดาวน์โหลดข้อความสรุปได้ตามปกติ           */
const LINE_SUMMARY_FUNCTION_URL = ""; // เช่น "https://xxxx.functions.supabase.co/weekly-line-summary"

/* URL ของ Supabase Edge Function สำหรับ "ส่งรายงานเซลล์เข้าอีเมล" พร้อมไฟล์แนบ
   - ถ้าใส่ไว้ ปุ่ม "ส่งเข้าอีเมล" จะส่งอีเมลอัตโนมัติพร้อมไฟล์ Excel แนบ
   - ถ้าเว้นว่าง ปุ่มจะเปิดโปรแกรมอีเมลในเครื่อง (mailto) พร้อมข้อความสรุป
     และดาวน์โหลดไฟล์ Excel ให้แนบเองอัตโนมัติ                              */
const REPORT_EMAIL_FUNCTION_URL = ""; // เช่น "https://xxxx.functions.supabase.co/sales-report-email"

// ---------- สิทธิ์การใช้งาน (ROLE-BASED) ----------
function currentEmail(){ return (currentUser && currentUser.email || "").toLowerCase(); }
// หา salesId ของอีเมลนี้ (จาก config SALES_EMAILS หรือช่องอีเมลที่ผูกไว้กับตัวเซลล์)
function salesIdForEmail(em){
  em = (em||"").toLowerCase();
  const au = appUserFor(em);
  if(au && (au.role==="sales"||au.role==="sales_manager") && au.salesId) return au.salesId;
  for(const k in SALES_MANAGER_EMAILS){ if(k.toLowerCase()===em) return SALES_MANAGER_EMAILS[k]; }
  for(const k in SALES_EMAILS){ if(k.toLowerCase()===em) return SALES_EMAILS[k]; }
  const rep = ((db && db.salesReps) || []).find(s=>(s.email||"").toLowerCase()===em && em);
  return rep ? rep.id : null;
}
function mySalesId(){ return salesIdForEmail(currentEmail()); }
// ตำแหน่งของผู้ใช้ปัจจุบัน: owner | sales_manager | finance | sales | viewer  (ออฟไลน์ = owner)
function userRole(){
  if(!CLOUD) return "owner";
  const em = currentEmail();
  // เจ้าของกิจการ (จากโค้ด) = สิทธิ์สูงสุดเสมอ กันล็อกตัวเองออกจากระบบ
  if(OWNER_EMAILS.map(e=>e.toLowerCase()).includes(em)) return "owner";
  // อีเมล Sales Manager ที่กำหนดไว้ = สิทธิ์ผู้จัดการเสมอ
  if(Object.keys(SALES_MANAGER_EMAILS).some(e=>e.toLowerCase()===em)) return "sales_manager";
  // สิทธิ์ที่เจ้าของกำหนดจากหน้าโปรแกรม (มาก่อน config เดิมในโค้ด)
  const au = appUserFor(em);
  if(au && au.role) return au.role;
  if(FINANCE_EMAILS.map(e=>e.toLowerCase()).includes(em)) return "finance";
  if(SALES_ASSISTANT_EMAILS.map(e=>e.toLowerCase()).includes(em)) return "sales_assistant";
  if(salesIdForEmail(em)) return "sales";
  if(hmHotelsFor(em)) return "hm";
  return "viewer";
}
function isOwner(){ return userRole()==="owner"; }
function isSalesManager(){ return userRole()==="sales_manager"; }
function isFinance(){ return userRole()==="finance"; }
function isSales(){ return userRole()==="sales"; }
function isHM(){ return userRole()==="hm"; }
function isSalesAssistant(){ return userRole()==="sales_assistant"; }
// รายชื่อ hotelId ที่ผู้ใช้คนนี้ "มีสิทธิ์เห็น" (ผู้จัดการโรงแรม = เฉพาะที่กำหนด · คนอื่น = ทุกโรงแรม)
function allowedHotelIds(){
  if(CLOUD && isHM()){ const ids = hmHotelsFor(currentEmail())||[]; return ids.filter(id=>hotelById(id)); }
  // เซลล์ (ไม่ใช่ผู้จัดการ/ผู้ช่วย) เห็นเฉพาะโรงแรมของตัวเองถ้ากำหนดไว้
  if(CLOUD && isSales()){ const ids = salesHotelsFor(currentEmail()); if(ids && ids.length){ const f=ids.filter(id=>hotelById(id)); if(f.length) return f; } }
  return HOTELS.map(h=>h.id);
}
// โรงแรมที่แสดงในแท็บ/กราฟ (กรองตามสิทธิ์ผู้จัดการโรงแรม)
function visibleHotels(){ const ids = allowedHotelIds(); return HOTELS.filter(h=>ids.includes(h.id)); }
function canSeeHotel(hid){ return allowedHotelIds().includes(hid); }

function roleBadgeHtml(){
  const r = userRole();
  const box = (txt,col)=>`<span class="text-xs font-semibold px-2 py-1 rounded" style="background:rgba(255,255,255,0.18);color:${col};">${txt}</span>`;
  if(r==="owner")   return box("👑 เจ้าของกิจการ · สิทธิ์สูงสุด","#fde68a");
  if(r==="sales_manager") return box("⭐ Sales Manager · จัดการข้อมูลฝั่งกรอก","#fde68a");
  if(r==="finance") return box("🧮 ฝ่ายบัญชี · แก้เฉพาะยอดขาย","#a7f3d0");
  if(r==="sales"){ const nm=salesById(mySalesId())?.name||"เซลล์"; return box("🧑‍💼 ฝ่ายขาย: "+nm+" · แก้เฉพาะของตัวเอง","#bae6fd"); }
  if(r==="sales_assistant") return box("🤝 ผู้ช่วยฝ่ายขาย · ช่วยทุกเซลล์","#bae6fd");
  if(r==="hm"){ const names=(allowedHotelIds().map(id=>hotelById(id)?.name).filter(Boolean).join(", "))||"—"; return box("🏨 ผจก.โรงแรม · ดูอย่างเดียว: "+names,"#fde68a"); }
  return box("👁 ดูอย่างเดียว","#fde68a");
}

const DEFAULT_ANNUAL_TARGET = 200000000; // 200 ล้านบาท/ปี (เป้ารวมทั้งกลุ่ม ค่าเริ่มต้น)
const DEFAULT_HOTEL_TARGET = 40000000;   // 40 ล้านบาท/ปี/โรงแรม (ค่าเริ่มต้นต่อโรงแรม)
// เป้าของโรงแรมแต่ละแห่ง (แก้ไขแยกได้) · ถ้ายังไม่ตั้ง จะเฉลี่ยจากเป้ารวมเดิม หรือใช้ค่าเริ่มต้น
function hotelTargetFor(hid,year){
  if(db.hotelTargets && db.hotelTargets[hid] && db.hotelTargets[hid][year]!=null) return Number(db.hotelTargets[hid][year]);
  if(db.targets && db.targets[year]!=null){ const n=(db.hotels&&db.hotels.length)||1; return Number(db.targets[year])/n; }
  return DEFAULT_HOTEL_TARGET;
}
// เป้าทั้งกลุ่ม = ผลรวมของทุกโรงแรม
function targetFor(year){ return HOTELS.reduce((s,h)=>s+hotelTargetFor(h.id,year),0); }

function fmtM(n){ n=Number(n)||0; const a=Math.abs(n);

function addMonthsKey(key,n){ let [y,m]=key.split("-").map(Number); m+=n; while(m>12){m-=12;y+=1;} while(m<1){m+=12;y-=1;} return y+"-"+String(m).padStart(2,"0"); }

function firstDayOfMonthKey(key){ return key+"-01"; }

let smartDateState=null;
function enhanceDateInputs(root){
  (root||document).querySelectorAll('input[type="date"],input[type="month"]').forEach(inp=>{
    if(inp.dataset.smartDate) return;
    inp.dataset.smartDate="1"; inp.classList.add("smart-date-native");
    const btn=document.createElement("button"); btn.type="button"; btn.className="smart-date-btn";
    btn.innerHTML='<span></span><span aria-hidden="true">▣</span>';
    btn.setAttribute("aria-label", inp.type==="month"?"เลือกเดือนและปี":"เลือกวัน เดือน และปี");
    btn.onclick=(e)=>{ e.preventDefault(); openSmartDate(inp,btn); };
    inp.insertAdjacentElement("afterend",btn); updateSmartDateButton(inp);
  });
  (root||document).querySelectorAll('select,input[type="number"]#f_year').forEach(inp=>{
    if(inp.dataset.smartDate) return;
    const isYearNumber=inp.matches('input[type="number"]#f_year');
    const vals=isYearNumber?[]:Array.from(inp.options).map(o=>o.value).filter(Boolean);
    if(!isYearNumber && (!vals.length||!vals.every(v=>/^\d{4}$/.test(v)))) return;
    inp.dataset.smartDate="1"; inp.dataset.smartKind="year"; inp.classList.add("smart-date-native");
    const btn=document.createElement("button"); btn.type="button"; btn.className="smart-date-btn"; btn.innerHTML='<span></span><span aria-hidden="true">▣</span>';
    btn.setAttribute("aria-label","เลือกปี"); btn.onclick=e=>{e.preventDefault();openSmartDate(inp,btn);}; inp.insertAdjacentElement("afterend",btn); updateSmartDateButton(inp);
  });
}
function updateSmartDateButton(inp){
  const btn=inp.nextElementSibling; if(!btn||!btn.classList.contains("smart-date-btn")) return;
  btn.firstElementChild.textContent=inp.dataset.smartKind==="year"?(inp.value?"ปี "+inp.value:"ทุกปี"):(inp.type==="month"?(inp.value?monthLabel(inp.value):"เลือกเดือน"):shortDateLabel(inp.value));
}
function closeSmartDate(){ const p=document.getElementById("smartDatePop"); if(p)p.remove(); smartDateState=null; }
function setSmartDateValue(value){
  const inp=smartDateState&&smartDateState.input; if(!inp)return;
  inp.value=value; updateSmartDateButton(inp); inp.dispatchEvent(new Event("change",{bubbles:true})); closeSmartDate();
}
function openSmartDate(inp,btn){
  closeSmartDate();
  const kind=inp.dataset.smartKind||inp.type;
  const fallback=kind==="year"?String(currentYear()):(kind==="month"?currentMonthKey():todayStr());
  const now=(inp.value||fallback).split("-").map(Number);
  smartDateState={input:inp,button:btn,type:kind,year:now[0]||currentYear(),month:now[1]||1,day:now[2]||1};
  const pop=document.createElement("div"); pop.id="smartDatePop"; pop.className="smart-date-pop"; document.body.appendChild(pop);
  positionSmartDate(); drawSmartDate();
}
function positionSmartDate(){
  const s=smartDateState,p=document.getElementById("smartDatePop"); if(!s||!p)return;
  const r=s.button.getBoundingClientRect(), w=Math.min(300,window.innerWidth-24), left=Math.max(12,Math.min(r.left,window.innerWidth-w-12));
  const below=r.bottom+6, top=(below+360<window.innerHeight)?below:Math.max(12,r.top-360);
  p.style.left=left+"px"; p.style.top=top+"px";
}
function shiftSmartYear(n){ smartDateState.year=Math.max(2000,Math.min(2100,smartDateState.year+n)); drawSmartDate(); }
function shiftSmartMonth(n){ let m=smartDateState.month+n,y=smartDateState.year; if(m>12){m=1;y++;}if(m<1){m=12;y--;}smartDateState.month=m;smartDateState.year=Math.max(2000,Math.min(2100,y));drawSmartDate(); }

function chooseSmartDay(d){ setSmartDateValue(smartDateState.year+"-"+String(smartDateState.month).padStart(2,"0")+"-"+String(d).padStart(2,"0")); }
function chooseSmartYear(y){ setSmartDateValue(String(y)); }
function drawSmartDate(){

    p.innerHTML=`<div class="smart-year-row"><button class="smart-year-step" onclick="shiftSmartYear(-1)" aria-label="ปีก่อน">−</button><div class="smart-year-value">ปี ${s.year}</div><button class="smart-year-step" onclick="shiftSmartYear(1)" aria-label="ปีถัดไป">＋</button></div>

    const first=new Date(s.year,s.month-1,1), days=new Date(s.year,s.month,0).getDate(), blanks=first.getDay();
    const cells=Array.from({length:blanks},()=>'<button class="muted" disabled></button>').concat(Array.from({length:days},(_,i)=>{const d=i+1,v=s.year+"-"+String(s.month).padStart(2,"0")+"-"+String(d).padStart(2,"0");return `<button class="${selected===v?'active':''}" onclick="chooseSmartDay(${d})">${d}</button>`;}));
    p.innerHTML=`<div class="smart-year-row"><button class="smart-year-step" onclick="shiftSmartYear(-1)" aria-label="ปีก่อน">−</button><div class="smart-year-value">ปี ${s.year}</div><button class="smart-year-step" onclick="shiftSmartYear(1)" aria-label="ปีถัดไป">＋</button></div>

  }

}

// สร้างข้อมูลยอดขายตัวอย่าง (ปีนี้ถึงเดือนปัจจุบัน + ทั้งปีที่แล้ว) เพื่อให้หน้าเจ้าของมีกราฟให้ดูทันที
function genSampleRevenue(hotels, cy){
  const rows = [];
  const season = [0.9,0.95,1.05,1.0,0.95,0.9,0.92,0.98,1.0,1.1,1.15,1.2]; // ปัจจัยตามเดือน
  const nowM = Number(todayStr().slice(5,7));
  const sampleKeys = ["corporate","walkin","direct","ota","other"];
  hotels.forEach((h,hi)=>{
    const base = 900000 + hi*250000;           // ฐานยอด/เดือน ต่างกันตามโรงแรม
    const mix  = [0.28,0.14,0.10,0.30,0.18];    // สัดส่วน Corporate/Walk-in/Direct/OTA/อื่นๆ
    const build = (year, month, growth)=>{
      const tot = Math.round(base*season[month-1]*growth/1000)*1000;
      const e = { id:uid("rev"), hotelId:h.id, month:year+"-"+String(month).padStart(2,"0"), vals:{} };
      sampleKeys.forEach((k,i)=>{ e.vals[k] = Math.round(tot*(mix[i]||0)/1000)*1000; });
      return e;
    };
    for(let m=1;m<=12;m++) rows.push(build(cy-2, m, 0.92));          // 2 ปีก่อน ครบ 12 เดือน
    for(let m=1;m<=12;m++) rows.push(build(cy-1, m, 1.0));            // ปีที่แล้ว ครบ 12 เดือน
    for(let m=1;m<=nowM;m++) rows.push(build(cy, m, 1.08+hi*0.01));   // ปีนี้ ถึงเดือนปัจจุบัน (โต ~8-13%)
  });
  return rows;
}

function blockCloudWrite(){ if(!CLOUD) return false; return userRole()==="viewer"; }
function saveData(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } // แคชในเครื่องเสมอ
  catch(e){
    console.warn("local cache full",e);
    if(!storageWarningShown){ storageWarningShown=true; alert("พื้นที่แคชในเครื่องใกล้เต็ม ไฟล์ Feedback จะยังพยายามบันทึกขึ้นระบบออนไลน์ กรุณาลดขนาดหรือลบไฟล์เก่าหากบันทึกไม่สำเร็จ"); }
  }
  if (CLOUD && !applyingRemote && !blockCloudWrite()) cloudSyncChanges(); // ซิงค์เฉพาะ “รายการที่เปลี่ยน” ขึ้นคลาวด์
}

// ---- ซิงค์แบบแยกรายการ: หา “อะไรเปลี่ยน” เทียบ snapshot แล้วส่งเฉพาะรายการนั้น ----
function cloudSyncChanges(){
  if(!sb || !currentUser) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(async ()=>{
    try{
      const rows = [];
      for(const col of CLOUD_COLLECTIONS){
        const cur = db[col] || [], prev = (cloudSnapshot && cloudSnapshot[col]) || [];
        const curMap = new Map(cur.map(x=>[x.id,x]));
        const prevMap = new Map(prev.map(x=>[x.id,x]));
        // เพิ่ม/แก้ไข
        for(const [id,item] of curMap){
          const p = prevMap.get(id);
          if(!p || JSON.stringify(p)!==JSON.stringify(item))
            rows.push({ collection:col, id, data:item, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });
        }
        // ลบ (soft delete)
        for(const [id] of prevMap){
          if(!curMap.has(id))
            rows.push({ collection:col, id, data:{}, deleted:true, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });
        }
      }
      // meta = years + targets (เก็บเป็นแถวเดียว)
      const meta = { years:db.years, targets:db.targets, hotelTargets:db.hotelTargets, salesTargets:db.salesTargets, customerGroups:db.customerGroups };
      const prevMeta = cloudSnapshot ? { years:cloudSnapshot.years, targets:cloudSnapshot.targets, hotelTargets:cloudSnapshot.hotelTargets, salesTargets:cloudSnapshot.salesTargets, customerGroups:cloudSnapshot.customerGroups } : null;
      if(!prevMeta || JSON.stringify(prevMeta)!==JSON.stringify(meta))
        rows.push({ collection:"meta", id:"app_meta", data:meta, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });

      if(rows.length){
        const { error } = await sb.from("records").upsert(rows);
        if(error) throw error;
      }
      cloudSnapshot = JSON.parse(JSON.stringify(db));
      setCloudStatus("saved");
    }catch(e){ console.error("cloud sync error:", e); setCloudStatus("error"); }
  }, 350);
}

function rebuildDbFromRows(rows){
  const base = defaultData();
  const out = { hotels:[], salesReps:[], accounts:[], pipeline:[], functionEvents:[], activities:[], forecasts:[], revenue:[], partners:[], newCompanies:[], lostBusiness:[], events:[], opportunities:[], appUsers:[], orders:[], quotations:[], years:base.years, targets:{}, hotelTargets:{}, salesTargets:{} };
  for(const r of rows){
    if(r.deleted) continue;
    if(r.collection==="meta"){ if(r.data){ out.years=r.data.years||out.years; out.targets=r.data.targets||{}; out.hotelTargets=r.data.hotelTargets||{}; out.salesTargets=r.data.salesTargets||{}; if(Array.isArray(r.data.customerGroups)&&r.data.customerGroups.length) out.customerGroups=r.data.customerGroups; } continue; }
    if(out[r.collection]) out[r.collection].push(r.data);
  }
  return out;
}
async function pushEntireDb(){ // ใช้ตอนตั้งค่าครั้งแรก (ฐานข้อมูลยังว่าง)
  const rows = [];
  for(const col of CLOUD_COLLECTIONS)
    (db[col]||[]).forEach(item=>rows.push({ collection:col, id:item.id, data:item, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() }));
  rows.push({ collection:"meta", id:"app_meta", data:{ years:db.years, targets:db.targets, hotelTargets:db.hotelTargets, salesTargets:db.salesTargets, customerGroups:db.customerGroups }, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });
  if(rows.length) await sb.from("records").upsert(rows);
}

// ดึงข้อมูลทั้งหมดจากคลาวด์ ประกอบเป็น db แล้วเริ่มฟังเรียลไทม์
async function cloudBootstrap(){
  try{
    const { data:rows, error } = await sb.from("records").select("*");
    if(error) throw error;
    if(rows && rows.length){
      db = rebuildDbFromRows(rows); normalizeData();
    } else {
      db = defaultData(); normalizeData();
      if(!readOnly()) await pushEntireDb();
    }
    cloudSnapshot = JSON.parse(JSON.stringify(db));
    // ถ้าเป็นบัญชีฝ่ายขาย ให้เริ่มที่หน้าเซลล์ตัวเองเลย (สะดวกในการแก้ข้อมูลของตัวเอง)
    if(isSales()){ ui.role="sales"; const sid=mySalesId(); if(sid) ui.currentSales=sid; }
    if(isSalesAssistant()){ ui.role="sales"; }
    if(isSalesManager()){ ui.role="gm"; ui.currentHotelTab="group"; }
    // ฝ่ายบัญชี เปิดมาที่หน้ากรอกข้อมูลฝ่ายบัญชีเลย
    if(isFinance()){ ui.role="finance"; }
    // เจ้าของกิจการ เปิดมาที่หน้าแดชบอร์ดผู้บริหาร (ดูภาพรวมก่อน)
    if(isOwner()){ ui.role="gm"; }
    // ผู้จัดการโรงแรม (hm) เปิดมาที่หน้าพรีเซนต์ + โฟกัสโรงแรมของตัวเอง
    if(isHM()){ ui.role="present"; const ids=allowedHotelIds(); ui.presScope = ids.length===1 ? ids[0] : "group"; ui.currentHotelTab=ui.presScope; ui.ownerTab=ui.presScope; }
    subscribeRealtime();
    setCloudStatus("saved");
    startIdleWatch();   // เริ่มจับเวลา auto logout เมื่อไม่มีการใช้งาน
    render();
  }catch(e){
    console.error("cloud bootstrap failed:", e);
    alert("เชื่อมต่อฐานข้อมูลไม่สำเร็จ: "+(e.message||e)+"\n\nแอปจะทำงานแบบออฟไลน์ในเครื่องนี้ชั่วคราว");
    loadData(); render();
  }
}

// รับการเปลี่ยนแปลงจากคนอื่น “ทีละรายการ” แล้วผสานเข้ากับ db (ไม่ทับทั้งก้อน)
function subscribeRealtime(){
  sb.channel("records_rt")
    .on("postgres_changes", { event:"*", schema:"public", table:"records" }, payload=>{
      const row = payload.new;
      if(!row || row.updated_by===CLIENT_ID) return; // ข้ามสิ่งที่เราเขียนเอง
      applyRemoteRow(row);
    })
    .subscribe();
}
function applyRemoteRow(row){
  applyingRemote = true;
  try{
    if(row.collection==="meta"){
      if(row.data){ db.years = row.data.years || db.years; db.targets = row.data.targets || {}; db.hotelTargets = row.data.hotelTargets || {}; db.salesTargets = row.data.salesTargets || {}; if(Array.isArray(row.data.customerGroups)&&row.data.customerGroups.length) db.customerGroups = row.data.customerGroups; }
    } else if(Array.isArray(db[row.collection])){
      const arr = db[row.collection];
      const idx = arr.findIndex(x=>x.id===row.id);
      if(row.deleted){ if(idx>=0) arr.splice(idx,1); }
      else { if(idx>=0) arr[idx] = row.data; else arr.push(row.data); }
    }
    normalizeData();
    cloudSnapshot = JSON.parse(JSON.stringify(db)); // กันไม่ให้ diff รอบหน้าดันข้อมูลของคนอื่นกลับ
    localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
  }catch(e){ console.error(e); }
  applyingRemote = false;
  setCloudStatus("synced");
  if(isUserBusy()) pendingRemoteRender = true; // กำลังพิมพ์อยู่ → ค่อยรีเฟรชทีหลัง
  else render();
}
function flushPendingRender(){
  if(pendingRemoteRender && !isUserBusy()){ pendingRemoteRender=false; render(); }
}
function setCloudStatus(state){
  const el = document.getElementById("cloudStatus");
  if(!el) return;
  const map = { saved:["● ซิงค์แล้ว","#a7f3d0"], synced:["● อัปเดตจากทีม","#bae6fd"], error:["● บันทึกไม่สำเร็จ","#fecaca"] };
  const [txt,color] = map[state]||["",""];
  el.textContent = txt; el.style.color = color;
}

// ---------- data helpers ----------
function hotelById(id){ return HOTELS.find(h=>h.id===id); }
function salesById(id){ return SALES_REPS.find(s=>s.id===id); }
function accountsForHotel(hid){ return db.accounts.filter(a=>a.hotelIds.includes(hid)); }
function pipelineForHotel(hid){ return db.pipeline.filter(p=>p.hotelId===hid); }
function functionsForHotel(hid){ return db.functionEvents.filter(f=>f.hotelId===hid); }
function activitiesForHotel(hid){ return db.activities.filter(a=>a.hotelId===hid).sort((a,b)=>b.date.localeCompare(a.date)); }
function pipelineForSales(sid){ return db.pipeline.filter(p=>p.salesId===sid); }
function functionsForSales(sid){ return db.functionEvents.filter(f=>f.salesId===sid); }
function activitiesForSales(sid){ return db.activities.filter(a=>a.salesId===sid).sort((a,b)=>b.date.localeCompare(a.date)); }
function accountsForSales(sid){ return db.accounts.filter(a=>a.salesId===sid); }
function sumVal(arr,key){ return arr.reduce((s,x)=>s+(Number(x[key])||0),0); }

// ---------- ON HAND (auto-linked from won pipeline + confirmed functions) ----------
function onHandPipeline(hid,key){ return sumVal(db.pipeline.filter(p=>p.hotelId===hid && p.stage==="won" && ymKey(p.expectedCloseDate)===key),"estValue"); }
function onHandFunction(hid,key){ return sumVal(db.functionEvents.filter(f=>f.hotelId===hid && ONHAND_FN_STATUS.includes(f.status) && ymKey(f.eventDate)===key),"estRevenue"); }
function onHandForMonth(hid,key){ return onHandPipeline(hid,key)+onHandFunction(hid,key); }
function onHandForSalesMonth(sid,key){
  const won = sumVal(db.pipeline.filter(p=>p.salesId===sid && p.stage==="won" && ymKey(p.expectedCloseDate)===key),"estValue");
  const conf = sumVal(db.functionEvents.filter(f=>f.salesId===sid && ONHAND_FN_STATUS.includes(f.status) && ymKey(f.eventDate)===key),"estRevenue");
  return won+conf;
}

// ---------- FORECAST (two buckets) ----------
function forecastEntry(hid,key){ return db.forecasts.find(x=>x.hotelId===hid && x.month===key); }
function fcPipeline(hid,key){ const e=forecastEntry(hid,key); return e?Number(e.pipelineForecast)||0:0; }
function fcFunction(hid,key){ const e=forecastEntry(hid,key); return e?Number(e.functionForecast)||0:0; }
function fcTotal(hid,key){ return fcPipeline(hid,key)+fcFunction(hid,key); }
function setForecastPart(hid,month,part,value){
  if(!canEditForecast()){ render(); return; }
  let e = db.forecasts.find(x=>x.hotelId===hid && x.month===month);
  if(!e){ e={ id:uid("fc"), hotelId:hid, month, pipelineForecast:0, functionForecast:0, notes:"" }; db.forecasts.push(e); }
  e[part] = Number(value)||0;
  saveData(); render();
}

// group-wide sums for a month
function groupOnHand(key){ return HOTELS.reduce((s,h)=>s+onHandForMonth(h.id,key),0); }
function groupForecast(key){ return HOTELS.reduce((s,h)=>s+fcTotal(h.id,key),0); }
function groupOpenPipeline(){ return db.pipeline.filter(p=>p.stage!=="won" && p.stage!=="lost"); }
function monthKey(y,m){ return y+"-"+String(m).padStart(2,"0"); }
function yearMonths(y){ const a=[]; for(let m=1;m<=12;m++) a.push(monthKey(y,m)); return a; }
function groupOnHandYear(y){ return yearMonths(y).reduce((s,k)=>s+groupOnHand(k),0); }
function groupForecastYear(y){ return yearMonths(y).reduce((s,k)=>s+groupForecast(k),0); }

// ---------- TOTAL REVENUE (Owner view: OTA/FIT/Walk-in/ฝ่ายขาย/อื่นๆ) ----------
function revEntry(hid,key){ return db.revenue.find(r=>r.hotelId===hid && r.month===key); }
function revVals(hid,key){ const e=revEntry(hid,key); return (e && e.vals && typeof e.vals==="object") ? e.vals : {}; }
function revChannel(hid,key,ch){ const v=revVals(hid,key); return Number(v[ch])||0; }
// ยอด "แยกช่องทาง" ที่เซลล์กรอกเอง (ผลรวมของทุกกลุ่มลูกค้าในเดือนนั้น)
function revSplitSum(hid,key){ const v=revVals(hid,key); return Object.keys(v).reduce((s,k)=>s+(Number(v[k])||0),0); }
// ยอดรวมจากบัญชี (GOR) ที่ฝ่ายบัญชีตั้งไว้เป็น "ตัวคุม" ให้ตรงบัญชี (ต่อโรงแรม/เดือน)
function revAcct(hid,key){ const e=revEntry(hid,key); return e?Number(e.acct)||0:0; }
// ยอดรวมของเดือน = ใช้ "ยอดบัญชี" เป็นหลักถ้ามี (ให้ตรงบัญชีเสมอ) · ถ้ายังไม่ตั้ง ใช้ยอดที่แยกช่องทาง
function revHotelMonth(hid,key){ const a=revAcct(hid,key); return a>0 ? a : revSplitSum(hid,key); }
// ผลต่างการกระทบยอด: บวก = ยังไม่ได้แยกช่องทาง/รายได้อื่น(F&B) · ลบ = แยกเกินยอดบัญชี (ผิดปกติ)
function revReconcile(hid,key){ const a=revAcct(hid,key); return a>0 ? (a - revSplitSum(hid,key)) : 0; }
function hotelRevenueYear(hid,year){ return yearMonths(year).reduce((s,k)=>s+revHotelMonth(hid,k),0); }

// ---------- ANNUAL SALES TARGETS & PERFORMANCE ----------
function salesTargetFor(hid,year){
  const src=db.salesTargets&&db.salesTargets[hid]&&db.salesTargets[hid][year];
  return { corporate:0, government:0, gro:0, function:0, newAccounts:0, activeOldPct:0, ...(src||{}) };
}
function saleCategoryOf(item,kind){
  if(kind==="function") return "function";
  if(item.salesCategory && B2B_CATEGORIES[item.salesCategory]) return item.salesCategory;
  if(item.dealType==="function") return "function";
  if(item.customerType==="government") return "government";
  return "gro";
}
function b2bActualForHotelYear(hid,year,category){
  const y=String(year);
  let total=0;
  db.pipeline.forEach(p=>{
    const d=p.expectedCloseDate||p.serviceStartDate||"";
    if(p.hotelId===hid && p.stage==="won" && d.slice(0,4)===y && saleCategoryOf(p,"group_ro")===category) total+=Number(p.estValue)||0;
  });
  if(category==="function") db.functionEvents.forEach(f=>{
    const d=f.eventDate||f.expectedCloseDate||"";
    if(f.hotelId===hid && ONHAND_FN_STATUS.includes(f.status) && d.slice(0,4)===y) total+=Number(f.estRevenue)||0;
  });
  return total;
}
function b2bTargetTotal(hid,year){ const t=salesTargetFor(hid,year); return ["corporate","government","gro","function"].reduce((s,k)=>s+(Number(t[k])||0),0); }
function b2bActualTotal(hid,year){ return Object.keys(B2B_CATEGORIES).reduce((s,k)=>s+b2bActualForHotelYear(hid,year,k),0); }
function accountMetricsForHotelYear(hid,year){
  const list=accountsForHotel(hid), y=String(year);
  const newer=list.filter(a=>(a.acquiredDate||"").slice(0,4)===y);
  const old=list.filter(a=>!a.acquiredDate || (a.acquiredDate||"").slice(0,4)<y);
  const activeOld=old.filter(a=>a.status==="active");
  return { newCount:newer.length, oldCount:old.length, activeOldCount:activeOld.length, activeOldPct:old.length?activeOld.length/old.length*100:0 };
}
function achievementPct(actual,target){ return Number(target)>0 ? actual/Number(target)*100 : 0; }
function performanceScope(hid,year){
  const hs=hid?[hotelById(hid)].filter(Boolean):HOTELS;
  const categories={};
  Object.keys(B2B_CATEGORIES).forEach(k=>{
    categories[k]={
      target:hs.reduce((s,h)=>s+(Number(salesTargetFor(h.id,year)[k])||0),0),
      actual:hs.reduce((s,h)=>s+b2bActualForHotelYear(h.id,year,k),0)
    };
  });
  const hotelTarget=hs.reduce((s,h)=>s+hotelTargetFor(h.id,year),0);
  const hotelActual=hs.reduce((s,h)=>s+hotelRevenueYear(h.id,year),0);
  const newTarget=hs.reduce((s,h)=>s+(Number(salesTargetFor(h.id,year).newAccounts)||0),0);
  const newActual=hs.reduce((s,h)=>s+accountMetricsForHotelYear(h.id,year).newCount,0);
  const oldCount=hs.reduce((s,h)=>s+accountMetricsForHotelYear(h.id,year).oldCount,0);
  const activeOldCount=hs.reduce((s,h)=>s+accountMetricsForHotelYear(h.id,year).activeOldCount,0);
  const activeOldPct=oldCount?activeOldCount/oldCount*100:0;
  const activeOldTarget=hs.length?hs.reduce((s,h)=>s+(Number(salesTargetFor(h.id,year).activeOldPct)||0),0)/hs.length:0;
  return { categories, hotelTarget, hotelActual, b2bTarget:Object.values(categories).reduce((s,x)=>s+x.target,0),
    b2bActual:Object.values(categories).reduce((s,x)=>s+x.actual,0), newTarget,newActual,oldCount,activeOldCount,activeOldPct,activeOldTarget };
}

      ${kpiCard("ดูแลลูกค้าเก่า",p.activeOldPct.toFixed(0)+"%",`Active ${p.activeOldCount}/${p.oldCount} · Target ${p.activeOldTarget.toFixed(0)}%`,G.onhand)}

    </table></div>

}
// ---- กลุ่มลูกค้า (ชุดกลาง 1 ชุด · เหมือนกันทุกโรงแรม) ----
function customerGroups(){ return (db && Array.isArray(db.customerGroups) && db.customerGroups.length) ? db.customerGroups : DEFAULT_CHANNELS; }
// คงชื่อฟังก์ชันเดิมไว้เพื่อความเข้ากันได้ — ทุกอันคืนชุดกลุ่มลูกค้าชุดกลางเสมอ
function hotelChannels(hid){ return customerGroups(); }
function groupChannels(hs){ return customerGroups(); }
function channelsForScope(scope){ return customerGroups(); }
function chLabel(key,scope){ const c=channelsForScope(scope||"group").find(x=>x.key===key); return c?c.label:(LEGACY_CH_LABEL[key]||key); }
function chColor(key,scope){ const c=channelsForScope(scope||"group").find(x=>x.key===key); return c?c.color:(LEGACY_CH_COLOR[key]||"#94a3b8"); }
function revGroupMonth(key){ return HOTELS.reduce((s,h)=>s+revHotelMonth(h.id,key),0); }
function revHotelMonthChannel(hid,y,m,ch){ return revChannel(hid,monthKey(y,m),ch); }
// a month "has data" if any hotel (or a given hotel) recorded revenue that month
function revHotelYear(hid,y){ return yearMonths(y).reduce((s,k)=>s+revHotelMonth(hid,k),0); }
function revGroupYear(y){ return yearMonths(y).reduce((s,k)=>s+revGroupMonth(k),0); }
function revHotelYearChannel(hid,y,ch){ let s=0; for(let m=1;m<=12;m++) s+=revChannel(hid,monthKey(y,m),ch); return s; }
function revGroupYearChannel(y,ch){ return HOTELS.reduce((s,h)=>s+revHotelYearChannel(h.id,y,ch),0); }
// monthly array (1..12) for a scope ('group' or hotelId)
function revMonthlyArray(scope,y){
  return yearMonths(y).map(k=> scope==="group" ? revGroupMonth(k) : revHotelMonth(scope,k));
}
function revScopeYear(scope,y){ return scope==="group" ? revGroupYear(y) : revHotelYear(scope,y); }
function revScopeYearChannel(scope,y,ch){ return scope==="group" ? revGroupYearChannel(y,ch) : revHotelYearChannel(scope,y,ch); }
// which months (1..12) have any recorded revenue for this scope+year
function revMonthsWithData(scope,y){
  const out=[]; const arr=revMonthlyArray(scope,y);
  arr.forEach((v,i)=>{ if(v>0) out.push(i+1); });
  return out;
}
// sum only the given month-numbers, for a scope+year
function revSumMonths(scope,y,monthNums){
  return monthNums.reduce((s,m)=>s+(scope==="group"?revGroupMonth(monthKey(y,m)):revHotelMonth(scope,monthKey(y,m))),0);
}
function pctChange(cur,prev){ if(!prev) return null; return (cur-prev)/prev*100; }

// hotels a rep touches
function repHotels(sid){
  const set = new Set();
  db.pipeline.filter(p=>p.salesId===sid).forEach(p=>set.add(p.hotelId));
  db.functionEvents.filter(f=>f.salesId===sid).forEach(f=>set.add(f.hotelId));
  db.accounts.filter(a=>a.salesId===sid).forEach(a=>a.hotelIds.forEach(h=>set.add(h)));
  const ids = [...set];
  return ids.length ? HOTELS.filter(h=>ids.includes(h.id)) : HOTELS.slice();
}

function render(){
  const app = document.getElementById("app");
  closeSmartDate();
  document.body.classList.toggle("readonly", readOnly());
  guardHotelScope();
  const mainView = ui.page==="topProduction" ? renderTopProduction()
                 : ui.page==="salesReport" ? renderSalesReport()
                 : ui.page==="feedbackCenter" ? renderFeedbackCenter()
                 : ui.page==="banquetOps" ? renderBanquetOps()
                 : ui.page==="quotePrint" ? renderQuotePrint()
                 : ui.page==="beoPrint" ? renderBeoPrint()
                 : ui.page==="eventBoard" ? renderEventBoard()
                 : ui.page==="yieldBoard" ? renderYieldBoard()
                 : ui.page==="hotelTargets" ? renderHotelTargetsView()
                 : ui.role==="present" ? renderPresentView()
                 : ui.role==="sales" ? renderSalesView()
                 : ui.role==="finance" ? renderFinanceView()
                 : ui.role==="owner" ? renderOwnerView()
                 : renderGMView();
  app.innerHTML = `
    ${renderTopBar()}
    <div class="max-w-7xl mx-auto px-4 py-6">
      ${notifBannerHtml()}
      ${mainView}
    </div>
    <div id="modalRoot"></div>`;
  enhanceDateInputs(app);
  if (window.__chartRefs){ Object.values(window.__chartRefs).forEach(c=>c&&c.destroy&&c.destroy()); }
  window.__chartRefs = {};
  if (ui.page==="salesReport"){
    /* report page draws its own charts */
    drawReportChart();
  } else if (ui.page==="topProduction"){
    drawTopProdCharts();
  } else if (ui.page==="eventBoard" || ui.page==="yieldBoard" || ui.page==="hotelTargets" || ui.page==="feedbackCenter"
             || ui.page==="banquetOps" || ui.page==="quotePrint" || ui.page==="beoPrint"){
    /* หน้าปฏิทินอีเวนต์ / แผนราคา / งานจัดเลี้ยง ไม่มีกราฟ */
  } else if (ui.role==="present"){
    drawPresentCharts();
  } else if (ui.role==="gm"){
    if (ui.currentHotelTab==="group") drawGroupCharts();
    else drawHotelCharts(ui.currentHotelTab);
  } else if (ui.role==="owner"){
    drawOwnerCharts();
  } else if (ui.role==="finance"){
    drawFinanceChart();
  }
}

function updateField(collection,id,field,value){
  const item = db[collection] ? db[collection].find(x=>x.id===id) : null;
  if(!item){ render(); return; }
  if(!canEditSales(item.salesId)){ alert("บัญชีนี้แก้ได้เฉพาะข้อมูลของเซลล์ตัวเองเท่านั้น"); render(); return; }
  item[field]=value;
  // ถ้าเปลี่ยน Stage เป็น Lost → ถามเหตุผลทันที (เก็บไว้ปรับปรุง)
  if(collection==="pipeline" && field==="stage" && value==="lost"){
    const r = prompt("ดีลนี้ Lost เพราะอะไร? (บริษัทจะได้เอาไปปรับปรุงถูกจุด)", item.lostReason||"");
    if(r!==null) item.lostReason = r;
  }
  saveData(); render();
}

// ---------- GROUP (consolidated, vs 200M target) ----------
function renderGroupDashboard(){
  if(!ui.year) ui.year = currentYear();
  const yr = ui.year;
  const mk = currentMonthKey();
  const ohMonth = groupOnHand(mk);
  const fcMonth = groupForecast(mk);
  const open = groupOpenPipeline();

  // annual progress based on the SELECTED year (target is editable per year)
  const TARGET = targetFor(yr);
  const secured = groupOnHandYear(yr);            // ยืนยันแล้ว ทั้งปี
  const projected = secured + groupForecastYear(yr); // ยืนยัน + คาดการณ์ ทั้งปี
  const pctSecured = Math.min(100, secured/TARGET*100);
  const pctProjected = Math.min(100, projected/TARGET*100);

  // pipeline by stage (group)
  const stages = ["lead","quoted","negotiation","won"];
  const stageData = stages.map(st=>({ st, count: db.pipeline.filter(p=>p.stage===st).length,

function ownerKpiSub(pct, note){
  if(pct===null || pct===undefined || !isFinite(pct)) return note || "ยังไม่มีข้อมูลปีก่อน";
  const up = pct>=0, col = up ? "#bbf7d0" : "#fecaca";
  return `<span style="color:${col};font-weight:800">${up?'▲':'▼'} ${Math.abs(pct).toFixed(0)}%</span> ${note||"เทียบปีก่อน"}`;
}
function renderOwnerView(){
  if(!ui.ownerYear) ui.ownerYear = currentYear();
  if(ui.ownerYearB===null || ui.ownerYearB===undefined) ui.ownerYearB = ui.ownerYear-1;
  let scope = ui.ownerTab;
  if(scope!=="group" && !hotelById(scope)){ ui.ownerTab="group"; scope="group"; }
  const y = ui.ownerYear, py = ui.ownerYearB;   // y = ปีหลัก · py = ปีที่เลือกมาเทียบ
  const scopeName = scope==="group" ? "ภาพรวมทุกโรงแรม" : hotelById(scope).name;

  // years available to pick (จาก db.years + ปีที่มีข้อมูลยอดขายจริง + ปีที่กำลังเลือกอยู่)
  const revYears = db.revenue.map(r=>Number(r.month.slice(0,4)));
  const yearsSel = [...new Set([...db.years, ...revYears, y, py])].sort((a,b)=>a-b);

  // เทียบเฉพาะเดือนที่ "ปีหลัก" มีข้อมูล เทียบกับเดือนเดียวกันของ "ปีที่เลือกมาเทียบ"
  const monthsData    = revMonthsWithData(scope,y);
  const curYearSoFar  = revScopeYear(scope,y);
  const cmpSamePeriod = revSumMonths(scope,py,monthsData);   // ปีเทียบ เฉพาะเดือนเดียวกัน
  const cmpYearFull   = revScopeYear(scope,py);              // ปีเทียบ ครบทั้งปี
  const yoy = pctChange(curYearSoFar, cmpSamePeriod);
  const diffBaht = curYearSoFar - cmpSamePeriod;

  const latestM   = monthsData.length ? monthsData[monthsData.length-1] : Number(currentMonthKey().slice(5,7));
  const latestVal = scope==="group" ? revGroupMonth(monthKey(y,latestM))  : revHotelMonth(scope,monthKey(y,latestM));
  const latestPrv = scope==="group" ? revGroupMonth(monthKey(py,latestM)) : revHotelMonth(scope,monthKey(py,latestM));
  const latestYoy = pctChange(latestVal, latestPrv);

  const chTotals = channelsForScope(scope).map(c=>({ k:c.key, v:revScopeYearChannel(scope,y,c.key) })).sort((a,b)=>b.v-a.v);
  const topCh = chTotals[0] || { k:"ota", v:0 };
  const topChPct = curYearSoFar ? Math.round(topCh.v/curYearSoFar*100) : 0;

  // ทิศทางผล: ดีขึ้น / เท่าเดิม / ลดลง — พร้อม % และยอดเงิน (ผู้บริหารถามทั้งสองอย่าง)
  const hasCmp   = yoy!==null && isFinite(yoy);
  const flat     = hasCmp && Math.abs(yoy)<0.5;
  const up       = hasCmp && yoy>0;
  const dirWord  = !hasCmp ? "" : flat ? "เท่าเดิม" : up ? "ดีขึ้น" : "ลดลง";
  const dirColor = !hasCmp ? "#64748b" : flat ? "#64748b" : up ? "#0f766e" : "#be123c";

// แก้ได้: ฝ่ายบัญชี + ฝ่ายขาย + เจ้าของ

function renderFinanceView(){
  if(!ui.finHotel || !hotelById(ui.finHotel)) ui.finHotel = (visibleHotels()[0]||HOTELS[0]).id;
  if(!ui.finYear) ui.finYear = currentYear();

  const groups = customerGroups();
  const editable = canEditRevenue();
  const yearTotal = revHotelYear(hid,y);
  const target = hotelTargetFor(hid,y);
  const pct = target ? Math.min(100, yearTotal/target*100) : 0;
  const revYears = db.revenue.map(r=>Number(r.month.slice(0,4)));
  const yearsSel = [...new Set([...db.years, ...revYears, y])].sort((a,b)=>a-b);

  return `

    : `<div class="rounded-xl px-4 py-3 mb-4 text-sm" style="background:#fff7ed;color:#9a3412;">👁 บัญชีนี้ดูได้อย่างเดียว — แก้ไขตัวเลขได้เฉพาะฝ่ายบัญชี / ฝ่ายขาย / เจ้าของ</div>`}

  <div class="card p-4 mb-5">
    <div class="flex items-center justify-between mb-2">

    </div>
    <div class="flex flex-wrap gap-2">
      ${groups.map(c=>`<span class="badge" style="background:${c.color}1f;color:${c.color};border:1px solid ${c.color}55;">${c.label}</span>`).join("")}
    </div>
    <div class="text-xs text-slate-400 mt-2">Corporate · MICE · Government เป็นกลุ่มหลักที่ต้องมีทุกโรงแรม (ลบไม่ได้) · แก้ที่นี่แล้วทุกโรงแรมเปลี่ยนตาม</div>

  <div class="card p-4 mb-4">
    <div class="flex flex-wrap items-end gap-3">
      <label class="text-sm text-slate-600">โรงแรม<br><select onchange="setFinHotel(this.value)" class="btn btn-ghost text-sm px-3 py-2 mt-1" style="font-weight:700">${visibleHotels().map(h=>`<option value="${h.id}" ${h.id===hid?"selected":""}>${h.name}</option>`).join("")}</select></label>
      <label class="text-sm text-slate-600">ปี<br><select onchange="setFinYear(this.value)" class="btn btn-ghost text-sm px-3 py-2 mt-1">${yearsSel.map(yy=>`<option value="${yy}" ${yy===y?"selected":""}>ปี ${yy}</option>`).join("")}</select></label>
      <div class="flex-1"></div>

      ${canEditRevenue()?`<label class="qbtn-solid cursor-pointer" style="background:#7c3aed"><span class="qi">⬆</span> นำเข้าตัวเลข<input type="file" accept=".xlsx,.xls,.csv" class="hidden" onchange="importRevenueFile(event)"/></label>`:""}

  <div class="card p-4 mb-5 overflow-x-auto">

    <table class="w-full text-sm" style="min-width:${520+groups.length*110}px">
      <thead><tr class="text-left text-slate-500 border-b">

function setFinHotel(v){ ui.finHotel=v; render(); }
function setFinYear(v){ ui.finYear=Number(v); render(); }
function setRevCell(hid,mk,key,value){
  if(!guardRevenue()){ render(); return; }
  const v = Number(value)||0;
  let e = revEntry(hid,mk);
  if(!e){ e={ id:uid("rev"), hotelId:hid, month:mk, vals:{} }; db.revenue.push(e); }
  if(!e.vals || typeof e.vals!=="object") e.vals={};
  if(v) e.vals[key]=v; else delete e.vals[key];
  saveData(); render();
}
function guardAcct(){ if(canEditAcct()) return true; alert("เฉพาะเจ้าของกิจการหรือฝ่ายบัญชีเท่านั้นที่แก้ 'ยอดรวมจากบัญชี (GOR)' ได้ · เซลล์กรอกได้เฉพาะการแยกช่องทาง"); return false; }
function setRevAcct(hid,mk,value){
  if(!guardAcct()){ render(); return; }
  const v = Number(value)||0;
  let e = revEntry(hid,mk);
  if(!e){ e={ id:uid("rev"), hotelId:hid, month:mk, vals:{} }; db.revenue.push(e); }
  if(v) e.acct=v; else delete e.acct;
  saveData(); render();
}
// ป้ายสถานะการกระทบยอด (แยกช่องทาง เทียบ ยอดบัญชี)
function reconChip(acc,split){
  acc=Number(acc)||0; split=Number(split)||0;
  if(acc<=0) return '<span class="text-slate-300 text-xs">— ยังไม่ตั้งยอดบัญชี</span>';
  const diff=acc-split;
  if(Math.abs(diff)<1) return '<span class="badge" style="background:#dcfce7;color:#166534;">✓ ตรงบัญชี</span>';
  if(diff>0) return `<span class="badge" style="background:#fef9c3;color:#854d0e;" title="ส่วนต่างนี้คือรายได้อื่น/F&B หรือยอดที่เซลล์ยังไม่แยกช่องทาง">เหลือ ${fmtMoney(diff)}</span>`;
  return `<span class="badge" style="background:#fee2e2;color:#991b1b;" title="แยกช่องทางเกินยอดบัญชี ควรตรวจสอบ">⚠ เกิน ${fmtMoney(-diff)}</span>`;
}
function drawFinanceChart(){
  const hid=ui.finHotel, y=ui.finYear; const c=document.getElementById("fin-donut"); if(!c) return;
  const groups=customerGroups();

// TOP PRODUCTION — หน้าเจาะลึกลูกค้า/ช่องทาง Top Production
//   • เลือกโรงแรม/ภาพรวม · เพิ่ม-ลดปีที่เปรียบเทียบได้ · ค้นหา · จัดเรียง
//   • เทียบปีต่อปี: Room Nights · ยอดขาย · ADR · %สัดส่วน · ลูกค้าใหม่/หายไป

function openTopProduction(){ ui.page="topProduction"; render(); }
function topProdInit(){
  if(ui.topScope===undefined){ const vis=visibleHotels(); ui.topScope = vis.length===1 ? vis[0].id : "group"; }
  if(ui.topScope!=="group" && !hotelById(ui.topScope)) ui.topScope="group";
  if(ui.topScope!=="group" && !canSeeHotel(ui.topScope)) ui.topScope="group";
  if(ui.topSort===undefined) ui.topSort="rev";
  if(ui.topSearch===undefined) ui.topSearch="";
  const avail=topProdAllYears();
  if(!Array.isArray(ui.topYears) || !ui.topYears.length){
    ui.topYears = avail.length ? avail.slice(-2) : [currentYear()-1,currentYear()];
  }
  // เอาปีที่ไม่มีให้เลือกออก (แต่คงปีที่ผู้ใช้เพิ่มเองไว้)
  ui.topYears = [...new Set(ui.topYears.map(Number))].sort((a,b)=>a-b);
}
function topProdRaw(){
  return (db.partners||[]).filter(p=> ui.topScope==="group" ? canSeeHotel(p.hotelId) : p.hotelId===ui.topScope );
}
function topProdAllYears(){ return [...new Set(topProdRaw().map(p=>Number(p.year)).filter(Boolean))].sort((a,b)=>a-b); }
// สร้างตารางรวมตามชื่อบัญชี (ภาพรวม=รวมข้ามโรงแรม · รายตึก=ตามชื่อ)
function topProdAccounts(){
  const raw=topProdRaw(); const years=ui.topYears;
  const map=new Map();
  raw.forEach(p=>{
    const y=Number(p.year); if(!years.includes(y)) return;
    const nm=String(p.name||"").trim(); if(!nm) return;
    const key = nm.toLowerCase();
    if(!map.has(key)) map.set(key,{ name:nm, hotels:new Set(), byYear:{} });
    const o=map.get(key); o.hotels.add(p.hotelId);
    if(!o.byYear[y]) o.byYear[y]={rn:0,rev:0};
    o.byYear[y].rn += Number(p.roomNights)||0;
    o.byYear[y].rev += Number(p.revenue)||0;
  });
  return [...map.values()];
}
function topProdYearTotals(){
  const t={}; ui.topYears.forEach(y=>t[y]={rn:0,rev:0,accts:0});
  topProdAccounts().forEach(a=>{ ui.topYears.forEach(y=>{ const v=a.byYear[y]; if(v&&(v.rev||v.rn)){ t[y].rn+=v.rn; t[y].rev+=v.rev; t[y].accts++; } }); });
  return t;
}
function setTopScope(v){ ui.topScope=v; render(); }
function setTopSort(v){ ui.topSort=v; render(); }
function setTopSearch(v){ ui.topSearch=v; render(); }
function toggleTopYear(y){ y=Number(y); if(ui.topYears.includes(y)) ui.topYears=ui.topYears.filter(x=>x!==y); else ui.topYears=[...ui.topYears,y].sort((a,b)=>a-b); if(!ui.topYears.length) ui.topYears=[y]; render(); }
function addTopYearPrompt(){ const s=prompt("เพิ่มปีที่ต้องการเปรียบเทียบ (ค.ศ. เช่น 2026):", String(currentYear())); if(s===null) return; const y=Number(s); if(!y||y<2000||y>2100){ alert("กรุณาใส่ปีเป็นตัวเลข ค.ศ. เช่น 2026"); return; } if(!ui.topYears.includes(y)) ui.topYears=[...ui.topYears,y].sort((a,b)=>a-b); render(); }
function openTopPartnerAdd(){ if(!guardPresentation())return; const ys=ui.topYears; ui.presYear = ys.length?ys[ys.length-1]:currentYear(); openPartnerModal(); }

function renderTopProduction(){
  topProdInit();
  const years=ui.topYears, avail=topProdAllYears();
  const totals=topProdYearTotals();
  const newest=years[years.length-1], older=years.length>1?years[years.length-2]:null;
  const editable=canEditPresentation();
  let accts=topProdAccounts();
  // ค้นหา
  const q=(ui.topSearch||"").trim().toLowerCase();
  if(q) accts=accts.filter(a=>a.name.toLowerCase().includes(q));
  // จัดเรียง
  const rev=(a,y)=>a.byYear[y]?a.byYear[y].rev:0, rn=(a,y)=>a.byYear[y]?a.byYear[y].rn:0;
  const deltaRev=a=>older!=null?(rev(a,newest)-rev(a,older)):rev(a,newest);
  const sorters={ rev:(a,b)=>rev(b,newest)-rev(a,newest), rn:(a,b)=>rn(b,newest)-rn(a,newest),
    delta:(a,b)=>deltaRev(b)-deltaRev(a), name:(a,b)=>a.name.localeCompare(b.name,"th") };
  accts.sort(sorters[ui.topSort]||sorters.rev);
  const totRevNewest=totals[newest]?totals[newest].rev:0;
  // ลูกค้าใหม่/หายไป (เทียบ 2 ปีล่าสุดที่เลือก)
  let nNew=0,nDrop=0;
  if(older!=null){ topProdAccounts().forEach(a=>{ const ro=rev(a,older),rnw=rev(a,newest); if(ro===0&&rnw>0)nNew++; if(ro>0&&rnw===0)nDrop++; }); }
  const scopeName = ui.topScope==="group" ? "ทุกโรงแรม (รวม)" : (hotelById(ui.topScope)?.name||"");

  const yearChips = avail.map(y=>`<button onclick="toggleTopYear(${y})" class="tab-pill px-3 py-1 rounded-full text-xs ${years.includes(y)?'active':''}" style="border:1px solid ${years.includes(y)?'#0e7490':'var(--line)'};">${years.includes(y)?'✓ ':''}${y}</button>`).join("")
    + years.filter(y=>!avail.includes(y)).map(y=>`<button onclick="toggleTopYear(${y})" class="tab-pill active px-3 py-1 rounded-full text-xs" style="border:1px dashed #0e7490;" title="ปีที่เพิ่มเอง (ยังไม่มีข้อมูล)">✓ ${y} ✚</button>`).join("")
    + `<button onclick="addTopYearPrompt()" class="btn btn-ghost text-xs px-2.5 py-1 rounded-full" title="เพิ่มปีที่ต้องการเปรียบเทียบ">＋ เพิ่มปี</button>`;

  const kpis = years.map(y=>{
    const t=totals[y]||{rn:0,rev:0,accts:0};
    return kpiCard("ปี "+y, fmtM(t.rev), "Room Nights "+Number(t.rn).toLocaleString("th-TH")+" · "+t.accts+" บัญชี", G.account);
  }).join("");

  const yearColsHead = years.map(y=>`<th class="text-right px-2" style="border-left:1px solid #eef2f6"><span class="text-slate-600 font-bold">${y}</span><div class="text-[10px] font-normal text-slate-400">RN · ยอดขาย · ADR</div></th>`).join("");
  const rowsHtml = accts.map((a,i)=>{
    const cells=years.map(y=>{ const v=a.byYear[y]||{rn:0,rev:0}; const adr=v.rn?Math.round(v.rev/v.rn):0;
      return `<td class="text-right px-2 whitespace-nowrap" style="border-left:1px solid #f1f5f9">
        <div>${v.rn?Number(v.rn).toLocaleString("th-TH"):'<span class="text-slate-300">—</span>'}</div>
        <div class="font-semibold" style="color:#0e7490">${v.rev?fmtMoney(v.rev):'<span class="text-slate-300 font-normal">—</span>'}</div>
        <div class="text-[11px] text-slate-400">${adr?('฿'+adr.toLocaleString("th-TH")):''}</div></td>`; }).join("");
    const dRev=deltaRev(a); const ro=older!=null?rev(a,older):null; const rnw=rev(a,newest);
    let status,scol,sbg;
    if(older!=null && ro===0 && rnw>0){ status="ใหม่"; scol="#166534"; sbg="#dcfce7"; }
    else if(older!=null && ro>0 && rnw===0){ status="หายไป"; scol="#991b1b"; sbg="#fee2e2"; }
    else if(older==null){ status="—"; scol="#64748b"; sbg="#f1f5f9"; }
    else if(dRev>0){ status="▲ โต"; scol="#166534"; sbg="#dcfce7"; }
    else if(dRev<0){ status="▼ ลด"; scol="#9a3412"; sbg="#ffedd5"; }
    else { status="คงที่"; scol="#64748b"; sbg="#f1f5f9"; }
    const share=totRevNewest?rnw/totRevNewest*100:0;
    const deltaHtml = older!=null ? `<span style="color:${dRev>0?'#166534':(dRev<0?'#9a3412':'#64748b')}">${dRev>0?'+':''}${fmtMoney(dRev)}</span>` : '<span class="text-slate-300">—</span>';
    return `<tr class="border-b last:border-0 hover:bg-slate-50">
      <td class="py-1.5 pr-1 text-slate-400 text-right">${i+1}</td>
      <td class="py-1.5 pr-2 font-medium">${escHtml(a.name)}${ui.topScope==="group"?`<div class="text-[11px] text-slate-400">${[...a.hotels].map(h=>hotelById(h)?.name?.replace("Plaai ","")||h).join(" · ")}</div>`:""}</td>
      ${cells}
      <td class="text-right px-2 whitespace-nowrap" style="border-left:1px solid #eef2f6">${deltaHtml}</td>
      <td class="text-right px-2">${share?share.toFixed(1)+"%":'<span class="text-slate-300">—</span>'}</td>
      <td class="text-center px-2"><span class="badge" style="background:${sbg};color:${scol}">${status}</span></td>
    </tr>`;
  }).join("") || `<tr><td colspan="${3+years.length+3}" class="py-4 text-center text-slate-400">— ไม่พบข้อมูลตามเงื่อนไข —</td></tr>`;

  return `
  <div class="mb-4 flex flex-wrap items-end justify-between gap-3">
    <div>
      <div class="text-2xl font-bold text-slate-800">🏆 Top Production</div>
      <div class="text-sm text-slate-500">ลูกค้า/ช่องทางที่ทำยอดสูงสุด — เปรียบเทียบรายปี · ${scopeName}</div>
    </div>
    ${editable?`<button onclick="openTopPartnerAdd()" class="btn btn-primary text-xs px-3 py-2">＋ เพิ่มรายการ</button>`:""}
  </div>

  <div class="card p-3 mb-4 flex flex-wrap items-center gap-3">
    <div class="flex items-center gap-1 flex-wrap">
      <button onclick="setTopScope('group')" class="tab-pill px-3 py-1.5 rounded-full text-sm ${ui.topScope==='group'?'active':''}">ภาพรวมทุกโรงแรม</button>
      ${visibleHotels().map(h=>`<button onclick="setTopScope('${h.id}')" class="tab-pill px-3 py-1.5 rounded-full text-sm ${ui.topScope===h.id?'active':''}">${h.name.replace("Plaai ","")}</button>`).join("")}
    </div>
    <div class="flex-1"></div>
    <input value="${escAttr(ui.topSearch||'')}" oninput="setTopSearch(this.value)" placeholder="🔍 ค้นหาชื่อลูกค้า/ช่องทาง" class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm" style="min-width:220px"/>
  </div>

  <div class="card p-3 mb-4">
    <div class="flex flex-wrap items-center gap-2">
      <span class="text-xs text-slate-500 font-semibold">ปีที่เปรียบเทียบ:</span>
      ${yearChips}
      <div class="flex-1"></div>
      <span class="text-xs text-slate-500">จัดเรียง:</span>
      <select onchange="setTopSort(this.value)" class="btn btn-ghost text-xs px-2 py-1">
        <option value="rev" ${ui.topSort==='rev'?'selected':''}>ยอดขาย (ปีล่าสุด)</option>
        <option value="rn" ${ui.topSort==='rn'?'selected':''}>Room Nights (ปีล่าสุด)</option>
        <option value="delta" ${ui.topSort==='delta'?'selected':''}>การเปลี่ยนแปลง (Δ)</option>
        <option value="name" ${ui.topSort==='name'?'selected':''}>ชื่อ (ก-ฮ)</option>
      </select>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-${Math.min(4,Math.max(2,years.length))} gap-3 mb-4">
    ${kpis}
    ${older!=null?kpiCard("ลูกค้าใหม่ / หายไป", nNew+" / "+nDrop, "เทียบ "+older+" → "+newest, G.warn):""}
  </div>

  <div class="card p-4 mb-5">
    <div class="section-title mb-2">อันดับลูกค้า/ช่องทาง — ${scopeName}</div>
    <div class="overflow-x-auto">
    <table class="w-full text-sm" style="min-width:${560+years.length*160}px">
      <thead><tr class="text-left text-slate-500 border-b">
        <th class="py-1 pr-1 text-right">#</th><th class="py-1 pr-2">ลูกค้า / ช่องทาง</th>
        ${yearColsHead}
        <th class="text-right px-2" style="border-left:1px solid #eef2f6">Δ ยอดขาย${older!=null?` (${older}→${newest})`:''}</th>
        <th class="text-right px-2">%สัดส่วน ${newest}</th>
        <th class="text-center px-2">สถานะ</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    </div>
    <div class="text-xs text-slate-400 mt-2">ADR = ยอดขาย ÷ Room Nights · %สัดส่วน = ยอดขายของบัญชีนั้น ÷ ยอดรวมปีล่าสุด · "ใหม่/หายไป" เทียบ ${older!=null?older+" → "+newest:"ปีเดียว (ต้องเลือก ≥2 ปี)"}</div>
  </div>

  <div class="card p-4 mb-5">
    <div class="section-title mb-2">Top 10 ลูกค้า (ปีล่าสุด ${newest}) — เทียบรายปี</div>
    <canvas id="topprod-bar" height="260"></canvas>
  </div>

  ${editable?`<div class="card p-4 mb-5">
    <div class="section-title mb-2">รายการทั้งหมด (แก้ไข/ลบรายรายการ) — ${scopeName}</div>
    <div class="text-xs text-slate-400 mb-2">แต่ละแถว = 1 รายการต่อปี · ใช้แก้ตัวเลข/ลบข้อมูลที่ผิด</div>
    <div class="overflow-x-auto" style="max-height:340px;overflow-y:auto">

    </div>
    <div class="text-xs text-slate-400 mt-1">แสดงสูงสุด 400 รายการแรก · ใช้ช่องค้นหาด้านบนเพื่อกรอง</div>

function drawTopProdCharts(){

  const labels=accts.map(a=>a.name.length>22?a.name.slice(0,20)+"…":a.name);
  const palette=["#0e7490","#cbd5e1","#0f766e","#f59e0b","#7c3aed","#0369a1"];
  const datasets=years.map((y,i)=>({ label:String(y), data:accts.map(a=>a.byYear[y]?a.byYear[y].rev:0), backgroundColor:palette[i%palette.length], borderRadius:5 }));
  window.__chartRefs["topprod-bar"]=new Chart(c.getContext("2d"),{ type:"bar",

function setActivityDateFrom(v){ ui.activityFrom=v||addDaysStr(todayStr(),-29); if(!ui.activityTo||ui.activityTo<ui.activityFrom)ui.activityTo=ui.activityFrom; render(); }
function setActivityDateTo(v){ ui.activityTo=v||todayStr(); if(!ui.activityFrom||ui.activityFrom>ui.activityTo)ui.activityFrom=ui.activityTo; render(); }
function setYear(y){ ui.year=Number(y); render(); }
function setOwnerTab(id){ ui.ownerTab=id; render(); }
function setOwnerYear(y){ ui.ownerYear=Number(y); if(ui.ownerYearB===ui.ownerYear) ui.ownerYearB=ui.ownerYear-1; render(); }
function setOwnerYearB(y){ ui.ownerYearB=Number(y); render(); }
function swapOwnerYears(){ const a=ui.ownerYear, b=ui.ownerYearB; ui.ownerYear=b; ui.ownerYearB=a; render(); }
function addYear(){
  if(!guardManage())return;
  const mx = db.years.length ? Math.max.apply(null,db.years) : new Date().getFullYear();
  const input = prompt("เพิ่มปีที่ต้องการบันทึกข้อมูล (ค.ศ. เช่น "+(mx+1)+")", String(mx+1));
  if(input===null) return;                       // กดยกเลิก
  const yr = parseInt(String(input).trim(),10);
  if(!yr || yr<2000 || yr>2100){ alert("กรุณากรอกปีเป็น ค.ศ. ระหว่าง 2000–2100"); return; }
  if(db.years.includes(yr)){ alert("มีปี "+yr+" อยู่แล้ว"); ui.year=yr; ui.ownerYear=yr; render(); return; }
  db.years.push(yr);
  db.years = db.years.map(Number).sort((a,b)=>a-b);
  ui.year=yr; ui.ownerYear=yr;                    // เด้งไปที่ปีที่เพิ่งเพิ่ม
  saveData(); render();
}
function setToday(v){ ui.today = v || null; render(); }

function addTargetYear(){
  if(!guardTargets()) return;
  const mx=db.years.length?Math.max(...db.years):new Date().getFullYear();
  const input=prompt("เพิ่มปี Target (ค.ศ.)",String(mx+1)); if(input===null) return;

function updateTargetPageTotal(){

  });

  if(!guardTargets()) return;

// ============================================================
function feedbackRows(){
  const rows=[
    ...db.pipeline.map(x=>({item:x,kind:"group_ro",collection:"pipeline",name:x.accountName,date:x.closedDate||x.serviceEndDate||x.serviceStartDate||x.expectedCloseDate||""})),
    ...db.functionEvents.map(x=>({item:x,kind:"function",collection:"functionEvents",name:x.clientName,date:x.closedDate||x.eventEndDate||x.eventDate||""}))
  ];
  return rows.filter(r=>{
    const x=r.item;
    const hasContent=x.workClosed||(x.feedbackFiles||[]).length||x.customerFeedback||x.salesObstacle||x.salesSuggestion||Number(x.feedbackRating)>0;
    if(!hasContent) return false;
    if(isSales()&&x.salesId!==mySalesId()) return false;
    if(CLOUD&&isHM()&&!allowedHotelIds().includes(x.hotelId)) return false;
    return true;
  }).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
}
function feedbackFileGallery(row){
  const files=Array.isArray(row.item.feedbackFiles)?row.item.feedbackFiles:[];
  if(!files.length) return `<div class="text-xs text-amber-700 bg-amber-50 rounded-lg px-3 py-2">ยังไม่มีรูปหรือ PDF ประเมินหลังใช้บริการ</div>`;
  return `<div class="flex flex-wrap gap-2">${files.map((f,i)=>{
    const imageFile=String(f.type||"").startsWith("image/");
    return `<button type="button" onclick="openFeedbackFile('${row.collection}','${row.item.id}',${i})" class="rounded-lg border border-slate-200 bg-white overflow-hidden text-left" style="width:112px" title="เปิด ${escAttr(f.name||'ไฟล์ Feedback')}">
      ${imageFile&&f.data?`<img src="${f.data}" alt="${escAttr(f.name||'Feedback')}" style="width:112px;height:76px;object-fit:cover"/>`:`<div class="flex items-center justify-center bg-rose-50 text-2xl" style="width:112px;height:76px">📄</div>`}
      <div class="px-2 py-1 text-xs truncate">${escHtml(f.name||"Feedback")}</div></button>`;
  }).join("")}</div>`;
}
function openFeedbackCenter(){
  if(!guardFeedback()) return;
  const mk=currentMonthKey();
  if(!ui.feedbackFrom) ui.feedbackFrom=mk;
  if(!ui.feedbackTo) ui.feedbackTo=mk;
  ui.page="feedbackCenter"; render();
}
function closeFeedbackCenter(){ ui.page=null; render(); }
function setFeedbackFilter(part,value){
  if(part==="year"&&value){ const y=Number(value)||currentYear(); ui.feedbackYear=y; ui.feedbackFrom=y+"-01"; ui.feedbackTo=y+"-12"; }
  if(part==="from"){ ui.feedbackFrom=value; ui.feedbackYear=null; }
  if(part==="to"){ ui.feedbackTo=value; ui.feedbackYear=null; }
  if(part==="hotel") ui.feedbackHotel=value;
  if(part==="status") ui.feedbackStatus=value;
  render();
}
function renderFeedbackCenter(){
  if(!canViewFeedback()) return `<div class="card p-8 text-center text-rose-600">บัญชีนี้ไม่มีสิทธิ์เข้าถึงหน้า Feedback งาน</div>`;
  const all=feedbackRows();
  const cy=currentYear();
  let fromKey=ui.feedbackFrom||currentMonthKey(), toKey=ui.feedbackTo||currentMonthKey();
  if(fromKey>toKey){ const tmp=fromKey; fromKey=toKey; toKey=tmp; }
  ui.feedbackFrom=fromKey; ui.feedbackTo=toKey;
  const presetYear=fromKey.slice(5)==="01"&&toKey.slice(5)==="12"&&fromKey.slice(0,4)===toKey.slice(0,4)?Number(fromKey.slice(0,4)):null;
  const years=[...new Set([...(db.years||[]),...systemYearRange(),...all.map(r=>Number((r.date||"").slice(0,4))).filter(Boolean)])].sort((a,b)=>b-a);
  const hotel=ui.feedbackHotel||"all", status=ui.feedbackStatus||"all";
  const rows=all.filter(r=>ymKey(r.date)>=fromKey && ymKey(r.date)<=toKey && (hotel==="all"||r.item.hotelId===hotel) &&
    (status==="all"||(status==="closed"&&r.item.workClosed)||(status==="missing"&&r.item.workClosed&&!(r.item.feedbackFiles||[]).length&&!r.item.customerFeedback)));
  const closed=rows.filter(r=>r.item.workClosed).length;
  const withCustomer=rows.filter(r=>(r.item.feedbackFiles||[]).length||r.item.customerFeedback||Number(r.item.feedbackRating)>0).length;
  const withSalesIssue=rows.filter(r=>r.item.salesObstacle||r.item.salesSuggestion).length;
  const ratings=rows.map(r=>Number(r.item.feedbackRating)||0).filter(Boolean);
  const avg=ratings.length?ratings.reduce((s,n)=>s+n,0)/ratings.length:0;
  return `<div class="flex flex-wrap items-start justify-between gap-3 mb-5">
    <div><div class="text-2xl font-bold text-slate-800">💬 Feedback งานหลังใช้บริการ</div>
      <div class="text-sm text-slate-500">รวมหลักฐานประเมินจากลูกค้า และแยกอุปสรรค/ข้อเสนอแนะที่มาจากฝ่ายขาย เพื่อใช้ปรับปรุงการทำงาน</div></div>
    <button onclick="closeFeedbackCenter()" class="btn btn-ghost text-sm px-3 py-2">← กลับ</button>
  </div>
  <div class="card p-4 mb-5 flex flex-wrap items-end gap-3">

      ${presetYear?"" : `<option value="" selected>ช่วงที่กำหนดเอง</option>`}
      ${years.map(yy=>`<option value="${yy}" ${yy===presetYear?"selected":""}>ปี ${yy}</option>`).join("")}</select></label>
    <label class="text-xs text-slate-500">ตั้งแต่เดือน<input type="month" value="${fromKey}" onchange="setFeedbackFilter('from',this.value)" class="block btn btn-ghost text-sm px-3 py-2 mt-1"/></label>
    <label class="text-xs text-slate-500">ถึงเดือน<input type="month" value="${toKey}" onchange="setFeedbackFilter('to',this.value)" class="block btn btn-ghost text-sm px-3 py-2 mt-1"/></label>
    <label class="text-xs text-slate-500">โรงแรม<select onchange="setFeedbackFilter('hotel',this.value)" class="block btn btn-ghost text-sm px-3 py-2 mt-1"><option value="all">ทุกโรงแรม</option>${visibleHotels().map(h=>`<option value="${h.id}" ${hotel===h.id?"selected":""}>${escHtml(h.name)}</option>`).join("")}</select></label>
    <label class="text-xs text-slate-500">สถานะ<select onchange="setFeedbackFilter('status',this.value)" class="block btn btn-ghost text-sm px-3 py-2 mt-1"><option value="all">ทั้งหมด</option><option value="closed" ${status==="closed"?"selected":""}>ปิดงานแล้ว</option><option value="missing" ${status==="missing"?"selected":""}>ปิดแล้ว แต่ยังไม่มี Feedback ลูกค้า</option></select></label>
  </div>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
    ${kpiCard("งานที่ปิดแล้ว",closed,monthLabel(fromKey)+" ถึง "+monthLabel(toKey),G.onhand)}
    ${kpiCard("มี Feedback ลูกค้า",withCustomer,"มีไฟล์ คะแนน หรือความคิดเห็น",G.account)}
    ${kpiCard("ฝ่ายขายแจ้งปัญหา/ข้อเสนอ",withSalesIssue,"เสียงจากทีมขาย",G.warn)}
    ${kpiCard("คะแนนลูกค้าเฉลี่ย",ratings.length?avg.toFixed(1)+" / 5":"—",ratings.length+" งานที่มีคะแนน",G.pipeline)}
  </div>
  <div class="space-y-4">${rows.map(r=>{const x=r.item,cat=saleCategoryOf(x,r.kind);return `<div class="card p-5">
    <div class="flex flex-wrap items-start justify-between gap-3 mb-4">
      <div><div class="flex flex-wrap items-center gap-2"><span class="badge ${cat==="function"?'bg-amber-100 text-amber-800':'bg-sky-100 text-sky-800'}">${B2B_CATEGORIES[cat]||cat}</span>${x.workClosed?'<span class="badge bg-teal-100 text-teal-800">✓ ปิดงานแล้ว</span>':'<span class="badge bg-slate-100 text-slate-600">กำลังติดตาม</span>'}</div>
        <div class="font-bold text-lg text-slate-800 mt-2">${escHtml(r.name||"-")}</div><div class="text-xs text-slate-400 mt-1">${hotelById(x.hotelId)?.name||"-"} · ${salesById(x.salesId)?.name||"-"} · ${r.date||"ไม่ระบุวันที่"}</div></div>
      <div class="text-right"><div class="text-amber-500 text-lg">${Number(x.feedbackRating)>0?"★".repeat(Number(x.feedbackRating)):""}</div>${canEditSales(x.salesId)?`<button onclick="openSaleModal('${r.kind}','${x.id}')" class="text-cyan-700 text-xs mt-1">แก้ไข / เพิ่ม Feedback</button>`:""}</div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div><div class="text-xs font-bold text-slate-500 mb-2">ไฟล์ Feedback ลูกค้า</div>${feedbackFileGallery(r)}</div>
      <div class="rounded-xl bg-cyan-50 p-3"><div class="text-xs font-bold text-cyan-800 mb-1">เสียงจากลูกค้า</div><div class="text-sm text-slate-700 whitespace-pre-line">${escHtml(x.customerFeedback||"ยังไม่มีความคิดเห็นจากลูกค้า")}</div></div>
      <div class="rounded-xl bg-amber-50 p-3"><div class="text-xs font-bold text-amber-800 mb-1">อุปสรรค / ปัญหาที่ฝ่ายขายพบ</div><div class="text-sm text-slate-700 whitespace-pre-line">${escHtml(x.salesObstacle||"ยังไม่ได้ระบุ")}</div><div class="border-t border-amber-200 mt-3 pt-2 text-xs font-bold text-amber-800">ข้อเสนอแนะจากฝ่ายขาย</div><div class="text-sm text-slate-700 whitespace-pre-line mt-1">${escHtml(x.salesSuggestion||"ยังไม่ได้ระบุ")}</div></div>
    </div>
  </div>`;}).join("")||`<div class="card p-8 text-center text-slate-400">ยังไม่มี Feedback งานตามตัวกรองนี้</div>`}</div>`;

function deletePipeline(id){ const it=db.pipeline.find(p=>p.id===id); if(!it)return; if(!guardSales(it.salesId))return; if(!confirm("ลบรายการ Pipeline นี้?"))return; db.pipeline=db.pipeline.filter(p=>p.id!==id); saveData(); render(); }
function deleteFunction(id){ const it=db.functionEvents.find(f=>f.id===id); if(!it)return; if(!guardSales(it.salesId))return; if(!confirm("ลบงาน Function นี้?"))return; db.functionEvents=db.functionEvents.filter(f=>f.id!==id); saveData(); render(); }
function deleteActivity(id){ const it=db.activities.find(a=>a.id===id); if(!it)return; if(!guardSales(it.salesId))return; if(!confirm("ลบกิจกรรมนี้?"))return; db.activities=db.activities.filter(a=>a.id!==id); saveData(); render(); }
function deleteAccount(id){ const it=db.accounts.find(a=>a.id===id); if(!it)return; if(!guardSales(it.salesId))return; if(!confirm("ลบ Account นี้?"))return; db.accounts=db.accounts.filter(a=>a.id!==id); saveData(); render(); }

function modalShell(title,bodyHtml,onSubmitFn,extraFooter){
  return `
  <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50" onclick="if(event.target===this) closeModal()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-xl mx-4 max-h-[90vh] overflow-y-auto">
      <div class="px-5 py-4 border-b flex justify-between items-center">
        <div class="font-semibold text-lg text-slate-800">${title}</div>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700">✕</button>
      </div>
      <form id="modalForm" class="px-5 py-4 space-y-3" onsubmit="return false;">
        ${bodyHtml}
        <div class="pt-3 pb-1 flex justify-between items-center gap-2 sticky bottom-0 bg-white border-t" style="z-index:2;">
          <div>${extraFooter||""}</div>
          <div class="flex gap-2">
            <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm rounded-lg border">ยกเลิก</button>
            <button id="modalSaveBtn" type="button" onclick="${onSubmitFn}()" class="btn btn-primary px-4 py-2 text-sm">บันทึก</button>

        </div>

    </div>

}

function submitActivity(){
  const id=val("f_id");
  const salesId = isSales() ? mySalesId() : val("f_sales");
  if(!guardSales(salesId)) return;
  if(id){ const old=db.activities.find(a=>a.id===id); if(!old||!guardSales(old.salesId)) return;

  } else db.activities.unshift({ id:uid("act"), date:val("f_date"), salesId, hotelId:val("f_hotel"),
    type:val("f_type"), accountName:val("f_account"), notes:val("f_notes") });
