// ---------- QUOTATION ----------
function quoteTotals(q){
  let sub=0; (q.items||[]).forEach(it=>{ sub+=(Number(it.unitPrice)||0)*(Number(it.qty)||0)*(Number(it.days)||1); });
  const disc=Number(q.discount)||0; const net=Math.max(0,sub-disc);
  if(q.priceIncl){ return { sub, disc, net, service:0, vat:0, total:net, incl:true }; }
  const service=net*(Number(q.svcPct)||0)/100;
  const vat=(net+service)*(Number(q.vatPct)||0)/100;
  return { sub, disc, net, service, vat, total:net+service+vat, incl:false };
}
function qtRowHtml(it){
  it=it||{};
  return `<tr class="qt-row border-b">
    <td class="p-1"><input class="qt-desc border rounded px-1 py-1 text-xs w-full" value="${escAttr(it.desc||"")}" placeholder="รายการ เช่น อาหารกลางวันบุฟเฟ่ต์"/></td>
    <td class="p-1"><input type="number" class="qt-price border rounded px-1 py-1 text-xs text-right" value="${it.unitPrice!=null?it.unitPrice:""}" oninput="recalcQuote()" style="width:100px;"/></td>
    <td class="p-1"><input type="number" class="qt-qty border rounded px-1 py-1 text-xs text-right" value="${it.qty!=null?it.qty:""}" oninput="recalcQuote()" style="width:80px;"/></td>
    <td class="p-1"><input type="number" class="qt-days border rounded px-1 py-1 text-xs text-right" value="${it.days!=null?it.days:1}" oninput="recalcQuote()" style="width:70px;"/></td>
    <td class="p-1 text-right qt-amt text-xs font-semibold" style="min-width:90px;">0.00</td>
    <td class="p-1"><button type="button" onclick="this.closest('tr').remove();recalcQuote()" class="text-rose-400 text-xs">✕</button></td>
  </tr>`;
}
function addQtRow(){ document.getElementById("qtItems").insertAdjacentHTML("beforeend", qtRowHtml({days:1})); }
function recalcQuote(){
  let sub=0;
  document.querySelectorAll("#qtItems .qt-row").forEach(tr=>{
    const p=Number(tr.querySelector(".qt-price").value)||0;
    const q=Number(tr.querySelector(".qt-qty").value)||0;
    const d=Number(tr.querySelector(".qt-days").value)||1;
    const amt=p*q*d; tr.querySelector(".qt-amt").textContent=bahtFmt(amt); sub+=amt;
  });
  const disc=Number(val("f_discount"))||0;
  const incl=document.getElementById("f_incl") && document.getElementById("f_incl").checked;
  const svc=Number(val("f_svc"))||0, vatp=Number(val("f_vat"))||0;
  const net=Math.max(0,sub-disc);
  let service=0,vat=0,total=net;
  if(!incl){ service=net*svc/100; vat=(net+service)*vatp/100; total=net+service+vat; }
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent="฿"+bahtFmt(v); };
  set("qtSub",sub); set("qtNet",net); set("qtSvc",service); set("qtVat",vat); set("qtTotal",total);
  const sw=document.getElementById("qtTaxWrap"); if(sw) sw.style.display= incl?"none":"";
}

function renderBeoPrint(){

      <td style="padding:6px;border:1px solid #e2e8f0;">${r.done?"✔":""}</td>

      <td style="padding:6px;border:1px solid #e2e8f0;">${escHtml(r.phone||"")}</td>
      <td style="padding:6px;border:1px solid #e2e8f0;">${escHtml(r.note||"")}</td></tr>`).join("");

    <div style="font-size:13px;margin-bottom:12px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div><b>ถึง:</b> ${escHtml(b.toDept||"")}</div>
        <div style="text-align:right;"><b>รหัสงาน:</b> ${escHtml(o.code||"")} ${o.boNo?`· <b>${escHtml(o.boNo)}</b>`:""}</div>
        <div><b>ลูกค้า/หน่วยงาน:</b> ${escHtml(o.customerName||"")}</div>
        <div style="text-align:right;"><b>ผู้จัด:</b> ${escHtml(o.contactPerson||"")} ${o.phone?" · "+escHtml(o.phone):""}</div>

        <div style="text-align:right;"><b>วันจัดงาน:</b> ${o.eventDate?shortDateLabel(o.eventDate):""} · ${o.pax||"-"} PAX · ${escHtml(b.venue||"")}</div>

    <div style="font-weight:700;font-size:14px;margin:10px 0 4px;">รายการค่าใช้จ่าย</div>

      <thead><tr style="background:#f1f5f9;"><th style="padding:6px;border:1px solid #e2e8f0;">วันที่</th><th style="padding:6px;border:1px solid #e2e8f0;text-align:left;">รายการ</th><th style="padding:6px;border:1px solid #e2e8f0;">ราคา</th><th style="padding:6px;border:1px solid #e2e8f0;">จำนวน</th><th style="padding:6px;border:1px solid #e2e8f0;">วัน/มื้อ</th><th style="padding:6px;border:1px solid #e2e8f0;">รวม</th></tr></thead>

    ${agRows?`<div style="font-weight:700;font-size:14px;margin:14px 0 4px;">กำหนดการจัดงาน</div>

    ${briefRows?`<div style="font-weight:700;font-size:14px;margin:14px 0 4px;">นัดบรีฟงาน${o.briefDate?" — "+shortDateLabel(o.briefDate)+(o.briefTime?" "+escHtml(o.briefTime):""):""}${o.briefOwner?" · โดย "+escHtml(o.briefOwner):""}</div>

      <thead><tr style="background:#f1f5f9;"><th style="padding:6px;border:1px solid #e2e8f0;">บรีฟแล้ว</th><th style="padding:6px;border:1px solid #e2e8f0;">แผนก</th><th style="padding:6px;border:1px solid #e2e8f0;">ผู้รับผิดชอบ</th><th style="padding:6px;border:1px solid #e2e8f0;">เบอร์</th><th style="padding:6px;border:1px solid #e2e8f0;text-align:left;">หมายเหตุ</th></tr></thead>
      <tbody>${briefRows}</tbody></table>`:""}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:36px;font-size:12px;text-align:center;color:#64748b;">

      <div>_______________________________<br>Approved by ${b.approvedBy?"("+escHtml(b.approvedBy)+")":""}</div>

  </div>`;
}

async function initCloud(){
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(session){ currentUser = session.user; await cloudBootstrap(); }
    else { renderLogin(); }
  }catch(e){
    console.error(e); renderLogin("เชื่อมต่อระบบไม่สำเร็จ กรุณาลองใหม่");
  }
}

// ---- เฝ้าดูวันที่จริง: ถ้าข้ามวัน (เช่นเปิดแอปค้างข้ามคืน) ให้รีเฟรชเอง เพื่อให้แจ้งเตือน 30 วันแม่นยำ ----
let __lastRealDate = realToday();
function startDateWatch(){
  setInterval(()=>{
    const d=realToday();
    if(d!==__lastRealDate){
      __lastRealDate=d;
      if(typeof db!=="undefined" && db && !isUserBusy()) render();  // ไม่รีเฟรชทับตอนกำลังพิมพ์
    }
  }, 60*1000);  // ตรวจทุก 1 นาที
}

// ============================================================
// INIT
// ============================================================
if (CLOUD && sb){
  initCloud();               // โหมดออนไลน์: ล็อกอินก่อน แล้วดึงข้อมูลจากคลาวด์
} else {
  loadData();                // โหมดออฟไลน์: ใช้ข้อมูลในเครื่อง (localStorage)
  render();
}
startDateWatch();            // อัปเดตวันที่/แจ้งเตือนอัตโนมัติตามวันจริง
// เมื่อผู้ใช้พิมพ์เสร็จ (เลิกโฟกัสช่องกรอก) แล้วมีอัปเดตจากทีมค้างอยู่ → รีเฟรชให้เห็นข้อมูลล่าสุด
document.addEventListener("focusout", ()=>{ setTimeout(flushPendingRender, 150); });
// ช่องวันที่ที่ถูกสร้างภายหลัง (เช่น Modal) ใช้ปฏิทินแบบกระชับเดียวกันอัตโนมัติ
new MutationObserver(changes=>changes.forEach(c=>c.addedNodes.forEach(n=>{ if(n.nodeType===1) enhanceDateInputs(n); }))).observe(document.getElementById("app"),{childList:true,subtree:true});
document.addEventListener("mousedown",e=>{ const p=document.getElementById("smartDatePop"); if(p&&smartDateState&&!p.contains(e.target)&&e.target!==smartDateState.button&&!smartDateState.button.contains(e.target)) closeSmartDate(); });
window.addEventListener("resize",positionSmartDate);
</script>
