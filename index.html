<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plaai Group — Sales Ops</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root{
    --brand:#0f3a52;         /* deep teal-navy */
    --brand-2:#12546f;
    --accent:#0e7490;        /* teal/cyan primary action */
    --accent-2:#0891b2;
    --pos:#0f766e;           /* teal-green (on hand / confirmed) */
    --warn:#c2760c;          /* muted amber */
    --danger:#be123c;        /* rose */
    --ink:#0f2233;
    --muted:#64748b;
    --line:#e6ebf0;
    --bg:#f4f7f9;
  }
  body { font-family: 'Inter','Segoe UI','Tahoma',sans-serif; color:#0f2233;
         background: linear-gradient(180deg,#eaf0f4 0%, #f4f7f9 240px, #f4f7f9 100%); }
  .modal-backdrop { background: rgba(10,28,45,0.55); backdrop-filter: blur(2px); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

  .tab-pill { transition: all .15s ease; }
  .tab-pill.active { background:#ffffff; color:var(--brand); font-weight:700; box-shadow:0 1px 3px rgba(15,58,82,0.18); }
  .tab-pill:not(.active) { color:#64748b; }
  .tab-pill:not(.active):hover { color:var(--brand); }

  .badge { display:inline-block; padding:2px 10px; border-radius:9999px; font-size:11px; font-weight:600; }
  .card { background:#fff; border-radius:16px; box-shadow:0 1px 2px rgba(15,23,42,0.05),0 1px 10px rgba(15,23,42,0.04); border:1px solid #eef2f6; }
  .card:hover { box-shadow:0 4px 16px rgba(15,23,42,0.07); }
  .kpi { border-radius:16px; padding:16px 18px; color:#fff; box-shadow:0 6px 18px rgba(15,58,82,0.14); }
  .kpi .lbl{ font-size:11px; opacity:.85; letter-spacing:.02em; }
  .kpi .num{ font-size:24px; font-weight:800; margin-top:4px; line-height:1.1; }
  .kpi .sub{ font-size:11px; opacity:.82; margin-top:4px; }

  .btn { border-radius:10px; font-weight:600; transition: all .15s ease; }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary{ background:var(--accent); color:#fff; box-shadow:0 2px 8px rgba(14,116,144,0.25); }
  .btn-primary:hover{ background:#0c6a86; }
  .btn-ghost{ background:#fff; border:1px solid var(--line); color:var(--ink); }
  .btn-ghost:hover{ border-color:#cbd5e1; }

  /* clean unified quick-add buttons: white chip + colored icon */
  .qbtn{ display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line);
         border-radius:11px; padding:8px 13px; font-size:13px; font-weight:600; color:var(--ink);
         transition:all .15s ease; box-shadow:0 1px 2px rgba(15,23,42,0.05); }
  .qbtn:hover{ transform:translateY(-1px); border-color:#cbd5e1; box-shadow:0 4px 10px rgba(15,23,42,0.09); }
  .qico{ width:22px; height:22px; border-radius:7px; display:inline-flex; align-items:center; justify-content:center;
         color:#fff; font-size:14px; font-weight:700; }

  select.pill-select { border:0; cursor:pointer; -webkit-appearance:none; appearance:none; padding-right:20px;
        background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 3.5L5 6.5L8 3.5' stroke='%23475569' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>");
        background-repeat:no-repeat; background-position:right 6px center; }
  select.pill-select:focus { outline: 2px solid #7dd3fc; }
  .fc-input{ width:110px; border:1px solid var(--line); border-radius:8px; padding:4px 8px; font-size:13px; text-align:right; }
  .fc-input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(14,116,144,0.15); }
  table th { font-weight:600; letter-spacing:.02em; }
  tbody tr:hover { background:#f8fafc; }
  .link-tag{ display:inline-block; font-size:10px; font-weight:700; color:var(--pos);
             background:#e6f6f2; border-radius:6px; padding:1px 6px; margin-left:6px; white-space:nowrap; }
  .progress-track{ height:10px; border-radius:9999px; background:#e5edf2; overflow:hidden; }
  .progress-fill{ height:100%; border-radius:9999px; background:linear-gradient(90deg,var(--accent),var(--pos)); }
  .stage-bar{ height:8px; border-radius:9999px; background:#eef2f6; overflow:hidden; }
  .section-title{ font-weight:700; color:#1e2a3a; }
  /* solid, clearly-visible quick-add buttons */
  .qbtn-solid{ display:inline-flex; align-items:center; gap:7px; color:#fff; border:0; border-radius:11px;
        padding:9px 15px; font-size:13px; font-weight:700; cursor:pointer;
        box-shadow:0 2px 6px rgba(15,23,42,0.20); transition:all .15s ease; }
  .qbtn-solid:hover{ transform:translateY(-1px); filter:brightness(1.08); box-shadow:0 5px 14px rgba(15,23,42,0.26); }
  .qbtn-solid .qi{ font-size:15px; font-weight:800; line-height:1; }

  /* โหมดดูอย่างเดียว (View only): ซ่อนปุ่มเพิ่ม/แก้ไข/ลบ ทั้งหมด ผู้ใช้ยังเลื่อนดู/สลับแท็บ/เลือกปีได้ */
  body.readonly [onclick*="Modal("],
  body.readonly [onclick^="delete"],
  body.readonly [onclick^="quickLogFor"],
  body.readonly [onclick^="addYear"],
  body.readonly .ro-hide,
  body.readonly .qbtn-solid { display:none !important; }
</style>
</head>

<div id="app"></div>

<script>
/* =========================================================
   PLAAI GROUP — SALES OPS  (client-side prototype)
   Redesign: easier sales workflow, two-bucket forecast
   (Pipeline + Function), results-only executive view,
   and everything auto-linked to On Hand.
   Data persists in this browser via localStorage.
   ========================================================= */

const STORAGE_KEY = "plaai_sales_ops_v3";

/* =========================================================
   CLOUD (Supabase) CONFIG
   ใส่ค่า 2 อย่างจากโปรเจกต์ Supabase ของคุณด้านล่างนี้:
   1) SUPABASE_URL      = Project URL   (Settings > API)
   2) SUPABASE_ANON_KEY = anon public key (Settings > API)
   ถ้าเว้นว่างไว้ แอปจะทำงานแบบออฟไลน์ (localStorage) เหมือนเดิม
   ========================================================= */
const SUPABASE_URL = "https://diffxgsxmztvccebgnol.supabase.co";// <-- วาง Project URL ที่นี่
const SUPABASE_ANON_KEY = "sb_publishable_m9ntF4MgZrk7wbIcXUL5rw_wUQEvWOT";  // <-- วาง anon public key ที่นี่
const CLOUD = !!(SUPABASE_URL && SUPABASE_ANON_KEY);

/* =========================================================
   สิทธิ์การใช้งานแบบแยกตำแหน่ง (ROLE-BASED ACCESS)
   ---------------------------------------------------------
   มี 4 ระดับสิทธิ์:
   • owner  (เจ้าของกิจการ) — ดูได้ทุกหน้า และ "แก้ไขได้ทุกอย่าง"
   • finance (ฝ่ายบัญชี)     — ดูได้ทุกหน้า แต่แก้ได้ "เฉพาะตัวเลขยอดขาย/รายได้" (หน้าเจ้าของ)
   • sales  (ฝ่ายขาย)        — ดูได้ทุกหน้า แต่แก้ได้ "เฉพาะข้อมูลของเซลล์ตัวเอง" เท่านั้น
   • viewer (อื่น ๆ)          — เข้าดูได้อย่างเดียว (View only)
   หมายเหตุ: ถ้าใช้งานแบบออฟไลน์ (ไม่ต่อคลาวด์) จะแก้ได้ทุกอย่างเหมือนเดิม
   ========================================================= */

/* อีเมลเจ้าของกิจการ (สิทธิ์สูงสุด แก้ได้ทุกหน้า) */
const OWNER_EMAILS = [
  "kunnsiri@gmail.com",
  "rda.plaai@gmail.com",
];

/* อีเมลฝ่ายบัญชี (ดูได้ทุกหน้า แต่แก้ได้เฉพาะตัวเลขยอดขาย/รายได้) */
const FINANCE_EMAILS = [
  "finance@p-plaai.com",
];

/* ผูก "อีเมลของฝ่ายขายแต่ละคน" กับ "รหัสเซลล์ (salesId)" ของตัวเอง
   - เซลล์คนนั้นจะแก้ได้เฉพาะข้อมูลของ salesId ตัวเอง (Pipeline/Function/Account/กิจกรรม/แผนงาน)
   - ค่าเริ่มต้น s1/s2/s3 = เซลล์ 1/2/3 ในระบบ  ← แก้ให้ตรงกับเซลล์จริงได้เลย
   - เพิ่มบรรทัดใหม่ได้ตามจำนวนพนักงานขาย เช่น "email@บริษัท": "s4"        */
const SALES_EMAILS = {
  "sales1.plaaihotel@p-plaai.com": "s1",
  "ales.plusbowin@p-plaai.com":    "s2",
  "salesco.plus@p-plaai.com":      "s3",
};

/* URL ของ Supabase Edge Function สำหรับส่งสรุปเข้า LINE (ดูคู่มือ LINE)
   - ถ้าใส่ไว้ ปุ่ม “ส่งเข้า LINE เลย” จะทำงานได้
   - ถ้าเว้นว่าง ยังใช้ปุ่มคัดลอก/ดาวน์โหลดข้อความสรุปได้ตามปกติ           */
const LINE_SUMMARY_FUNCTION_URL = ""; // เช่น "https://xxxx.functions.supabase.co/weekly-line-summary"

/* URL ของ Supabase Edge Function สำหรับ "ส่งรายงานเซลล์เข้าอีเมล" พร้อมไฟล์แนบ
   - ถ้าใส่ไว้ ปุ่ม "ส่งเข้าอีเมล" จะส่งอีเมลอัตโนมัติพร้อมไฟล์ Excel แนบ
   - ถ้าเว้นว่าง ปุ่มจะเปิดโปรแกรมอีเมลในเครื่อง (mailto) พร้อมข้อความสรุป
     และดาวน์โหลดไฟล์ Excel ให้แนบเองอัตโนมัติ                              */
const REPORT_EMAIL_FUNCTION_URL = ""; // เช่น "https://xxxx.functions.supabase.co/sales-report-email"

let sb = null;                 // Supabase client
let currentUser = null;        // ผู้ใช้ที่ล็อกอินอยู่
let applyingRemote = false;    // กันบันทึกซ้ำเมื่อรับข้อมูลจากคนอื่น
let cloudSaveTimer = null;     // debounce การบันทึกขึ้นคลาวด์
let cloudSnapshot = null;      // สำเนา db ที่ตรงกับคลาวด์ล่าสุด (ใช้หา “อะไรเปลี่ยน”)
let pendingRemoteRender = false; // มีอัปเดตจากทีมค้างอยู่ รอผู้ใช้พิมพ์เสร็จค่อยรีเฟรช
const CLIENT_ID = Math.random().toString(36).slice(2); // ระบุว่า update นี้มาจากเครื่องเรา
// ทุกคอลเลกชันที่ซิงค์ (แต่ละ “รายการ” มี id ของตัวเอง → บันทึกแยกกันได้ ไม่ทับกัน)
const CLOUD_COLLECTIONS = ["hotels","salesReps","accounts","pipeline","functionEvents","activities","forecasts","revenue"];
if (CLOUD && window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  // ความปลอดภัย: เก็บ session ไว้ใน sessionStorage (ไม่ใช่ localStorage)
  //  → ปิดหน้าต่าง/แท็บเมื่อไหร่ session จะหายทันที ต้องล็อกอินใหม่เสมอ
  //  (การรีเฟรชหน้าในแท็บเดิมยังอยู่ในระบบตามปกติ)
  auth: {
    storage: window.sessionStorage,
    storageKey: "plaai_auth",
    persistSession: true,
    autoRefreshToken: true,
  }
});

// ---------- สิทธิ์การใช้งาน (ROLE-BASED) ----------
function currentEmail(){ return (currentUser && currentUser.email || "").toLowerCase(); }
// หา salesId ของอีเมลนี้ (จาก config SALES_EMAILS หรือช่องอีเมลที่ผูกไว้กับตัวเซลล์)
function salesIdForEmail(em){
  em = (em||"").toLowerCase();
  for(const k in SALES_EMAILS){ if(k.toLowerCase()===em) return SALES_EMAILS[k]; }
  const rep = ((db && db.salesReps) || []).find(s=>(s.email||"").toLowerCase()===em && em);
  return rep ? rep.id : null;
}
function mySalesId(){ return salesIdForEmail(currentEmail()); }
// ตำแหน่งของผู้ใช้ปัจจุบัน: owner | finance | sales | viewer  (ออฟไลน์ = owner)
function userRole(){
  if(!CLOUD) return "owner";
  const em = currentEmail();
  if(OWNER_EMAILS.map(e=>e.toLowerCase()).includes(em)) return "owner";
  if(FINANCE_EMAILS.map(e=>e.toLowerCase()).includes(em)) return "finance";
  if(salesIdForEmail(em)) return "sales";
  return "viewer";
}
function isOwner(){ return userRole()==="owner"; }
function isFinance(){ return userRole()==="finance"; }
function isSales(){ return userRole()==="sales"; }

// แก้อะไรได้บ้างไหม (ไม่ใช่ viewer) — คงชื่อเดิมไว้เพื่อความเข้ากันได้
function canEdit(){ return userRole()!=="viewer"; }
// ดูอย่างเดียวทั้งระบบ = เฉพาะ viewer เท่านั้น (owner/finance/sales แก้ได้บางส่วน)
function readOnly(){ return CLOUD && userRole()==="viewer"; }
function roDisabled(){ return readOnly() ? "disabled" : ""; }

// แก้ข้อมูล "ของเซลล์คนนี้" ได้ไหม (owner=ทุกคน · sales=เฉพาะตัวเอง · finance/viewer=ไม่ได้)
function canEditSales(salesId){
  if(!CLOUD) return true;
  const r = userRole();
  if(r==="owner") return true;
  if(r==="sales") return mySalesId()===salesId;
  return false;
}
function dSales(salesId){ return canEditSales(salesId) ? "" : "disabled"; }
// แก้ตัวเลขยอดขาย/รายได้ (หน้าเจ้าของ) ได้ไหม — owner + finance
function canEditRevenue(){ if(!CLOUD) return true; const r=userRole(); return r==="owner"||r==="finance"; }
// แก้ Forecast ของฝ่ายขาย — owner + sales
function canEditForecast(){ if(!CLOUD) return true; const r=userRole(); return r==="owner"||r==="sales"; }
// แก้โครงสร้างระบบ (โรงแรม/เซลล์/เป้า/ปี/สำรองข้อมูล) — เจ้าของเท่านั้น
function canManage(){ if(!CLOUD) return true; return userRole()==="owner"; }
function guardSales(salesId){ if(canEditSales(salesId)) return true; alert("บัญชีนี้แก้ได้เฉพาะข้อมูลของเซลล์ตัวเองเท่านั้น"); return false; }
function guardRevenue(){ if(canEditRevenue()) return true; alert("เฉพาะเจ้าของกิจการหรือฝ่ายบัญชีเท่านั้นที่แก้ไขตัวเลขยอดขายได้"); return false; }
function guardManage(){ if(canManage()) return true; alert("เฉพาะเจ้าของกิจการเท่านั้นที่แก้ไขส่วนนี้ได้"); return false; }
// ป้ายบอกตำแหน่ง/สิทธิ์ที่มุมบนขวา
function roleBadgeHtml(){
  const r = userRole();
  const box = (txt,col)=>`<span class="text-xs font-semibold px-2 py-1 rounded" style="background:rgba(255,255,255,0.18);color:${col};">${txt}</span>`;
  if(r==="owner")   return box("👑 เจ้าของกิจการ · แก้ได้ทุกหน้า","#fde68a");
  if(r==="finance") return box("🧮 ฝ่ายบัญชี · แก้เฉพาะยอดขาย","#a7f3d0");
  if(r==="sales"){ const nm=salesById(mySalesId())?.name||"เซลล์"; return box("🧑‍💼 ฝ่ายขาย: "+nm+" · แก้เฉพาะของตัวเอง","#bae6fd"); }
  return box("👁 ดูอย่างเดียว","#fde68a");
}
// ผู้ใช้กำลังพิมพ์/เปิดหน้าต่างกรอกข้อมูลอยู่ไหม (จะได้ไม่รีเฟรชทับ)
function isUserBusy(){
  if(document.getElementById("modalForm")) return true;
  const a = document.activeElement;
  return !!(a && /^(INPUT|SELECT|TEXTAREA)$/.test(a.tagName));
}
function guardEdit(){ if(readOnly()){ alert("โหมดดูอย่างเดียว — บัญชีนี้ไม่มีสิทธิ์แก้ไขข้อมูล"); return false; } return true; }
const DEFAULT_ANNUAL_TARGET = 200000000; // 200 ล้านบาท/ปี (ค่าเริ่มต้น แก้ไขได้ต่อปี)
function targetFor(year){ return (db.targets && db.targets[year]!=null) ? Number(db.targets[year]) : DEFAULT_ANNUAL_TARGET; }

const DEFAULT_HOTELS = [
  { id:"prime",  name:"Plaai Prime",       sub:"ห้องอาหาร • อาหารเช้า • บาร์ • ห้องประชุม/Function", accent:"#0e7490",
    features:{ functionRoom:true, otaOnly:false } },
  { id:"saroch", name:"Plaai Plus สาโรช",   sub:"ห้องอาหาร • ห้องประชุม/Function", accent:"#0f766e",
    features:{ functionRoom:true, otaOnly:false } },
  { id:"play",   name:"Plaai Play",         sub:"ห้องอาหาร • อาหารเช้า • บาร์ • ห้องประชุม/Function", accent:"#155e75",
    features:{ functionRoom:true, otaOnly:false } },
  { id:"bowin",  name:"Plaai Plus บ่อวิน",   sub:"ห้องอาหาร • อาหารเช้า • บาร์ • ห้องประชุม/Function", accent:"#0369a1",
    features:{ functionRoom:true, otaOnly:false } },
  { id:"bowin2", name:"Plaai Plus บ่อวิน2",  sub:"ห้องอาหาร • อาหารเช้า • บาร์ • ห้องประชุม/Function", accent:"#334155",
    features:{ functionRoom:true, otaOnly:false } },
];

const DEFAULT_SALES_REPS = [
  { id:"s1", name:"เซลล์ 1" },
  { id:"s2", name:"เซลล์ 2" },
  { id:"s3", name:"เซลล์ 3" },
];

// HOTELS / SALES_REPS now point at the persisted arrays in `db`
// (populated by normalizeData -> syncLookups), so they can be added,
// edited, and deleted by the user and survive reloads via localStorage.
let HOTELS = DEFAULT_HOTELS.slice();
let SALES_REPS = DEFAULT_SALES_REPS.slice();

const ACTIVITY_TYPES = {
  call:"โทร/ติดต่อลูกค้า", visit:"เข้าพบลูกค้า", site:"พาลูกค้าดูสถานที่ (Site Inspection)",
  quote:"ส่งใบเสนอราคา", followup:"ติดตามงาน", beo:"จัดทำ/ส่ง BEO", other:"อื่น ๆ"
};
const PIPELINE_STAGES = { lead:"Lead", quoted:"Quoted", negotiation:"Negotiation", won:"ปิดได้แน่นอน (Won)", lost:"Lost" };
const FUNCTION_STATUS = { inquiry:"Inquiry", quoted:"Quoted", confirmed:"ยืนยันแล้ว (Confirmed)", beo_sent:"BEO Sent", completed:"Completed", cancelled:"Cancelled" };
const ACCOUNT_STATUS = { new:"New", active:"Active", dormant:"Dormant" };
const THAI_MONTHS = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

// statuses that count as "On Hand" (ยืนยัน/ปิดได้แล้ว)
const ONHAND_FN_STATUS = ["confirmed","beo_sent","completed"];

function fmtM(n){ n=Number(n)||0; const a=Math.abs(n);

function addMonthsKey(key,n){ let [y,m]=key.split("-").map(Number); m+=n; while(m>12){m-=12;y+=1;} while(m<1){m+=12;y-=1;} return y+"-"+String(m).padStart(2,"0"); }

// สร้างข้อมูลยอดขายตัวอย่าง (ปีนี้ถึงเดือนปัจจุบัน + ทั้งปีที่แล้ว) เพื่อให้หน้าเจ้าของมีกราฟให้ดูทันที
function genSampleRevenue(hotels, cy){
  const rows = [];
  const season = [0.9,0.95,1.05,1.0,0.95,0.9,0.92,0.98,1.0,1.1,1.15,1.2]; // ปัจจัยตามเดือน
  const nowM = Number(todayStr().slice(5,7));
  hotels.forEach((h,hi)=>{
    const base = 900000 + hi*250000;           // ฐานยอด/เดือน ต่างกันตามโรงแรม
    const mix  = [0.30,0.18,0.14,0.28,0.10];    // สัดส่วน OTA/FIT/Walkin/ฝ่ายขาย/อื่นๆ
    const build = (year, month, growth)=>{
      const tot = Math.round(base*season[month-1]*growth/1000)*1000;
      const e = { id:uid("rev"), hotelId:h.id, month:year+"-"+String(month).padStart(2,"0") };
      REVENUE_CH_KEYS.forEach((k,i)=>{ e[k] = Math.round(tot*(mix[i]||0)/1000)*1000; });
      return e;
    };
    for(let m=1;m<=12;m++) rows.push(build(cy-1, m, 1.0));            // ปีที่แล้ว ครบ 12 เดือน
    for(let m=1;m<=nowM;m++) rows.push(build(cy, m, 1.08+hi*0.01));   // ปีนี้ ถึงเดือนปัจจุบัน (โต ~8-13%)
  });
  return rows;
}

let db = null;

  try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw){ db=JSON.parse(raw); normalizeData(); return; } }catch(e){}

// keep the global HOTELS / SALES_REPS pointing at the persisted arrays
function syncLookups(){ HOTELS = db.hotels; SALES_REPS = db.salesReps; }
function normalizeData(){
  // hotels & sales reps are now persisted; fall back to defaults for old saves
  db.hotels = (db.hotels && db.hotels.length) ? db.hotels.map(h=>({ features:{ functionRoom:true, otaOnly:false }, accent:"#0e7490", sub:"", ...h, features:{ functionRoom:true, otaOnly:false, ...(h.features||{}) } })) : DEFAULT_HOTELS.map(h=>({ ...h, features:{ ...h.features } }));
  db.salesReps = (db.salesReps && db.salesReps.length) ? db.salesReps.map(s=>({ actionPlan:"", email:"", ...s })) : DEFAULT_SALES_REPS.map(s=>({ actionPlan:"", email:"", ...s }));
  syncLookups();
  db.accounts = (db.accounts||[]).map(a=>({ contactPerson:"", phone:"", lastContactTopic:"", ...a }));
  db.pipeline = db.pipeline||[]; db.functionEvents = db.functionEvents||[]; db.activities = db.activities||[];
  db.forecasts = (db.forecasts||[]).map(f=>{
    // migrate old single-value forecast -> two-bucket
    if (f.pipelineForecast===undefined && f.functionForecast===undefined){
      return { id:f.id, hotelId:f.hotelId, month:f.month,
               pipelineForecast:Number(f.forecastValue)||0, functionForecast:0, notes:f.notes||"" };
    }
    return { pipelineForecast:0, functionForecast:0, notes:"", ...f };
  });
  // ยอดขายรวมรายเดือน (5 ช่องทาง) สำหรับหน้าเจ้าของ
  db.revenue = (db.revenue||[]).map(r=>({ ota:0, fit:0, walkin:0, sales:0, other:0, lump:0, ...r }));
  const cy = new Date().getFullYear();
  db.years = (db.years && db.years.length) ? db.years : [cy];
  if(!db.years.includes(cy)) db.years.push(cy);
  db.years = db.years.map(Number).sort((a,b)=>a-b);
  db.targets = db.targets || {};
}
function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(db));       // แคชในเครื่องเสมอ
  if (CLOUD && !applyingRemote && !readOnly()) cloudSyncChanges(); // ซิงค์เฉพาะ “รายการที่เปลี่ยน” ขึ้นคลาวด์
}

// ---- ซิงค์แบบแยกรายการ: หา “อะไรเปลี่ยน” เทียบ snapshot แล้วส่งเฉพาะรายการนั้น ----
function cloudSyncChanges(){
  if(!sb || !currentUser) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(async ()=>{
    try{
      const rows = [];
      for(const col of CLOUD_COLLECTIONS){
        const cur = db[col] || [], prev = (cloudSnapshot && cloudSnapshot[col]) || [];
        const curMap = new Map(cur.map(x=>[x.id,x]));
        const prevMap = new Map(prev.map(x=>[x.id,x]));
        // เพิ่ม/แก้ไข
        for(const [id,item] of curMap){
          const p = prevMap.get(id);
          if(!p || JSON.stringify(p)!==JSON.stringify(item))
            rows.push({ collection:col, id, data:item, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });
        }
        // ลบ (soft delete)
        for(const [id] of prevMap){
          if(!curMap.has(id))
            rows.push({ collection:col, id, data:{}, deleted:true, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });
        }
      }
      // meta = years + targets (เก็บเป็นแถวเดียว)
      const meta = { years:db.years, targets:db.targets };
      const prevMeta = cloudSnapshot ? { years:cloudSnapshot.years, targets:cloudSnapshot.targets } : null;
      if(!prevMeta || JSON.stringify(prevMeta)!==JSON.stringify(meta))
        rows.push({ collection:"meta", id:"app_meta", data:meta, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });

      if(rows.length){
        const { error } = await sb.from("records").upsert(rows);
        if(error) throw error;
      }
      cloudSnapshot = JSON.parse(JSON.stringify(db));
      setCloudStatus("saved");
    }catch(e){ console.error("cloud sync error:", e); setCloudStatus("error"); }
  }, 350);
}

function rebuildDbFromRows(rows){
  const base = defaultData();
  const out = { hotels:[], salesReps:[], accounts:[], pipeline:[], functionEvents:[], activities:[], forecasts:[], revenue:[], years:base.years, targets:{} };
  for(const r of rows){
    if(r.deleted) continue;
    if(r.collection==="meta"){ if(r.data){ out.years=r.data.years||out.years; out.targets=r.data.targets||{}; } continue; }
    if(out[r.collection]) out[r.collection].push(r.data);
  }
  return out;
}
async function pushEntireDb(){ // ใช้ตอนตั้งค่าครั้งแรก (ฐานข้อมูลยังว่าง)
  const rows = [];
  for(const col of CLOUD_COLLECTIONS)
    (db[col]||[]).forEach(item=>rows.push({ collection:col, id:item.id, data:item, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() }));
  rows.push({ collection:"meta", id:"app_meta", data:{ years:db.years, targets:db.targets }, deleted:false, updated_by:CLIENT_ID, updated_at:new Date().toISOString() });
  if(rows.length) await sb.from("records").upsert(rows);
}

// ดึงข้อมูลทั้งหมดจากคลาวด์ ประกอบเป็น db แล้วเริ่มฟังเรียลไทม์
async function cloudBootstrap(){
  try{
    const { data:rows, error } = await sb.from("records").select("*");
    if(error) throw error;
    if(rows && rows.length){
      db = rebuildDbFromRows(rows); normalizeData();
    } else {
      db = defaultData(); normalizeData();
      if(!readOnly()) await pushEntireDb();
    }
    cloudSnapshot = JSON.parse(JSON.stringify(db));
    // ถ้าเป็นบัญชีฝ่ายขาย ให้เริ่มที่หน้าเซลล์ตัวเองเลย (สะดวกในการแก้ข้อมูลของตัวเอง)
    if(isSales()){ const sid=mySalesId(); if(sid) ui.currentSales=sid; }
    subscribeRealtime();
    setCloudStatus("saved");
    startIdleWatch();   // เริ่มจับเวลา auto logout เมื่อไม่มีการใช้งาน
    render();
  }catch(e){
    console.error("cloud bootstrap failed:", e);
    alert("เชื่อมต่อฐานข้อมูลไม่สำเร็จ: "+(e.message||e)+"\n\nแอปจะทำงานแบบออฟไลน์ในเครื่องนี้ชั่วคราว");
    loadData(); render();
  }
}

// รับการเปลี่ยนแปลงจากคนอื่น “ทีละรายการ” แล้วผสานเข้ากับ db (ไม่ทับทั้งก้อน)
function subscribeRealtime(){
  sb.channel("records_rt")
    .on("postgres_changes", { event:"*", schema:"public", table:"records" }, payload=>{
      const row = payload.new;
      if(!row || row.updated_by===CLIENT_ID) return; // ข้ามสิ่งที่เราเขียนเอง
      applyRemoteRow(row);
    })
    .subscribe();
}
function applyRemoteRow(row){
  applyingRemote = true;
  try{
    if(row.collection==="meta"){
      if(row.data){ db.years = row.data.years || db.years; db.targets = row.data.targets || {}; }
    } else if(Array.isArray(db[row.collection])){
      const arr = db[row.collection];
      const idx = arr.findIndex(x=>x.id===row.id);
      if(row.deleted){ if(idx>=0) arr.splice(idx,1); }
      else { if(idx>=0) arr[idx] = row.data; else arr.push(row.data); }
    }
    normalizeData();
    cloudSnapshot = JSON.parse(JSON.stringify(db)); // กันไม่ให้ diff รอบหน้าดันข้อมูลของคนอื่นกลับ
    localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
  }catch(e){ console.error(e); }
  applyingRemote = false;
  setCloudStatus("synced");
  if(isUserBusy()) pendingRemoteRender = true; // กำลังพิมพ์อยู่ → ค่อยรีเฟรชทีหลัง
  else render();
}
function flushPendingRender(){
  if(pendingRemoteRender && !isUserBusy()){ pendingRemoteRender=false; render(); }
}
function setCloudStatus(state){
  const el = document.getElementById("cloudStatus");
  if(!el) return;
  const map = { saved:["● ซิงค์แล้ว","#a7f3d0"], synced:["● อัปเดตจากทีม","#bae6fd"], error:["● บันทึกไม่สำเร็จ","#fecaca"] };
  const [txt,color] = map[state]||["",""];
  el.textContent = txt; el.style.color = color;
}

function sumVal(arr,key){ return arr.reduce((s,x)=>s+(Number(x[key])||0),0); }

// ---------- ON HAND (auto-linked from won pipeline + confirmed functions) ----------
function onHandPipeline(hid,key){ return sumVal(db.pipeline.filter(p=>p.hotelId===hid && p.stage==="won" && ymKey(p.expectedCloseDate)===key),"estValue"); }
function onHandFunction(hid,key){ return sumVal(db.functionEvents.filter(f=>f.hotelId===hid && ONHAND_FN_STATUS.includes(f.status) && ymKey(f.eventDate)===key),"estRevenue"); }
function onHandForMonth(hid,key){ return onHandPipeline(hid,key)+onHandFunction(hid,key); }
function onHandForSalesMonth(sid,key){
  const won = sumVal(db.pipeline.filter(p=>p.salesId===sid && p.stage==="won" && ymKey(p.expectedCloseDate)===key),"estValue");
  const conf = sumVal(db.functionEvents.filter(f=>f.salesId===sid && ONHAND_FN_STATUS.includes(f.status) && ymKey(f.eventDate)===key),"estRevenue");
  return won+conf;
}

// ---------- FORECAST (two buckets) ----------
function forecastEntry(hid,key){ return db.forecasts.find(x=>x.hotelId===hid && x.month===key); }
function fcPipeline(hid,key){ const e=forecastEntry(hid,key); return e?Number(e.pipelineForecast)||0:0; }
function fcFunction(hid,key){ const e=forecastEntry(hid,key); return e?Number(e.functionForecast)||0:0; }
function fcTotal(hid,key){ return fcPipeline(hid,key)+fcFunction(hid,key); }
function setForecastPart(hid,month,part,value){
  if(!canEditForecast()){ render(); return; }
  let e = db.forecasts.find(x=>x.hotelId===hid && x.month===month);
  if(!e){ e={ id:uid("fc"), hotelId:hid, month, pipelineForecast:0, functionForecast:0, notes:"" }; db.forecasts.push(e); }
  e[part] = Number(value)||0;
  saveData(); render();
}

// group-wide sums for a month
function groupOnHand(key){ return HOTELS.reduce((s,h)=>s+onHandForMonth(h.id,key),0); }
function groupForecast(key){ return HOTELS.reduce((s,h)=>s+fcTotal(h.id,key),0); }
function groupOpenPipeline(){ return db.pipeline.filter(p=>p.stage!=="won" && p.stage!=="lost"); }
function monthKey(y,m){ return y+"-"+String(m).padStart(2,"0"); }
function yearMonths(y){ const a=[]; for(let m=1;m<=12;m++) a.push(monthKey(y,m)); return a; }
function groupOnHandYear(y){ return yearMonths(y).reduce((s,k)=>s+groupOnHand(k),0); }
function groupForecastYear(y){ return yearMonths(y).reduce((s,k)=>s+groupForecast(k),0); }

// ---------- TOTAL REVENUE (Owner view: OTA/FIT/Walk-in/ฝ่ายขาย/อื่นๆ) ----------
function revEntry(hid,key){ return db.revenue.find(r=>r.hotelId===hid && r.month===key); }
function revChannel(hid,key,ch){ const e=revEntry(hid,key); return e?Number(e[ch])||0:0; }
function revHotelMonth(hid,key){ const e=revEntry(hid,key); return e?REVENUE_CH_KEYS.reduce((s,k)=>s+(Number(e[k])||0),0):0; }
function revGroupMonth(key){ return HOTELS.reduce((s,h)=>s+revHotelMonth(h.id,key),0); }
function revHotelMonthChannel(hid,y,m,ch){ return revChannel(hid,monthKey(y,m),ch); }
// a month "has data" if any hotel (or a given hotel) recorded revenue that month
function revHotelYear(hid,y){ return yearMonths(y).reduce((s,k)=>s+revHotelMonth(hid,k),0); }
function revGroupYear(y){ return yearMonths(y).reduce((s,k)=>s+revGroupMonth(k),0); }
function revHotelYearChannel(hid,y,ch){ let s=0; for(let m=1;m<=12;m++) s+=revChannel(hid,monthKey(y,m),ch); return s; }
function revGroupYearChannel(y,ch){ return HOTELS.reduce((s,h)=>s+revHotelYearChannel(h.id,y,ch),0); }
// monthly array (1..12) for a scope ('group' or hotelId)
function revMonthlyArray(scope,y){
  return yearMonths(y).map(k=> scope==="group" ? revGroupMonth(k) : revHotelMonth(scope,k));
}
function revScopeYear(scope,y){ return scope==="group" ? revGroupYear(y) : revHotelYear(scope,y); }
function revScopeYearChannel(scope,y,ch){ return scope==="group" ? revGroupYearChannel(y,ch) : revHotelYearChannel(scope,y,ch); }
// which months (1..12) have any recorded revenue for this scope+year
function revMonthsWithData(scope,y){
  const out=[]; const arr=revMonthlyArray(scope,y);
  arr.forEach((v,i)=>{ if(v>0) out.push(i+1); });
  return out;
}
// sum only the given month-numbers, for a scope+year
function revSumMonths(scope,y,monthNums){
  return monthNums.reduce((s,m)=>s+(scope==="group"?revGroupMonth(monthKey(y,m)):revHotelMonth(scope,monthKey(y,m))),0);
}
function pctChange(cur,prev){ if(!prev) return null; return (cur-prev)/prev*100; }

// hotels a rep touches
function repHotels(sid){
  const set = new Set();
  db.pipeline.filter(p=>p.salesId===sid).forEach(p=>set.add(p.hotelId));
  db.functionEvents.filter(f=>f.salesId===sid).forEach(f=>set.add(f.hotelId));
  db.accounts.filter(a=>a.salesId===sid).forEach(a=>a.hotelIds.forEach(h=>set.add(h)));
  const ids = [...set];
  return ids.length ? HOTELS.filter(h=>ids.includes(h.id)) : HOTELS.slice();
}

function render(){
  const app = document.getElementById("app");
  document.body.classList.toggle("readonly", readOnly());
  const mainView = ui.page==="salesReport" ? renderSalesReport()
                 : ui.role==="sales" ? renderSalesView()
                 : ui.role==="owner" ? renderOwnerView()
                 : renderGMView();
  app.innerHTML = `
    ${renderTopBar()}
    <div class="max-w-7xl mx-auto px-4 py-6">
      ${mainView}
    </div>
    <div id="modalRoot"></div>`;
  if (window.__chartRefs){ Object.values(window.__chartRefs).forEach(c=>c&&c.destroy&&c.destroy()); }
  window.__chartRefs = {};
  if (ui.page==="salesReport"){
    /* report page draws its own charts */
    drawReportChart();
  } else if (ui.role==="gm"){
    if (ui.currentHotelTab==="group") drawGroupCharts();
    else drawHotelCharts(ui.currentHotelTab);
  } else if (ui.role==="owner"){
    drawOwnerCharts();
  }
}

}
function functionSelect(f){
  return `<select ${dSales(f.salesId)} onchange="updateField('functionEvents','${f.id}','status',this.value)" class="pill-select badge ${FUNCTION_COLOR[f.status]}">
    ${Object.entries(FUNCTION_STATUS).map(([k,v])=>`<option value="${k}" ${k===f.status?"selected":""}>${v}</option>`).join("")}</select>`;

function accountSelect(a){
  return `<select ${dSales(a.salesId)} onchange="updateField('accounts','${a.id}','status',this.value)" class="pill-select badge ${ACCOUNT_COLOR[a.status]}">
    ${Object.entries(ACCOUNT_STATUS).map(([k,v])=>`<option value="${k}" ${k===a.status?"selected":""}>${v}</option>`).join("")}</select>`;
}
function updateField(collection,id,field,value){
  const item = db[collection] ? db[collection].find(x=>x.id===id) : null;
  if(!item){ render(); return; }
  if(!canEditSales(item.salesId)){ alert("บัญชีนี้แก้ได้เฉพาะข้อมูลของเซลล์ตัวเองเท่านั้น"); render(); return; }
  item[field]=value; saveData(); render();
}

function ownerKpiSub(pct, note){
  if(pct===null || pct===undefined || !isFinite(pct)) return note || "ยังไม่มีข้อมูลปีก่อน";
  const up = pct>=0, col = up ? "#bbf7d0" : "#fecaca";
  return `<span style="color:${col};font-weight:800">${up?'▲':'▼'} ${Math.abs(pct).toFixed(0)}%</span> ${note||"เทียบปีก่อน"}`;
}
function renderOwnerView(){
  if(!ui.ownerYear) ui.ownerYear = new Date().getFullYear();
  let scope = ui.ownerTab;
  if(scope!=="group" && !hotelById(scope)){ ui.ownerTab="group"; scope="group"; }
  const y = ui.ownerYear, py = y-1;
  const scopeName = scope==="group" ? "ภาพรวมทุกโรงแรม" : hotelById(scope).name;

  // years available to pick (จาก db.years + ปีที่มีข้อมูลยอดขายจริง)
  const revYears = db.revenue.map(r=>Number(r.month.slice(0,4)));
  const yearsSel = [...new Set([...db.years, ...revYears])].sort((a,b)=>a-b);

  const monthsData   = revMonthsWithData(scope,y);
  const curYearSoFar = revScopeYear(scope,y);
  const lastYearSame = revSumMonths(scope,py,monthsData);
  const lastYearFull = revScopeYear(scope,py);
  const yoy = pctChange(curYearSoFar, lastYearSame);

  const latestM   = monthsData.length ? monthsData[monthsData.length-1] : Number(currentMonthKey().slice(5,7));
  const latestVal = scope==="group" ? revGroupMonth(monthKey(y,latestM))  : revHotelMonth(scope,monthKey(y,latestM));
  const latestPrv = scope==="group" ? revGroupMonth(monthKey(py,latestM)) : revHotelMonth(scope,monthKey(py,latestM));
  const latestYoy = pctChange(latestVal, latestPrv);

  const chTotals = REVENUE_CH_KEYS.map(k=>({ k, v:revScopeYearChannel(scope,y,k) })).sort((a,b)=>b.v-a.v);
  const topCh = chTotals[0] || { k:"ota", v:0 };
  const topChPct = curYearSoFar ? Math.round(topCh.v/curYearSoFar*100) : 0;

  const up = yoy!==null && isFinite(yoy) && yoy>=0;
  const summary = (yoy===null || !isFinite(yoy))
    ? `ปีนี้ทำได้ <b>${fmtMoney(curYearSoFar)}</b> — ยังไม่มีข้อมูลปีก่อนไว้เทียบ (กรอกยอดปี ${py+543} เพื่อเทียบได้)`
    : `ปีนี้ (ถึง ${monthLabel(monthKey(y,latestM))}) ทำได้ <b>${fmtMoney(curYearSoFar)}</b> — <span style="color:${up?'#0f766e':'#be123c'};font-weight:800">${up?'มากกว่า':'น้อยกว่า'}ช่วงเดียวกันปีก่อน ${Math.abs(yoy).toFixed(0)}%</span> (ปีก่อน ${fmtMoney(lastYearSame)})`;

  // best month (สำหรับกล่องสรุปฝั่งขวาเมื่อดูรายโรงแรม)
  const arr = revMonthlyArray(scope,y);
  let bi=-1, bv=-1; arr.forEach((v,i)=>{ if(v>bv){ bv=v; bi=i; } });
  const bestMonthTxt = bv>0 ? `${THAI_MONTHS[bi]} ${y+543}` : "—";

  const tabs = `
  <div class="flex flex-wrap items-center gap-2 mb-5">
    <div class="flex flex-wrap gap-1 bg-slate-200/60 rounded-full p-1 w-fit">
      <button onclick="setOwnerTab('group')" class="tab-pill px-4 py-2 rounded-full text-sm ${scope==='group'?'active':''}">ภาพรวมทุกโรงแรม</button>
      ${HOTELS.map(h=>`<button onclick="setOwnerTab('${h.id}')" class="tab-pill px-4 py-2 rounded-full text-sm ${scope===h.id?'active':''}">${h.name}</button>`).join("")}
    </div>
  </div>`;

  return `
  ${tabs}
  ${db.revenue.length===0 ? `<div class="rounded-2xl p-4 mb-5 border" style="background:#f0f9ff;border-color:#bae6fd;color:#075985;"><b>ยังไม่มีข้อมูลยอดขาย</b> — กดปุ่ม “＋ กรอกยอดขาย” มุมขวา เพื่อเริ่มบันทึกยอดแต่ละเดือนของแต่ละโรงแรม</div>`:""}

  <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
    <div>
      <div class="text-2xl font-bold text-slate-800">ยอดขายรวม — ${scopeName}</div>
      <div class="text-sm text-slate-500">รวมทุกช่องทาง: OTA · FIT · Walk-in · Corporate · อื่นๆ</div>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <span class="text-sm text-slate-500">ปี</span>
      <select onchange="setOwnerYear(this.value)" class="btn btn-ghost text-sm px-3 py-2">
        ${yearsSel.map(yy=>`<option value="${yy}" ${yy===y?"selected":""}>พ.ศ. ${yy+543}</option>`).join("")}
      </select>
      <button onclick="exportRevenueExcel()" title="ดาวน์โหลดตัวเลขยอดขายทั้งปีเป็น Excel (แก้ทีเดียวหลายเดือน)" class="qbtn-solid" style="background:#0f766e"><span class="qi">⬇</span> Excel</button>
      <button onclick="exportRevenueCSV()" title="ดาวน์โหลดตัวเลขยอดขายทั้งปีเป็น CSV" class="qbtn-solid" style="background:#0369a1"><span class="qi">⬇</span> CSV</button>
      ${canEditRevenue() ? `<label class="qbtn-solid cursor-pointer" style="background:#7c3aed" title="นำเข้าไฟล์ Excel/CSV เพื่ออัปเดตตัวเลขยอดขายทีเดียวหลายเดือน"><span class="qi">⬆</span> นำเข้าตัวเลข
        <input type="file" accept=".xlsx,.xls,.csv" class="hidden" onchange="importRevenueFile(event)"/></label>
      <button onclick="openRevenueModal()" class="qbtn-solid" style="background:#0e7490"><span class="qi">＋</span> กรอกยอดขาย</button>` : ""}
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    ${kpiCard("ยอดขายรวมสะสม ปี "+(y+543), fmtM(curYearSoFar), ownerKpiSub(yoy,"เทียบช่วงเดียวกันปีก่อน"), G.onhand)}
    ${kpiCard("เดือนล่าสุด ("+THAI_MONTHS[latestM-1]+")", fmtM(latestVal), ownerKpiSub(latestYoy,"เทียบเดือนเดียวกันปีก่อน"), G.pipeline)}
    ${kpiCard("ทั้งปีที่แล้ว ("+(py+543)+")", fmtM(lastYearFull), "ยอดรวม 12 เดือน", G.forecast)}
    ${kpiCard("ช่องทางหลักปีนี้", REVENUE_CHANNELS[topCh.k], fmtMoney(topCh.v)+" · "+topChPct+"% ของทั้งหมด", G.account)}
  </div>

  <div class="card p-5 mb-6">
    <div class="section-title mb-1">ยอดขายรวมรายเดือน — ปีนี้ เทียบ ปีที่แล้ว</div>
    <div class="text-sm text-slate-600 mb-3">${summary}</div>
    <canvas id="own-monthly" height="230"></canvas>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-2">
    <div class="card p-5">
      <div class="section-title mb-1">สัดส่วนยอดขายตามช่องทาง — ปี ${y+543}</div>
      <div class="text-xs text-slate-400 mb-2">ยอดรวมทั้งปี ${fmtMoney(curYearSoFar)}</div>
      <canvas id="own-donut" height="240"></canvas>
    </div>
    ${scope==="group" ? `
    <div class="card p-5">
      <div class="section-title mb-1">เทียบรายโรงแรม — ปีนี้ vs ปีที่แล้ว</div>
      <div class="text-xs text-slate-400 mb-2">ยาวกว่า = ยอดสูงกว่า</div>
      <canvas id="own-hotels" height="260"></canvas>
    </div>` : `
    <div class="card p-5">
      <div class="section-title mb-3">สรุปสั้น ๆ — ${scopeName}</div>
      <div class="space-y-3 text-slate-700">
        <div class="flex items-center gap-3"><span class="text-2xl">🏆</span><div><div class="text-xs text-slate-400">เดือนที่ทำยอดสูงสุดปีนี้</div><div class="text-lg font-bold">${bestMonthTxt} · ${fmtMoney(bv>0?bv:0)}</div></div></div>
        <div class="flex items-center gap-3"><span class="text-2xl">⭐</span><div><div class="text-xs text-slate-400">ช่องทางที่ทำรายได้มากสุด</div><div class="text-lg font-bold">${REVENUE_CHANNELS[topCh.k]} · ${topChPct}%</div></div></div>
        <div class="flex items-center gap-3"><span class="text-2xl">${up?'📈':'📉'}</span><div><div class="text-xs text-slate-400">เทียบช่วงเดียวกันปีก่อน</div><div class="text-lg font-bold" style="color:${up?'#0f766e':'#be123c'}">${(yoy===null||!isFinite(yoy))?'—':(up?'+':'')+yoy.toFixed(0)+'%'}</div></div></div>
      </div>
    </div>`}
  </div>
  <div class="text-xs text-slate-400 mb-6">ฝ่ายบัญชีอัปเดตยอดจริงแต่ละช่องทางได้ที่ปุ่ม “＋ กรอกยอดขาย” (เลือกโรงแรมและเดือน) · ข้อมูลจะรวมและวาดกราฟให้อัตโนมัติ</div>
  `;
}

        tooltip:{ callbacks:{ label:ctx=>ctx.dataset.label+": "+fmtMoney(ctx.parsed.x) } } },

function deletePipeline(id){ const it=db.pipeline.find(p=>p.id===id); if(!it)return; if(!guardSales(it.salesId))return; if(!confirm("ลบรายการ Pipeline นี้?"))return; db.pipeline=db.pipeline.filter(p=>p.id!==id); saveData(); render(); }
function deleteFunction(id){ const it=db.functionEvents.find(f=>f.id===id); if(!it)return; if(!guardSales(it.salesId))return; if(!confirm("ลบงาน Function นี้?"))return; db.functionEvents=db.functionEvents.filter(f=>f.id!==id); saveData(); render(); }
function deleteActivity(id){ const it=db.activities.find(a=>a.id===id); if(!it)return; if(!guardSales(it.salesId))return; if(!confirm("ลบกิจกรรมนี้?"))return; db.activities=db.activities.filter(a=>a.id!==id); saveData(); render(); }
function deleteAccount(id){ const it=db.accounts.find(a=>a.id===id); if(!it)return; if(!guardSales(it.salesId))return; if(!confirm("ลบ Account นี้?"))return; db.accounts=db.accounts.filter(a=>a.id!==id); saveData(); render(); }

function submitPipeline(){
  const id = val("f_id");
  const salesId = isSales() ? mySalesId() : val("f_sales");
  if(!guardSales(salesId)) return;

// WEEKLY SUMMARY — สรุปยอดขายประจำสัปดาห์ (ส่งเข้า LINE)
// ============================================================
function thaiFullDate(d){ return d.getDate()+" "+THAI_MONTHS[d.getMonth()]+" "+(d.getFullYear()+543); }
// สร้างข้อความสรุป (รูปแบบเดียวกับที่ Edge Function ส่งอัตโนมัติ)
function buildWeeklySummary(){
  const now = new Date();
  const y = now.getFullYear(), py = y-1;
  const mk = currentMonthKey();
  const monthsData = revMonthsWithData("group", y);
  const ytd = revGroupYear(y);
  const lastSame = revSumMonths("group", py, monthsData);
  const yoy = pctChange(ytd, lastSame);
  const arrow = (yoy===null||!isFinite(yoy)) ? "—" : (yoy>=0 ? "▲ "+yoy.toFixed(0)+"%" : "▼ "+Math.abs(yoy).toFixed(0)+"%");
  const monthRev = revGroupMonth(mk);
  const oh = groupOnHand(mk), fc = groupForecast(mk);
  const target = targetFor(y), securedYr = groupOnHandYear(y);
  const pctTarget = target ? Math.round(securedYr/target*100) : 0;

  let s = "";
  s += "📊 สรุปยอดขายประจำสัปดาห์\n";
  s += "Plaai Group • ณ " + thaiFullDate(now) + "\n\n";
  s += "━━ ภาพรวมทั้งกลุ่ม ━━\n";
  s += "💰 ยอดขายรวมปีนี้ (สะสม): " + fmtMoney(ytd) + "\n";
  s += "   เทียบช่วงเดียวกันปีก่อน " + arrow + " (ปีก่อน " + fmtMoney(lastSame) + ")\n";
  s += "📅 เดือนนี้ (" + monthLabel(mk) + ")\n";
  s += "   • ยอดขายรวมทุกช่องทาง: " + fmtMoney(monthRev) + "\n";
  s += "   • On Hand (ยืนยันแล้ว): " + fmtMoney(oh) + "\n";
  s += "   • Forecast (Pipeline+Function): " + fmtMoney(fc) + "\n";
  s += "🎯 เทียบเป้าทั้งปี: " + fmtMoney(securedYr) + " / " + fmtMoney(target) + " (" + pctTarget + "%)\n\n";
  s += "━━ ช่องทาง (ปีนี้สะสม) ━━\n";
  s += REVENUE_CH_KEYS.map(k=>REVENUE_CHANNELS[k]+" "+fmtMoney(revGroupYearChannel(y,k))).join("\n") + "\n\n";
  s += "━━ รายโรงแรม (เดือนนี้) ━━\n";
  HOTELS.forEach(h=>{
    s += "• " + h.name + "\n";
    s += "   ขาย " + fmtMoney(revHotelMonth(h.id,mk)) + " | OnHand " + fmtMoney(onHandForMonth(h.id,mk)) + " | FC " + fmtMoney(fcTotal(h.id,mk)) + "\n";
  });
  s += "\n— ส่งจากระบบ Plaai Sales Ops";
  return s;
}
function showWeeklySummary(){
  const text = buildWeeklySummary();
  const canSend = !!(CLOUD && LINE_SUMMARY_FUNCTION_URL);
  const esc = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  document.getElementById("modalRoot").innerHTML = `
  <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50" onclick="if(event.target===this) closeModal()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
      <div class="px-5 py-4 border-b flex justify-between items-center">
        <div class="font-semibold text-lg text-slate-800">สรุปยอดขายประจำสัปดาห์</div>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700">✕</button>
      </div>
      <div class="px-5 py-4 space-y-3">
        <div class="text-xs text-slate-400">ตัวอย่างข้อความที่จะส่งเข้า LINE — คัดลอกไปวางเอง ดาวน์โหลด หรือกดส่งเข้ากลุ่มได้เลย</div>
        <textarea id="weeklyText" readonly rows="16" class="w-full border border-slate-200 rounded-lg px-3 py-2" style="font-family:ui-monospace,Menlo,monospace;font-size:12px;line-height:1.5;white-space:pre;overflow:auto;">${esc}</textarea>
        <div id="weeklyMsg" class="text-xs min-h-[16px]"></div>
        <div class="flex flex-wrap justify-end gap-2 pt-1">
          <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm rounded-lg border">ปิด</button>
          <button type="button" onclick="downloadWeekly()" class="btn btn-ghost px-4 py-2 text-sm">ดาวน์โหลด .txt</button>
          <button type="button" onclick="copyWeekly()" class="btn btn-ghost px-4 py-2 text-sm">คัดลอกข้อความ</button>
          ${canSend ? `<button type="button" onclick="sendWeeklyToLine(this)" class="btn btn-primary px-4 py-2 text-sm">📤 ส่งเข้า LINE เลย</button>` : ""}
        </div>
        ${canSend ? "" : `<div class="text-xs text-slate-400">* ปุ่มส่งเข้า LINE จะใช้ได้เมื่อตั้งค่า Edge Function แล้ว (ดูคู่มือ LINE)</div>`}
      </div>
    </div>
  </div>`;
}
function copyWeekly(){
  const t = document.getElementById("weeklyText"); if(!t) return;
  const done = ()=>{ const m=document.getElementById("weeklyMsg"); if(m){ m.textContent="คัดลอกแล้ว ✓"; m.style.color="#0f766e"; } };
  try{ navigator.clipboard.writeText(t.value).then(done, ()=>{ t.select(); document.execCommand("copy"); done(); }); }
  catch(e){ t.select(); document.execCommand("copy"); done(); }
}
function downloadWeekly(){
  const t = document.getElementById("weeklyText"); if(!t) return;
  const blob = new Blob([t.value], { type:"text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="plaai_weekly_"+realToday()+".txt"; a.click(); URL.revokeObjectURL(url);
}
async function sendWeeklyToLine(btn){
  const msg = document.getElementById("weeklyMsg");
  if(!sb){ if(msg){ msg.textContent="ต้องเชื่อมต่อคลาวด์ก่อนจึงจะส่งได้"; msg.style.color="#be123c"; } return; }
  if(btn){ btn.disabled=true; btn.textContent="กำลังส่ง..."; }
  try{
    const { data:{ session } } = await sb.auth.getSession();
    const res = await fetch(LINE_SUMMARY_FUNCTION_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+(session?session.access_token:SUPABASE_ANON_KEY) },
      body: JSON.stringify({ mode:"send" })
    });
    if(!res.ok) throw new Error("HTTP "+res.status+" "+(await res.text()));
    if(msg){ msg.textContent="ส่งเข้า LINE เรียบร้อย ✓"; msg.style.color="#0f766e"; }
  }catch(e){
    if(msg){ msg.textContent="ส่งไม่สำเร็จ: "+(e.message||e); msg.style.color="#be123c"; }
  }finally{ if(btn){ btn.disabled=false; btn.textContent="📤 ส่งเข้า LINE เลย"; } }
}

function reloadRevenueModal(){ openRevenueModal(val("f_hotel"), val("f_month")); }
function updateRevTotal(){
  const t = REVENUE_CH_KEYS.reduce((s,k)=>s+(Number(val("f_"+k))||0),0);
  const el = document.getElementById("revTotal"); if(el) el.textContent = fmtMoney(t);
}
function submitRevenue(){
  if(!guardRevenue()) return;
  const hid = val("f_hotel"), month = val("f_month");
  if(!month){ alert("กรุณาเลือกเดือน"); return; }
  const data = {}; REVENUE_CH_KEYS.forEach(k=>data[k]=Number(val("f_"+k))||0);
  const e = revEntry(hid,month);
  if(e){ Object.assign(e,data); }
  else { db.revenue.push({ id:uid("rev"), hotelId:hid, month, ...data }); }
  saveData(); closeModal(); render();
}
function deleteRevenue(hid,month){
  if(!guardRevenue()) return;
  if(!confirm("ล้างยอดขายของเดือนนี้?")) return;
  db.revenue = db.revenue.filter(r=>!(r.hotelId===hid && r.month===month));
  saveData(); closeModal(); render();
}

function firstDayOfMonth(){ return todayStr().slice(0,7)+"-01"; }
function ensureReportDefaults(){
  if(!ui.reportFrom) ui.reportFrom = firstDayOfMonth();
  if(!ui.reportTo)   ui.reportTo   = todayStr();
  if(ui.reportRep!=="all" && !salesById(ui.reportRep)) ui.reportRep = "all";
}
function openSalesReport(){ ensureReportDefaults(); ui.page="salesReport"; render(); }
function closeSalesReport(){ ui.page=null; render(); }
function setReportRep(v){ ui.reportRep=v; render(); }
function setReportFrom(v){ ui.reportFrom=v; render(); }
function setReportTo(v){ ui.reportTo=v; render(); }
function setReportEmail(v){ ui.reportEmail=v; }
function reportRepMatch(sid){ return ui.reportRep==="all" || sid===ui.reportRep; }
function inRange(dateStr){ const d=(dateStr||""); return d && d>=ui.reportFrom && d<=ui.reportTo; }

// ---- data slices for the selected rep + date range ----
function repActivities(){ return db.activities.filter(a=>reportRepMatch(a.salesId) && inRange(a.date)).sort((a,b)=>a.date.localeCompare(b.date)); }
function repRoomDeals(){ return db.pipeline.filter(p=>reportRepMatch(p.salesId) && p.dealType==="corporate_room" && p.stage==="won" && inRange(p.expectedCloseDate)); }
function repFunctionPipeline(){ return db.pipeline.filter(p=>reportRepMatch(p.salesId) && p.dealType==="function" && p.stage==="won" && inRange(p.expectedCloseDate)); }
function repFunctionEvents(){ return db.functionEvents.filter(f=>reportRepMatch(f.salesId) && ONHAND_FN_STATUS.includes(f.status) && inRange(f.eventDate)); }
function repOpenPipeline(){ return db.pipeline.filter(p=>reportRepMatch(p.salesId) && p.stage!=="won" && p.stage!=="lost"); }
function repUpcomingFunctions(){ return db.functionEvents.filter(f=>reportRepMatch(f.salesId) && f.status!=="completed" && f.status!=="cancelled" && daysDiff(f.eventDate)>=0).sort((a,b)=>a.eventDate.localeCompare(b.eventDate)); }
function repOverdueAccounts(){ return db.accounts.filter(a=>reportRepMatch(a.salesId) && daysDiff(a.lastContactDate)<=-14); }

function roomTotal(){ return sumVal(repRoomDeals(),"estValue"); }
function functionTotal(){ return sumVal(repFunctionEvents(),"estRevenue") + sumVal(repFunctionPipeline(),"estValue"); }
function reportGrandTotal(){ return roomTotal()+functionTotal(); }
function reportRepName(){ return ui.reportRep==="all" ? "ทุกคน (รวมทุกเซลล์)" : (salesById(ui.reportRep)?.name || "-"); }
function reportPeriodTh(){
  const f=new Date(ui.reportFrom), t=new Date(ui.reportTo);
  return thaiFullDate(f)+" – "+thaiFullDate(t);
}

// ---- auto action plan (สรุปจากข้อมูลที่มี) ----
function autoActionItems(){
  const items=[];
  const nm = sid => salesById(sid)?.name || "-";
  const pfx = sid => ui.reportRep==="all" ? "["+nm(sid)+"] " : "";
  repOpenPipeline().sort((a,b)=>(a.expectedCloseDate||"").localeCompare(b.expectedCloseDate||"")).forEach(p=>{
    items.push(pfx(p.salesId)+"ตามดีล “"+p.accountName+"” ("+hotelById(p.hotelId).name+") — "+PIPELINE_STAGES[p.stage]+" · "+fmtMoney(p.estValue)+(p.expectedCloseDate?" · คาดปิด "+p.expectedCloseDate:""));
  });
  repUpcomingFunctions().forEach(f=>{
    const dd=daysDiff(f.eventDate);
    const warn = (!ONHAND_FN_STATUS.includes(f.status)) ? " · ยังไม่ยืนยัน" : (f.status==="confirmed"?" · ยังไม่ส่ง BEO":"");
    items.push(pfx(f.salesId)+"เตรียมงาน “"+f.clientName+"” ("+hotelById(f.hotelId).name+") วันงาน "+f.eventDate+" (อีก "+dd+" วัน) — "+FUNCTION_STATUS[f.status]+warn);
  });
  repOverdueAccounts().forEach(a=>{
    items.push(pfx(a.salesId)+"ติดต่อ Account “"+a.name+"” — เงียบไป "+Math.abs(daysDiff(a.lastContactDate))+" วัน"+(a.lastContactTopic?" (ล่าสุด: "+a.lastContactTopic+")":""));
  });
  return items;
}

// ============================================================
// นำเข้า/ส่งออก "ตัวเลขยอดขายรายเดือน" เป็น Excel / CSV
//   - ส่งออก: ได้ตารางยอดขายทั้งปี (แต่ละโรงแรม × 12 เดือน × ทุกช่องทาง)
//   - นำเข้า: อัปเดตตัวเลขทีเดียวหลายเดือน (ไม่ต้องแก้ทีละช่อง) เหมาะกับฝ่ายบัญชี
//   คอลัมน์: hotelId | โรงแรม | เดือน(YYYY-MM) | OTA | FIT | Walk-in | Corporate | อื่นๆ | ยอดรวมเหมา(lump)
// ============================================================
const REVENUE_XLS_HEADER = ["hotelId","โรงแรม","เดือน(YYYY-MM)","OTA","FIT","Walk-in","Corporate","อื่นๆ","ยอดรวมเหมา(lump)"];
// ลำดับช่องทางให้ตรงกับหัวตาราง (คอลัมน์ที่ 4 เป็นต้นไป)
const REVENUE_XLS_CHANNELS = ["ota","fit","walkin","sales","other","lump"];
function revenueRowsForYear(y){
  const rows = [REVENUE_XLS_HEADER.slice()];
  HOTELS.forEach(h=>{
    for(let m=1;m<=12;m++){
      const key = monthKey(y,m); const e = revEntry(h.id,key) || {};
      rows.push([ h.id, h.name, key,
        Number(e.ota)||0, Number(e.fit)||0, Number(e.walkin)||0,
        Number(e.sales)||0, Number(e.other)||0, Number(e.lump)||0 ]);
    }
  });
  return rows;
}
function exportRevenueExcel(){
  if(typeof XLSX==="undefined"){ alert("ไลบรารี Excel ยังโหลดไม่เสร็จ กรุณาลองใหม่ หรือใช้ปุ่ม CSV แทน"); return; }
  const y = ui.ownerYear || new Date().getFullYear();
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(revenueRowsForYear(y)), "ยอดขาย "+(y+543));
  XLSX.writeFile(wb, "plaai_ยอดขาย_"+y+".xlsx");
}
function exportRevenueCSV(){
  const y = ui.ownerYear || new Date().getFullYear();
  const csv = "﻿" + aoaToCsv(revenueRowsForYear(y)); // BOM ให้ Excel อ่านภาษาไทยถูก
  const blob = new Blob([csv],{ type:"text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="plaai_ยอดขาย_"+y+".csv"; a.click(); URL.revokeObjectURL(url);
}
// จับคู่คอลัมน์จากหัวตาราง (รองรับสลับตำแหน่ง/พิมพ์ต่างเล็กน้อย)
function revColMap(header){
  const idx = { hotelId:-1, name:-1, month:-1, ota:-1, fit:-1, walkin:-1, sales:-1, other:-1, lump:-1 };
  header.forEach((raw,i)=>{
    const h = String(raw||"").toLowerCase().trim();
    if(h.includes("hotelid")) idx.hotelId=i;
    else if(h.includes("โรงแรม")||h==="hotel") idx.name=i;
    else if(h.includes("เดือน")||h.includes("month")) idx.month=i;
    else if(h.includes("ota")) idx.ota=i;
    else if(h.includes("fit")) idx.fit=i;
    else if(h.includes("walk")) idx.walkin=i;
    else if(h.includes("corporate")||h.includes("ฝ่ายขาย")||h.includes("คอร์ปอเรท")) idx.sales=i;
    else if(h.includes("อื่น")||h.includes("other")) idx.other=i;
    else if(h.includes("lump")||h.includes("เหมา")||h.includes("ยอดรวม")) idx.lump=i;
  });
  return idx;
}
function normMonthCell(v){
  if(v==null) return "";
  // เผื่อ Excel ส่งมาเป็น Date object
  if(v instanceof Date){ return v.getFullYear()+"-"+String(v.getMonth()+1).padStart(2,"0"); }
  const s = String(v).trim();
  const m = s.match(/(\d{4})[-/](\d{1,2})/);
  if(m) return m[1]+"-"+String(Number(m[2])).padStart(2,"0");
  return "";
}
function applyRevenueImport(aoa){
  if(!aoa || !aoa.length) throw new Error("ไฟล์ว่าง");
  const header = aoa[0];
  const idx = revColMap(header);
  if(idx.month===-1 || (idx.hotelId===-1 && idx.name===-1))
    throw new Error("ไม่พบคอลัมน์ 'เดือน' หรือ 'โรงแรม/hotelId' — กรุณาใช้ไฟล์ที่ส่งออกจากปุ่ม Excel/CSV เป็นแม่แบบ");
  let updated=0, skipped=0;
  for(let r=1;r<aoa.length;r++){
    const row = aoa[r]; if(!row || !row.length) continue;
    const month = normMonthCell(idx.month>=0?row[idx.month]:"");
    if(!/^\d{4}-\d{2}$/.test(month)){ skipped++; continue; }
    // หา hotelId: จาก hotelId ก่อน ถ้าไม่มี match ด้วยชื่อโรงแรม
    let hid = idx.hotelId>=0 ? String(row[idx.hotelId]||"").trim() : "";
    if(!hid || !hotelById(hid)){
      const nm = idx.name>=0 ? String(row[idx.name]||"").trim() : "";
      const h = HOTELS.find(x=>x.name===nm) || (hid?hotelById(hid):null);
      hid = h ? h.id : "";
    }
    if(!hid || !hotelById(hid)){ skipped++; continue; }
    const num = i => (i>=0 ? Number(String(row[i]).replace(/[,\s฿]/g,""))||0 : 0);
    const data = { ota:num(idx.ota), fit:num(idx.fit), walkin:num(idx.walkin),
      sales:num(idx.sales), other:num(idx.other), lump:num(idx.lump) };
    const e = revEntry(hid,month);
    if(e){ Object.assign(e,data); } else { db.revenue.push({ id:uid("rev"), hotelId:hid, month, ...data }); }
    updated++;
  }
  return { updated, skipped };
}
function importRevenueFile(evt){
  if(!guardRevenue()){ evt.target.value=""; return; }
  if(typeof XLSX==="undefined"){ alert("ไลบรารี Excel ยังโหลดไม่เสร็จ กรุณาลองใหม่อีกครั้ง"); evt.target.value=""; return; }
  const file = evt.target.files[0]; if(!file){ return; }
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const wb = XLSX.read(new Uint8Array(reader.result), { type:"array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const aoa = XLSX.utils.sheet_to_json(ws, { header:1, raw:true, defval:"" });
      const res = applyRevenueImport(aoa);
      saveData(); render();
      alert("นำเข้ายอดขายสำเร็จ ✓\nอัปเดต "+res.updated+" เดือน"+(res.skipped?("\nข้าม "+res.skipped+" แถวที่อ่านไม่ได้"):""));
    }catch(e){ alert("นำเข้าไม่สำเร็จ: "+(e.message||e)); }
    evt.target.value="";
  };
  reader.readAsArrayBuffer(file);
}

// สร้างข้อมูลรายงานเป็นชุดตาราง (ใช้ร่วมกันทั้ง Excel และ CSV)
function buildReportTables(){
  const all = ui.reportRep==="all";
  const acts = repActivities(), roomDeals = repRoomDeals(), fnEvents = repFunctionEvents();
  const rTotal=roomTotal(), fTotal=functionTotal(), gTotal=rTotal+fTotal;

  const summary = [
    ["รายงานฝ่ายขาย — Plaai Group"],
    ["เซลล์", reportRepName()],
    ["ช่วงวันที่", ui.reportFrom+" ถึง "+ui.reportTo],
    ["ออกรายงานเมื่อ", realToday()],
    [],
    ["สรุปยอด", "บาท"],
    ["ยอดขายห้องพัก (Corporate)", rTotal],
    ["ยอดงาน Function", fTotal],
    ["ยอดรวมที่ทำได้ (On Hand)", gTotal],
    ["จำนวนกิจกรรม", acts.length],
  ];

  const actHead = ["วันที่", ...(all?["เซลล์"]:[]), "ประเภทกิจกรรม", "โรงแรม", "Account/งาน", "บันทึก/ผล"];
  const actRows = acts.map(a=>["'"+a.date, ...(all?[salesById(a.salesId)?.name||"-"]:[]),
    ACTIVITY_TYPES[a.type]||a.type, hotelById(a.hotelId)?.name||"-", a.accountName||"-", a.notes||"-"]);

  const roomHead = ["วันที่ปิด", ...(all?["เซลล์"]:[]), "Account", "โรงแรม", "มูลค่า (บาท)", "Stage"];
  const roomRows = roomDeals.map(p=>["'"+(p.expectedCloseDate||"-"), ...(all?[salesById(p.salesId)?.name||"-"]:[]),
    p.accountName, hotelById(p.hotelId).name, Number(p.estValue)||0, PIPELINE_STAGES[p.stage]||p.stage]);

  const fnHead = ["วันงาน", ...(all?["เซลล์"]:[]), "ลูกค้า/งาน", "โรงแรม", "ประเภทงาน", "Pax", "มูลค่า (บาท)", "สถานะ"];
  const fnRows = fnEvents.map(f=>["'"+f.eventDate, ...(all?[salesById(f.salesId)?.name||"-"]:[]),
    f.clientName, hotelById(f.hotelId).name, f.eventType||"-", Number(f.paxCount)||0, Number(f.estRevenue)||0, FUNCTION_STATUS[f.status]||f.status]);

  const autoItems = autoActionItems();
  const planRows = [["Action Plan (สรุปอัตโนมัติ)"], ...(autoItems.length?autoItems.map(i=>[i]):[["— ไม่มีรายการค้าง —"]]),
    [], ["แผนงาน/Next step (กรอกเอง)"], ...manualPlanReps().map(r=>[ (all?r.name+": ":"")+(r.actionPlan||"—") ])];

  return { summary,
    activities:{ head:actHead, rows:actRows },
    room:{ head:roomHead, rows:roomRows },
    functions:{ head:fnHead, rows:fnRows },
    plan:planRows };
}

function exportReportExcel(){
  if(typeof XLSX==="undefined"){ alert("ไลบรารี Excel ยังโหลดไม่เสร็จ กรุณาลองใหม่อีกครั้ง หรือใช้ปุ่ม CSV แทน"); return; }
  const t = buildReportTables();
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(t.summary), "สรุป");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([t.activities.head, ...t.activities.rows]), "กิจกรรมรายวัน");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([t.room.head, ...t.room.rows]), "ยอดขายห้องพัก");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([t.functions.head, ...t.functions.rows]), "งาน Function");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(t.plan), "Action Plan");
  XLSX.writeFile(wb, reportFileBase()+".xlsx");
}

function csvCell(v){
  let s = (v===null||v===undefined) ? "" : String(v);
  if(s.charAt(0)==="'") s = s.slice(1); // ตัด marker ที่กันวันที่เพี้ยนใน Excel ออกสำหรับ CSV
  if(/[",\n]/.test(s)) s = '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function aoaToCsv(aoa){ return aoa.map(row=>row.map(csvCell).join(",")).join("\r\n"); }
function exportReportCSV(){
  const t = buildReportTables();
  const blocks = [];
  blocks.push(aoaToCsv(t.summary));
  blocks.push("");
  blocks.push("=== กิจกรรมรายวัน ===");
  blocks.push(aoaToCsv([t.activities.head, ...t.activities.rows]));
  blocks.push("");
  blocks.push("=== ยอดขายห้องพัก (Corporate) ===");
  blocks.push(aoaToCsv([t.room.head, ...t.room.rows]));
  blocks.push("");
  blocks.push("=== งาน Function ===");
  blocks.push(aoaToCsv([t.functions.head, ...t.functions.rows]));
  blocks.push("");
  blocks.push("=== Action Plan ===");
  blocks.push(aoaToCsv(t.plan));
  const csv = "﻿" + blocks.join("\r\n"); // BOM เพื่อให้ Excel อ่านภาษาไทยถูกต้อง
  const blob = new Blob([csv],{ type:"text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=reportFileBase()+".csv"; a.click(); URL.revokeObjectURL(url);
}

async function emailReport(){
  const to = (val("rep_email")||ui.reportEmail||"").trim();
  if(!to){ alert("กรุณากรอกอีเมลผู้รับก่อน"); return; }
  const subject = "รายงานฝ่ายขาย "+reportRepName()+" ("+ui.reportFrom+" ถึง "+ui.reportTo+")";
  const body = buildReportSummaryText();

  // โหมดส่งอัตโนมัติผ่าน Edge Function (พร้อมไฟล์ Excel แนบ)
  if(REPORT_EMAIL_FUNCTION_URL && sb){
    try{
      const wb = XLSX.utils.book_new();
      const t = buildReportTables();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(t.summary), "สรุป");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([t.activities.head, ...t.activities.rows]), "กิจกรรมรายวัน");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([t.room.head, ...t.room.rows]), "ยอดขายห้องพัก");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([t.functions.head, ...t.functions.rows]), "งาน Function");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(t.plan), "Action Plan");
      const b64 = XLSX.write(wb, { bookType:"xlsx", type:"base64" });
      const { data:{ session } } = await sb.auth.getSession();
      const res = await fetch(REPORT_EMAIL_FUNCTION_URL, {
        method:"POST",
        headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+(session?session.access_token:SUPABASE_ANON_KEY) },
        body: JSON.stringify({ to, subject, body, filename:reportFileBase()+".xlsx", attachmentBase64:b64 })
      });
      if(!res.ok) throw new Error("HTTP "+res.status+" "+(await res.text()));
      alert("ส่งรายงานเข้าอีเมล "+to+" เรียบร้อยแล้ว ✓");
      return;
    }catch(e){ alert("ส่งอัตโนมัติไม่สำเร็จ: "+(e.message||e)+"\n\nจะเปิดโปรแกรมอีเมลให้แทน"); }
  }

  // โหมดสำรอง: เปิดโปรแกรมอีเมล (mailto) + ดาวน์โหลดไฟล์ Excel ให้แนบเอง
  exportReportExcel();
  const mailto = "mailto:"+encodeURIComponent(to)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body+"\n\n*กรุณาแนบไฟล์ Excel ที่เพิ่งดาวน์โหลด ("+reportFileBase()+".xlsx) ก่อนส่ง");
  window.location.href = mailto;
}
function importData(evt){
  if(!guardManage()){ evt.target.value=""; return; }
  const file = evt.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed.accounts || !parsed.pipeline) throw new Error("invalid");
      db = parsed; normalizeData(); saveData(); render(); alert("นำเข้าข้อมูลสำเร็จ");
    }catch(e){ alert("ไฟล์ไม่ถูกต้อง กรุณาตรวจสอบอีกครั้ง"); }
  };
  reader.readAsText(file);
}

/* ---- Auto logout เมื่อไม่มีการใช้งานเกิน 30 นาที ----
   นับเวลาจากการขยับเมาส์/พิมพ์/แตะ/เลื่อนหน้าจอครั้งล่าสุด
   ถ้าเงียบเกิน 30 นาที → ออกจากระบบอัตโนมัติ แล้วบังคับให้ล็อกอินใหม่ */
const IDLE_LIMIT_MS = 30 * 60 * 1000; // 30 นาที
let idleTimer = null;
let idleWatchStarted = false;

async function autoLogoutIdle(){
  clearTimeout(idleTimer);
  try{ if(sb) await sb.auth.signOut(); }catch(e){}
  currentUser = null;
  try{ sessionStorage.clear(); }catch(e){}
  alert("ออกจากระบบอัตโนมัติ เนื่องจากไม่มีการใช้งานเกิน 30 นาที\nกรุณาเข้าสู่ระบบใหม่อีกครั้ง");
  location.reload();
}
function resetIdleTimer(){
  if(!CLOUD || !currentUser) return;
  clearTimeout(idleTimer);
  idleTimer = setTimeout(autoLogoutIdle, IDLE_LIMIT_MS);
}
function startIdleWatch(){
  if(idleWatchStarted || !CLOUD) return;
  idleWatchStarted = true;
  ["mousemove","mousedown","keydown","scroll","touchstart","click"].forEach(ev=>
    document.addEventListener(ev, resetIdleTimer, { passive:true }));
  resetIdleTimer();
}

function renderLogin(msg){
  document.getElementById("app").innerHTML = `
  <div class="min-h-screen flex items-center justify-center px-4" style="background:linear-gradient(120deg,#0f3a52,#12657f);">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
      <div class="text-lg font-bold text-slate-800">Plaai Group <span class="font-normal text-slate-400">| Sales Ops</span></div>
      <div class="text-sm text-slate-500 mb-4">เข้าสู่ระบบเพื่ออัปเดตข้อมูลร่วมกัน</div>
      <label class="block text-sm text-slate-600">อีเมล
        <input id="login_email" type="email" class="${inputCls}" placeholder="you@company.com" onkeydown="if(event.key==='Enter')doLogin()"/></label>
      <label class="block text-sm text-slate-600 mt-2">รหัสผ่าน
        <input id="login_pw" type="password" class="${inputCls}" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></label>
      <div id="login_err" class="text-xs text-rose-500 mt-2 min-h-[16px]">${msg||""}</div>
      <button onclick="doLogin()" class="btn btn-primary w-full py-2 mt-2">เข้าสู่ระบบ</button>
      <div class="text-xs text-slate-400 mt-3">บัญชีผู้ใช้เพิ่มได้จากหน้า Supabase (Authentication &gt; Users) โดยผู้ดูแลระบบ</div>
    </div>
  </div>
  <div id="modalRoot"></div>`;
}
// แปลงข้อความ error ของ Supabase เป็นภาษาไทยที่เข้าใจง่าย
function loginErrorTh(error){
  const code = error.code || "", msg = (error.message||"").toLowerCase();
  if(code==="invalid_credentials" || msg.includes("invalid login credentials"))
    return "อีเมลหรือรหัสผ่านไม่ถูกต้อง — ตรวจตัวพิมพ์เล็ก/ใหญ่ของรหัสผ่านอีกครั้ง หรือติดต่อแอดมินเพื่อรีเซ็ตรหัส";
  if(code==="email_not_confirmed" || msg.includes("email not confirmed"))
    return "บัญชีนี้ยังไม่ได้ยืนยันอีเมล — กรุณาเปิดอีเมลของคุณแล้วกดลิงก์ยืนยัน หรือแจ้งแอดมินให้กด Confirm ในระบบ";
  if(msg.includes("network") || msg.includes("fetch"))
    return "เชื่อมต่ออินเทอร์เน็ต/เซิร์ฟเวอร์ไม่ได้ — ตรวจสัญญาณเน็ตแล้วลองใหม่";
  return "เข้าสู่ระบบไม่สำเร็จ: "+error.message;
}
async function doLogin(){
  const email = val("login_email").trim().toLowerCase(), password = val("login_pw");
  const errEl = document.getElementById("login_err");
  if(!email || !password){ if(errEl) errEl.textContent="กรุณากรอกอีเมลและรหัสผ่าน"; return; }
  if(errEl) errEl.textContent="กำลังเข้าสู่ระบบ...";
  try{
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ if(errEl) errEl.textContent=loginErrorTh(error); return; }
    const { data:{ session } } = await sb.auth.getSession();
    currentUser = session ? session.user : null;
    await cloudBootstrap();
  }catch(e){ if(errEl) errEl.textContent="เกิดข้อผิดพลาด: "+(e.message||e); }
}
async function logout(){
  clearTimeout(idleTimer);
  try{ await sb.auth.signOut(); }catch(e){}
  currentUser = null;
  try{ sessionStorage.clear(); }catch(e){}   // ล้าง session ให้หมด กันเข้าระบบซ้ำโดยไม่ล็อกอิน
  location.reload();
}
async function initCloud(){
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(session){ currentUser = session.user; await cloudBootstrap(); }
    else { renderLogin(); }
  }catch(e){
    console.error(e); renderLogin("เชื่อมต่อระบบไม่สำเร็จ กรุณาลองใหม่");
  }
}
